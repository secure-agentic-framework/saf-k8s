- control_id: SAF-K8S-1001-012
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.1'
  control_seq: '012'
  control_title: SIEM correlation rules for AI-specific attack patterns
  control_statement: Organizations must develop and maintain SIEM correlation rules that detect AI-specific attack patterns, including unauthorized model access, anomalous GPU utilization, training job manipulation, and inference endpoint abuse.
  objective: Detect sophisticated attacks targeting AI workloads through purpose-built SIEM correlation rules that recognize AI-specific threat patterns not captured by generic infrastructure detection logic.
  rationale: Generic SIEM correlation rules designed for traditional workloads do not detect AI-specific attack patterns such as GPU cryptomining through sustained utilization without a matching training job, unauthorized model deployment via InferenceService creation by an unexpected ServiceAccount, or inference endpoint abuse via request rate spikes. Purpose-built correlation rules are required to surface these patterns from the AI workload event streams ingested per SAF-K8S-1001-006.
  scope: Applies to all production Kubernetes clusters hosting AI workloads. Covers SIEM correlation rule sets for AI-specific attack detection scenarios. Depends on SIEM ingestion being operational per SAF-K8S-1001-006.
  primary_enforcement_point: Correlation rule engine management within the SIEM platform.
  implementation_surface: 'Correlation rules covering: unauthorized model deployment via InferenceService CREATE by unexpected ServiceAccount, GPU cryptomining via sustained utilization without matching training job, training job manipulation via PATCH/UPDATE by non-owner ServiceAccount, inference endpoint abuse via request rate spikes, model exfiltration via large egress from model storage PV, and audit evasion via audit policy ConfigMap UPDATE.'
  owner_primary: Detection Engineering
  owner_supporting: Security Operations; AI/ML Engineering; Platform Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
