- control_id: SAF-K8S-0203-013
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.3'
  control_seq: '013'
  control_title: Kernel lockdown mode enforcement for runtime integrity
  control_statement: Kubernetes nodes must enable kernel lockdown mode where supported so runtime loading of unsigned or unauthorized kernel code and direct kernel modification interfaces are restricted after boot.
  objective: Reduce post-boot kernel tampering opportunities through kernel lockdown enforcement where supported.
  rationale: Kernel lockdown mode restricts even privileged processes from loading unsigned modules or modifying kernel memory after boot, providing defense-in-depth when an attacker gains root on the node. This is distinct from module blacklisting because it enforces runtime integrity boundaries inside the kernel itself.
  scope: Applies to all production cluster nodes regardless of boot verification support. Nodes requiring specific kernel modules (e.g., GPU drivers, InfiniBand) must whitelist only required modules and document exceptions. DKMS-signed modules must have their signing keys validated.
  primary_enforcement_point: Node boot and runtime kernel integrity settings for supported platforms and node pools.
  implementation_surface: Kernel lockdown mode configuration and validation via runtime securityfs status checks, plus supported-platform exception handling.
  owner_primary: OS/Infrastructure
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
