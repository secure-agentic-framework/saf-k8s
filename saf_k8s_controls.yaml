  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.3'
  control_seq: '16'
  control_title: AI workload PriorityClass hierarchy and preemption protection
  control_statement: Organizations must define PriorityClass objects for system-critical, production inference, training, and development AI workload tiers, and must configure preemption policies that preserve inference availability by preventing lower-value or lower-priority workloads from displacing protected serving capacity.
  objective: Ensure that production inference workloads maintain availability during resource contention by establishing explicit AI workload priority tiers with preemption protection.
  rationale: Without defined priority tiers, Kubernetes may treat latency-sensitive inference, batch training, and development notebooks as equivalent competitors for scarce GPU capacity. Without explicit preemption behavior, lower-value workloads can crowd out or displace protected inference services during saturation, degrading production availability and creating avoidable service interruptions.
  scope: Applies to all Kubernetes clusters with GPU resources or dedicated AI workloads. PriorityClass definitions must cover at minimum system-critical, inference-production, training-default, and development-low tiers. Single-tenant dedicated clusters may use simplified hierarchies with documented justification.
  primary_enforcement_point: PriorityClass objects and preemptionPolicy settings applied to AI workload tiers.
  implementation_surface: PriorityClass objects (scheduling.k8s.io/v1) with tiered value hierarchy and preemptionPolicy configuration (PreemptLowerPriority, Never) protecting inference and cluster-critical workloads from lower-priority displacement.
  owner_primary: Platform Engineering
  owner_supporting: ML Engineering; FinOps
