  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.1'
  control_seq: '033'
  control_title: Tamper-resistant retention for Kubernetes AI audit backends
  control_statement: Production Kubernetes clusters running AI workloads must use tamper-resistant retention settings on audit backends so retained audit records cannot be silently altered, prematurely deleted, or lost before the required evidence window expires.
  objective: Ensure that delivered audit records remain retained and tamper-resistant for the required evidence window after reaching the backend.
  rationale: Durable delivery is insufficient if attackers or misconfiguration can alter or prematurely purge backend audit records after arrival. Tamper-resistant retention preserves the evidentiary value of audit data by preventing silent overwrites or early deletion within the required retention window.
  scope: Applies to storage backends receiving Kubernetes and AI workload audit data, including SIEM repositories, logging platforms, object storage, and archival systems. Covers backend-side retention immutability, deletion resistance, and evidence-window preservation. Excludes the transport path that delivers records to the backend.
  primary_enforcement_point: Audit backend retention and immutability configuration.
  implementation_surface: Tamper-resistant retention settings for audit backends, immutable or WORM-like storage controls, backend deletion restrictions, and configuration preventing early purge of retained audit data within the required evidence window.
  owner_primary: Security Operations
  owner_supporting: Platform Engineering; GRC/Compliance
