- control_id: SAF-K8S-0402-020
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.2'
  control_seq: '020'
  control_title: Projected service account token issuance path enforcement
  control_statement: Kubernetes clusters must issue workload service account tokens only through projected service account token volumes or the TokenRequest API, and must enforce those issuance paths through admission and policy controls instead of allowing legacy secret-mounted token delivery.
  objective: Ensure workload identity tokens are issued only through explicit projected-token mechanisms with verifiable request flows.
  rationale: Projected token volumes and TokenRequest-based issuance provide a controlled, inspectable token delivery path that avoids implicit secret mounting and enables workload identity policies to verify how a token was issued. Without issuance-path enforcement, workloads can fall back to legacy or unmanaged token delivery paths that are harder to govern and rotate.
  scope: Applies to all workload service account token issuance paths used for in-cluster and federated workload authentication.
  primary_enforcement_point: Admission and policy enforcement for workload token issuance method and legacy token delivery prohibition.
  implementation_surface: Projected ServiceAccountToken volume configuration, TokenRequest API usage, and admission controls enforcing projected-token issuance paths.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Application Development
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0402-021
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.2'
  control_seq: '021'
  control_title: Workload token explicit audience binding
  control_statement: Projected workload service account tokens must specify explicit audiences appropriate to the target Kubernetes API or external relying service, and clusters must validate that workload token configurations do not issue audience-agnostic tokens for federated or API access.
  objective: Prevent replay of workload tokens against unintended relying parties by requiring explicit audience binding for issued service account tokens.
  rationale: Audience binding limits where a stolen token can be replayed. Even when projected tokens are used, a token without the correct explicit audience can be accepted too broadly by relying services or reused against unintended APIs. Explicit audience control narrows token use to the intended trust boundary.
  scope: Applies to all projected workload service account tokens used against the Kubernetes API server or external relying services such as cloud workload identity endpoints.
  primary_enforcement_point: Projected token audience configuration validation and relying-service workload identity checks.
  implementation_surface: Projected ServiceAccountToken volume audience settings, TokenRequest audience parameters, and validation evidence showing relying services accept only intended audience-bound tokens.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Application Development
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
