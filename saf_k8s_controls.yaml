- control_id: SAF-K8S-0505-007
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.5'
  control_seq: '007'
  control_title: Administrative API server access path via bastion or VPN
  control_statement: Administrative access to Kubernetes API server endpoints must traverse bastion hosts, VPN connections, or equivalent managed private access paths rather than direct public internet exposure.
  objective: Ensure human and automation administrators reach the API server only through controlled private access paths.
  rationale: Even when API server endpoints are restricted, administrative workflows can still reintroduce exposure if operators, CI/CD systems, or support personnel connect over unmanaged public paths. Bastions, VPNs, and equivalent managed private access paths create a chokepoint for authentication, logging, and operational control.
  scope: Applies to all production Kubernetes clusters. Managed Kubernetes services must use private endpoint or authorized network features. Self-managed clusters must place API servers on private networks with bastion or VPN access. Non-production clusters with access to production secrets or infrastructure must also restrict API server access.
  primary_enforcement_point: Bastion host access controls, VPN access controls, and equivalent managed private administrative access pathways.
  implementation_surface: Bastion host deployments with MFA-protected SSH access, VPN configurations for kubectl and automation access, private access gateways, SSH tunneling patterns, and access logs demonstrating that administrative API usage traverses managed access points.
  owner_primary: Platform Engineering
  owner_supporting: Network Engineering; Security Engineering; Cloud Platform Engineering
