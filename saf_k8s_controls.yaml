- control_id: SAF-K8S-0203-012
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.3'
  control_seq: '012'
  control_title: Kernel module restriction and approved module whitelisting
  control_statement: Kubernetes nodes must restrict kernel module loading by disabling unnecessary modules, blacklisting known-risky modules, and maintaining an approved whitelist of required modules for node functions such as GPU drivers or InfiniBand support.
  objective: Prevent unauthorized or unnecessary kernel modules from expanding the host kernel attack surface.
  rationale: Unrestricted kernel module loading allows post-exploitation installation of rootkits, sniffers, and other kernel-resident capabilities below container isolation boundaries. Restricting modules through blacklists and approved whitelists is independently auditable from kernel lockdown mode because it governs which modules are permitted to exist on the running node.
  scope: Applies to all production cluster nodes regardless of boot verification support. Nodes requiring specific kernel modules (e.g., GPU drivers, InfiniBand) must whitelist only required modules and document exceptions. DKMS-signed modules must have their signing keys validated.
  primary_enforcement_point: Node image build pipeline, modprobe configuration, and approved module inventory for production node pools.
  implementation_surface: Kernel module blacklisting in /etc/modprobe.d/, approved module whitelist validation, lsmod verification, and exception handling for required modules such as signed GPU drivers.
  owner_primary: OS/Infrastructure
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
