- control_id: SAF-K8S-0909-008
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.9'
  control_seq: 008
  control_title: Classification-aware chunking and vector collection segregation
  control_statement: RAG document chunking and indexing pipelines must apply classification-aware chunking strategies, preserve source classification metadata on each chunk, and prevent cross-classification content mixing within the same vector collection or retrieval scope.
  objective: Preserve document classification boundaries through chunking and indexing so that retrieval cannot silently mix content across classification levels or tenant trust zones.
  rationale: Chunking is where document-level security boundaries are often lost. If confidential and lower-sensitivity content are mixed in the same collection or retrieval scope, downstream retrieval can leak higher-classification content even when the source repository was properly controlled. Classification-aware chunking and collection segregation preserve those boundaries inside the vector layer.
  scope: Applies to chunking and indexing pipelines for RAG systems on Kubernetes. Covers chunk boundary strategy, metadata tagging, collection-level separation by classification, and retrieval-scope segregation. Excludes source repository authentication and initial document provenance admission checks.
  primary_enforcement_point: Chunking configuration, chunk metadata tagging, vector collection design, and retrieval scope enforcement in the vector database.
  implementation_surface: Classification-aware chunking configuration, chunk metadata tagging with source document classification, separate vector collections or equivalent retrieval scopes per classification level, and chunk overlap controls that avoid mixing differently classified content.
