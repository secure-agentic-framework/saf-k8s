  date_modified: '2026-03-17'
- control_id: SAF-K8S-0502-010
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.2'
  control_seq: '010'
  control_title: Kubernetes CNI IP pool exhaustion monitoring and alerting
  control_statement: IP address management for Kubernetes networking must be monitored to detect impending pod, service, or node IP pool exhaustion before scheduling failures or service outages occur.
  objective: Detect impending IP pool exhaustion early enough to prevent availability impact from depleted pod, service, or node address ranges.
  rationale: Even correctly sized IP pools can be depleted over time by growth or abnormal consumption. Separate monitoring and alerting from sizing so exhaustion detection and response can be independently audited.
  scope: Applies to all Kubernetes clusters. Covers pod CIDR, service CIDR, and node CIDR range sizing, utilization monitoring, exhaustion thresholds, and alerting for IP address pool depletion.
  primary_enforcement_point: CNI plugin IP pool utilization monitoring and alerting.
  implementation_surface: IP pool utilization monitoring, exhaustion thresholds, alerting for pod, service, and node CIDR depletion, and operational review of capacity trend signals.
  owner_primary: Network Engineering
  owner_supporting: Platform Engineering; Security Operations
  baseline_or_ai_specific: baseline
  maturity: Practitioner
