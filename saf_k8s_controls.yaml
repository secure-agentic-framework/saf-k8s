  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.4'
  control_seq: '015'
  control_title: Experiment tracking metadata access control and tenant visibility enforcement
  control_statement: Experiment tracking systems must enforce access controls on experiment metadata, hyperparameters, metrics, and run history through project-, run-, and tenant-scoped authorization that limits visibility and modification to approved principals.
  objective: Protect the confidentiality and integrity of experiment tracking metadata by restricting who can view and modify experiment records.
  rationale: Experiment metadata exposes proprietary model configurations, hyperparameters, evaluation results, and tuning decisions. Without fine-grained authorization and tenant-scoped visibility limits, users can harvest sensitive ML intellectual property or alter experiment records outside their approved scope.
  scope: Applies to experiment tracking platforms such as MLflow and Weights & Biases deployed on Kubernetes or used by Kubernetes-based ML platforms. Covers metadata authorization, project or run-level RBAC, and tenant-scoped visibility controls. Excludes audit logging, which is addressed separately.
  primary_enforcement_point: Experiment tracking server authorization policy and tenant-scoping configuration.
  implementation_surface: Experiment tracking platform authentication and authorization settings, project and run-level RBAC, tenant-scoped metadata visibility controls, and authorization tests demonstrating that unauthorized principals cannot read or modify experiment records.
