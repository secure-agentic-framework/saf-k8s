  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.10'
  control_seq: '027'
  control_title: Cross-cluster registry federation endpoint authorization and reconciliation governance
  control_statement: Model registry federation across clusters must govern federation membership so that only authorized registry endpoints can join, remain in, or receive artifacts from the federation, and periodic reconciliation must detect unauthorized or inconsistent federation endpoints.
  objective: Prevent unauthorized registry endpoints from participating in cross-cluster model federation by enforcing endpoint authorization and periodic reconciliation governance.
  rationale: Federated artifact distribution expands blast radius if unauthorized, isolated, or drifted registry endpoints can remain in replication topologies. Explicit endpoint authorization and periodic reconciliation keep federation membership limited to approved endpoints and expose drift before unauthorized clusters continue receiving or publishing artifacts.
  scope: Applies to federated model registries and cross-cluster artifact replication topologies that maintain authorized endpoint registries, endpoint onboarding and revocation workflows, and reconciliation scans across clusters or regions. Excludes preservation of provenance metadata inside the replicated artifacts themselves.
  primary_enforcement_point: Authorized federation endpoint registry, onboarding and revocation workflow, and reconciliation of active federation membership.
  implementation_surface: Authorized federation endpoint registries, change-managed endpoint onboarding and revocation, reconciliation scans for endpoint drift, and controls that prevent unauthorized registry endpoints from joining, remaining in, or receiving artifacts from the federation.
