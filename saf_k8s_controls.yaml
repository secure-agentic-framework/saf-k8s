- control_id: SAF-K8S-0702-016
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.2'
  control_seq: '016'
  control_title: Classification metadata preservation across model lifecycle stages
  control_statement: Organizations must preserve data and model classification metadata across development, staging, and production lifecycle stages so promoted artifacts retain the classification attributes needed for downstream security and governance controls.
  objective: Prevent classification drift and loss of sensitivity metadata as models and related artifacts move across lifecycle stages and environments.
  rationale: If classification metadata is dropped as artifacts move from development to staging or production, downstream access, network, audit, and privacy controls can be misapplied or omitted entirely. Preserving metadata across the lifecycle is a distinct obligation from reclassifying it for a stricter target environment.
  scope: Applies to AI model artifacts and associated metadata as they move through development, staging, and production. Covers model weights, model configuration, serving manifests, model registry metadata, and associated training-data references.
  primary_enforcement_point: Model registry metadata, artifact metadata, and promotion pipeline metadata preservation.
  implementation_surface: Model registry OCI annotations and metadata for classification attributes, promotion pipelines preserving metadata across stage transitions, and serving manifests or deployment metadata carrying classification attributes forward into target environments.
  owner_primary: ML Engineering
  owner_supporting: Data Governance; Platform Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0702-018
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.2'
  control_seq: 018
  control_title: Namespace tenant boundary model and isolation limitation documentation
  control_statement: Organizations must define and document the namespace-based tenant isolation model for multi-tenant clusters hosting AI workloads and must document the isolation properties and limitations of namespaces as a security boundary relative to the threat model.
  objective: Establish clear tenant boundary design decisions for namespace-based multi-tenancy and ensure operators understand both the intended isolation properties and the limitations of namespaces as a security boundary.
  rationale: Namespaces provide logical separation but not complete security isolation by themselves. Without a documented boundary model and explicit statement of namespace limitations, teams adopt inconsistent tenant layouts and overestimate the protection namespaces provide. This design and documentation obligation is distinct from implementing the supplementary controls that enforce the chosen isolation level.
  scope: Applies to all multi-tenant Kubernetes clusters where multiple teams, projects, or workload types share infrastructure. Covers selection and documentation of the namespace isolation model and its stated security-boundary limitations for AI and non-AI workloads.
  primary_enforcement_point: Namespace design standards and documented tenant boundary decisions.
  implementation_surface: Namespace isolation model documentation, tenant boundary design records, per-team or per-workload namespace patterns, vCluster or HNC design decisions, and documented statements of what namespaces do and do not isolate.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; ML Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0702-019
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.2'
  control_seq: 019
  control_title: Supplementary namespace isolation control enforcement for multi-tenant AI clusters
  control_statement: Organizations must implement and periodically validate supplementary controls, including network policies, namespace-scoped RBAC, admission controls, and isolation testing, to achieve the required isolation level between AI and non-AI workloads in namespace-based multi-tenant clusters.
  objective: Enforce and validate the supplementary technical controls required to make namespace-based tenant isolation effective in practice.
  rationale: A documented namespace model is insufficient unless supporting controls actually enforce the intended boundary. Without network isolation, RBAC scoping, admission restrictions, and periodic isolation validation, namespaces become a weak logical grouping rather than an effective tenant boundary. This enforcement obligation is distinct from selecting and documenting the boundary model itself.
  scope: Applies to all multi-tenant Kubernetes clusters where namespaces are used as tenant boundaries. Covers the supporting network, RBAC, admission, and validation controls required to enforce the intended isolation level between AI and non-AI workloads.
  primary_enforcement_point: NetworkPolicy, namespace-scoped RBAC, admission policies, and isolation validation procedures.
  implementation_surface: Default-deny inter-namespace traffic rules, namespace-scoped RBAC bindings, admission controls blocking disallowed cross-namespace references, periodic isolation tests, and other supplementary controls that make namespace-based multi-tenancy effective.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; ML Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
