- control_id: SAF-K8S-1004-002
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.4'
  control_seq: '002'
  control_title: Software supply chain threat model per NIST SP 800-204D
  control_statement: Organizations must apply the NIST SP 800-204D software supply chain threat model to their Kubernetes CI/CD and AI pipeline infrastructure, analyzing the three-stage SSC attack lifecycle (Compromise, Propagation, Exploitation), distinguishing SSC defects from SSC attacks, identifying attack targets (source code, credentials, build systems, internal operations) and attack vectors (dependency confusion, typosquatting, malicious PRs, compromised build tools), and must implement controls at each stage to disrupt the attack lifecycle.
  objective: Systematically identify and mitigate software supply chain threats to Kubernetes and AI pipeline infrastructure using the NIST SP 800-204D framework, preventing adversaries from compromising the build and deployment chain of AI workloads.
  rationale: AI pipelines depend on complex software supply chains, including ML frameworks, model repositories, training data sources, and container images, that are vulnerable to supply chain attacks at each stage. Without a structured threat model distinguishing defects from deliberate attacks and mapping specific vectors to Kubernetes CI/CD components, organizations cannot prioritize controls for the highest-risk supply chain entry points such as compromised model registries or poisoned base images.
  scope: Applies to all CI/CD pipelines, container image build systems, model registries, and artifact repositories supporting Kubernetes AI workloads. Covers source code management, dependency resolution, build environments, and artifact distribution channels. Must be reviewed when pipeline architecture or dependency sources change.
  primary_enforcement_point: CI/CD pipeline security configuration, supply chain security review process, and artifact provenance verification gates.
  implementation_surface: NIST SP 800-204D software supply chain threat model documentation, three-stage SSC attack lifecycle analysis (Compromise, Propagation, Exploitation), CI/CD pipeline infrastructure security controls (source code repositories, build systems, artifact registries), SSC attack vector identification (dependency confusion, typosquatting, malicious PRs, compromised build tools), SSC defect vs. SSC attack classification, Kubernetes CI/CD and AI pipeline infrastructure analysis (model training pipelines, container image builds, model registry operations), and disruption controls at each lifecycle stage.
  owner_primary: Security Architecture
  owner_supporting: DevOps/Platform Engineering; AI/ML Engineering; Supply Chain Security
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-1004-004
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.4'
  control_seq: '004'
  control_title: Kubernetes AI threat intelligence feed ingestion and detection enrichment
  control_statement: Organizations must consume Kubernetes CVE feeds, runtime threat intelligence, and relevant external threat-sharing sources for Kubernetes AI environments, and must use that intelligence to develop, maintain, and prioritize detection rules and exposure assessments.
  objective: Keep Kubernetes AI detection and exposure analysis current by continuously ingesting actionable external threat intelligence and translating it into operational detections and triage inputs.
  rationale: Kubernetes AI environments are affected by rapidly changing vulnerability disclosures, runtime threat indicators, and ecosystem-wide attacker tradecraft. Without disciplined feed ingestion and detection enrichment, defenders miss emerging exposure, detection logic becomes stale, and response teams lose time re-deriving threat context during active incidents.
  scope: Applies to security operations teams responsible for Kubernetes AI infrastructure. Covers external feed ingestion, threat-sharing participation, rule enrichment, and vulnerability exposure assessment for AI platforms, clusters, runtimes, and supporting components.
  primary_enforcement_point: Threat intelligence platform configuration, detection rule management system, and feed-driven exposure assessment workflow in SIEM or SOAR.
  implementation_surface: Kubernetes CVE feed consumption, NVIDIA and platform security bulletin monitoring, runtime threat intelligence feeds, automated or analyst-driven threat-sharing intake, SIEM detection rule development from threat intelligence, indicator ingestion, and enrichment workflows for vulnerability and attack exposure assessment.
  owner_primary: Security Operations
  owner_supporting: Threat Intelligence; Detection Engineering; Security Architecture
