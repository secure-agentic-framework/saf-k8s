- control_id: SAF-K8S-0606-026
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.6'
  control_seq: '026'
  control_title: Automated SCM security posture assessment before promotion reliance
  control_statement: Source repositories must be continuously assessed with OpenSSF Scorecard or equivalent automated SCM posture tooling, and promotion decisions must not rely on repositories whose security posture fails defined acceptance criteria.
  objective: Reduce reliance on insecure source repositories by enforcing automated SCM posture assessment as an input to promotion trust.
  rationale: A repository with weak branch protection, unsafe workflows, or poor dependency hygiene can undermine deployment trust even when a specific artifact is fresh. Automated SCM posture assessment is independently auditable because it evaluates repository governance and workflow security rather than artifact age.
  scope: Applies to source repositories whose outputs may be promoted to production. Covers continuous repository posture assessment and promotion decisions that depend on repository trustworthiness.
  primary_enforcement_point: SCM posture assessment tooling and promotion trust policy.
  implementation_surface: Automated repository posture assessment tooling such as OpenSSF Scorecard, repository acceptance thresholds, and promotion controls that require passing SCM security posture results before repository outputs are trusted for release.
  owner_primary: DevSecOps / Release Engineering
  owner_supporting: Security Engineering; Development Teams
  baseline_or_ai_specific: baseline
  maturity: Practitioner
