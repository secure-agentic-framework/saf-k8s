  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.2'
  control_seq: 008
  control_title: Inference endpoint authentication and authorization
  control_statement: Inference model endpoints must enforce authentication and authorization via API gateway integration, token validation, and per-model access controls to ensure that only authorized clients can invoke specific models.
  objective: Prevent unauthorized access to model inference endpoints by enforcing per-model authentication and authorization at the API gateway or ingress layer.
  rationale: Without endpoint authentication and per-model authorization, any network-reachable client can invoke any model, enabling data exfiltration through model abuse or unauthorized use of high-cost GPU resources.
  scope: Applies to all inference endpoints exposed on Kubernetes. Covers API gateway and ingress configurations for model endpoints, OAuth/mTLS token validation, and per-model RBAC or token-based access controls. Excludes model loading integrity covered by SAF-K8S-0902-002.
  primary_enforcement_point: API gateway policies and ingress controller authentication settings for inference endpoints.
  implementation_surface: API gateway policies (Kong, Envoy, Istio ingress) for per-model authentication and authorization, OAuth/mTLS token validation configuration, per-model RBAC access control rules, and service mesh AuthorizationPolicy for inference services.
  owner_primary: API Platform Engineering
  owner_supporting: ML Platform Engineering; Security Engineering
