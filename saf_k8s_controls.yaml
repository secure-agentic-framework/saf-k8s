- control_id: SAF-K8S-0203-004
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.3'
  control_seq: '004'
  control_title: Secure boot and verified boot chain enforcement
  control_statement: Kubernetes nodes must enable UEFI Secure Boot or equivalent verified boot chain mechanisms to ensure only signed bootloaders and kernels execute, establishing hardware-rooted trust in the node boot process.
  objective: Establish hardware-rooted trust in the node boot process so that only verified, signed software executes from firmware through kernel initialization.
  rationale: Without verified boot, an attacker with host access can replace the kernel or bootloader with a compromised version that disables security controls before the container runtime starts. Secure Boot validates cryptographic signatures at each stage of the boot chain, preventing tampered kernels from executing and ensuring that all subsequent security controls (container isolation, runtime monitoring, mandatory access control) operate on a trusted foundation.
  scope: Applies to all production cluster nodes where the hardware and OS support UEFI Secure Boot. Cloud environments must enable Secure Boot on instance types that support it. Nodes on hardware that does not support Secure Boot must document this as a risk acceptance with compensating controls such as measured boot with remote attestation.
  primary_enforcement_point: Cloud instance launch templates with Secure Boot enabled and node image build pipeline with signed kernel verification.
  implementation_surface: UEFI Secure Boot configuration, cloud instance launch templates (AWS, GCP, Azure Secure Boot settings), node image build pipeline boot chain verification, and measured boot attestation where available.
  owner_primary: Cloud Infrastructure
  owner_supporting: OS/Infrastructure; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0203-008
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.3'
  control_seq: 008
  control_title: Pod metadata endpoint network path blocking
  control_statement: Cloud-hosted Kubernetes clusters must implement network-level controls that prevent pod workloads from directly accessing cloud metadata endpoints, including host-network and local-routing paths where applicable.
  objective: Block pod reachability to cloud metadata services so SSRF, host-network abuse, or compromised workloads cannot retrieve node-scoped cloud credentials through metadata endpoints.
  rationale: Even when cloud metadata services support hardened modes, pod workloads may still attempt to reach metadata endpoints through routable local addresses. This control isolates the network-path blocking obligation so teams can independently verify that pod traffic cannot reach metadata services.
  scope: Applies to cloud-hosted Kubernetes clusters where pods can otherwise route to metadata endpoints such as 169.254.169.254. Covers NetworkPolicy, host firewall, iptables, and CNI controls used to block metadata paths from pod networks.
  primary_enforcement_point: Node and cluster networking controls for pod credential access paths.
  implementation_surface: NetworkPolicy or host-level filtering for metadata endpoints and validation tests confirming pods cannot reach metadata services.
  owner_primary: Cloud Infrastructure
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: baseline
