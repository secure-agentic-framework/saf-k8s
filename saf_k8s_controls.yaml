- control_id: SAF-K8S-0702-024
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.2'
  control_seq: '024'
  control_title: Tenant namespace-scoped RBAC boundary enforcement
  control_statement: Organizations must enforce tenant boundaries at the Kubernetes API layer by restricting tenant users and service accounts to namespace-scoped RBAC bindings and by reviewing grants to prevent cross-namespace or shared-cluster privilege expansion.
  objective: Prevent cross-tenant API access by enforcing namespace-scoped RBAC boundaries for tenant identities.
  rationale: RBAC determines who can act through the Kubernetes API. If tenant users or service accounts receive cross-namespace or cluster-wide grants, they can bypass tenant isolation even when runtime network boundaries exist. Namespace-scoped RBAC enforcement is therefore a distinct tenant-boundary control.
  scope: Applies to all multi-tenant Kubernetes clusters. Tenant users and service accounts must be bound only to approved namespace-scoped roles unless an explicitly governed shared-service exception exists.
  primary_enforcement_point: RoleBinding and ClusterRoleBinding review for cross-namespace or cluster-wide grant detection.
  implementation_surface: Namespace-scoped RoleBindings, restricted ClusterRoleBindings, service account binding reviews, and recurring RBAC audit evidence confirming tenant identities remain scoped to their namespaces.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Network Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
