- control_id: SAF-K8S-0606-028
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.6'
  control_seq: 028
  control_title: GitOps commit signing and protected deployment branch governance
  control_statement: GitOps deployment repositories must require signed commits on deployment branches and enforce branch protection rules including pull request approval and required status checks before reconciled changes can reach controlled environments.
  objective: Ensure changes to Git-based deployment sources are cryptographically attributable and pass protected review gates before reconciliation.
  rationale: Repository access restriction alone does not ensure that changes are reviewable, attributable, and policy-compliant. Signed commits and protected deployment branches are independently auditable because they govern how authorized changes are validated and approved before GitOps reconciliation occurs.
  scope: Applies to Git repositories used as deployment sources for Flux or Argo CD in staging and production environments. Covers commit signature verification, pull request review, and protected deployment branch policy.
  primary_enforcement_point: Deployment branch governance and commit verification policy.
  implementation_surface: Commit signature verification on GitOps deployment branches, protected branch rules with pull request approval and required status checks, and review workflows governing changes before GitOps reconciliation.
  owner_primary: Platform Engineering
  owner_supporting: DevSecOps / Release Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
