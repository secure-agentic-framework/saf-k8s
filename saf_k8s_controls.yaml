- control_id: SAF-K8S-0901-009
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.1'
  control_seq: 009
  control_title: Multi-node training worker mutual authentication
  control_statement: Multi-node distributed training jobs must enforce mutual authentication between worker nodes so only authorized participants can join inter-worker training communication.
  objective: Prevent rogue worker participation in distributed training by requiring explicit worker identity verification before gradient exchange begins.
  rationale: Distributed training jobs create ephemeral peer groups that exchange sensitive gradient data and influence model state. Without mutual authentication, a rogue or mis-scheduled worker can join the training fabric, observe data, or inject poisoned updates.
  scope: Applies to multi-node distributed training workloads such as PyTorchJob, MPIJob, and TFJob that use multiple worker nodes or parameter exchange endpoints.
  primary_enforcement_point: Training job definitions and operator controls that provision and validate worker identities for inter-worker communication.
  implementation_surface: Training job manifests, operator configuration, mTLS identity distribution, worker certificates, and framework settings that require authenticated worker participation.
  owner_primary: ML Platform Engineering
  owner_supporting: Security Engineering; Network Engineering
