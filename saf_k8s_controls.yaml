- control_id: SAF-K8S-0902-001
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.2'
  control_seq: '001'
  control_title: Inference server hardening
  control_statement: Inference servers (vLLM, Triton, TGI, KServe) must run with minimal privileges, mount model artifacts as read-only volumes, restrict network access to required endpoints only, and follow a defined patching cadence for serving frameworks, CUDA runtime, and API dependencies.
  objective: Reduce the attack surface of inference servers by enforcing least-privilege execution, immutable model storage, network segmentation, and timely vulnerability remediation.
  rationale: Inference servers are internet-facing or internally exposed services that process untrusted input. Running with excessive privileges or writable model mounts enables post-exploitation persistence and model tampering. Unrestricted network access allows lateral movement from a compromised inference pod. Unpatched serving frameworks, CUDA runtimes, and API dependencies contain known vulnerabilities that attackers actively exploit.
  scope: Applies to all inference server deployments on Kubernetes, including vLLM, Triton Inference Server, TGI, and KServe InferenceService resources. Covers pod security context, volume mount configuration, network policies, and vulnerability management for serving stack dependencies. Excludes training workloads.
  primary_enforcement_point: Inference server pod security context, Kubernetes NetworkPolicy resources, volume mount specifications in deployment manifests, and container image vulnerability scanning pipelines.
  implementation_surface: Inference server pod security context (runAsNonRoot, readOnlyRootFilesystem, drop all capabilities, no privilege escalation), read-only volume mounts for model artifacts, Kubernetes NetworkPolicy restricting inference pod egress, resource limits (CPU, memory, GPU), liveness and readiness probes, container image vulnerability scanning for vLLM, Triton Inference Server, TGI, and KServe, CUDA runtime patching pipeline, and GitHub security advisory monitoring for serving frameworks.
  owner_primary: ML Platform Engineering
  owner_supporting: Security Engineering; Platform Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
