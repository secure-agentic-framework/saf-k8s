  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.1'
  control_seq: '035'
  control_title: SIEM ingestion health, delivery completeness, and source coverage monitoring
  control_statement: Organizations must monitor SIEM ingestion pipelines for Kubernetes audit logs and AI workload security events to verify delivery completeness, forwarding health, and expected source coverage for the telemetry required by the SOC.
  objective: Ensure that onboarded Kubernetes and AI security telemetry actually arrives completely and continuously in the SIEM.
  rationale: Initial forwarding configuration does not guarantee ongoing observability. Pipeline failures, partial delivery, or missing sources can silently blind detection and response. Continuous ingestion health, delivery completeness, and source coverage monitoring preserves trustworthy visibility for the SOC.
  scope: Applies to monitoring and verification of SIEM ingestion pipelines for Kubernetes and AI workload security telemetry. Covers delivery health, completeness checks, missing-source detection, and verification that expected telemetry feeds remain active. Excludes initial source onboarding and forwarding configuration itself.
  primary_enforcement_point: SIEM ingestion health monitoring and completeness verification.
  implementation_surface: Log forwarding health dashboards, delivery completeness checks, missing-source detection, pipeline health alerts, and source coverage verification for the Kubernetes and AI security telemetry required by the SOC.
