  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.1'
  control_seq: '023'
  control_title: Image pull credential automatic rotation and expiry reduction
  control_statement: Image pull credentials for authenticated registries must be rotated automatically to reduce the exposure window for leaked or stale registry credentials.
  objective: Reduce the usable lifetime of leaked registry pull credentials by enforcing automatic rotation and credential refresh workflows.
  rationale: Credential rotation is a distinct operational obligation from secret distribution. Even correctly stored pull secrets become a long-lived liability if they are not refreshed or expired automatically, especially in shared clusters and long-running workloads.
  scope: Applies to Kubernetes clusters and CI/CD workflows that use authenticated registries for pulling images. Covers image pull secret storage, synchronization from external secret managers, and automatic credential rotation.
  primary_enforcement_point: Image pull credential rotation automation and secret refresh workflows.
  implementation_surface: Automatic rotation configuration, secret refresh automation, registry credential renewal workflows, and logs or records showing pull secrets are rotated without manual long-lived reuse.
