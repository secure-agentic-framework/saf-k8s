  date_modified: '2026-03-17'
- control_id: SAF-K8S-0905-049
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: 049
  control_title: OCI model registry tag immutability and overwrite prevention
  control_statement: OCI registries that store or distribute models must enforce tag immutability and block tag overwrite or tag reuse so that approved model version tags cannot be retargeted after review.
  objective: Ensure that OCI registries storing approved models prevent post-review tag mutation or overwrite that could redirect downstream consumers to a different artifact.
  rationale: Even if consumers are expected to use digests, registries that allow tag overwrite or reuse create an avoidable path for confusion, operational drift, and artifact substitution. Registry-side tag immutability prevents approved model tags from being silently retargeted after release.
  scope: Applies to OCI registries and model registries backed by OCI artifacts that store approved models. Covers immutable-tag registry settings, blocked overwrite attempts, and audit visibility into tag mutation enforcement.
  primary_enforcement_point: OCI registry configuration and audit controls for model artifact tags.
  implementation_surface: OCI registries such as Harbor, ECR, GCR, or ACR configured for immutable tags, registry policies that block tag overwrite or reuse, and audit records showing tag immutability enforcement for model artifacts.
  owner_primary: ML Platform Engineering
  owner_supporting: Security Engineering; DevOps Engineering
  baseline_or_ai_specific: ai-specific
