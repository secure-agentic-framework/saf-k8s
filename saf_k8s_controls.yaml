- control_id: SAF-K8S-0904-011
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.4'
  control_seq: '011'
  control_title: Pipeline stage isolation between sensitivity levels
  control_statement: Pipeline steps must be isolated to prevent data leakage between stages operating at different sensitivity levels.
  objective: Prevent unauthorized data exposure between pipeline stages by enforcing execution and communication isolation across differing sensitivity levels.
  rationale: Without effective stage isolation, a lower-sensitivity pipeline step can read artifacts, intermediate data, or side effects from a higher-sensitivity stage, undermining data-separation guarantees and enabling cross-stage leakage.
  scope: Applies to ML pipeline orchestration on Kubernetes where different steps process data of different sensitivity levels. Covers namespace or runtime isolation between stages, restricted cross-stage communication paths, and leakage testing between isolated pipeline steps. Excludes explicit authorization for cross-classification transfers, which is covered by SAF-K8S-0904-012.
  primary_enforcement_point: Pipeline orchestrator isolation settings and namespace or network boundary controls.
  implementation_surface: Namespace isolation between stages, per-stage runtime separation, restricted service-account and network paths between pipeline steps, and leakage testing that verifies lower-sensitivity stages cannot access higher-sensitivity stage data or artifacts.
  owner_primary: Data Engineering
  owner_supporting: ML Platform Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
