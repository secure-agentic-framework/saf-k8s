- control_id: SAF-K8S-0803-005
  domain_code: D08
  domain_name: GPU, Accelerator, and Confidential Computing
  knowledge_area: '8.3'
  control_seq: '005'
  control_title: DPU and SmartNIC firmware cryptographic verification and Secure Boot integrity
  control_statement: DPU and SmartNIC devices used for AI workload acceleration or network offload must maintain firmware integrity through cryptographic verification and Secure Boot validation of the DPU firmware chain.
  objective: Ensure programmable offload devices boot only approved firmware and that unauthorized firmware modification is detectable before DPU or SmartNIC services influence AI workload traffic or storage paths.
  rationale: DPUs operate below the host OS trust boundary with direct access to traffic and storage I/O. Cryptographic firmware verification and Secure Boot validation are separate trust anchors that ensure the DPU firmware chain itself has not been replaced or tampered with before the device begins enforcing policies or processing workload traffic.
  scope: Applies to Kubernetes nodes equipped with DPUs or SmartNICs with programmable firmware. Covers firmware signature verification, Secure Boot attestation for the DPU boot chain, and monitoring for unauthorized firmware version changes.
  primary_enforcement_point: DPU Firmware Chain Integrity
  implementation_surface: DPU firmware management platforms, Secure Boot configuration for DPU firmware chain, firmware cryptographic signature verification, and firmware version attestation or monitoring.
  owner_primary: Network Engineering
  owner_supporting: GPU Infrastructure Engineering; Security Engineering; Platform Engineering
