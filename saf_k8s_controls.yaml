- control_id: SAF-K8S-0303-004
  domain_code: D03
  domain_name: Workload and Pod Security
  knowledge_area: '3.3'
  control_seq: '004'
  control_title: MAC profile generation from runtime behavior
  control_statement: Organizations must generate seccomp, AppArmor, or SELinux profiles for workloads using runtime recording tools that observe actual syscalls, file accesses, and network operations, rather than writing profiles by hand, to produce accurate, workload-specific profiles.
  objective: Produce workload-specific MAC profiles derived from actual runtime behavior rather than manual specification, ensuring profiles accurately reflect the full set of legitimate operations the workload performs.
  rationale: Hand-written MAC profiles are frequently either too permissive (providing little security value) or too restrictive (breaking workload functionality). Runtime profiling tools such as Security Profiles Operator ProfileRecording, Inspektor Gadget, aa-logprof, and audit2allow observe actual syscalls, file accesses, and network operations during workload execution to generate accurate profiles. For GPU workloads, profiling must capture model load, training epochs, checkpoint saves, and inference paths, since GPU ioctl patterns differ between CUDA versions and driver versions.
  scope: Applies to all workloads for which custom MAC profiles are being created or updated. Runtime profiling must be performed in an environment that exercises the full range of workload behavior including normal operation, error handling, startup, and shutdown.
  primary_enforcement_point: Profile generation tooling (Security Profiles Operator ProfileRecording CRD, Inspektor Gadget, aa-logprof, audit2allow) used during the profiling phase before profile deployment.
  implementation_surface: Security Profiles Operator (SPO) ProfileRecording CRD for automated seccomp profile capture, Inspektor Gadget for runtime syscall tracing, aa-logprof for AppArmor profile generation from audit logs, audit2allow for SELinux policy generation, GPU driver version-matched profiling environments for AI workloads, and version-controlled profile files stored alongside application manifests.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Application Development teams
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0303-005
  domain_code: D03
  domain_name: Workload and Pod Security
  knowledge_area: '3.3'
  control_seq: '005'
  control_title: MAC profile pre-enforcement audit-mode validation
  control_statement: Organizations must test all generated seccomp, AppArmor, or SELinux profiles in audit or complain mode (seccomp SCMP_ACT_LOG, AppArmor complain, SELinux permissive) before activating enforcement mode, and must confirm that no legitimate workload operations are denied during a defined observation period.
  objective: Prevent production outages caused by over-restrictive MAC profiles by validating that the generated profile does not block any legitimate workload operation before enforcement mode is activated.
  rationale: Activating a generated MAC profile directly in enforcement mode can cause immediate production outages if the profiling phase missed any legitimate operations. Audit mode (SCMP_ACT_LOG for seccomp, complain mode for AppArmor, permissive mode for SELinux) logs denied operations without blocking them, allowing operators to verify that no legitimate workload operations would be blocked before committing to enforcement.
  scope: Applies to all generated MAC profiles prior to their first enforcement-mode deployment and after any significant profile change. The observation period must be long enough to capture infrequent legitimate operations such as periodic health checks, garbage collection syscalls, and scheduled backup operations.
  primary_enforcement_point: Seccomp SCMP_ACT_LOG mode, AppArmor complain mode, and SELinux permissive mode, monitored via audit logs and alerting before enforcement mode is activated.
  implementation_surface: Seccomp SCMP_ACT_LOG action for non-blocking violation logging, AppArmor complain mode profile deployment, SELinux permissive domain configuration, audit log monitoring for denied-but-allowed operations, and sign-off workflow requiring zero legitimate denials over a defined observation window.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Application Development teams
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-13'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0303-006
  domain_code: D03
  domain_name: Workload and Pod Security
  knowledge_area: '3.3'
  control_seq: '006'
  control_title: MAC profile iterative refinement cycle
  control_statement: Organizations must iteratively refine MAC profiles through successive audit-mode test cycles, incorporating any legitimate operations observed as denied into revised profile versions, and must require at least two consecutive clean audit cycles before activating enforcement mode.
  objective: Ensure MAC profiles are complete and accurate for all workload code paths, including infrequent paths such as health checks, garbage collection, and scheduled operations, before enforcement is activated, by requiring systematic iterative refinement until successive clean cycles confirm profile completeness.
  rationale: A single audit-mode observation cycle may not exercise all legitimate workload code paths, particularly infrequent operations such as periodic health checks, garbage collection syscalls, checkpoint saves, or emergency error-handling paths. Requiring iterative refinement across multiple cycles ensures that profiles are complete before enforcement is activated, preventing operational disruptions caused by profiles that are accurate for common paths but miss edge cases.
  scope: Applies to all generated MAC profiles before enforcement mode activation and after any workload update that could introduce new syscalls or file access patterns. The iterative cycle must be repeated whenever the workload binary, its dependencies, or the underlying runtime environment changes significantly.
  primary_enforcement_point: Profile version control and change management process, with iterative cycle completion verified before enforcement mode is approved in the deployment pipeline.
  implementation_surface: Version-controlled profile files with change history documenting additions between refinement iterations, iterative refinement workflow across model load, training epoch, checkpoint, inference, and health check code paths, cycle completion tracking, and deployment pipeline gates requiring documented clean audit cycles before enforcement.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Application Development teams
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
