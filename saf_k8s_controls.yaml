- control_id: SAF-K8S-0905-059
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: 059
  control_title: External-origin annotation and internal registry enrollment for approved external models
  control_statement: Organizations must annotate approved external models with external-origin and scan-result lineage metadata and must enroll those models in the internal registry with records showing the date and outcome of internalization.
  objective: Preserve governed chain of custody for approved external models through lineage annotation and internal registry enrollment records.
  rationale: Even when an external model is re-signed, the organization still needs durable records showing that the artifact originated externally, what review and scan context applied, and when it was internalized. Annotation and registry enrollment preserve that lineage and make the internalized artifact auditable.
  scope: Applies to externally sourced models approved for internal use. Covers ML-BOM or lineage annotation of external origin and scan results, and internal registry enrollment records for approved external models. Excludes the signing act itself, which is covered by SAF-K8S-0905-058.
  primary_enforcement_point: Internal registry enrollment and lineage annotation process.
  implementation_surface: ML-BOM or lineage entries recording external origin, scan results, and date of internalization, plus internal registry admission or enrollment records for approved external models.
