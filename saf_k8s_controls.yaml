- control_id: SAF-K8S-1007-013
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.7'
  control_seq: '013'
  control_title: Automated AI infrastructure asset discovery and continuously updated inventory
  control_statement: Organizations must maintain an automated, continuously updated inventory of AI infrastructure assets running on Kubernetes, including models, datasets, ML pipelines, inference endpoints, and GPU allocations.
  objective: Provide current visibility into AI assets on Kubernetes so security, operations, and governance teams can discover what exists and where it resides.
  rationale: Without automated discovery and current inventory records, organizations lose track of deployed models, datasets, pipelines, endpoints, and GPU allocations. That creates blind spots for security monitoring, incident response, and operational ownership.
  scope: Applies to Kubernetes clusters hosting AI workloads and covers automated discovery and inventory maintenance for AI infrastructure assets.
  primary_enforcement_point: Asset inventory automation tooling, Kubernetes resource discovery agents, and registry or metadata integrations.
  implementation_surface: Automated asset discovery controllers, model registry integrations, PVC and object storage discovery, GPU allocation tracking, asset registry storage, and reconciliation workflows.
