- control_id: SAF-K8S-0601-014
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.1'
  control_seq: '014'
  control_title: Container image runtime hardening with non-root and read-only filesystem
  control_statement: Container images must run as non-root users, mount filesystems as read-only where operationally feasible, and exclude shell binaries and unnecessary utilities that expand post-compromise capabilities.
  objective: Reduce the blast radius of container compromise by enforcing hardened runtime defaults and minimizing readily usable attack tooling inside deployed images.
  rationale: Running containers as root or shipping writable filesystems and shell tooling gives attackers immediate execution and persistence advantages after compromise. Hardened runtime defaults constrain what an attacker can do even when a workload is successfully exploited.
  scope: Applies to production and pre-production container images deployed in Kubernetes clusters, with documented and time-limited exceptions only for approved debugging workflows outside production.
  primary_enforcement_point: CI/CD image validation and admission controls enforcing non-root, read-only filesystem, and minimal-runtime constraints.
  implementation_surface: Dockerfile USER directives, pod security contexts, admission policies, image inspection, and build validation for removal of shells and unnecessary utilities.
  owner_primary: DevSecOps / Release Engineering
  owner_supporting: ML Platform Engineering; Platform Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
