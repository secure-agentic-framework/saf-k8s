- control_id: SAF-K8S-0905-043
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: '043'
  control_title: Durable ML-BOM attachment to model artifacts and versions
  control_statement: Organizations must attach ML-BOM records to production-bound model artifacts and model versions in a durable, reviewable form so lineage metadata remains linked to the corresponding model throughout storage, distribution, and promotion workflows.
  objective: Preserve ML-BOM usability by ensuring lineage metadata remains durably linked to the exact model artifact or version it describes.
  rationale: Generating ML-BOM metadata is insufficient if it is stored separately or lost during promotion and distribution. Durable attachment ensures downstream operators can retrieve the correct lineage record for the exact model version under review.
  scope: Applies to production-bound model artifacts generated or promoted through Kubernetes-connected AI delivery workflows. Covers durable attachment of ML-BOM records to model artifacts, registries, or version records. Excludes the upstream generation of ML-BOM content itself.
  primary_enforcement_point: Artifact publication and registry linkage of ML-BOM records to model versions.
  implementation_surface: Registry attachment records, OCI or artifact metadata linkage, version records, and preservation of ML-BOM references through promotion workflows.
