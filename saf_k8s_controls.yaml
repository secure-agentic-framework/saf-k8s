  date_modified: '2026-03-17'
- control_id: SAF-K8S-0901-002
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.1'
  control_seq: '002'
  control_title: Parameter server and all-reduce security
  control_statement: Parameter server and all-reduce distributed training architectures must implement protections against gradient poisoning, worker impersonation, and Byzantine fault injection through authenticated aggregation, gradient validation, and anomaly detection on contributed updates.
  objective: Prevent adversarial manipulation of model training through the gradient aggregation process by detecting and rejecting poisoned, impersonated, or Byzantine-faulty worker contributions.
  rationale: Parameter servers and all-reduce rings aggregate gradient updates from all workers to update the shared model. An attacker who can impersonate a worker or inject crafted gradient values can poison the model, introduce backdoors, or degrade model accuracy. Byzantine workers can submit arbitrary values that corrupt the aggregation without detection.
  scope: Applies to all distributed training topologies that use parameter server or all-reduce aggregation patterns. Covers both synchronous and asynchronous training configurations. Excludes single-worker training and inference workloads.
  primary_enforcement_point: Training operator configuration, parameter server deployment manifests, and gradient aggregation middleware.
  implementation_surface: Parameter server deployment manifests, training operator aggregation configuration, projected service account tokens and SPIFFE/SPIRE identity for worker authentication, Byzantine-resilient aggregation libraries (Adversarial Robustness Toolbox), gradient norm validation middleware, and anomaly detection on gradient statistics within all-reduce ring and parameter server topologies.
  owner_primary: ML Platform Engineering
  owner_supporting: Security Engineering; ML Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0901-003
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.1'
  control_seq: '003'
  control_title: Checkpoint security
  control_statement: Model checkpoints and optimizer state must be stored with encryption at rest, verified for integrity before restoration, and protected by access controls that restrict read and write operations to authorized training jobs and personnel.
  objective: Protect model checkpoints from tampering, unauthorized access, and corruption to ensure that training can resume from a known-good state and that checkpoint data containing model weights is not exfiltrated.
  rationale: Model checkpoints contain the full model weights and optimizer state at a point in time, representing significant intellectual property and compute investment. Without encryption, checkpoints can be stolen from shared storage. Without integrity verification, a tampered checkpoint can inject backdoors into the model when training resumes. Without access controls, unauthorized users can read or overwrite checkpoint data.
  scope: Applies to all model checkpoint and optimizer state files written during training to persistent volumes, object storage, or network file systems on Kubernetes. Covers both scheduled checkpoints and fault-recovery checkpoints. Includes checkpoint files in all formats (PyTorch .pt, TensorFlow SavedModel, ONNX).
  primary_enforcement_point: Storage class encryption configuration, persistent volume access policies, and training job service account RBAC bindings for checkpoint storage paths.
  implementation_surface: Kubernetes StorageClass encryption-at-rest configuration, PersistentVolume and PVC access mode settings (ReadWriteOnce, ReadOnlyMany), RBAC bindings for checkpoint storage service accounts, SHA-256 hash manifests for checkpoint integrity verification, object storage encryption (S3 SSE, GCS CMEK), checkpoint retention and lifecycle policies, and application-level checkpoint encryption tooling for PyTorch .pt, TensorFlow SavedModel, and ONNX formats.
  owner_primary: ML Platform Engineering
  owner_supporting: Storage Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0901-004
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.1'
  control_seq: '004'
  control_title: Training fault tolerance and security
  control_statement: Training fault tolerance mechanisms must include corrupted data detection at recovery points, hardened retry logic that prevents adversary manipulation, and verified backup and rollback strategies for training state that ensure recovery only from integrity-checked snapshots.
  objective: Ensure that fault tolerance and recovery mechanisms for training jobs cannot be exploited by adversaries to inject corrupted data or manipulate model state during error recovery.
  rationale: Distributed training jobs rely on fault tolerance mechanisms such as automatic retries and checkpoint recovery to handle infrastructure failures. An adversary can exploit retry logic by deliberately causing failures and injecting corrupted data during recovery, or by tampering with checkpoints so that recovery loads a poisoned model state. Without integrity verification at recovery points, these attacks are invisible to the training system.
  scope: Applies to all fault tolerance, retry, and recovery mechanisms in distributed training orchestration on Kubernetes. Covers training operator retry policies, checkpoint-based recovery, and data re-ingestion during fault handling. Excludes general Kubernetes pod restart policies unrelated to training state.
  primary_enforcement_point: Training operator retry and recovery configuration, checkpoint integrity verification hooks, and training job controller settings.
  implementation_surface: Training operator retry and recovery configuration (backoffLimit on Kubernetes Jobs), checkpoint integrity verification hooks (SHA-256 hash verification before restore), validation pass scripts for post-recovery model evaluation, backup storage diversification across PersistentVolumes and object storage, and training job controller fault-tolerance settings.
  owner_primary: ML Platform Engineering
  owner_supporting: Security Engineering; ML Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0901-005
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.1'
  control_seq: '005'
  control_title: Federated learning security on Kubernetes
  control_statement: Federated learning deployments on Kubernetes must implement secure aggregation protocols, differential privacy for gradient updates, Byzantine-resilient aggregation, authenticated participant enrollment, and namespace-level isolation of federated training participants to prevent gradient leakage and model inversion attacks.
  objective: Protect the confidentiality of participant data and the integrity of the global model in federated learning by securing the aggregation process and isolating participants from one another.
  rationale: Federated learning shares gradient updates rather than raw data, but gradients can still leak sensitive training data through gradient inversion attacks. Without secure aggregation, the central server can observe individual participant contributions. Without Byzantine-resilient aggregation, a malicious participant can poison the global model. Without participant isolation, compromised participants can attack others through shared infrastructure.
  scope: Applies to all federated learning workloads orchestrated on Kubernetes, including cross-silo and cross-device configurations. Covers the aggregation server, participant worker pods, and inter-participant communication channels. Does not apply to centralized training where all data is co-located.
  primary_enforcement_point: Federated learning operator configuration, aggregation server deployment manifests, participant namespace isolation policies, and network policies restricting cross-participant communication.
  implementation_surface: Federated learning framework deployments (Flower, FATE/KubeFATE, NVIDIA FLARE, TensorFlow Federated), secure aggregation protocol configuration (SecAgg), differential privacy parameters (epsilon, delta, DP-SGD), Byzantine-resilient aggregation algorithms (Krum, coordinate-wise median), SPIFFE/SPIRE identity federation for participant authentication, Kubernetes namespace isolation per participant, NetworkPolicy restricting cross-participant communication, FL enrollment registry, privacy budget tracking, and cross-cluster mTLS for gradient transport.
  owner_primary: ML Platform Engineering
  owner_supporting: Security Engineering; Privacy Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0901-006
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.1'
  control_seq: '006'
  control_title: Gang scheduling security (Volcano, Kueue)
  control_statement: Gang scheduling systems (Volcano, Kueue) must enforce controls that prevent resource quota manipulation, scheduling priority abuse, and resource starvation attacks during distributed training job scheduling.
  objective: Ensure that gang scheduling for distributed training cannot be exploited to monopolize GPU resources, starve other workloads, or bypass resource quota enforcement.
  rationale: Gang schedulers coordinate the simultaneous allocation of multiple GPU nodes for distributed training. Without proper controls, a malicious user can manipulate priority classes to preempt legitimate workloads, inflate resource requests to monopolize cluster GPUs, or exploit gang scheduling semantics to create deadlocks that deny resources to other training jobs.
  scope: Applies to all Kubernetes clusters using Volcano, Kueue, or equivalent gang scheduling systems for distributed training job orchestration. Covers queue configuration, priority class assignments, and resource quota enforcement. Excludes standard Kubernetes scheduling for non-training workloads.
  primary_enforcement_point: Gang scheduler queue configuration, Kubernetes ResourceQuota and LimitRange objects, and priority class admission controls.
  implementation_surface: Volcano Queue and PodGroup CRDs, Kueue ClusterQueue and LocalQueue configurations, Kubernetes ResourceQuota and LimitRange objects for per-namespace GPU limits, PriorityClass definitions and admission controls restricting priority assignment, gang scheduler queue depth limits, fair-share scheduling policies, and RBAC restricting CRD operations (Queue, ClusterQueue, PodGroup creation) to platform administrators.
  owner_primary: ML Platform Engineering
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
