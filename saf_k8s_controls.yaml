- control_id: SAF-K8S-0405-024
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.5'
  control_seq: '024'
  control_title: Break-glass credential automatic expiration and revocation enforcement
  control_statement: Organizations must ensure break-glass credentials, kubeconfigs, or certificates are automatically time-limited, revoked, or expired after the emergency window so emergency access cannot persist as standing privileged access.
  objective: Ensure emergency credentials are automatically retired after use so break-glass access does not persist beyond the approved recovery window.
  rationale: Temporary emergency access becomes dangerous if it remains valid after the incident. Automatic expiration and revocation reduce the risk that exceptional privileges silently become durable administrative backdoors.
  scope: Applies to all break-glass credentials, kubeconfigs, or certificates issued for production Kubernetes clusters, including managed and multi-tenant environments. Covers audit trails, post-use review evidence, automatic revocation, and expiration after emergency access use.
  primary_enforcement_point: Emergency credential expiry and revocation controls.
  implementation_surface: Short TTLs for emergency credentials, automatic revocation or expiration policies, and validation that break-glass access cannot persist after the approved emergency window.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Identity and Access Management
  baseline_or_ai_specific: baseline
