- control_id: SAF-K8S-0405-019
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.5'
  control_seq: 019
  control_title: Break-glass recovery procedure definition
  control_statement: Organizations must define documented break-glass emergency access procedures that allow authorized personnel to regain cluster access when normal authentication pathways are unavailable.
  objective: Ensure emergency recovery access paths are formally defined so authorized responders can restore administrative access during identity-provider, federation, or primary authentication outages.
  rationale: Without a documented break-glass procedure, administrators may be unable to recover control-plane access during authentication failures, prolonging outages and increasing pressure for unsafe ad hoc workarounds.
  scope: Applies to production Kubernetes clusters that depend on OIDC providers or external identity systems for normal administrative access. Covers documented runbooks, authorized activation steps, storage and retrieval workflow, and periodic validation exercises.
  primary_enforcement_point: Break-glass runbook definition and controlled credential activation workflow.
  implementation_surface: Documented break-glass runbooks, approved activation steps, emergency kubeconfig or client certificate retrieval procedures, and secure storage locations for recovery materials.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Identity and Access Management
  baseline_or_ai_specific: baseline
