- control_id: SAF-K8S-0601-011
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.1'
  control_seq: '011'
  control_title: Integrity metadata co-retention with software artifacts
  control_statement: Organizations must retain integrity verification data such as signatures, attestations, SBOMs, and related OCI referrers for at least as long as the artifact they describe, using lifecycle policies that prevent orphaning or premature deletion of integrity metadata.
  objective: Ensure provenance and integrity evidence remains available alongside retained artifacts for audit, vulnerability investigation, and trust verification.
  rationale: Retaining an artifact without its associated signature, attestation, or SBOM destroys the evidence needed to validate provenance and investigate vulnerabilities, while retaining metadata without the subject artifact creates incomplete and misleading records.
  scope: All registries and artifact stores that hold integrity verification metadata for container images, Helm charts, ML model artifacts, or other OCI artifacts.
  primary_enforcement_point: Lifecycle management for signatures, attestations, SBOMs, and related integrity metadata linked to stored artifacts.
  implementation_surface: OCI referrer retention policy, signature and attestation retention rules, SBOM storage lifecycle controls, and metadata cleanup logic that tracks the lifecycle of the subject artifact.
  owner_primary: Platform Engineering
  owner_supporting: DevSecOps / Release Engineering; ML Platform Engineering
