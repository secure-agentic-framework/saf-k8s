- control_id: SAF-K8S-0503-004
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.3'
  control_seq: '004'
  control_title: Internal load balancer annotation enforcement
  control_statement: Services of type LoadBalancer must use internal load balancer annotations by default unless explicitly approved for internet exposure through a documented security review process, with source IP restrictions (loadBalancerSourceRanges) applied to all approved external LoadBalancer services.
  objective: Prevent unintended exposure of Kubernetes services to the public internet by enforcing internal load balancer annotations as the default for all LoadBalancer services.
  rationale: A developer inadvertently creating a LoadBalancer service without internal annotations exposes the service to the public internet. Enforcing internal annotations by default ensures that internet exposure requires explicit opt-in through a security review process. Source IP restrictions provide defense in depth for approved external services. Admission-time enforcement of Service types is covered by SAF-K8S-0505-002.
  scope: Applies to all production Kubernetes clusters using cloud provider LoadBalancer services. Covers internal annotation enforcement and source IP restriction for approved external services. Service type admission restrictions (blocking LoadBalancer, NodePort, ExternalIP) are addressed by SAF-K8S-0505-002.
  primary_enforcement_point: Admission controller policies enforcing internal load balancer annotations on LoadBalancer services.
  implementation_surface: 'Internal load balancer annotations (AWS service.beta.kubernetes.io/aws-load-balancer-internal, GCP networking.gke.io/load-balancer-type: Internal, Azure service.beta.kubernetes.io/azure-load-balancer-internal), admission controller policies (Kyverno, OPA Gatekeeper) enforcing internal annotations by default, Service spec loadBalancerSourceRanges for source IP restrictions on approved external services, and kubectl-based audit scripts for externally exposed services.'
  owner_primary: Platform Engineering
  owner_supporting: Network Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0503-005
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.3'
  control_seq: '005'
  control_title: DNS exfiltration detection
  control_statement: DNS query logging and anomaly detection must be enabled to detect and prevent DNS-based data exfiltration, including detection of DNS tunneling indicators such as high-entropy subdomain labels, high-frequency queries, and anomalous TXT record queries.
  objective: Detect and prevent covert data exfiltration channels that abuse the DNS protocol, which is rarely blocked and often overlooked in monitoring.
  rationale: DNS exfiltration is particularly dangerous because DNS traffic is rarely blocked and often overlooked in monitoring. Attackers encode stolen data in DNS queries (long subdomain labels, TXT record queries) to bypass network egress controls. Without DNS query logging and anomaly detection, these covert channels operate undetected.
  scope: Applies to all production clusters with CoreDNS. DNS query logs must be forwarded to a centralized analysis platform. Detection rules must cover DNS tunneling indicators including high-entropy subdomain labels, anomalous query volume, and unusual record types.
  primary_enforcement_point: DNS query log analysis pipelines and SIEM detection rules for DNS tunneling indicators.
  implementation_surface: CoreDNS log plugin for query logging, DNS query log analysis pipelines, SIEM detection rules for DNS tunneling indicators (long subdomain labels, high-frequency queries, anomalous TXT record queries), Cilium DNS proxy logging, and DNS exfiltration anomaly detection tooling.
  owner_primary: Security Operations
