- control_id: SAF-K8S-0405-021
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.5'
  control_seq: '021'
  control_title: Break-glass activation multi-party approval enforcement
  control_statement: Organizations must ensure break-glass access activation requires MFA or equivalent dual-authorization so emergency privileges cannot be enabled by a single actor without strong approval controls.
  objective: Constrain break-glass activation through strong multi-party approval so emergency access does not become a single-actor privileged bypass.
  rationale: Emergency access is inherently high risk because it bypasses normal identity paths. Requiring MFA or equivalent dual-authorization at activation reduces the likelihood that one person can improperly enable powerful recovery access during an incident.
  scope: Applies to all break-glass credentials, kubeconfigs, or certificates issued for production Kubernetes clusters, including managed and multi-tenant environments. Covers activation controls, MFA or equivalent dual-authorization, and tenant-scoped emergency credentials where applicable.
  primary_enforcement_point: Break-glass activation approval controls.
  implementation_surface: MFA or equivalent dual-authorization at emergency access activation, activation approval workflows, and emergency access authorization records.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Identity and Access Management
  baseline_or_ai_specific: baseline
  maturity: Practitioner
