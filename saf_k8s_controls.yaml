  date_modified: '2026-03-17'
- control_id: SAF-K8S-0901-008
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.1'
  control_seq: 008
  control_title: Training job network isolation
  control_statement: Distributed training jobs must implement documented network-level isolation controls (Kubernetes NetworkPolicy, fabric segmentation, dedicated VLANs) to restrict inter-worker communication to authorized pod selectors and prevent lateral movement from training namespaces, particularly where native transport encryption is not practical.
  objective: Prevent unauthorized network access to distributed training communication paths and contain lateral movement from compromised training workers through network-level segmentation.
  rationale: Not all communication fabrics support native encryption -- RDMA over InfiniBand and some NCCL transport paths have limited or no encryption support. Network-level isolation controls are required as compensating controls where transport-layer encryption is not feasible, and as defense-in-depth even where encryption is enabled.
  scope: Applies to all multi-node distributed training workloads on Kubernetes. Covers Kubernetes NetworkPolicy for training namespaces, InfiniBand partition key (P_Key) configuration, and dedicated VLAN or fabric segmentation for training traffic. Required as primary control where native transport encryption is not supported and as defense-in-depth where it is.
  primary_enforcement_point: Kubernetes NetworkPolicy enforcement for training namespaces and fabric-level segmentation configuration.
  implementation_surface: Kubernetes NetworkPolicy resources with job-specific label selectors, InfiniBand partition key (P_Key) configuration, dedicated training VLANs, fabric segmentation configuration, and network scan results confirming isolation.
  owner_primary: Network Engineering
  owner_supporting: ML Platform Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
