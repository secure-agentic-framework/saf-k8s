- control_id: SAF-K8S-0606-032
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.6'
  control_seq: '032'
  control_title: GitOps drift detection and automated resync or notification
  control_statement: GitOps controllers must detect runtime configuration deviations from Git-declared state and automatically resync or notify on drift in production environments.
  objective: Detect divergence between declared and running cluster state and ensure unauthorized runtime changes are surfaced and either automatically corrected or escalated through alerting.
  rationale: If runtime drift is not detected and corrected or escalated promptly, unauthorized or accidental changes can persist in production and silently weaken security controls. This is a separate operational obligation from monitoring controller reconciliation health itself.
  scope: Applies to production Kubernetes clusters managed through GitOps. Covers runtime drift detection, self-heal or resync behavior, and alerting or notification when deployed state diverges from approved Git state.
  primary_enforcement_point: GitOps drift detection settings and remediation or alert workflows.
  implementation_surface: Argo CD auto-sync and self-heal settings, Flux drift detection behavior, controller-generated drift alerts, automated resync execution, and notification workflows for unauthorized runtime changes.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; SRE / Operations
