- control_id: SAF-K8S-0905-047
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: '047'
  control_title: Training pipeline attestation generation for ML artifacts
  control_statement: In-toto or equivalent attestations must be generated for the training and build pipeline steps that produced internal ML artifacts so the provenance of those artifacts can be independently evaluated.
  objective: Establish verifiable provenance for internally produced ML artifacts by generating attestations that record how the artifacts were built.
  rationale: Cryptographic signatures prove artifact integrity, but not how the artifact was produced. Training pipeline attestations provide verifiable build-step provenance, inputs, and workflow evidence that downstream trust decisions depend on.
  scope: Applies to models, training input manifests, intermediate pipeline artifacts, final outputs, and related provenance records generated by internal ML training and packaging pipelines. Covers attestation generation for training and build steps, but not deploy-time verification or registry retention policies.
  primary_enforcement_point: Training attestation generation workflow.
  implementation_surface: In-toto attestation generation for training pipeline steps, provenance predicate capture, attestation subjects for models and related artifacts, and attestation storage alongside OCI model artifacts.
