- control_id: SAF-K8S-0402-002
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.2'
  control_seq: '002'
  control_title: Inactive service account and stale credential remediation
  control_statement: Organizations must implement processes to identify inactive service accounts that have not authenticated within a defined period, disable or remove them, and revoke any stale credentials including legacy static tokens associated with those accounts.
  objective: Reduce the attack surface by eliminating dormant service accounts and their associated credentials, which represent unmonitored pathways for unauthorized cluster access.
  rationale: Service accounts created for decommissioned workloads, past experiments, or deprecated operators often retain their RBAC bindings and tokens indefinitely. Attackers who discover these stale credentials gain access to the cluster without triggering alerts associated with active workloads. Legacy static service account tokens, unlike projected tokens, never expire and remain valid until explicitly deleted.
  scope: Applies to all service accounts across all namespaces in production and pre-production clusters. Covers both Kubernetes-native service account tokens and any external credentials (cloud IAM roles, Vault tokens) bound to those service accounts. Automated cleanup must respect system service accounts that may authenticate infrequently.
  primary_enforcement_point: Service account lifecycle management tooling, scheduled audits of service account last-used timestamps, and automated workflows for disabling or deleting inactive accounts and revoking associated tokens.
  implementation_surface: Kubernetes API server audit logs (service account last-used timestamps), service account lifecycle management tooling, scheduled cluster scans for inactive accounts, legacy static token Secret scanning (kubernetes.io/service-account-token type), automated workflows for disabling or deleting inactive accounts, and external credential revocation (cloud IAM roles, Vault tokens) bound to stale service accounts.
  owner_primary: Identity and Access Management
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
