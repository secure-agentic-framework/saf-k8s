- control_id: SAF-K8S-0802-001
  domain_code: D08
  domain_name: GPU, Accelerator, and Confidential Computing
  knowledge_area: '8.2'
  control_seq: '001'
  control_title: GPU driver lifecycle and vulnerability management
  control_statement: GPU drivers must be maintained under a formal vulnerability management program that includes version tracking, compatibility validation against CUDA toolkits and workloads, timely patching of known CVEs, and controlled rollout using driver containers or GPU Operator lifecycle management.
  objective: Ensure GPU drivers are current, free of known vulnerabilities, and compatible with deployed AI workloads, preventing exploitation of driver-level vulnerabilities that grant kernel-level access on GPU nodes.
  rationale: GPU drivers operate at the kernel level and vulnerabilities in them can enable local privilege escalation, container escape, or denial of service to all GPU workloads on the node. Driver version incompatibilities with CUDA toolkits can cause silent computation errors in training jobs, potentially corrupting model weights. Without lifecycle management through driver containers or GPU Operator, driver updates require node reboots and create extended vulnerability windows.
  scope: Applies to all Kubernetes nodes with GPU hardware, whether using host-installed drivers, driver containers, or GPU Operator-managed driver installations. Includes both self-managed and managed Kubernetes GPU node pools. Managed service provider driver management must be validated against organizational patching SLAs.
  primary_enforcement_point: GPU Operator driver manager configuration, driver container image registry policies, node vulnerability scanning, and change management workflows for driver upgrades.
  implementation_surface: GPU driver kernel modules (nvidia.ko, nvidia-uvm.ko), NVIDIA GPU Operator driver container images and lifecycle management configuration, host-installed driver packages and node provisioning templates, NVIDIA GPU driver security bulletin subscriptions, driver-CUDA compatibility matrix tracking, driver container rollout and rollback procedures per node pool, node vulnerability scanning for GPU driver CVEs, and change management workflows for driver upgrades.
  owner_primary: GPU Infrastructure Engineering
  owner_supporting: ML Platform Engineering; Vulnerability Management; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
