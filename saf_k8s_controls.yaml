- control_id: SAF-K8S-1001-023
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.1'
  control_seq: '023'
  control_title: Regulatory audit log durable retrieval enforcement
  control_statement: Organizations subject to regulatory requirements must ensure that retained regulatory audit logs remain durably retrievable throughout the full retention period by preserving readable storage formats, maintaining index integrity or equivalent lookup capability, and performing periodic retrieval tests that verify historical logs can be accessed and validated.
  objective: Ensure that retained regulatory audit logs remain accessible and verifiable throughout the full retention period for audits, investigations, and regulatory review.
  rationale: Retaining logs for the required period provides no compliance value if the logs cannot be retrieved when needed. Storage format obsolescence, index corruption, or silent archival failures can render retained logs unusable long before the retention window ends. This control isolates durable retrieval assurance from retention-period configuration so retrieval failures can be tested and governed independently.
  scope: Applies to audit log storage systems holding regulatory audit logs retained under organizational or regulatory policy. Covers format durability, retrieval-path integrity, and periodic retrieval validation. Excludes retention-period configuration and immutability enforcement, which are addressed separately.
  primary_enforcement_point: Audit Log Retrieval Validation and Long-Term Accessibility
  implementation_surface: Log storage format standards, archive index or lookup integrity checks, storage redundancy configuration, and periodic retrieval test execution for retained audit records.
  owner_primary: GRC/Compliance
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
