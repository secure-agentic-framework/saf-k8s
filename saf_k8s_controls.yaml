- control_id: SAF-K8S-0203-016
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.3'
  control_seq: '016'
  control_title: Node time synchronization with authoritative time sources
  control_statement: Production Kubernetes nodes must synchronize system time using organization-approved authoritative time sources, must monitor for clock drift beyond organization-defined thresholds, and must alert or remediate when synchronization fails.
  objective: Preserve trustworthy time on Kubernetes nodes so security telemetry, distributed tracing, certificate validation, token lifetime enforcement, and forensic reconstruction remain accurate across the cluster.
  rationale: Accurate time is a foundational dependency for multiple Kubernetes and AI platform security controls. Clock skew breaks cross-node audit log correlation, distorts OpenTelemetry span ordering and latency analysis across ML pipelines, causes TLS certificate NotBefore and NotAfter validation failures, and can cause projected service account tokens or OIDC tokens to be rejected incorrectly or accepted beyond intended expiry windows. During incident response, timestamp drift undermines forensic sequence reconstruction and weakens the evidentiary value of collected node, container, and network artifacts.
  scope: Applies to all production Kubernetes worker and control-plane nodes, including GPU nodes, training nodes, and inference-serving nodes. Nodes in managed Kubernetes services satisfy this control through provider-managed time synchronization only when provider documentation or attestation confirms the service and the organization monitors observed drift or synchronization health using available telemetry. Development clusters may use different time-source hierarchies only with documented exceptions.
  primary_enforcement_point: Node operating system time synchronization service configuration and monitoring integrated into node provisioning, compliance checks, and alerting.
  implementation_surface: Chrony, systemd-timesyncd, ntpd, or equivalent node time synchronization services; organization-approved NTP source configuration; drift and synchronization health monitoring; node compliance scans; and alerting or automated remediation workflows for unsynchronized nodes.
  owner_primary: Platform Engineering
  owner_supporting: OS/Infrastructure; Security Engineering; Security Operations (SOC)
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
