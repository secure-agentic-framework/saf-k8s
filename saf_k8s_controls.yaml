  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: '054'
  control_title: External model source NetworkPolicy enforcement for protected namespaces
  control_statement: Organizations must enforce the approved external model source allowlist through NetworkPolicy or equivalent egress controls that block direct pulls from public hubs to production or otherwise protected namespaces.
  objective: Prevent protected workloads from bypassing approved-source policy by restricting runtime network access to unapproved external model sources.
  rationale: Even with an approved-source policy, production workloads can still reach public model hubs unless network egress is explicitly constrained. Runtime egress restriction is required to stop direct pulls from unapproved external sources.
  scope: Applies to production and protected Kubernetes namespaces that consume external models. Covers NetworkPolicy or equivalent egress controls restricting direct access to public model hubs and other unapproved external model endpoints. Excludes admission-time validation of model source references.
  primary_enforcement_point: NetworkPolicy and egress control enforcement point.
  implementation_surface: NetworkPolicy blocking direct public hub access from protected namespaces, CNI or cloud egress controls restricting unapproved model source endpoints, and enforcement telemetry showing denied runtime access attempts.
