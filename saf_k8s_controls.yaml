- control_id: SAF-K8S-0203-009
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.3'
  control_seq: 009
  control_title: Workload identity replacement for cloud API access
  control_statement: Cloud-hosted Kubernetes clusters must replace metadata-derived cloud credentials with workload identity federation where the platform supports it so pod workloads use dedicated short-lived identities instead of node instance credentials.
  objective: Eliminate operational dependence on node metadata credentials by shifting workloads to dedicated workload identities for cloud API access.
  rationale: Blocking metadata paths reduces exposure, but durable risk reduction requires removing the need for pods to use node instance credentials at all. This control isolates the workload identity replacement obligation so teams can independently verify that cloud API access uses federated pod identities rather than metadata-derived credentials.
  scope: Applies to cloud-hosted Kubernetes clusters supporting workload identity federation features such as IRSA, EKS Pod Identity, GKE Workload Identity, and Azure Workload Identity.
  primary_enforcement_point: Workload identity configuration for pod credential issuance.
  implementation_surface: Workload identity federation configuration replacing node instance credentials for cloud API access.
