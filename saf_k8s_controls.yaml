  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.4'
  control_seq: 019
  control_title: Per-workload cloud identity binding for managed Kubernetes workloads
  control_statement: Organizations must bind cloud API permissions to individual Kubernetes workloads through approved per-workload identity mechanisms rather than sharing node-scoped credentials across pods.
  objective: Ensure workloads that need cloud API access receive credentials through auditable per-workload identity bindings so cloud permissions are scoped to the intended workload and service account.
  rationale: Per-workload cloud identity mechanisms such as IRSA, EKS Pod Identity, Workload Identity Federation, and Entra Workload ID reduce lateral movement by attaching cloud permissions to specific workloads instead of every pod on a node. This makes cloud access independently attributable to the workload identity and complements metadata endpoint protections.
  scope: Applies to pods and service accounts that require cloud API access on managed Kubernetes platforms. Covers workload identity federation setup, service-account-to-role bindings, and platform-specific per-workload identity mechanisms.
  primary_enforcement_point: Per-Workload Cloud Identity Binding
  implementation_surface: OIDC federation setup, workload identity bindings, service account annotations, pod identity admission or webhook configuration, and workload inventory review.
  owner_primary: Cloud Platform Engineering
  owner_supporting: Platform Engineering; Security Engineering
