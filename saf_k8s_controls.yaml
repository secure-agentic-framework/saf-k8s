  control_title: Approved minimal base image catalog enforcement
  control_statement: All container images deployed to production clusters must be built from approved minimal base images selected from an authorized base image catalog or allowlist.
  objective: Reduce container attack surface by enforcing use of approved minimal base images for production workloads.
  rationale: 'Controlling which base images may be used is an independent supply-chain control claim: approved minimal bases reduce inherited packages, libraries, and utilities before build customization occurs and create a governed boundary for image provenance and review.'
