  control_title: Kubernetes incident credential revocation procedures for ServiceAccounts and external access
  control_statement: Organizations must define and document Kubernetes incident containment procedures for revoking or rotating affected ServiceAccount credentials and external access tokens during incident response.
  objective: Enable rapid containment of compromised access paths by preparing tested credential revocation procedures for Kubernetes-native and external credentials used by affected workloads.
  rationale: Credential compromise can preserve attacker access even after workloads are isolated. Incident responders need explicit revocation and rotation procedures for ServiceAccounts and external credentials so containment actions remove access paths as well as compute execution paths.
  scope: Applies to all Kubernetes clusters hosting AI workloads. Covers ServiceAccount credential invalidation or rotation, external credential revocation, and related access-path shutdown procedures used during incident containment.
  primary_enforcement_point: IR playbook credential containment procedures and emergency authorization for Kubernetes credential revocation actions.
  implementation_surface: ServiceAccount token invalidation or replacement procedures, external credential and secret rotation procedures, and tested runbooks for credential revocation during incident response.
