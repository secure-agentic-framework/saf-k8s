- control_id: SAF-K8S-0905-029
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: 029
  control_title: CUDA and GPU accelerator dependency vulnerability management
  control_statement: Organizations must perform vulnerability triage and remediation tracking for CUDA toolkits and GPU accelerator libraries used in training and inference environments.
  objective: Reduce exploitability of vulnerable accelerator software components by continuously identifying, prioritizing, and remediating defects in CUDA and related GPU libraries.
  rationale: CUDA, cuDNN, NCCL, and related accelerator libraries are high-privilege, performance-critical dependencies in ML workloads. If their vulnerabilities are not managed separately, exploitable defects can persist across GPU-backed training and inference environments.
  scope: Applies to CUDA toolkits and GPU accelerator libraries used in Kubernetes-based training and inference environments. Covers CUDA, cuDNN, NCCL, and similar accelerator dependencies. Excludes framework and Python package vulnerability management, which is covered by SAF-K8S-0905-028.
  primary_enforcement_point: GPU image and accelerator library dependency review workflow.
  implementation_surface: Vulnerability scanning, advisory review, remediation tracking, and update records for CUDA toolkits, cuDNN, NCCL, and related accelerator libraries in training and inference images.
  owner_primary: Security Engineering
  owner_supporting: ML Platform Engineering; DevOps Engineering
