  date_modified: '2026-03-17'
- control_id: SAF-K8S-0503-009
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.3'
  control_seq: 009
  control_title: CoreDNS and upstream resolver hardening
  control_statement: CoreDNS must be configured with hardened settings that restrict upstream resolver use to approved destinations, apply secure caching and forwarding behavior, and limit DNS infrastructure changes to authorized configuration paths.
  objective: Secure the cluster DNS infrastructure itself so CoreDNS and related resolver components cannot be abused as a weak or untrusted control plane dependency.
  rationale: CoreDNS is a critical shared service in every Kubernetes cluster. Weak forwarding, caching, or upstream resolver configuration can expose workloads to malicious resolution behavior, redirection, or unauthorized infrastructure changes. Hardening the DNS infrastructure is a distinct obligation from controlling which DNS paths and service names workloads may use.
  scope: Applies to CoreDNS deployments, NodeLocal DNSCache, and any approved upstream resolver integrations in production clusters.
  primary_enforcement_point: DNS Infrastructure
  implementation_surface: CoreDNS Corefile configuration, NodeLocal DNSCache configuration, and approved upstream resolver settings.
  owner_primary: Network Engineering
  owner_supporting: Platform Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
