- control_id: SAF-K8S-0902-011
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.2'
  control_seq: '011'
  control_title: Streaming token-level output leakage and policy-violation filtering
  control_statement: LLM serving infrastructure must inspect streaming model outputs in real time for PII, secrets, and policy-violating content and block, redact, or terminate responses before disallowed tokens reach the client through controls that operate independently of the model's own safety training.
  objective: Prevent sensitive data leakage and policy-violating content release in streaming LLM responses by filtering output tokens before they reach the client.
  rationale: For streaming inference, post-generation review is too late because tokens may already be delivered to the caller. Token-window scanners operating in the serving path can detect secrets, PII, and policy violations in real time and stop or redact the response before disclosure occurs, complementing both model-level safety training and general response filtering.
  scope: Applies to LLM inference endpoints deployed on Kubernetes that return streaming or chunked responses. Covers real-time token inspection, redaction, and stream termination controls. Excludes input-side prompt injection classification, which is addressed separately.
  primary_enforcement_point: Streaming response filter middleware, sidecar proxies, or gateway components in the output path.
  implementation_surface: Streaming token scanners, regex and NER-based PII or secret detectors, policy classifiers operating on token windows, stream redaction or termination logic, and test harnesses demonstrating pre-delivery blocking in SSE or WebSocket output flows.
  owner_primary: Security Engineering
  owner_supporting: ML Platform Engineering; Application Security
  baseline_or_ai_specific: ai-specific
