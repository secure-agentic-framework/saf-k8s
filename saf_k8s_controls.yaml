- control_id: SAF-K8S-0203-015
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.3'
  control_seq: '015'
  control_title: Cloud metadata endpoint restriction settings
  control_statement: Kubernetes nodes on cloud infrastructure must apply restrictive metadata endpoint or hop-limit settings appropriate to the provider so metadata access cannot traverse unintended network paths or permissive platform defaults.
  objective: Constrain provider metadata endpoint behavior through restrictive instance or node-pool settings beyond authenticated access mode alone.
  rationale: Even when authenticated metadata modes are enabled, permissive hop limits or endpoint behaviors can still expose metadata access through unintended local routing paths, host-network reachability, or provider-default settings. Restrictive endpoint or hop-limit settings are independently auditable from metadata protocol mode enforcement.
  scope: Applies to Kubernetes nodes on AWS, GCP, Azure, and other cloud providers exposing instance metadata services. Covers node group, VM, or managed service metadata configuration that customers can set or must verify through provider documentation and platform APIs.
  primary_enforcement_point: Cloud infrastructure provisioning and managed service configuration governing metadata endpoint behavior on node instances or managed node pools.
  implementation_surface: Provider-specific endpoint enablement flags, hop-limit settings, local-routing constraints, and managed service verification of restrictive metadata endpoint defaults.
  owner_primary: Cloud Infrastructure
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: baseline
