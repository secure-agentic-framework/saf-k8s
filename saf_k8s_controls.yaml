- control_id: SAF-K8S-0304-013
  domain_code: D03
  domain_name: Workload and Pod Security
  knowledge_area: '3.4'
  control_seq: '013'
  control_title: Tmpfs-backed handling for sensitive training intermediates
  control_statement: Sensitive intermediate training data that does not require durable persistence must use tmpfs-backed emptyDir or equivalent memory-backed ephemeral storage so those artifacts are not written to node-local disk and are removed with pod lifecycle termination.
  objective: Reduce exposure of sensitive temporary training data by keeping qualifying intermediate artifacts in memory-backed ephemeral storage rather than on node-local disks.
  rationale: Sensitive training intermediates can contain fragments of training data, embeddings, or model state that should not persist on node-local SSD or host filesystems after job completion. tmpfs-backed storage limits that exposure window by keeping qualifying data in memory and removing it with pod termination.
  scope: Applies to AI and ML training workloads that stage sensitive intermediate data, tokenized samples, gradients, or temporary outputs that do not require durable persistence.
  primary_enforcement_point: Pod specification validation for emptyDir.medium=Memory and workload design reviews for sensitive intermediate-data handling.
  implementation_surface: Pod spec emptyDir medium selections and workload manifests showing which sensitive intermediate datasets use memory-backed scratch space.
  owner_primary: AI/ML Platform team
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: baseline
