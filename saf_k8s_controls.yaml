  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.3'
  control_seq: 028
  control_title: Exposed credential revocation and replacement execution
  control_statement: Organizations must revoke and replace exposed credentials on defined timelines when secret leaks are detected so compromised secrets do not remain usable after discovery.
  objective: Ensure exposed credentials are actually revoked and reissued promptly after a leak is detected.
  rationale: Revocation and replacement are independently auditable from the broader incident workflow. This control isolates the credential-lifecycle action so teams can verify that exposed secrets, tokens, and keys are invalidated and replaced within defined response windows.
  scope: Applies to any detected exposure of credentials, tokens, keys, or secrets in repositories, images, CI/CD artifacts, logs, and runtime outputs. Covers credential revocation timing, replacement or reissuance, and evidence that exposed secrets no longer remain valid. Incident triage and containment remain governed by SAF-K8S-0403-027.
  primary_enforcement_point: Credential revocation and reissuance process triggered by secret leak findings.
  implementation_surface: Credential revocation procedures, replacement or reissuance workflows, and records showing exposed credentials were invalidated within required response windows.
