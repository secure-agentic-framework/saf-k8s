- control_id: SAF-K8S-0702-023
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.2'
  control_seq: '023'
  control_title: Virtual cluster tenant isolation validation and host-cluster access review
  control_statement: Organizations using virtual cluster technologies for tenant isolation must periodically validate tenant isolation through testing and must review tenant access to the host cluster API server to confirm the intended tenant boundary remains enforced.
  objective: Ensure virtual-cluster-based tenant isolation is periodically verified through testing and host-cluster access review.
  rationale: Documented guarantees are insufficient unless the tenant boundary is periodically validated in the live environment. Isolation testing and host-cluster access review confirm that virtual cluster separation, tenant privilege boundaries, and host API restrictions remain effective over time.
  scope: Applies to multi-tenant Kubernetes environments that rely on virtual cluster or equivalent tenant control-plane separation. Validation must cover tenant boundary testing and review of tenant access to host-cluster APIs.
  primary_enforcement_point: Periodic isolation validation exercises and RBAC or host-cluster access review for tenant identities.
  implementation_surface: Penetration tests or tenant-isolation validation exercises, RBAC audits, host-cluster API access reviews, and recurring verification records confirming the tenant boundary still holds.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Cloud Platform Engineering
  baseline_or_ai_specific: baseline
