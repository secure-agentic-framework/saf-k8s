- control_id: SAF-K8S-0202-011
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.2'
  control_seq: '011'
  control_title: Node mandatory access control activation for container workloads
  control_statement: Supported nodes must activate AppArmor or SELinux mandatory access control for container workloads and maintain the policy or labeling prerequisites required for those protections to remain effective by default.
  objective: Reduce container escape and cross-workload impact by ensuring node-level mandatory access control is active for container execution.
  rationale: AppArmor and SELinux constrain file access, process behavior, and labeling boundaries even when a workload reaches a vulnerable code path. Activation and maintenance of mandatory access control on supported nodes is a distinct hardening obligation from default seccomp enforcement.
  scope: Applies to production cluster nodes and the workloads scheduled onto them. Seccomp defaults and AppArmor or SELinux activation must be validated for supported operating systems, node pools, and runtime configurations, with exceptions documented and reviewed.
  primary_enforcement_point: Node operating-system MAC activation and workload policy or labeling prerequisites for AppArmor or SELinux enforcement.
  implementation_surface: AppArmor profile loading, SELinux enablement and labeling prerequisites, and validation that workloads run with active MAC protections on supported nodes.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; OS/Infrastructure
