- control_id: SAF-K8S-0606-017
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.6'
  control_seq: '017'
  control_title: CNCF lifecycle phase security coverage
  control_statement: CI/CD pipelines must apply required security controls across all CNCF lifecycle phases (Develop, Distribute, Deploy), with explicit phase-completion gates preventing artifact promotion or deployment until the controls for that phase have executed and passed.
  objective: Ensure CI/CD security coverage is defined and enforced at each CNCF lifecycle phase so supply chain controls are not concentrated in only one stage of the delivery path.
  rationale: A pipeline can implement strong point controls but still leave major lifecycle gaps if develop-time, distribute-time, or deploy-time protections are missing. Treating Develop, Distribute, and Deploy as distinct control checkpoints ensures that security coverage is complete across the software delivery path rather than assumed from a single successful gate.
  scope: Applies to all CI/CD pipelines that build, promote, sign, attest, or deploy artifacts to Kubernetes clusters. Covers phase coverage from source and build activity through artifact distribution and deployment gating.
  primary_enforcement_point: CI/CD pipeline phase definitions, promotion gates, and deployment approval logic.
  implementation_surface: CI/CD pipeline definitions covering Develop, Distribute, and Deploy phases, with required stage-specific controls, promotion criteria, and evidence that artifacts do not advance when a lifecycle phase gate is incomplete or failed.
  owner_primary: DevSecOps / Release Engineering
  owner_supporting: Security Engineering; Platform Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
