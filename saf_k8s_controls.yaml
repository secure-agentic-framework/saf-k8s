- control_id: SAF-K8S-0603-014
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.3'
  control_seq: '014'
  control_title: Fail-closed admission enforcement for attestation requirements
  control_statement: Organizations must enforce policy-based admission decisions that reject artifacts lacking complete verified attestation chains before those artifacts are admitted to deployment environments.
  objective: Ensure deployment admission fails closed when required attestation evidence is absent, invalid, or incomplete.
  rationale: Lifecycle verification must culminate in an enforcement point that blocks non-compliant artifacts from entering deployment environments. Admission enforcement provides that fail-closed control and generates auditable rejection evidence when attestation requirements are not met.
  scope: Applies to Kubernetes admission controllers, deployment gates, and related enforcement points that decide whether artifacts may be admitted to deployment environments based on attestation status.
  primary_enforcement_point: Kubernetes admission controllers and deployment-time gate enforcement points.
  implementation_surface: Kyverno or Sigstore policy-controller admission checks, deployment gate decision logic, and rejection logs showing artifacts without complete verified attestation chains are denied before admission.
