- control_id: SAF-K8S-0503-013
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.3'
  control_seq: '013'
  control_title: Ingress web application firewall integration and request filtering
  control_statement: Ingress controllers protecting internet-facing services must integrate with a web application firewall that applies request filtering rules appropriate to the exposed application risk.
  objective: Reduce exploit delivery and malicious request exposure at the ingress layer by filtering abusive or malformed traffic before it reaches backend services.
  rationale: TLS alone does not stop injection payloads, malformed requests, or exploit probes. Separating WAF integration from rate limiting makes request filtering and abuse throttling independently auditable.
  scope: Applies to internet-facing ingress controllers and to internal ingress paths where risk assessment requires request filtering or abuse throttling. Covers WAF integrations, request filtering rules, and per-route or per-client rate limiting.
  primary_enforcement_point: Ingress request filtering controls.
  implementation_surface: WAF policy configuration, managed rule attachments, custom request filtering rules, and enforcement telemetry for blocked or challenged traffic.
  owner_primary: Network Engineering
  owner_supporting: Application Security; Platform Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
