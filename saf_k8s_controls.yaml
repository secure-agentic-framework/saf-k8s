- control_id: SAF-K8S-0704-018
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.4'
  control_seq: '18'
  control_title: Break-glass cloud identity governance for Kubernetes administration
  control_statement: Organizations must restrict cluster-admin-equivalent or break-glass cloud identities to tightly governed emergency access procedures with explicit approval, control, and review.
  objective: Ensure emergency cloud identities capable of privileged Kubernetes administration are tightly governed and not available as uncontrolled standing access paths.
  rationale: Break-glass access remains a high-risk backdoor when permanently available or weakly governed. Emergency cloud identities need explicit governance so they are available when required but do not become a routine or opaque path to cluster-admin-equivalent access.
  scope: Applies to managed Kubernetes services and any cloud-authenticated break-glass, vendor-admin, or other emergency identities that can obtain cluster-admin-equivalent Kubernetes access.
  primary_enforcement_point: Emergency access governance and privileged identity control processes for cloud-to-cluster administration.
  implementation_surface: Break-glass account procedures, multi-person approval workflows for emergency privileged access, access review evidence, and controls restricting standing availability of cluster-admin-equivalent cloud identities.
