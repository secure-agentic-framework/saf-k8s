- control_id: SAF-K8S-0704-006
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.4'
  control_seq: '006'
  control_title: Cloud provider contingency plans for managed Kubernetes services
  control_statement: Organizations must maintain cloud provider contingency plans for managed Kubernetes services that address provider lock-in, service disruption, and data portability requirements.
  objective: Ensure operational continuity and data portability in the event of cloud provider service disruptions, relationship changes, or migration requirements.
  rationale: Without cloud provider contingency plans, organizations face operational paralysis if a managed Kubernetes service experiences extended outages, pricing changes, or service deprecation. Data portability gaps can make migration prohibitively expensive or technically infeasible. Plans must be reviewed annually and after significant provider service changes.
  scope: Applies to all managed Kubernetes services (EKS, GKE, AKS). Cloud provider contingency plans must cover data export, workload migration, and alternative deployment targets. Plans must be reviewed annually and after significant provider service changes.
  primary_enforcement_point: Documented cloud provider contingency plans with periodic validation exercises.
  implementation_surface: Cloud provider portability assessment documentation (cloud-specific vs. cloud-agnostic component mapping), training data and model artifact export procedures to portable formats, and disaster recovery procedures for managed Kubernetes service outages including etcd backup restoration.
  owner_primary: Security Engineering
