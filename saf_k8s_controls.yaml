  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.6'
  control_seq: '005'
  control_title: Annotation pipeline integrity and targeted label attack detection
  control_statement: Training data annotation pipelines must detect label modification attacks through annotation pipeline integrity verification, annotator authentication, inter-annotator agreement monitoring, and targeted label flipping detection using historical label distribution comparison.
  objective: Detect and prevent targeted label attacks in annotation workflows before compromised labels reach model training.
  rationale: 'Targeted label attacks differ from general data poisoning because the attacker manipulates labels rather than the underlying feature values. Defending against that threat requires controls tied to the annotation process itself: authenticated annotators, integrity checks on annotation workflows, and analytics that surface suspicious changes in label distributions or reviewer disagreement.'
  scope: Applies to automated and human-in-the-loop annotation pipelines on Kubernetes. Covers annotator authentication, annotation workflow integrity, inter-annotator agreement monitoring, and targeted label flipping detection. Excludes broader feature-distribution and schema validation for raw training data ingestion.
  primary_enforcement_point: Annotation platform access controls, workflow integrity checks, and label consistency verification stages.
  implementation_surface: Annotation platform access logs with annotator identity, annotation API and workflow integrity checks, inter-annotator agreement metrics, historical label distribution comparison, and targeted label-flipping detection logic for training datasets.
  owner_primary: Data Engineering
  owner_supporting: Security Engineering; ML Engineering
  baseline_or_ai_specific: ai-specific
