  knowledge_area: '9.10'
  control_seq: '020'
  control_title: Security-aware target-cluster posture verification before multi-cluster placement
  control_statement: Multi-cluster AI workload orchestration control planes must verify target-cluster health and security posture before workload placement and must block placement to clusters that do not meet defined security eligibility criteria.
  objective: Ensure that AI workloads are placed only on clusters that currently satisfy required security and health baselines.
  rationale: Multi-cluster AI platforms inherit the weakest-cluster problem. Without placement-time posture verification, workloads can be routed onto clusters with unsupported Kubernetes versions, disabled admission controls, unsafe GPU driver baselines, or unresolved critical security findings.
  scope: Applies to organizations operating AI workloads across multiple Kubernetes clusters, whether on-premises, multi-cloud, or hybrid. Covers target-cluster posture verification before workload placement, including health and security eligibility checks. Excludes compromised-cluster isolation, workload draining, and re-admission after isolation.
  primary_enforcement_point: Security-aware placement policy definitions and target-cluster posture assessment feeds used before workload placement.
  implementation_surface: Security-aware placement policies, target-cluster posture assessment feeds such as SAF-K8S-1007-004 outputs, cluster eligibility decision logic, and placement decision logs recording security justification for cluster selection or rejection.
  owner_primary: Platform Engineering
  owner_supporting: ML Platform Engineering; Security Engineering; SRE
