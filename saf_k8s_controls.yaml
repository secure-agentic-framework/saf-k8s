- control_id: SAF-K8S-1006-010
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.6'
  control_seq: '010'
  control_title: Policy exception approval and expiration governance for AI workload compliance
  control_statement: Organizations must document AI workload compliance policy exceptions with approver identity, justification, scope, and expiration metadata, and must track review, renewal, or closure of those exceptions before they lapse or become permanent bypasses.
  objective: Ensure policy deviations are explicitly approved, time-bounded, and auditable so exceptions do not silently erode compliance enforcement.
  rationale: Policy exceptions create unmanaged compliance and security drift when they are undocumented, lack accountable approval, or remain open indefinitely. Formal exception governance preserves oversight, compensating-control review, and expiry discipline.
  scope: Applies to exceptions granted against AI workload compliance policies enforced through policy-as-code and related governance workflows.
  primary_enforcement_point: Exception approval workflows, exception registers, and periodic governance review.
  implementation_surface: Exception registers, approval tickets, compensating control documentation, expiration tracking, and periodic review workflows.
