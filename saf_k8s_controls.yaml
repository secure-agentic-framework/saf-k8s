  date_modified: '2026-03-17'
- control_id: SAF-K8S-1002-003
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.2'
  control_seq: '003'
  control_title: AI workload telemetry integration into cluster monitoring
  control_statement: Organizations must integrate AI workload telemetry, including GPU metrics via DCGM exporter, training job progress, inference latency, and model performance indicators, into the cluster monitoring stack.
  objective: Ensure that AI-specific telemetry is available in the cluster monitoring stack for performance monitoring and anomaly detection.
  rationale: Without integrated AI workload telemetry, operators lack visibility into GPU health, training progress, and inference degradation, delaying detection of cryptomining, model theft via side-channel analysis, or adversarial input attacks.
  scope: Applies to all Kubernetes clusters hosting AI workloads. Covers GPU metrics collection, training job telemetry, inference serving metrics, and model performance indicators. Includes DCGM exporter deployment and AI workload metric endpoint integration.
  primary_enforcement_point: DCGM exporter deployment manifests and AI workload metric endpoint configuration.
  implementation_surface: DCGM exporter DaemonSet deployment on GPU nodes with taint tolerations and minimal RBAC, AI workload telemetry endpoints from inference serving frameworks (Triton, vLLM, TorchServe native metrics), training job progress metrics (epoch completion, loss convergence), and Prometheus ServiceMonitor or PodMonitor configuration for AI workload metric scraping.
  owner_primary: AI/ML Engineering
  owner_supporting: Platform Engineering; Security Operations
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
