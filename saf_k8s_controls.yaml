- control_id: SAF-K8S-0910-030
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.10'
  control_seq: '032'
  control_title: Cross-cluster registry replication channel mutual authentication
  control_statement: Model registry replication across clusters must use mutually authenticated replication channels so source and destination registries cryptographically verify each other before exchanging replicated model artifacts.
  objective: Prevent spoofing and tampering on cross-cluster registry replication paths by enforcing mutually authenticated replication channels.
  rationale: A trusted registry peer list is not sufficient if the replication path itself can be spoofed or intercepted. Mutual authentication on the replication channel ensures each participating registry endpoint proves its identity before artifacts are exchanged across cluster boundaries.
  scope: Applies to model registry replication and federation channels spanning clusters or regions, including Harbor replication, OCI registry replication, and custom model distribution pipelines where registry endpoints exchange replicated artifacts. Covers channel-level peer authentication. Excludes join-time approval of which registry endpoints are permitted to enroll in the federation.
  primary_enforcement_point: Replication channel mutual authentication configuration and peer identity validation.
  implementation_surface: mTLS or equivalent authenticated replication channels, SPIFFE or other workload identity for registry replication peers, and operational controls that block unauthenticated registry endpoints from exchanging replicated artifacts.
