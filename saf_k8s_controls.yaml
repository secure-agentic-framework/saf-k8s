- control_id: SAF-K8S-1007-017
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.7'
  control_seq: '017'
  control_title: Kubernetes release-channel and changelog monitoring for API deprecations
  control_statement: Organizations must monitor official Kubernetes release channels, changelog entries, and deprecation notices for API removals that affect cluster services, AI operators, custom resources, manifests, and workload dependencies, and must translate those upstream notices into tracked internal impact alerts before planned cluster upgrades.
  objective: Identify Kubernetes API deprecations and removals affecting AI workloads early enough to begin impact review before upgrade execution and compatibility validation windows.
  rationale: Kubernetes publishes API deprecation and removal timelines before enforcement. Tracking those upstream notices early gives platform teams time to assess which AI operators, CRDs, and workload manifests may be affected before upgrade preparation begins.
  scope: Applies to Kubernetes release streams, changelogs, and deprecation notices that affect clusters running AI training, inference, platform, and operator workloads.
  primary_enforcement_point: Release-note monitoring workflows, changelog review checkpoints, and deprecation alert triage processes.
