  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.3'
  control_seq: '030'
  control_title: Environment variable secret injection exception governance
  control_statement: Organizations must maintain an exception registry for any approved environment variable secret usage with documented compensating controls and mandatory re-review dates.
  objective: Ensure any rare approved use of environment variable secret injection is explicitly governed, time-bounded, and subject to compensating controls.
  rationale: Exception governance is independently auditable from the enforcement of the default prohibition. This control isolates approval, compensating-control documentation, and re-review so teams can verify that deviations are rare, tracked, and actively governed.
  scope: Applies to all approved deviations from the production prohibition on environment variable secret injection. Covers exception registry maintenance, documented compensating controls, approval metadata, and mandatory re-review dates. Default admission blocking remains governed by SAF-K8S-0403-029.
  primary_enforcement_point: Exception registry and re-review workflow for env-var secret usage.
  implementation_surface: Exception registry entries, approval records, compensating control documentation, and re-review workflow records for approved environment-variable secret use.
