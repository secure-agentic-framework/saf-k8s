- control_id: SAF-K8S-0905-012
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: '012'
  control_title: Development-to-production environment separation for AI workloads
  control_statement: Organizations must enforce development-to-production environment separation for AI workloads to prevent training environment credentials (data access tokens, cloud IAM roles) from leaking to production inference, using namespace isolation, workload identity federation with environment-scoped IAM roles, and admission control.
  objective: Prevent credential leakage across environment boundaries by enforcing strict separation between training/development and production inference environments.
  rationale: Without environment separation, training credentials (data access tokens, cloud IAM roles) that are broader than production needs can be exploited from compromised inference pods. Training environments typically require broad data access that would be dangerous in production.
  scope: Applies to Kubernetes namespace and RBAC configurations separating training/development from production inference environments. Covers credential separation, workload identity scoping, and admission control validating absence of cross-environment credentials. Excludes model artifact lifecycle management covered by SAF-K8S-0905-006.
  primary_enforcement_point: Kubernetes namespace and RBAC configurations enforcing environment separation and admission control validating credential scoping.
  implementation_surface: Kubernetes namespace and RBAC configurations enforcing development/staging/production environment separation, workload identity federation with environment-scoped IAM roles, and admission control validating absence of cross-environment credentials.
  owner_primary: Security Engineering
  owner_supporting: ML Platform Engineering; DevOps Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
