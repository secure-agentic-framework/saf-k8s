- control_id: SAF-K8S-0402-003
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.2'
  control_seq: '003'
  control_title: Service account identifier exposure prevention
  control_statement: Service account names, tokens, and associated identifiers must not be exposed in public repositories, container images, application logs, error messages, or externally accessible API responses.
  objective: Prevent disclosure of service account identifiers that would allow attackers to target specific accounts for credential theft or to craft targeted attacks against known workload identities.
  rationale: Exposed service account names reveal the identity structure of a cluster, enabling attackers to identify high-value targets such as accounts with broad permissions or accounts bound to cloud IAM roles. Leaked tokens provide direct API access. Even without tokens, knowing account names aids reconnaissance for RBAC bypass, impersonation attacks, and social engineering of operators who manage those accounts.
  scope: Applies to all service accounts in all clusters. Covers source code repositories, CI/CD pipeline logs, container image layers, application stdout/stderr logs, API error responses, and documentation artifacts. Scanning must include both real-time log filtering and retrospective repository scanning.
  primary_enforcement_point: Secret scanning tools in CI/CD pipelines and source repositories, log filtering rules that redact service account tokens and identifiers, and container image scanning for embedded credentials.
  implementation_surface: Secret scanning tools in CI/CD pipelines (GitHub push protection, GitLeaks, TruffleHog) with Kubernetes JWT token patterns, container image layer scanning for embedded service account credentials, log aggregation filtering rules redacting Authorization Bearer headers and service account tokens, and API error response sanitization configurations.
  owner_primary: Security Engineering
  owner_supporting: Application Development; Platform Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0402-004
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.2'
  control_seq: '004'
  control_title: Workload identity attribute integrity
  control_statement: Organizations must maintain accurate and protected identity attributes for workload identities, including service account annotations, labels, and namespace bindings, and must prevent unauthorized modification of these attributes.
  objective: Ensure that workload identity metadata remains trustworthy and cannot be tampered with to bypass authorization decisions that rely on identity attributes such as namespace labels, service account annotations, or workload identity federation bindings.
  rationale: Many authorization and policy decisions in Kubernetes depend on identity attributes beyond the service account name, including annotations for cloud IAM bindings, labels for network policy selectors, and namespace membership. If an attacker can modify these attributes, they can redirect cloud IAM role assumptions, bypass network policies, or alter workload identity federation mappings without changing RBAC bindings directly.
  scope: Applies to all workload identity attributes including service account annotations (e.g., IAM role annotations), namespace labels used in policy decisions, and projected token audience configurations. Covers all clusters with workload identity federation or attribute-based policies.
  primary_enforcement_point: RBAC restrictions on service account and namespace metadata modification, admission policies that validate identity attribute changes against an approved registry, and audit logging of all identity attribute mutations.
  implementation_surface: RBAC restrictions on update/patch verbs for ServiceAccount and Namespace metadata, service account annotations for cloud IAM binding (eks.amazonaws.com/role-arn, iam.gke.io/gcp-service-account, azure.workload.identity/client-id), namespace labels used in NetworkPolicy and admission policy selectors, admission policies validating identity attribute changes against an approved registry, and API server audit logging at RequestResponse level for identity attribute mutations.
  owner_primary: Identity and Access Management
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0402-006
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.2'
  control_seq: '006'
  control_title: Cloud workload identity federation for AI services
  control_statement: AI workloads requiring access to cloud services such as model registries, data lakes, and feature stores must use workload identity federation (GKE Workload Identity, EKS IRSA/Pod Identity, AKS Workload Identity) instead of static cloud credentials stored as Kubernetes Secrets.
  objective: Eliminate static cloud credentials from Kubernetes clusters by leveraging platform-native workload identity federation, ensuring AI workloads authenticate to cloud services using short-lived, automatically rotated tokens tied to their Kubernetes identity.
  rationale: AI workloads routinely access high-value cloud services including model registries containing proprietary models, data lakes with training data, and feature stores with business-critical features. Storing cloud credentials as Kubernetes Secrets creates a high-impact exfiltration target. Workload identity federation binds cloud IAM roles directly to Kubernetes service accounts, eliminating long-lived credentials and enabling fine-grained per-workload cloud access control.
  scope: Applies to all AI/ML workloads accessing cloud provider services from Kubernetes clusters on GKE, EKS, or AKS. Covers model registry access, training data storage, feature store queries, experiment tracking, and any other cloud service integration. On-premises clusters using external OIDC federation are also in scope.
  primary_enforcement_point: Cloud IAM workload identity bindings, Kubernetes service account annotations for cloud identity mapping, and admission policies rejecting pods that mount cloud credential secrets when workload identity is available.
  implementation_surface: Cloud workload identity federation mechanisms (GKE Workload Identity with iam.gke.io/gcp-service-account annotation, EKS IRSA/Pod Identity with eks.amazonaws.com/role-arn annotation, AKS Workload Identity with azure.workload.identity/client-id annotation), cloud IAM trust policies referencing Kubernetes OIDC issuers, per-service-account cloud IAM role bindings scoped to specific cloud resources (S3 buckets, GCS buckets, Azure Blob containers), and admission policies rejecting pods mounting static cloud credential Secrets when workload identity is available.
  owner_primary: Platform Engineering
  owner_supporting: Cloud Platform Engineering; ML Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0402-007
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.2'
  control_seq: '007'
  control_title: OIDC authentication integration
  control_statement: Kubernetes clusters must authenticate human users through an external OIDC identity provider with validated token signatures, configured audience restrictions, and group claim mappings for RBAC integration, rather than relying on static credentials or client certificates for user access.
  objective: Centralize human user authentication through an enterprise identity provider, enabling consistent identity governance, multi-factor authentication enforcement, and automatic deprovisioning when users leave the organization.
  rationale: Without OIDC integration, clusters rely on client certificates or static tokens for user authentication. Client certificates cannot be revoked without rotating the entire cluster CA, and static tokens do not expire. OIDC integration ties cluster access to the enterprise identity provider, enabling MFA, session expiry, group-based RBAC, and immediate access revocation when users are deprovisioned from the identity provider.
  scope: Applies to all clusters where human users access the Kubernetes API directly. Covers API server OIDC configuration, token validation parameters, group claim mappings, and client tooling (kubectl, dashboard). Service-to-service authentication is addressed separately by workload identity controls.
  primary_enforcement_point: API server OIDC flags (--oidc-issuer-url, --oidc-client-id, --oidc-groups-claim), kubectl credential plugin configuration, and periodic validation of OIDC provider trust settings.
  implementation_surface: Kubernetes API server OIDC configuration flags (--oidc-issuer-url, --oidc-client-id, --oidc-groups-claim, --oidc-username-claim), external identity provider OIDC client registration, kubectl credential plugins (kubelogin), OIDC token signature validation, group claim-to-RBAC group mappings, MFA enforcement at the identity provider, and session expiry policies for interactive cluster access.
  owner_primary: Identity and Access Management
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0402-008
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.2'
  control_seq: 008
  control_title: Distinct identity assignment for AI workload types
  control_statement: Training jobs, inference servers, and ML pipeline components must each be assigned distinct Kubernetes service accounts with role-appropriate permissions, and must not share service accounts across workload types with differing access requirements.
  objective: Enforce identity segmentation between AI workload types so that a compromised inference server cannot access training data storage, and a compromised pipeline component cannot modify serving endpoints.
  rationale: 'AI workloads have fundamentally different access needs: training jobs require read access to training data and write access to model storage; inference servers require read access to model artifacts and may need access to feature stores; pipeline orchestrators require permissions to create and manage jobs. Sharing a single service account across these workload types violates least privilege and means that compromising any one component grants access to resources needed by all others.'
  scope: Applies to all clusters running AI/ML workloads. Covers Kubeflow pipelines, KServe inference services, training operators, notebook servers, and any custom ML components. Each distinct workload type within a namespace must have its own service account.
  primary_enforcement_point: Namespace-scoped service account definitions per AI workload type, with admission policies that validate pod service account assignments match the expected workload type based on labels or annotations.
  implementation_surface: Per-workload-type Kubernetes ServiceAccount definitions (sa-training, sa-inference, sa-pipeline, sa-notebook), namespace-scoped RBAC Roles with differentiated permissions per AI workload type, admission policies (OPA Gatekeeper, Kyverno) validating pod-to-service-account mappings based on workload labels or annotations, KServe InferenceService, Kubeflow Training Operator, and pipeline orchestrator service account assignment configurations.
  owner_primary: ML Engineering
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0402-010
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.2'
  control_seq: '010'
  control_title: Cross-cluster and cross-cloud cryptographic identity federation
  control_statement: Federated training and multi-cluster inference workloads must use cryptographic identity federation (such as SPIFFE/SPIRE or cloud-native cross-account trust) to authenticate across cluster and cloud boundaries.
  objective: Enable secure workload identity verification across cluster and cloud boundaries for distributed AI workloads, ensuring that federated training participants and multi-cluster inference components can mutually authenticate without long-lived shared secrets.
  rationale: Distributed training across multiple clusters or clouds, and multi-cluster inference for latency or resilience, require workloads to authenticate across trust boundaries. Cryptographic identity federation provides verifiable workload identity without shared secrets, enabling fine-grained cross-boundary access control.
  scope: Applies to AI workloads that span multiple Kubernetes clusters or cloud providers, including federated learning, distributed training with parameter servers across clusters, and multi-cluster model serving. Covers SPIFFE/SPIRE trust domain federation, cloud IAM cross-account roles, and multi-cluster service mesh identity.
  primary_enforcement_point: SPIFFE/SPIRE federation configuration, cloud IAM cross-account trust policies, service mesh cross-cluster identity settings, and admission policies preventing static credential sharing between clusters.
  implementation_surface: SPIFFE/SPIRE trust domain federation (per-cluster SPIRE servers, workload attestation, SVID issuance, trust bundle exchange, Bundle Endpoint rotation), cloud-native cross-account IAM trust (AWS cross-account AssumeRole with IRSA, GCP cross-project service account impersonation with Workload Identity, Azure cross-subscription federated identity credentials), SPIRE OIDC Discovery for hybrid on-prem-to-cloud federation, service mesh cross-cluster identity (Istio, Linkerd, Cilium), and admission policies preventing static credential replication between clusters.
  owner_primary: Platform Engineering
  owner_supporting: Cloud Platform Engineering; ML Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0402-011
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.2'
  control_seq: '011'
  control_title: Cross-environment static credential prohibition
  control_statement: Federated training and multi-cluster inference workloads must not rely on shared static credentials or replicated secrets for cross-environment access.
  objective: Eliminate long-lived static credentials from cross-environment AI workloads to reduce the blast radius of credential compromise and simplify revocation across cluster and cloud boundaries.
  rationale: Static credentials replicated between clusters or cloud environments create synchronization challenges, expand the blast radius of compromise, and cannot be quickly revoked when a cluster is compromised. Enforcing prohibition on static credentials drives adoption of short-lived federated mechanisms such as SPIFFE SVIDs and cloud STS tokens.
  scope: Applies to all AI workloads that communicate across Kubernetes cluster or cloud provider boundaries, including federated learning participants, multi-cluster inference routers, and cross-environment pipeline orchestrators.
  primary_enforcement_point: Admission policies scanning for credential secrets referencing remote cluster endpoints, and audit scans confirming absence of replicated credential Secrets across cluster namespaces.
  implementation_surface: OPA/Gatekeeper or Kyverno policies blocking creation of Secrets with cross-cluster credential patterns, periodic scans for orphaned credentials, CI/CD pipeline checks preventing static credential injection into multi-cluster configurations.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering, ML Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-12'
  date_modified: '2026-03-12'
- control_id: SAF-K8S-0402-012
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.2'
  control_seq: '012'
  control_title: Ephemeral training job credential expiration
  control_statement: Credentials issued to ephemeral training jobs must be short-lived with expiration aligned to the expected job duration.
  objective: Ensure credentials for ephemeral training jobs expire when the workload completes, preventing stale credentials from persisting after job termination through natural TTL-based expiry.
  rationale: Short-lived credentials with duration-aligned expiration prevent orphaned secrets when training jobs complete normally. TTL alignment eliminates a class of credential accumulation risk without requiring explicit revocation infrastructure for every credential type.
  scope: Applies to all credential types issued to ephemeral training jobs including Kubernetes service account tokens, cloud IAM short-lived credentials, Vault dynamic secrets, and database session tokens.
  primary_enforcement_point: Projected ServiceAccountToken expirationSeconds, Vault dynamic secret TTL configuration, and cloud workload identity federation token validity periods.
  implementation_surface: Projected ServiceAccountToken expirationSeconds aligned to job duration, Vault dynamic secret TTLs (1-4 hour leases), and cloud workload identity federation short-lived credentials with TTL matching estimated job runtime.
  owner_primary: ML Engineering
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-12'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0402-013
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.2'
  control_seq: '013'
  control_title: Ephemeral training job credential rotation
  control_statement: Credentials issued to ephemeral training jobs with expected durations exceeding the credential validity period must be automatically rotated before expiration.
  objective: Ensure long-running training jobs maintain valid credentials without requiring excessively long-lived tokens, reducing the exposure window while sustaining job continuity.
  rationale: Long-running training jobs may outlast short-lived credential TTLs. Without automatic rotation, jobs either fail on credential expiry or require long-lived tokens that create unacceptable exposure windows. Automatic rotation maintains access while constraining each individual token lifetime.
  scope: Applies to training jobs with expected durations exceeding the initial credential validity period, covering Kubernetes projected token refresh, Vault lease renewal, and cloud credential refresh mechanisms.
  primary_enforcement_point: Job controller credential refresh configuration, Vault lease renewal policies, and cloud IAM token refresh mechanisms for long-running workloads.
  implementation_surface: Kubernetes projected ServiceAccountToken automatic refresh, Vault agent credential renewal, Kubeflow TrainingJob and Argo Workflow credential rotation hooks, and cloud SDK automatic token refresh configuration.
  owner_primary: ML Engineering
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-12'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0402-014
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.2'
  control_seq: '014'
  control_title: Ephemeral training job credential revocation on completion
  control_statement: Credentials issued to ephemeral training jobs must be revoked or cleaned up upon job completion or failure.
  objective: Ensure training job credentials are explicitly terminated when the associated job ends, eliminating orphaned credentials that could be exploited after job termination even if TTL has not yet expired.
  rationale: Even when credentials have TTL alignment, explicit revocation on job completion provides defense-in-depth. Job failures in particular may leave credentials that have not yet expired. Without explicit cleanup, credential accumulation across thousands of training runs creates an expanding attack surface from orphaned secrets.
  scope: Applies to all credentials issued to ephemeral training jobs including Kubernetes service account tokens, cloud IAM short-lived credentials, Vault dynamic secrets, and any other credentials provisioned at job start.
  primary_enforcement_point: Kubernetes Job finalizers and post-completion hooks, Vault lease revocation on job termination, and cloud IAM credential revocation mechanisms triggered by job lifecycle events.
  implementation_surface: Kubernetes Job finalizers for credential revocation, post-completion cleanup hooks, Vault lease revocation API calls, cloud IAM credential invalidation on job termination, and orphaned credential scanning for completed training runs.
  owner_primary: ML Engineering
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
