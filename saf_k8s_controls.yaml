- control_id: SAF-K8S-0606-029
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.6'
  control_seq: 029
  control_title: GitOps deployed package and version metadata retention
  control_statement: GitOps deployment processes must preserve release metadata for deployed packages and version identifiers so auditors and responders can determine exactly which package builds and versions were released to each environment.
  objective: Ensure GitOps-managed deployments retain package and version metadata sufficient to identify the exact released artifacts and package versions promoted into each environment.
  rationale: Without preserved package and version metadata, teams cannot prove which package build or chart version was deployed, correlate deployed software to vulnerability disclosures, or support precise rollback and audit review. This is a distinct obligation from tracking configuration revision history.
  scope: Applies to production and staging GitOps deployments and to package, chart, image, and release-version metadata needed to identify what software release was deployed.
  primary_enforcement_point: GitOps release records and retained package or version metadata.
  implementation_surface: Helm release metadata, OCI artifact tags and digests, image version records, package manifests, and deployment history retained by GitOps controllers or release systems.
  owner_primary: Platform Engineering
  owner_supporting: DevSecOps / Release Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
