- control_id: SAF-K8S-1007-015
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.7'
  control_seq: '015'
  control_title: GPU node onboarding security baseline validation gates
  control_statement: Organizations must enforce security validation gates during GPU cluster scaling and node onboarding so new GPU nodes meet required kubelet, container runtime, operating system, and immutable baseline requirements before accepting workloads.
  objective: Ensure newly added GPU nodes satisfy required security baselines before they are admitted to the trusted compute environment.
  rationale: GPU scaling can rapidly introduce nodes that are missing foundational hardening controls. Baseline validation gates prevent insecure nodes from joining production AI clusters and reduce the chance that scaling operations bypass standard node-security requirements.
  scope: Applies to all GPU-capable node onboarding and scale-out operations in Kubernetes clusters hosting AI workloads.
  primary_enforcement_point: Node onboarding automation pipeline with baseline validation gates.
  implementation_surface: Node onboarding security validation for kubelet hardening, container runtime protections, node OS baseline checks, immutable root enforcement where supported, and workload admission readiness.
  owner_primary: Infrastructure Engineering
  owner_supporting: Platform Engineering; Security Engineering
