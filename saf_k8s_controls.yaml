- control_id: SAF-K8S-0502-001
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.2'
  control_seq: '001'
  control_title: CNI plugin security selection criteria
  control_statement: CNI plugin selection must be based on documented evaluation of security features including network policy support completeness, pod-to-pod encryption capabilities, FQDN-based filtering, L7 policy enforcement, and performance characteristics, with the selected plugin meeting all organization-defined minimum security requirements.
  objective: Ensure the cluster networking foundation supports the full range of required security controls by selecting a CNI plugin with adequate security feature coverage.
  rationale: The CNI plugin is the foundational network layer for all pod communication. Selecting a plugin without adequate network policy support, encryption capability, or performance under security-enabled configurations undermines all higher-layer network security controls. A CNI plugin that cannot enforce egress FQDN filtering or L7 policies forces the organization to rely on weaker compensating controls.
  scope: Applies to all Kubernetes cluster deployments, including new cluster provisioning and CNI migration decisions. Managed Kubernetes services with limited CNI choice must document the available security features and any gaps requiring compensating controls.
  primary_enforcement_point: Cluster provisioning standards and architecture review process governing CNI plugin selection and configuration.
  implementation_surface: CNI plugin evaluation matrix comparing Cilium, Calico, Flannel, and Canal across security features (NetworkPolicy support, WireGuard/IPsec encryption, FQDN filtering, L7 policy, eBPF dataplane, flow observability), architecture decision records, cluster provisioning standards, managed Kubernetes CNI documentation (AWS VPC CNI, GKE Dataplane V2, Azure NPM), and gap analysis with compensating controls for managed environments with limited CNI choice.
  owner_primary: Platform Engineering
  owner_supporting: Network Engineering; Security Architecture
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0502-002
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.2'
  control_seq: '002'
  control_title: Pod-to-pod traffic encryption
  control_statement: Pod-to-pod network traffic must be encrypted in transit using WireGuard, IPsec, or equivalent transparent encryption provided by the CNI plugin, ensuring that all inter-pod communication is protected against eavesdropping and tampering without requiring application-level changes.
  objective: Protect the confidentiality and integrity of data in transit between pods by encrypting all pod-to-pod communication at the network layer.
  rationale: Pod-to-pod traffic within a Kubernetes cluster traverses shared node networks and potentially physical or virtual switches accessible to other tenants or compromised nodes. Without encryption, an attacker with network access (via a compromised node, misconfigured network tap, or cloud provider vulnerability) can eavesdrop on inter-pod communication including API tokens, database queries, and sensitive application data.
  scope: Applies to all production Kubernetes clusters. Transparent encryption must cover all pod-to-pod traffic across nodes. Intra-node pod traffic encryption is recommended where the CNI supports it. Performance impact must be evaluated and documented, particularly for high-throughput workloads.
  primary_enforcement_point: CNI plugin encryption configuration (Cilium WireGuard, Calico WireGuard or IPsec), validated via network traffic capture and encryption verification.
  implementation_surface: 'CNI plugin encryption configuration (Cilium Helm values encryption.enabled/encryption.type: wireguard, Calico felixconfiguration wireguardEnabled patch via calicoctl), WireGuard kernel module, IPsec configuration, cilium encrypt status verification, tcpdump packet capture for encryption validation, and performance benchmarking tooling comparing encrypted vs. unencrypted throughput.'
  owner_primary: Network Engineering
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0502-004
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.2'
  control_seq: '004'
  control_title: CNI plugin hardening and lifecycle management
  control_statement: CNI plugins must be deployed using organization-approved hardened configuration baselines, included in the vulnerability management program with timely patching of security advisories, and upgraded following documented procedures that include rollback plans and network connectivity validation.
  objective: Maintain the security posture of the foundational networking layer by hardening CNI configurations and managing CNI plugin vulnerabilities and upgrades.
  rationale: The CNI plugin operates with elevated privileges on every node and controls all pod network traffic. A vulnerable or misconfigured CNI plugin can be exploited for container escape, network policy bypass, or cluster-wide denial of service. Without hardened baselines and timely patching, known CVEs in CNI plugins remain exploitable. Unplanned or untested upgrades risk network outages that affect all cluster workloads.
  scope: Applies to all CNI plugin deployments across all clusters. Includes the CNI binary, CNI DaemonSet, and any associated CRDs or control-plane components. Managed Kubernetes environments where the CNI is provider-managed must document the provider's patching SLA and compensating monitoring.
  primary_enforcement_point: CNI DaemonSet configuration management, container image vulnerability scanning, and change management procedures for CNI upgrades.
  implementation_surface: Helm chart deployments with pinned versions and locked values files for CNI plugins, container image vulnerability scanning of CNI images (pinned by digest), CNI DaemonSet RBAC configuration, Pod Security Admission (Privileged profile for CNI namespace), CNI upgrade runbooks with --atomic rollback, post-upgrade connectivity tests (cilium connectivity test), and CVE patch management records for CNI components.
  owner_primary: Platform Engineering
  owner_supporting: Network Engineering; Security Engineering; Change Management
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0502-005
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.2'
  control_seq: '005'
  control_title: AI workload data path encryption in transit
  control_statement: Data paths between compute nodes and storage backends used for AI training and inference workloads must be encrypted in transit, covering pod-to-pod training communication, compute-to-storage paths, model registry download paths, and inference serving traffic, with documented compensating controls where encryption is not supported and performance impact evaluated for high-bandwidth training paths.
  objective: Protect AI training data and model weights in transit between compute nodes and storage backends by ensuring all AI-specific data paths use appropriate in-transit encryption.
  rationale: AI workloads transfer large volumes of sensitive data between GPU nodes and storage backends including training datasets, model checkpoints, and gradient updates. Unencrypted data paths expose this data to interception. NCCL TCP pod-to-pod training traffic, NFS mounts for training datasets, object storage access, model registry pulls, and RDMA paths each require distinct protection or compensating controls because they traverse different protocol stacks.
  scope: Applies to Kubernetes clusters hosting AI/ML training or inference workloads. Covers pod-to-pod training traffic, compute-to-storage paths, model registry download paths, inference endpoint traffic, and RDMA paths requiring compensating controls where encryption is not supported. Excludes network policy design for AI traffic patterns, which is covered by SAF-K8S-0502-008.
  primary_enforcement_point: CNI encryption configuration, storage backend in-transit encryption settings, model registry TLS enforcement, and documented RDMA compensating controls.
  implementation_surface: CNI WireGuard encryption for NCCL TCP pod-to-pod training traffic, storage backend in-transit encryption such as NFS Kerberos krb5p and HTTPS-enforced object storage, model registry TLS verification, InfiniBand/RoCE fabric isolation and switch ACLs where encryption is unavailable, and performance benchmarks comparing encrypted and unencrypted AI data paths.
  owner_primary: Network Engineering
  owner_supporting: ML Platform Engineering; Storage Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0502-007
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.2'
  control_seq: '007'
  control_title: Kubernetes pod IP anti-spoofing enforcement and validation
  control_statement: IP spoofing protection must be enabled and validated so pods cannot forge source IP addresses to bypass network policies or impersonate other workloads.
  objective: Prevent network-layer identity spoofing that could circumvent policy enforcement or allow a compromised pod to impersonate another workload.
  rationale: IP spoofing allows a malicious pod to impersonate another workload's IP address, bypassing NetworkPolicy rules and undermining trust in network-layer identity. Separating anti-spoofing enforcement from IPAM capacity governance makes it possible to audit datapath enforcement and spoofing test validation directly.
  scope: Applies to all Kubernetes clusters. Covers anti-spoofing enforcement for all CNI configurations and validation on managed and self-managed clusters that forged source IP packets are dropped.
  primary_enforcement_point: CNI anti-spoofing enforcement at the pod virtual network interface or datapath.
  implementation_surface: CNI anti-spoofing enforcement at the veth pair or eBPF datapath, managed or self-managed CNI configuration, and spoofing test validation confirming forged source IP packets are dropped.
  owner_primary: Network Engineering
  owner_supporting: Platform Engineering; Security Operations
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0502-008
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.2'
  control_seq: 008
  control_title: Network policy design for AI-specific traffic patterns
  control_statement: Network policies for Kubernetes clusters hosting AI workloads must be designed to accommodate AI-specific traffic patterns including NCCL inter-node training communication with pinned port ranges scoped to training job labels, model registry download paths restricted to approved registries, and inference serving traffic, preventing both inadvertent blocking of legitimate AI communication and over-permissive rules that create lateral movement paths.
  objective: Ensure network policies correctly handle the unique traffic patterns of distributed AI workloads without blocking legitimate communication or creating excessive lateral movement exposure between unrelated workloads.
  rationale: AI workloads generate non-standard traffic patterns that standard network policies are not designed to handle. NCCL all-reduce operations require direct pod-to-pod communication across nodes on high-port ranges; without job-label-scoped policies, this traffic is either blocked, causing training failures, or permitted too broadly, creating lateral movement paths between training jobs. Model download paths require registry-specific egress rules to prevent exfiltration via alternate endpoints. Inference serving traffic requires differentiated policies by role and criticality. These trust-boundary decisions are independent of in-transit encryption.
  scope: Applies to Kubernetes clusters hosting AI/ML training or inference workloads. Covers NCCL inter-node training traffic, model registry egress policies, inference endpoint ingress and egress policies, and parameter server communication patterns. Excludes in-transit encryption configuration and RDMA fabric compensating controls, which remain on SAF-K8S-0502-005.
  primary_enforcement_point: Kubernetes NetworkPolicy manifests with training-job label selectors, pinned NCCL port ranges, and explicit registry / inference path allowlists.
  implementation_surface: Kubernetes NetworkPolicy rules scoped to training job labels with pinned NCCL port ranges, default-deny egress policies for AI namespaces with explicit allowlists for model registries and object storage endpoints, inference namespace ingress policies permitting only approved gateway or load balancer sources, and parameter-server communication policies scoped to job-specific labels to prevent cross-job access.
  owner_primary: Network Engineering
  owner_supporting: ML Platform Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0502-009
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.2'
  control_seq: 009
  control_title: Kubernetes CNI IPAM capacity sizing
  control_statement: IP address management for Kubernetes networking must be configured with adequate pod, service, and node CIDR capacity so IP pools support workload scheduling and service operation without avoidable exhaustion.
  objective: Maintain sufficient IP address capacity for workload scheduling and service operation by correctly sizing pod, service, and node CIDR allocations.
  rationale: Undersized pod, service, or node CIDR ranges cause scheduling failures and service disruption. Separate sizing governance from monitoring so capacity design can be independently reviewed and validated.
  scope: Applies to all Kubernetes clusters. Covers pod CIDR, service CIDR, and node CIDR range sizing, utilization monitoring, exhaustion thresholds, and alerting for IP address pool depletion.
  primary_enforcement_point: CNI plugin IPAM capacity planning and allocation design.
  implementation_surface: CNI plugin IPAM configuration for pod, service, and node CIDR allocation sizing, pool reservation strategy, and operational review of remaining address capacity.
  owner_primary: Network Engineering
  owner_supporting: Platform Engineering; Security Operations
  baseline_or_ai_specific: baseline
  maturity: Practitioner
