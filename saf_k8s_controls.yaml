- control_id: SAF-K8S-1007-004
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.7'
  control_seq: '004'
  control_title: Continuous security posture management for AI clusters
  control_statement: Organizations must implement continuous security posture assessment for Kubernetes AI clusters, monitoring configuration drift against security benchmarks, tracking vulnerability exposure, and evaluating compliance status, to detect security regression before the next periodic audit.
  objective: Maintain a continuously accurate view of Kubernetes AI cluster security posture by detecting configuration drift, vulnerability exposure, and compliance deviations in near real-time.
  rationale: Kubernetes cluster configurations drift over time through manual changes, operator updates, and scaling events. Without continuous posture assessment, drift from security benchmarks goes undetected until the next periodic audit, leaving windows of vulnerability.
  scope: Applies to all Kubernetes clusters hosting AI workloads. Configuration drift monitoring must cover CIS Kubernetes Benchmark controls and AI-specific security configurations. Managed Kubernetes services must monitor customer-configurable security settings. GPU scaling governance is covered by SAF-K8S-1007-008.
  primary_enforcement_point: Kubernetes security posture management tooling with daily benchmark scanning and change detection alerting.
  implementation_surface: CIS Kubernetes Benchmark scanning (kube-bench) on daily schedule with regression alerting, admission controller and policy engine configuration change monitoring (validating/mutating webhook, OPA constraint, Kyverno policy changes), NetworkPolicy change detection and alerting on access-widening modifications, RBAC change monitoring (ClusterRoleBindings, RoleBindings, ServiceAccount token creation), container image vulnerability scanning integration with posture dashboard, GPU driver and CUDA toolkit CVE exposure tracking against NVIDIA security bulletins, and vulnerability-to-asset-criticality correlation.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; AI/ML Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
