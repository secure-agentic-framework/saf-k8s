- control_id: SAF-K8S-0904-013
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.4'
  control_seq: '013'
  control_title: Pipeline artifact storage encryption and object-store access policy enforcement
  control_statement: Pipeline artifacts, including intermediate data, model artifacts, and pipeline metadata, must be stored with encryption at rest and explicit object-storage access policies that restrict artifact retrieval and modification to approved identities and pipeline contexts.
  objective: Protect pipeline artifact stores from unauthorized disclosure or tampering through storage-layer encryption and object-store policy enforcement.
  rationale: ML pipelines generate artifacts that frequently contain sensitive data subsets, features, model weights, and execution metadata. Without storage encryption and explicit access policies on the artifact store, any pod or identity with broad storage reach can read or alter those artifacts outside the intended pipeline flow.
  scope: Applies to object storage and persistent artifact repositories used by ML pipelines on Kubernetes, including MinIO, S3, GCS, and equivalent services. Covers encryption at rest, bucket or object policy enforcement, and artifact-store access restriction. Excludes stage isolation and cross-classification authorization, which are addressed separately.
  primary_enforcement_point: Object storage bucket policy, KMS configuration, and artifact store access-control settings.
  implementation_surface: Encrypted object storage, per-bucket or per-prefix access policies, artifact repository IAM bindings, versioning where used for artifact traceability, and storage-side controls restricting read or write access to approved pipeline identities.
  owner_primary: ML Platform Engineering
  owner_supporting: Data Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
