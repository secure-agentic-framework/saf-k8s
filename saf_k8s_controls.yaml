- control_id: SAF-K8S-0604-001
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.4'
  control_seq: '001'
  control_title: SBOM generation for container and AI artifacts
  control_statement: CI/CD pipelines must generate Software Bills of Materials in at least one standard format (SPDX, CycloneDX, or SWID) for every container image built, including AI container images and model artifacts. SBOMs must capture all direct and transitive dependencies, including native libraries specific to AI workloads (CUDA, cuDNN, ML framework packages). SBOM generation must be automated and integrated into the build process, not performed manually or after the fact.
  objective: Provide a complete, machine-readable inventory of all components in every container image and AI artifact to enable vulnerability tracking, license compliance, and supply chain analysis.
  rationale: Without SBOMs, organizations cannot systematically identify which deployed images contain a newly disclosed vulnerability. AI workload images have especially complex dependency trees spanning Python packages, native CUDA libraries, and framework-specific extensions. Manual inventory is infeasible at scale and quickly becomes stale. Automated SBOM generation at build time provides an authoritative component inventory that supports rapid vulnerability response.
  scope: Applies to all CI/CD pipelines producing container images or deployable AI artifacts for any environment. Includes inference server images, training job images, data pipeline images, and packaged model artifacts. Third-party images must have SBOMs obtained from vendors or generated through post-hoc analysis.
  primary_enforcement_point: CI/CD pipeline build stage with SBOM generation as a mandatory step before image push to registry.
  implementation_surface: SBOM generation tools (Syft, Trivy, cdxgen) integrated as mandatory CI/CD build steps, SPDX and CycloneDX output format support, cosign attach sbom CLI for OCI artifact attachment, Python pip metadata indexing for PyTorch/TensorFlow/JAX packages, OS package manager (apt/yum) dependency capture for CUDA toolkit and cuDNN, wheel-bundled native library detection (torch-shipped libcudart.so), and SBOM completeness validation for AI-specific dependency coverage.
  owner_primary: DevSecOps / Release Engineering
  owner_supporting: ML Platform Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0604-002
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.4'
  control_seq: '002'
  control_title: ML-BOM (ML Bill of Materials) generation
  control_statement: Organizations deploying ML models must generate ML Bills of Materials that extend standard SBOMs to capture model lineage, training data provenance, hyperparameter configurations, framework versions, training infrastructure identity, and dataset composition. ML-BOMs must conform to CTA-2114 or an equivalent standard and must be attached to model artifacts throughout their lifecycle.
  objective: Enable end-to-end ML supply chain transparency by documenting not only software dependencies but also the data, configuration, and infrastructure inputs that produced each model artifact.
  rationale: Standard SBOMs capture software dependencies but not the ML-specific inputs that determine model behavior. Without ML-BOMs, organizations cannot trace a model back to its training data, identify which models are affected by a poisoned dataset, verify that training was performed on authorized infrastructure, or demonstrate compliance with data governance requirements. This creates an invisible supply chain for the most consequential component of AI workloads.
  scope: Applies to all ML models trained or fine-tuned by the organization and deployed to Kubernetes clusters. Includes models served via inference endpoints, embedded models in application containers, and models used in batch processing pipelines. Pre-trained third-party models must have ML-BOMs obtained from the provider or reconstructed from available documentation.
  primary_enforcement_point: ML training pipeline output stage and model registry admission policy.
  implementation_surface: ML-BOM generation tooling conforming to CTA-2114, CycloneDX ML-BOM extensions for encoding model lineage metadata, training pipeline completion step integration for ML-BOM generation, model registry storage and attachment of ML-BOMs to model artifacts, ML-BOM fields capturing model lineage (parent model, training run ID), training data provenance (dataset identifiers, versions, hashes), hyperparameter configurations, framework versions (PyTorch, CUDA, cuDNN), training infrastructure identity (cluster ID, node pool, GPU type), and dataset composition (class distributions, data source breakdown).
  owner_primary: ML Platform Engineering
  owner_supporting: DevSecOps / Release Engineering; Data Governance
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
