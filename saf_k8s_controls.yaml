  control_seq: 039
  control_title: Centralized aggregation onboarding and export for cluster-wide AI logs
  control_statement: Organizations must aggregate collected Kubernetes and AI-related cluster logs into a centralized logging platform through approved onboarding or provider export paths so security monitoring and investigation can operate on unified log streams.
  objective: Ensure collected Kubernetes and AI-related cluster logs are onboarded or exported into centralized aggregation platforms for monitoring and investigation.
  rationale: Comprehensive log capture is not useful if collected logs never reach the centralized platform used by the SOC. Centralized aggregation and provider log export are independent control surfaces that determine whether captured cluster evidence becomes available for monitoring, search, and investigation.
  scope: Applies to production and pre-production Kubernetes clusters hosting AI workloads. Covers centralized log aggregation services, provider log export integrations, and centralized platform onboarding for collected node, container, managed-service, and GPU-related logs. Excludes source-side collector deployment and coverage verification.
  primary_enforcement_point: Centralized logging platform onboarding and provider export integration.
  implementation_surface: Centralized aggregation platforms such as OpenSearch, Loki, Splunk, or equivalent services; provider log export integration; and onboarding of collected cluster log streams into centralized monitoring and investigation platforms.
