  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.1'
  control_seq: '015'
  control_title: Inference image minimal composition with GPU runtime-only dependencies
  control_statement: Inference-serving images must use distroless or multi-stage build outputs that retain only the runtime libraries required for serving, including GPU and CUDA compatibility libraries when needed, while excluding compilers, package managers, and debugging toolchains.
  objective: Minimize inference-serving image contents while preserving only the runtime dependencies necessary for model serving and accelerator compatibility.
  rationale: Inference containers are high-value targets because they hold model-serving code, runtime credentials, and access to accelerators. Multi-stage and distroless outputs limit the software supply-chain and post-exploitation surface while preserving only the libraries required to serve models safely on GPU-capable platforms.
  scope: Applies to production and pre-production inference-serving images, including GPU-enabled images that require documented CUDA or accelerator runtime libraries.
  primary_enforcement_point: Build pipeline controls governing the final inference image contents before registry publication and deployment.
  implementation_surface: Multi-stage Dockerfile outputs, distroless base images, runtime library chain verification, and build validation proving only required inference and GPU runtime libraries remain.
  owner_primary: DevSecOps / Release Engineering
  owner_supporting: ML Platform Engineering; Platform Engineering
