- control_id: SAF-K8S-0405-022
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.5'
  control_seq: '022'
  control_title: Tenant-scoped break-glass credential boundary enforcement
  control_statement: Organizations must ensure break-glass credentials, kubeconfigs, or certificates are tenant-scoped where applicable so emergency access is constrained to the minimum necessary tenant or operational boundary.
  objective: Limit break-glass credential scope so emergency access cannot cross tenant or broader operational boundaries beyond the affected environment.
  rationale: Break-glass access should restore control without granting unnecessary cross-tenant reach. Tenant-scoped emergency credentials reduce blast radius and prevent a recovery path in one environment from becoming a broad administrative bypass in another.
  scope: Applies to all break-glass credentials, kubeconfigs, or certificates issued for production Kubernetes clusters, including managed and multi-tenant environments. Covers activation controls, MFA or equivalent dual-authorization, and tenant-scoped emergency credentials where applicable.
  primary_enforcement_point: Break-glass credential scope boundary enforcement.
  implementation_surface: Tenant-scoped break-glass credentials or kubeconfigs, scoped issuance workflows, and emergency credential configuration showing boundary-limited access.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Identity and Access Management
  baseline_or_ai_specific: baseline
