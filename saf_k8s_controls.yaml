  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.3'
  control_seq: '023'
  control_title: Credential scope drift monitoring for AI workloads
  control_statement: Organizations running AI workloads at scale must monitor credential scope drift by comparing granted permissions with actual usage and identifying over-broad or exception-expanded credentials.
  objective: Provide governance over credential breadth by detecting when issued AI workload credentials exceed their actually used privilege scope.
  rationale: Scope drift is independently auditable from aggregate lifecycle metrics. This control isolates the requirement to compare granted versus used permissions so teams can prove that broadening credential scope and exceptions are being detected and governed.
  scope: Applies to all credentials issued to AI and ML workloads including Vault dynamic secrets, cloud IAM temporary credentials, Kubernetes service account tokens, API keys for external services, and model registry authentication tokens. Covers scope drift analysis, exception identification, and governance review of over-broad credentials. Lifecycle metric publication remains governed by SAF-K8S-0403-024.
  primary_enforcement_point: Credential scope drift analysis and over-broad permission review workflow.
  implementation_surface: Granted-versus-used permission analysis, exception review queues, IAM policy usage data, and governance review records for over-scoped workload credentials.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; ML Engineering; Cloud Platform Engineering
