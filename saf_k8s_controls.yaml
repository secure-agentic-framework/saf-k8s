- control_id: SAF-K8S-1005-016
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.5'
  control_seq: '016'
  control_title: Documented post-incident model retraining or rollback decisions
  control_statement: Organizations must make and document retraining, rollback, quarantine, or related recovery decisions for AI models based on post-incident integrity verification results so model recovery actions are justified, reviewable, and consistently executed.
  objective: Ensure AI model recovery after infrastructure compromise is governed by documented retraining or rollback decisions derived from integrity verification results.
  rationale: Model integrity validation alone is insufficient if recovery teams do not convert validation results into a documented decision about whether to retrain, roll back, quarantine, or reapprove a model. Unstructured recovery decisions can return compromised or untrustworthy models to service.
  scope: Applies to AI workloads in Kubernetes clusters affected by a security incident. Covers documented retraining or rollback decision frameworks, quarantine or rollback procedures, and justification records tied to model recovery outcomes. Excludes the integrity verification mechanics that produce the underlying validation evidence.
  primary_enforcement_point: Incident response recovery decision governance and model recovery procedures.
  implementation_surface: Documented model recovery decision frameworks, quarantine or rollback procedures, retraining decision records, approval criteria for returning a model to service, and justification artifacts tied to post-incident integrity validation outcomes.
  owner_primary: Security Operations
  owner_supporting: AI/ML Engineering; Digital Forensics
  baseline_or_ai_specific: ai-specific
