- control_id: SAF-K8S-0603-008
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.3'
  control_seq: 008
  control_title: Build materials and artifact attestations per NIST SP 800-204D
  control_statement: Build pipelines must generate independently signed and verifiable materials attestations capturing all source inputs and dependencies consumed and artifacts attestations identifying build outputs and intermediate products, in alignment with NIST SP 800-204D.
  objective: Ensure build inputs and resulting outputs are independently attested so dependency substitution, source tampering, and output provenance gaps are detectable.
  rationale: Materials and artifact attestations provide the provenance needed to verify what inputs entered the build and what outputs were produced. Without them, dependency substitution and output tampering can remain invisible even when the build platform itself is trusted.
  scope: Applies to all CI/CD pipelines that produce container images or deployable artifacts for production clusters, including pipelines that generate intermediate OCI artifacts, Helm charts, and related release outputs.
  primary_enforcement_point: CI/CD attestation generation for consumed materials and produced artifacts.
  implementation_surface: Materials attestation for source and dependency inputs, artifacts attestation for build outputs and intermediate products, per-category signatures, and verification of materials and artifact attestation presence.
  owner_primary: DevSecOps / Release Engineering
  owner_supporting: Security Engineering; Platform Engineering
