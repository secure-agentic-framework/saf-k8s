  date_modified: '2026-03-17'
- control_id: SAF-K8S-0501-004
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.1'
  control_seq: '004'
  control_title: CNI-specific network policy extensions
  control_statement: Organizations using advanced CNI plugins must leverage CNI-specific policy extensions (such as Cilium CiliumNetworkPolicy or Calico GlobalNetworkPolicy) to enforce L7-aware network policies, FQDN-based filtering, and cluster-wide policy baselines that exceed the capabilities of standard Kubernetes NetworkPolicy.
  objective: Extend network policy enforcement beyond L3/L4 Kubernetes-native NetworkPolicy to include application-layer visibility and cluster-wide policy baselines.
  rationale: Standard Kubernetes NetworkPolicy is limited to L3/L4 filtering and is namespace-scoped, which is insufficient for enforcing HTTP method restrictions, DNS-based destination controls, or cluster-wide security baselines. Without leveraging CNI-specific extensions, organizations lose the ability to inspect and filter application-layer traffic, leaving gaps in protocol-aware security enforcement.
  scope: Applies to production clusters running CNI plugins that support extended policy resources (Cilium, Calico, or equivalent). Organizations using managed Kubernetes with limited CNI choice must document compensating controls. Global policies must not conflict with namespace-level policies.
  primary_enforcement_point: CNI-specific custom resource definitions (CiliumNetworkPolicy, CiliumClusterwideNetworkPolicy, Calico GlobalNetworkPolicy) applied via GitOps or admission control.
  implementation_surface: CiliumNetworkPolicy and CiliumClusterwideNetworkPolicy CRDs (L7 HTTP rules, toFQDNs, DNS proxy, identity-based policies), Calico GlobalNetworkPolicy and Calico Enterprise policy resources (destination.domains, Envoy-based L7 filtering), GitOps pipelines for cluster-wide baseline policy deployment, and CNI-specific CRD management via admission control.
  owner_primary: Network Engineering
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0501-006
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.1'
  control_seq: '006'
  control_title: Multi-cluster network segmentation for federated AI workloads
  control_statement: Multi-cluster AI deployments (federated training, distributed inference, cross-cluster model serving) must implement network segmentation controls that restrict cross-cluster traffic to explicitly authorized AI communication paths, enforce mutual authentication on all cross-cluster connections, and provide unified flow visibility across cluster boundaries.
  objective: Extend network segmentation guarantees across cluster boundaries for multi-cluster AI workloads, ensuring that cross-cluster AI traffic is authorized, authenticated, encrypted, and auditable.
  rationale: Single-cluster network policies do not extend across cluster boundaries. When AI workloads span multiple clusters -- federated training with participants in different clusters, multi-region inference routing, or hybrid on-prem/cloud training -- the absence of cross-cluster segmentation controls allows unauthorized inter-cluster communication, gradient exfiltration from federated learning participants, lateral movement through cross-cluster service discovery, and data residency violations when training data flows cross uncontrolled network paths.
  scope: Applies to any Kubernetes deployment where AI workloads communicate across cluster boundaries, including federated learning with cross-cluster participants, multi-region inference serving, hybrid on-prem/cloud training, and cross-cluster model registry access. Covers multi-cluster service mesh, Kubernetes Multi-Cluster Services API, VPN/interconnect, and API gateway federation models.
  primary_enforcement_point: Multi-cluster service mesh policies (Cilium Cluster Mesh CiliumNetworkPolicy, Istio multi-cluster AuthorizationPolicy), gateway pod allowlists, cross-cluster ingress/egress controls, and unified flow logging infrastructure.
  implementation_surface: Multi-cluster service mesh policies (Cilium Cluster Mesh CiliumNetworkPolicy with io.cilium.k8s.policy.cluster selectors, Istio multi-cluster AuthorizationPolicy with source principal matching), Kubernetes Multi-Cluster Services API (KEP-1645), VPN/interconnect gateway pods with mTLS allowlists and rate limiting, API gateway federation for cross-cluster inference routing, cross-cluster communication matrix documentation, Cilium Hubble multi-cluster relay for unified flow logging, VPC flow logs with cross-account aggregation, SPIFFE/SPIRE trust bundle federation for cross-cluster identity, and cross-cluster connectivity testing tools.
  owner_primary: Network Engineering
  owner_supporting: ML Platform Engineering; Security Operations
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-05'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0501-007
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.1'
  control_seq: '007'
  control_title: East-west AI workload traffic monitoring
  control_statement: East-west traffic between AI workload segments must be monitored using network flow logging and anomaly detection to identify unexpected cross-segment communication patterns that may indicate data poisoning, model exfiltration, or unauthorized access to training infrastructure.
  objective: Detect anomalous inter-workload communication between AI segments that bypasses or violates intended segmentation policy, enabling rapid identification of compromise or policy drift.
  rationale: Network segmentation policies (SAF-K8S-0501-005) define intended isolation boundaries, but policy misconfiguration, runtime drift, or attacker manipulation can create unintended communication paths. Without continuous monitoring of east-west traffic between AI workload segments, violations of segmentation policy go undetected. Unsupervised east-west traffic between AI workloads enables stealthy data exfiltration and model theft.
  scope: Applies to all Kubernetes clusters hosting AI/ML workloads with network segmentation in place. Monitoring must cover traffic between training, inference, pipeline, and notebook segments. Includes both permitted flows (for anomaly detection) and denied flows (for policy violation alerting).
  primary_enforcement_point: Network flow monitoring and anomaly detection infrastructure (Cilium Hubble, Calico flow logs, or equivalent CNI flow logging).
  implementation_surface: Cilium Hubble or equivalent flow logging for east-west AI traffic monitoring, anomaly detection rules for unexpected cross-segment communication (training-to-inference, notebook-to-production), SIEM integration for flow log analysis, alerting dashboards covering AI workload traffic patterns, and baseline traffic profiles for normal inter-segment communication.
  owner_primary: Security Operations
  owner_supporting: Network Engineering; ML Platform Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-06'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0501-008
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.1'
  control_seq: 008
  control_title: AI workload type network microsegmentation
  control_statement: Training, inference, pipeline orchestration, and notebook environments must reside in separate network segments with explicit policy-controlled communication paths between workload types.
  objective: Prevent unauthorized lateral movement and cross-contamination between distinct AI workload classes by enforcing network boundaries around each workload type.
  rationale: AI environments combine training systems, notebooks, orchestration services, and production inference paths that have different trust assumptions and data sensitivity. Network microsegmentation confines compromise within a workload class and reduces direct access between development, training, and serving planes.
  scope: Applies to all Kubernetes clusters hosting AI and ML workloads, including training jobs, inference services, pipeline controllers, and interactive notebook environments.
  primary_enforcement_point: Kubernetes network policy enforcement separating AI workload namespaces and limiting allowed communication paths between workload types.
  implementation_surface: Namespace-scoped and cluster-scoped network policies, workload-type selectors, and connectivity validation between training, inference, pipeline, and notebook segments.
  owner_primary: Network Engineering
  owner_supporting: ML Platform Engineering
  baseline_or_ai_specific: ai-specific
