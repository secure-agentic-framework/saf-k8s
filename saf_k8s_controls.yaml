- control_id: SAF-K8S-0702-003
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.2'
  control_seq: '003'
  control_title: LimitRange enforcement for containers and pods
  control_statement: Every namespace must have a LimitRange object that defines default resource requests, default resource limits, and maximum resource limits for containers and pods, ensuring that no container can be created without resource constraints and that no single container can request resources exceeding the namespace's defined maximums.
  objective: Guarantee that every container in the cluster operates within defined resource boundaries, preventing unbounded resource consumption and ensuring fair scheduling.
  rationale: Without LimitRange enforcement, containers can be submitted with no resource requests or limits, making them invisible to the scheduler's resource accounting and allowing them to consume unbounded CPU and memory. This leads to node resource exhaustion, OOM kills affecting co-located workloads, and unpredictable scheduling behavior. LimitRange provides a namespace-level safety net that complements ResourceQuota.
  scope: Applies to all namespaces in all Kubernetes clusters. Every namespace must have at least one LimitRange defining default requests, default limits, and maximum limits for containers. System namespaces may have relaxed maximums with documented justification. Covers CPU, memory, and ephemeral storage resource types.
  primary_enforcement_point: LimitRange objects per namespace, enforced by the Kubernetes LimitRange admission controller at pod creation time.
  implementation_surface: LimitRange objects specifying default, defaultRequest, max, and min values for Container and Pod resource types (cpu, memory, ephemeral-storage), admission control policies (Kyverno, OPA/Gatekeeper) for per-pod GPU guardrails where LimitRange cannot enforce extended resources, and audit tooling to verify running workload compliance after LimitRange modifications.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0702-005
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.2'
  control_seq: '005'
  control_title: Label and annotation schema definition for AI workload classification
  control_statement: Organizations must define a standardized labeling and annotation schema for all AI workloads that classifies workload type (training, inference, data preprocessing, evaluation), data sensitivity level, and model tier, and must document this schema to enable consistent identification, policy enforcement, scheduling, and auditability of AI workloads.
  objective: Enable consistent identification, policy enforcement, scheduling, and auditability of AI workloads by requiring machine-readable classification metadata on every pod.
  rationale: Without standardized workload classification labels, platform teams cannot apply differentiated security policies, resource quotas, scheduling rules, or network policies to AI workloads. Inference workloads may inadvertently run on training-optimized nodes, sensitive data processing may co-locate with untrusted workloads, and cost attribution becomes impossible. A documented schema is the foundation for all downstream policy enforcement.
  scope: 'Applies to all pods, jobs, deployments, and statefulsets in namespaces designated for AI workloads. The labeling schema must cover at minimum: workload type (training, inference, preprocessing, evaluation, notebook), data sensitivity (public, internal, confidential, restricted), and model tier (experimental, staging, production). Non-AI workloads in shared clusters should carry a baseline classification label.'
  primary_enforcement_point: Admission control policies (OPA Gatekeeper, Kyverno) that validate required labels on pod creation, and namespace-level label enforcement through mutating or validating webhooks.
  implementation_surface: Kubernetes pod metadata.labels schema (ai.kais.io/workload-type, ai.kais.io/data-sensitivity, ai.kais.io/model-tier, ai.kais.io/team), admission control policy engines (Kyverno ClusterPolicy, OPA/Gatekeeper ConstraintTemplates) validating required label presence and value enumeration on pods in AI namespaces, label-based NetworkPolicy selectors, ResourceQuota scopeSelectors keyed on labels, and audit log filtering by classification labels.
  owner_primary: Platform Engineering
  owner_supporting: ML Engineering; Data Governance; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0702-009
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.2'
  control_seq: 009
  control_title: Admission control enforcement of workload classification label requirements
  control_statement: Organizations must enforce the standardized workload classification labeling schema through admission control by configuring admission webhooks or admission policies to reject workloads that do not carry the required classification labels, preventing unlabeled workloads from bypassing governance policies.
  objective: Ensure that all AI workloads entering the cluster carry required classification labels by using admission control as a mandatory enforcement gate that rejects non-compliant workloads before scheduling.
  rationale: Admission control enforcement prevents unlabeled workloads from bypassing governance policies. Without admission control, the labeling schema defined in SAF-K8S-0702-005 cannot be reliably enforced, as workloads may be submitted without the required classification labels and still run, undermining policy enforcement, cost attribution, and security controls. Admission control provides the mechanism that makes the labeling schema operationally binding.
  scope: Applies to all pods, jobs, deployments, and statefulsets in namespaces designated for AI workloads where admission control enforcement of classification labels is required.
  primary_enforcement_point: Admission control policies (OPA Gatekeeper, Kyverno) that validate required labels on pod creation, and namespace-level label enforcement through validating webhooks.
  implementation_surface: Kubernetes admission control policy engines (Kyverno ClusterPolicy, OPA/Gatekeeper ConstraintTemplates) configured to validate required label presence on pods in AI namespaces, validating webhooks that reject pod creation when required classification labels are absent or carry invalid values.
  owner_primary: Platform Engineering
  owner_supporting: ML Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-12'
  date_modified: '2026-03-12'
- control_id: SAF-K8S-0702-010
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.2'
  control_seq: '010'
  control_title: Virtual cluster deployment for high-isolation multi-tenant Kubernetes environments
  control_statement: Organizations requiring stronger tenant isolation than namespace-level controls provide must evaluate and implement virtual cluster technologies or equivalent tenant control-plane separation mechanisms to achieve API-server-level isolation between tenants while sharing underlying infrastructure.
  objective: Provide stronger tenant isolation than namespace boundaries alone by deploying virtual cluster or equivalent control-plane separation for high-isolation tenants on shared infrastructure.
  rationale: Namespace isolation has inherent limitations because cluster-scoped resources and host control-plane surfaces remain shared. Virtual clusters or equivalent tenant control-plane separation reduce the blast radius of tenant misconfiguration, privileged tenant actions, and cross-tenant interference in shared Kubernetes environments.
  scope: Applies to multi-tenant Kubernetes environments where namespace-level isolation is insufficient for the threat model, including external tenants, cross-business-unit sharing, or mixed data classification levels. Not required for single-tenant or dedicated-cluster deployments.
  primary_enforcement_point: Virtual cluster provisioning system, host cluster admission controls restricting tenant access to the host API server, and tenant isolation architecture review.
  implementation_surface: vCluster or equivalent virtual control-plane deployments, host cluster admission controls, dedicated control-plane separation patterns for high-isolation tenants, provisioning workflows for tenant virtual clusters, and compensating controls for shared-kernel or shared-node residual exposure.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Cloud Platform Engineering
  baseline_or_ai_specific: baseline
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-13'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0702-013
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.2'
  control_seq: '013'
  control_title: Tenant default-deny inter-namespace network isolation
  control_statement: Organizations must enforce tenant traffic isolation with default-deny ingress and egress NetworkPolicy in every tenant namespace, permitting inter-namespace communication only through explicitly documented and reviewed allow rules.
  objective: Prevent lateral movement and cross-tenant runtime access by making all traffic paths between tenant namespaces and shared services explicit and auditable.
  rationale: Namespace scoping and RBAC do not constrain pod-to-pod traffic once workloads are running. Without default-deny network policy, a compromised tenant workload can laterally move to peer namespaces or access shared services even when API permissions are correctly scoped.
  scope: Applies to all multi-tenant Kubernetes clusters. Every tenant namespace must implement default-deny ingress and egress controls. Exceptions for shared services, monitoring, ingress, or pipeline dependencies must be explicitly allowlisted, documented, and periodically reviewed.
  primary_enforcement_point: Kubernetes NetworkPolicy objects and network isolation validation tests for inter-namespace communication paths.
  implementation_surface: Default-deny ingress and egress NetworkPolicy objects per tenant namespace, explicit allow rules for approved shared services and workflows, exception documentation, continuous connectivity testing for denied and approved paths, and periodic penetration testing of tenant isolation boundaries.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Network Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
