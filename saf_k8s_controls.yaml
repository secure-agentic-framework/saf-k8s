- control_id: SAF-K8S-0906-002
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.6'
  control_seq: '002'
  control_title: Large-scale data integrity verification
  control_statement: Large training datasets must be protected using hierarchical hashing, manifest-based integrity verification, and segmented integrity checking across distributed storage, with resilience strategies (erasure coding or mirroring) selected based on ML data availability and integrity requirements.
  objective: Detect tampering or corruption in large training datasets efficiently through scalable integrity verification mechanisms that work across distributed storage systems.
  rationale: Training datasets can be terabytes to petabytes in size, stored across distributed file systems and object stores. Flat hashing of entire datasets is computationally infeasible for verification. Without hierarchical and segmented integrity checking, small targeted modifications (e.g., poisoning a subset of training images) go undetected. Without appropriate resilience strategies, storage failures that corrupt training data are not recoverable, and the wrong resilience choice can trade integrity for availability or vice versa.
  scope: Applies to all training datasets stored on persistent volumes, distributed file systems, or object storage on Kubernetes that exceed single-node verification capacity. Covers hierarchical hashing, manifest generation, segmented verification, and storage resilience configuration. Excludes small datasets that can be verified with flat hashing.
  primary_enforcement_point: Data storage configuration, dataset manifest generation tooling, and integrity verification job configurations in data pipeline orchestrators.
  implementation_surface: Hierarchical hashing with Merkle tree construction over dataset segments, signed dataset manifests listing segment hashes, sizes, and locations, segmented integrity verification jobs in data pipeline orchestrators, storage resilience configuration (erasure coding, mirroring, object versioning) on distributed file systems and object storage, and incremental verification for changed segments.
  owner_primary: Data Engineering
  owner_supporting: Storage Engineering; ML Platform Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0906-004
  domain_code: D09
