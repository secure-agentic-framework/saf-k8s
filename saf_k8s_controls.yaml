- control_id: SAF-K8S-0601-008
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.1'
  control_seq: 008
  control_title: CI/CD build-time container image vulnerability scanning
  control_statement: All container images must undergo automated vulnerability scanning during the CI/CD build stage before they are pushed to any registry, and images with unmitigated critical or high-severity vulnerabilities must be blocked from promotion unless a documented risk acceptance is approved.
  objective: Catch known vulnerabilities early in the image lifecycle by enforcing build-time scanning and promotion gates before vulnerable images enter shared registries.
  rationale: Build-time scanning is the earliest scalable point to stop vulnerable images from propagating downstream. If critical findings are not blocked before push, the same vulnerable image can spread across registries, environments, and workloads. This is a distinct control claim from post-push and runtime exposure monitoring.
  scope: Applies to all container images built for production and pre-production Kubernetes workloads, including AI/ML images with native CUDA, cuDNN, NCCL, and framework-specific dependency chains.
  primary_enforcement_point: CI/CD Build Stage
  implementation_surface: CI pipeline scanning tools, build promotion gates, and pre-push risk acceptance workflow.
  owner_primary: DevSecOps / Release Engineering
  owner_supporting: ML Platform Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
