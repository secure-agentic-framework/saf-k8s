  domain_code: D08
  domain_name: GPU, Accelerator, and Confidential Computing
  knowledge_area: '8.2'
  control_seq: '007'
  control_title: Device plugin registration authentication monitoring and rogue plugin detection
  control_statement: Device plugin registration with the kubelet must be authenticated and continuously monitored, and unauthorized or rogue GPU device plugin registration or interface abuse attempts must be detected and blocked.
  objective: Ensure only approved GPU device plugins can register with the kubelet and that rogue plugin behavior or manipulated health reporting is detected before it can influence GPU allocation decisions.
  rationale: Even if socket-directory access is restricted, organizations still need assurance that only authorized plugins register and that abnormal registration, fake device advertisement, or manipulated health reporting is detected. This is a separate obligation from filesystem protection because it focuses on registration integrity and runtime detection of rogue plugin behavior.
  scope: Applies to all Kubernetes nodes where GPU device plugins register with the kubelet. Covers plugin registration events, kubelet authorization or attestation of approved plugins, and monitoring of device health reporting or rogue registration behavior.
  primary_enforcement_point: Device-Plugin Registration Integrity Monitoring
  implementation_surface: kubelet device plugin registration logs, approved plugin inventory and attestation, runtime security tooling for rogue registration detection, and monitoring of device health reporting callbacks or anomalous plugin behavior.
