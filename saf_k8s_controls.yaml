- control_id: SAF-K8S-0701-008
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.1'
  control_seq: 008
  control_title: Training data and model artifact version tracking for reproducibility
  control_statement: Training datasets, model checkpoints, and model artifacts must be versioned so that each training run can be reproduced and traced to the exact data and artifact versions it used.
  objective: Ensure training runs and model outputs can be reproduced, traced, and audited through explicit version tracking of datasets and artifacts.
  rationale: Reproducibility depends on being able to identify exactly which dataset snapshot, checkpoint lineage, and artifact version were used in a training run. Without explicit version tracking, failures, regressions, and audit questions cannot be resolved reliably.
  scope: Applies to persistent storage and repositories containing training datasets, model checkpoints, model weights, feature snapshots, and DVC-tracked data used by AI workflows.
  primary_enforcement_point: Storage and pipeline controls that require explicit dataset and artifact version references for training and model production workflows.
  implementation_surface: PV snapshot inventories, object version identifiers, DVC metadata, pipeline metadata linking training jobs to dataset versions, and model artifact version records.
  owner_primary: ML Engineering
  owner_supporting: Platform Engineering; Data Governance; Security Engineering
  baseline_or_ai_specific: ai-specific
