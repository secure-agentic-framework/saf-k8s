- control_id: SAF-K8S-0606-034
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.6'
  control_seq: '034'
  control_title: Emergency direct-access audit logging and justification governance
  control_statement: Production clusters managed by GitOps must record auditable break-glass logging and justification for any emergency direct access outside the approved Git deployment path.
  objective: Ensure exceptional emergency direct access outside GitOps is tightly governed, justified, and fully auditable for review after use.
  rationale: Even with Git-only deployment enforcement, emergency access paths can be abused or become normal practice if exceptional use is not logged, justified, and reviewed. This is a separate accountability and oversight obligation from prohibiting routine direct changes.
  scope: Applies to production namespaces and clusters governed through GitOps. Covers break-glass access logging, justification capture, and reviewable records for emergency direct interventions.
  primary_enforcement_point: Audit logging and operational governance for emergency direct cluster access.
  implementation_surface: Audit logs for break-glass direct access, recorded justifications or approvals, and retained review records for emergency kubectl or API operations performed outside the normal GitOps path.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; SRE / Operations
