- control_id: SAF-K8S-0405-002
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.5'
  control_seq: '002'
  control_title: Privilege escalation detection and monitoring
  control_statement: Organizations must implement continuous monitoring to detect privilege escalation indicators including unauthorized RBAC changes, service account token theft or misuse, unexpected cluster-admin activity, and creation of new ClusterRoleBindings granting elevated permissions.
  objective: Detect and alert on privilege escalation attempts in near real time, enabling rapid response before an attacker can leverage elevated permissions for data exfiltration, workload manipulation, or persistent cluster access.
  rationale: Privilege escalation is a core attacker objective after initial access to a cluster. Attackers may create new RBAC bindings, steal service account tokens from pod filesystems or etcd, or exploit misconfigured escalate and bind verbs to grant themselves cluster-admin privileges. Without continuous detection, these activities go unnoticed until the attacker achieves their objective. Early detection of RBAC mutations, unusual token usage, and unexpected admin activity provides the critical window for containment.
  scope: Applies to all production clusters. Covers monitoring of RBAC resource mutations (Roles, ClusterRoles, RoleBindings, ClusterRoleBindings), service account token creation and usage patterns, cluster-admin level API activity, and cert-signing requests that could indicate identity creation. Must integrate with SIEM or security monitoring platforms.
  primary_enforcement_point: API server audit log analysis, SIEM detection rules for RBAC mutation and privilege escalation patterns, and runtime security tools monitoring for token file access on pod filesystems.
  implementation_surface: API server audit logs analyzed by SIEM (Splunk, Elasticsearch, Chronicle) with detection rules for ClusterRoleBinding creation referencing cluster-admin, RBAC wildcard grants, escalate/bind verb usage, and CertificateSigningRequest creation by unexpected subjects, runtime security tools (Falco, Tetragon) monitoring /var/run/secrets token file access by non-application processes, and dashboards tracking RBAC change frequency and cluster-admin API usage trends.
  owner_primary: Security Operations
  owner_supporting: Security Engineering; Platform Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0405-003
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.5'
  control_seq: '003'
  control_title: Kubeconfig security and hygiene
  control_statement: Organizations must enforce secure kubeconfig management practices including encrypted storage, credential expiry aligned with session policies, restricted context configurations for shared environments, and periodic kubeconfig audits to detect stale or overprivileged configurations.
  objective: Prevent unauthorized cluster access through stolen, shared, or stale kubeconfig files that may contain long-lived credentials, cluster endpoints, and context configurations.
  rationale: 'Kubeconfig files often contain the keys to cluster access: client certificates, bearer tokens, or OIDC refresh tokens paired with cluster API endpoints. In shared environments such as jump boxes, CI/CD runners, and developer workstations, kubeconfig files accumulate contexts for multiple clusters with varying privilege levels. Stolen or leaked kubeconfig files provide immediate authenticated access. Without expiry enforcement, a kubeconfig from a departed employee may remain valid indefinitely.'
  scope: Applies to all kubeconfig files used by human operators, CI/CD systems, and automation tools. Covers developer workstations, shared jump hosts, CI/CD runner environments, and any system where kubeconfig files are stored. Includes both interactive kubectl usage and programmatic API access using kubeconfig credentials.
  primary_enforcement_point: Workstation security policies for kubeconfig file permissions, OIDC credential plugins with session expiry, CI/CD pipeline kubeconfig injection with ephemeral credentials, and periodic kubeconfig audits.
  implementation_surface: Kubeconfig file permissions (600 owner-only), OIDC credential plugins (kubelogin) replacing embedded certificates and static tokens, CI/CD pipeline ephemeral kubeconfig injection via environment variables, workstation security policies for kubeconfig storage locations, periodic kubeconfig audit scanning of developer workstations and CI/CD runners, and offboarding checklists including kubeconfig credential revocation.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Developer Experience
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0405-004
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.5'
  control_seq: '004'
  control_title: Security awareness for Kubernetes and GPU administrators
  control_statement: Personnel with cluster-admin, GPU resource management, or other elevated Kubernetes access must complete security awareness training covering social engineering, credential phishing (kubeconfig theft, cloud console credential harvesting, CI/CD token exfiltration), and operational security practices specific to Kubernetes administration.
  objective: Reduce the risk of credential compromise through social engineering by ensuring that personnel with the highest-impact cluster access are trained to recognize and resist phishing, pretexting, and credential harvesting attacks targeting Kubernetes administrators.
  rationale: Kubernetes administrators and GPU resource managers hold credentials that provide broad cluster access and control over expensive compute resources. These personnel are high-value targets for social engineering attacks including phishing emails that mimic cluster alerts, fake kubeconfig distribution, cloud console credential harvesting through OAuth consent phishing, and CI/CD token exfiltration through malicious pipeline configurations. Standard corporate security awareness training does not cover these Kubernetes-specific attack vectors.
  scope: Applies to all personnel with cluster-admin ClusterRoleBinding, GPU ResourceQuota management permissions, cloud provider IAM admin roles for Kubernetes clusters, and CI/CD pipeline credentials that can deploy to production clusters. Training must be completed upon role assignment and refreshed annually.
  primary_enforcement_point: Security awareness training platform with Kubernetes-specific modules, training completion tracking tied to access provisioning workflows, and periodic phishing simulations targeting Kubernetes administrators.
  implementation_surface: Security awareness training platforms with Kubernetes-specific modules covering kubeconfig theft, OAuth consent phishing for cloud console sessions, fake kubectl plugin distribution, CI/CD token exfiltration via malicious pipeline configurations, GPU quota approval social engineering, training completion tracking integrated with access provisioning workflows (cluster-admin and GPU ResourceQuota management access gating), and targeted phishing simulations for Kubernetes administrators.
  owner_primary: Security Engineering
  owner_supporting: Identity and Access Management; People Operations
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0405-006
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.5'
  control_seq: '006'
  control_title: Attribute-based access control for AI artifacts
  control_statement: Organizations must implement attribute-based access control (ABAC) for AI artifacts, enforcing access decisions based on data classification level, model sensitivity rating, and deployment environment (development, staging, production) to ensure that only authorized personnel and workloads can access artifacts matching their clearance and environment authorization.
  objective: Extend access control beyond role-based permissions to incorporate contextual attributes of AI artifacts, ensuring that access to models trained on sensitive data, high-value proprietary models, and production-deployed artifacts is governed by the sensitivity and classification of the artifacts themselves.
  rationale: RBAC alone cannot express access policies that depend on the properties of the accessed artifact. A data scientist authorized to work with public datasets should not automatically access models trained on PII or regulated health data. Similarly, access to production model endpoints should be restricted differently than access to development experiments. ABAC enables fine-grained policies that consider data classification, model sensitivity, and deployment context in authorization decisions, preventing unauthorized access to high-value or regulated AI artifacts.
  scope: Applies to all AI artifacts including trained models, model checkpoints, training datasets, feature stores, and inference endpoints across all environments. Covers OPA/Gatekeeper or Kyverno policies that evaluate resource labels and annotations for classification and sensitivity attributes. Must integrate with the organization's data classification framework and deployment environment taxonomy.
  primary_enforcement_point: Policy engine (OPA/Gatekeeper, Kyverno, or Cedar) evaluating artifact classification labels and annotations against requestor attributes, with admission policies and authorization webhooks enforcing ABAC decisions.
  implementation_surface: Policy engines (OPA/Gatekeeper Rego policies, Kyverno ClusterPolicies, Cedar policies) evaluating resource classification labels (data-classification, model-sensitivity) and deployment environment annotations against requestor identity attributes, admission webhooks and authorization webhooks enforcing ABAC decisions, artifact labeling standards for models, datasets, and inference endpoints, integration with organizational data classification frameworks (Domain 7 classification labels), and policy decision audit logs for ABAC evaluations.
  owner_primary: Security Engineering
  owner_supporting: ML Engineering; Data Governance; Platform Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0405-007
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.5'
  control_seq: '007'
  control_title: Authentication endpoint availability and DoS protection
  control_statement: Organizations must protect Kubernetes authentication endpoints against denial-of-service attacks through API server rate limiting, API Priority and Fairness configuration, connection throttling, and availability monitoring to ensure authentication infrastructure remains accessible during attacks or high-load conditions.
  objective: Ensure that authentication endpoints remain available and resilient against brute force and denial-of-service attacks that could lock out legitimate users or degrade cluster operations during an incident.
  rationale: Authentication endpoints (API server, OIDC providers, webhook token reviewers) are vulnerable to denial-of-service attacks that can prevent legitimate administrators from accessing the cluster during an incident. Rate limiting and connection throttling protect against brute force credential attacks and ensure authentication infrastructure availability under load.
  scope: Applies to all Kubernetes API server authentication endpoints, OIDC provider endpoints, webhook token review services, and cloud provider authentication integrations. Covers rate limiting, API Priority and Fairness configuration, and availability monitoring.
  primary_enforcement_point: API server rate limiting configurations (--max-requests-inflight, APF priority levels) and monitoring/alerting for authentication endpoint availability and error rates.
  implementation_surface: API server rate limiting flags (--max-requests-inflight, --max-mutating-requests-inflight), API Priority and Fairness (APF) FlowSchema and PriorityLevelConfiguration resources, authentication endpoint availability monitoring and SLA dashboards, and authentication error rate alerting (401/403 spike detection).
  owner_primary: Platform Engineering
  owner_supporting: Identity and Access Management; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-07'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0405-009
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.5'
  control_seq: 009
  control_title: API impersonation RBAC restriction
  control_statement: Organizations must restrict the Kubernetes API impersonation capability (the impersonate verb on users, groups, serviceaccounts, userextras, and uid resources) to explicitly authorized subjects only, using narrowly scoped RBAC roles and resourceNames that limit which identities may be impersonated.
  objective: Prevent unauthorized identity assumption through the Kubernetes impersonation API by tightly constraining which subjects can impersonate which identities.
  rationale: The impersonate verb allows a caller to act as another identity without possessing that identity's credentials. If broadly granted, it bypasses normal RBAC boundaries and enables direct privilege escalation into cluster-admin or sensitive service accounts. Restricting the grant itself is a separate control claim from detecting how approved impersonation is used.
  scope: Applies to all clusters. Covers RBAC grants for impersonating users, groups, serviceaccounts, userextras, and uid resources. Legitimate CI/CD, multi-tenant controller, and operator use cases must be explicitly approved and scoped to named targets.
  primary_enforcement_point: RBAC / Authorization
  implementation_surface: ClusterRoles, Roles, RoleBindings, and ClusterRoleBindings granting impersonate with scoped resourceNames and approved impersonator registry.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Security Operations
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-15'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0405-010
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.5'
  control_seq: '010'
  control_title: API impersonation audit logging and alerting
  control_statement: Organizations must audit Kubernetes API impersonation events through API server audit logging, capture sufficient event detail to identify both the impersonating subject and impersonated identity, and alert on unexpected or unapproved impersonation usage.
  objective: Ensure legitimate impersonation activity is fully traceable and that suspicious impersonation attempts are rapidly detected.
  rationale: Even approved impersonation is high risk because it enables actions under another identity. Without audit detail and alerting, misuse can blend into normal API traffic and forensic attribution becomes difficult. Monitoring and alerting are distinct from RBAC restriction and must stand on their own as an auditable obligation.
  scope: Applies to all clusters where impersonation could be attempted or legitimately used. Covers API server audit policy, log retention for impersonation events, and SIEM or detection rules for unexpected impersonation activity.
  primary_enforcement_point: Audit / Telemetry
  implementation_surface: API server audit policy, audit log pipeline, and SIEM detections keyed to impersonation event fields.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Security Operations
  baseline_or_ai_specific: baseline
