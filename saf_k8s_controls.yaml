- control_id: SAF-K8S-0602-005
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.2'
  control_seq: '005'
  control_title: Notary v2 OCI signature artifact registry integration
  control_statement: Organizations using Notary v2 (notation) must maintain registry integration that stores notation signatures as OCI-compliant artifacts alongside their corresponding image manifests.
  objective: Ensure notation signatures remain discoverable and synchronized with their corresponding registry artifacts through OCI-compliant storage integration.
  rationale: Registry integration for notation signatures is distinct from trust policy governance and admission verification. If signatures are stored outside OCI artifact flows or drift from image manifests, verification becomes brittle and signature discovery can fail across registries and toolchains.
  scope: Applies to all container registries and Kubernetes clusters where Notary v2 is the designated or supplementary signing mechanism. Includes environments using Azure Container Registry, AWS ECR, or other registries with native notation support. Organizations exclusively using Sigstore/cosign may document this control as not applicable.
  primary_enforcement_point: Registry-level signature artifact storage configuration and notation registry integration.
  implementation_surface: OCI artifact signature storage, registry integration for notation signatures in Azure Container Registry, AWS ECR, Harbor, or equivalent registries, and notation push or discovery workflows tied to image manifests.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; DevSecOps / Release Engineering
