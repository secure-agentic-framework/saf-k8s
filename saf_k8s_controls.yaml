- control_id: SAF-K8S-0604-013
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.4'
  control_seq: '013'
  control_title: Hermetic build execution and pinned dependency input control
  control_statement: Build pipelines must use hermetic build configurations that prevent uncontrolled network access or live dependency resolution during build execution and must enforce committed dependency lock files and pinned dependency inputs.
  objective: Prevent dependency confusion, typosquatting, and uncontrolled build-time input changes by ensuring builds execute from approved, pre-resolved, and pinned dependency sources.
  rationale: Non-hermetic builds that resolve dependencies dynamically can ingest malicious or unexpected content at build time even when provenance exists. Hermetic execution and pinned dependency inputs reduce that attack surface and make dependency state reproducible for review.
  scope: Applies to all CI/CD pipelines producing deployable Kubernetes artifacts, including application images, AI workload images, and infrastructure operator images. Approved mirrors, proxies, or caches may be used when they preserve pinned dependency and integrity guarantees.
  primary_enforcement_point: CI/CD build environment configuration and dependency resolution controls.
  implementation_surface: Hermetic build settings, no-egress build workers, approved dependency mirrors, committed lock files with hash validation, and enforcement of pinned dependency inputs during build execution.
  owner_primary: DevSecOps / Release Engineering
  owner_supporting: Security Engineering; Platform Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
