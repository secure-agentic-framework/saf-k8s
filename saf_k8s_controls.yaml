- control_id: SAF-K8S-1007-006
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.7'
  control_seq: '006'
  control_title: Secure AI workload decommissioning
  control_statement: Organizations must implement secure AI workload decommissioning procedures that clean up training data, model artifacts, GPU reservations, secrets, and access grants associated with retired workloads.
  objective: Ensure that decommissioned AI workloads do not leave residual security exposure from orphaned resources, stale credentials, or abandoned data.
  rationale: Decommissioned AI workloads that leave behind orphaned secrets, stale access grants, or residual training data create attack surface that persists unmonitored. Without systematic decommissioning, retired workloads become a source of credential leakage and unauthorized data access.
  scope: Applies to all AI workloads being retired from production Kubernetes clusters. Decommissioning procedures cover all AI workload artifacts and associated resources including persistent volumes, model registry entries, GPU reservations, secrets, service accounts, role bindings, network policies, and custom resources.
  primary_enforcement_point: AI workload decommissioning checklist automation and resource cleanup verification.
  implementation_surface: Secure decommissioning checklist (PV deletion/archival, model registry artifact removal, ResourceQuota GPU reservation cleanup, workload-specific Secret deletion and shared Secret rotation, ServiceAccount and RoleBinding deletion, NetworkPolicy cleanup, CRD/CR removal with finalizer verification).
  owner_primary: Platform Engineering
  owner_supporting: AI/ML Engineering; Security Operations
