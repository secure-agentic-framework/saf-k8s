- control_id: SAF-K8S-0905-045
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: '045'
  control_title: Sandboxed external model behavioral vetting and disposition review
  control_statement: Organizations must perform sandboxed execution or behavioral vetting of externally sourced models before internal use and must document pass, fail, reject, or escalated disposition decisions based on that vetting.
  objective: Detect unsafe or backdoored model behavior that static scanning cannot reveal by requiring sandboxed or behavioral vetting before internal approval.
  rationale: Static scanning cannot detect every malicious or unsafe model behavior. Sandboxed execution and behavioral vetting are needed to observe suspicious runtime characteristics, degraded model behavior, or policy violations before public models are admitted for fine-tuning or serving.
  scope: Applies to all models sourced from public hubs and community repositories after initial quarantine intake. Covers sandbox execution, behavioral checks, and documented disposition decisions. Excludes source allowlist governance and internal re-signing after approval.
  primary_enforcement_point: Sandbox execution and behavioral review workflow for candidate external models.
  implementation_surface: Sandboxed execution with monitoring, behavioral validation against standard datasets, analyst review, and workflow records showing pass, fail, reject, or escalation decisions.
