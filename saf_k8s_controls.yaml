- control_id: SAF-K8S-0902-002
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.2'
  control_seq: '002'
  control_title: Model loading integrity verification
  control_statement: Inference servers must verify model integrity at startup using cryptographic signatures or digest checks and must prevent runtime model replacement on loaded serving paths through read-only volume mounts and file integrity monitoring.
  objective: Ensure that only verified, unmodified models are loaded for inference and that model artifacts cannot be tampered with after loading.
  rationale: If model integrity is not verified at load time, an attacker who gains write access to model storage can replace a model with a backdoored version that the inference server will serve without detection. Without runtime protection, models can be replaced after initial verification.
  scope: Applies to all model loading configurations on Kubernetes inference platforms. Covers model artifact verification at pod startup, model cache integrity, read-only volume mounts, and file integrity monitoring for model directories. Excludes endpoint access controls and model registry controls covered by KA 9.5.
  primary_enforcement_point: Inference server startup configuration and init container model verification scripts.
  implementation_surface: Init container model verification scripts using cosign or notation signature verification, OCI registry digest pinning for model pulls, read-only volume mount specifications, readOnlyRootFilesystem on inference containers, and file integrity monitoring for model directories.
  owner_primary: ML Platform Engineering
  owner_supporting: Security Engineering; API Platform Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
