- control_id: SAF-K8S-1002-004
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.2'
  control_seq: '004'
  control_title: AI-specific alerting and failure mode detection
  control_statement: Organizations must configure alerts for AI-specific failure modes including training divergence, model staleness, GPU hardware errors, inference accuracy degradation, inference latency spikes, and training job hangs, with alert routing to security operations for conditions that may indicate security incidents.
  objective: Proactively detect AI workload anomalies that may indicate security incidents, data poisoning, supply chain compromise, or operational degradation before business impact materializes.
  rationale: Without AI-specific alerting, conditions such as training divergence (potential data poisoning), model staleness (potential supply chain compromise), or inference accuracy degradation (potential evasion attacks) go undetected until business impact materializes. These failure modes require domain-specific alert thresholds distinct from generic infrastructure monitoring.
  scope: Applies to all AI workloads on Kubernetes including training jobs, inference services, and pipeline orchestrators. Covers alert rule definitions, thresholds, and routing for AI-specific failure modes. Complements SAF-K8S-1002-002 (distributed tracing).
  primary_enforcement_point: Alerting rule definitions in the monitoring stack (Prometheus Alertmanager, PagerDuty, Opsgenie) with AI-specific thresholds.
  implementation_surface: Alerting rule definitions for training divergence (loss increasing over consecutive epochs), model staleness (time since last update exceeding threshold), GPU hardware errors (dcgm_fi_dev_xid_errors counter), inference accuracy degradation, inference latency spikes (p99 exceeding baseline), and training job hangs (no checkpoint within expected interval), with alert routing to security operations for security-relevant conditions.
  owner_primary: Security Operations
  owner_supporting: AI/ML Engineering; SRE
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
