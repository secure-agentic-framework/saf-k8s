- control_id: SAF-K8S-0405-017
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.5'
  control_seq: '017'
  control_title: Credential policy baseline requirements
  control_statement: Organizations must enforce credential policy baseline requirements including credential complexity standards for Kubernetes cluster and AI infrastructure authentication pathways.
  objective: Ensure authentication credentials meet baseline strength requirements so weak credentials do not become an initial access path into the cluster.
  rationale: Credential policy requirements are independently auditable from the secure storage and lifecycle handling of those credentials. This control isolates the baseline policy claim so teams can verify that credential strength requirements are actually enforced in the identity systems used for cluster and AI infrastructure access.
  scope: Applies to authentication pathways for Kubernetes clusters, OIDC integrations, and cloud provider IAM integrations that rely on managed credentials. Covers credential complexity and baseline policy requirements. Secure storage and lifecycle handling remain governed by SAF-K8S-0405-018.
  primary_enforcement_point: Credential policy controls in identity providers and authentication systems.
  implementation_surface: Credential complexity and baseline policy settings in OIDC providers, cloud IAM, and cluster authentication systems.
  owner_primary: Identity and Access Management
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: baseline
