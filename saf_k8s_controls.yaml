- control_id: SAF-K8S-0601-021
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.1'
  control_seq: '021'
  control_title: Container registry trusted-source network restriction
  control_statement: Container registries must enforce network restrictions that limit registry access to trusted sources, approved CIDR ranges, private endpoints, or equivalent managed network paths.
  objective: Prevent registry access from untrusted networks by enforcing trusted-source network boundaries around container registries.
  rationale: Even when registry users authenticate correctly, broad network exposure increases the opportunity for credential abuse, scanning, and exfiltration. Network restrictions create a separate boundary that reduces the exposed attack surface for registry services.
  scope: Applies to all container registries used for storing production, staging, and development images, including model-serving image registries and OCI artifact stores. Public mirror registries must be proxied through an authenticated pull-through cache.
  primary_enforcement_point: Registry network policy, private endpoint, firewall, and CIDR restriction configuration.
  implementation_surface: Cloud registry network settings, private endpoints, firewall rules, trusted CIDR restrictions, VPC endpoint policies, and reachability validation for registry access paths.
