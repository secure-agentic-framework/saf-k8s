- control_id: SAF-K8S-0501-001
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.1'
  control_seq: '001'
  control_title: Default deny ingress and egress network policies
  control_statement: Every namespace in production Kubernetes clusters must have a default deny NetworkPolicy for both ingress and egress traffic, with explicitly defined allow rules for each approved communication path.
  objective: Establish a zero-trust network baseline at the namespace level so that only explicitly authorized traffic flows are permitted between workloads.
  rationale: Without default deny policies, any pod can communicate with any other pod in the cluster, enabling lateral movement after an initial compromise. Attackers who gain access to a single workload can pivot to databases, control-plane components, or exfiltration endpoints without network-layer restriction. Default deny policies force all traffic to be explicitly authorized, dramatically reducing the blast radius of a compromise.
  scope: Applies to all namespaces in production Kubernetes clusters and to non-production clusters that host sensitive data or AI workloads. System namespaces (kube-system, monitoring) must also have default deny policies with explicit allow rules for required control-plane and observability traffic.
  primary_enforcement_point: Kubernetes NetworkPolicy objects applied at namespace creation via admission controllers or GitOps policy enforcement.
  implementation_surface: Kubernetes NetworkPolicy objects (default deny ingress/egress with empty podSelector), admission controllers (Kyverno generate rules, OPA Gatekeeper mutation webhooks) for automatic policy creation at namespace creation, CNI plugins enforcing NetworkPolicy (Cilium, Calico, AWS VPC CNI network policy agent), GitOps policy enforcement pipelines, connectivity testing tools (cilium connectivity test, netshoot), and namespace audit scripts verifying default-deny coverage.
  owner_primary: Network Engineering
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0501-002
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.1'
  control_seq: '002'
  control_title: Namespace network isolation patterns
  control_statement: Cross-namespace network communication must be restricted by default, with explicit NetworkPolicy rules permitting only required system services such as DNS resolution and monitoring agent traffic, and any approved application-level cross-namespace flows.
  objective: Prevent unauthorized cross-namespace lateral movement while preserving access to shared infrastructure services that workloads depend on.
  rationale: Namespaces provide a logical boundary, but without network policies they offer no network-level isolation. An attacker who compromises a workload in one namespace can freely communicate with workloads in other namespaces, including those containing secrets, databases, or privileged services. Allowing only DNS, monitoring, and explicitly approved cross-namespace flows limits the scope of any compromise.
  scope: Applies to all production Kubernetes clusters. Cross-namespace allow rules must be documented and reviewed periodically. Shared system services (CoreDNS, Prometheus, logging agents) require explicit allow rules rather than blanket cross-namespace access.
  primary_enforcement_point: Kubernetes NetworkPolicy objects with namespaceSelector rules, enforced via CNI plugin and validated by admission controllers.
  implementation_surface: 'Kubernetes NetworkPolicy objects with namespaceSelector and podSelector rules, namespace labels (network-role: ingress, monitoring, system), CNI plugin policy enforcement, admission controllers validating cross-namespace allow rules, and periodic network connectivity scan tooling to confirm no unauthorized cross-namespace flows.'
  owner_primary: Platform Engineering
  owner_supporting: Network Engineering; Application Development teams
