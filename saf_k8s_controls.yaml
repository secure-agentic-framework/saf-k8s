- control_id: SAF-K8S-0303-007
  domain_code: D03
  domain_name: Workload and Pod Security
  knowledge_area: '3.3'
  control_seq: '007'
  control_title: AppArmor profile distribution and node readiness
  control_statement: Clusters using AppArmor-enabled nodes must distribute approved AppArmor profiles to all applicable nodes through provisioning automation and must verify that each node pool consistently loads the required profiles before workloads that depend on them are scheduled.
  objective: Ensure AppArmor protections are actually available on every applicable node by making profile distribution and node readiness a managed platform control rather than a best-effort host configuration task.
  rationale: AppArmor enforcement fails silently when required profiles are missing from some nodes. Consistent profile distribution and node readiness verification prevent scheduling gaps where a workload lands on a node that cannot enforce its expected AppArmor confinement.
  scope: Applies to clusters running on AppArmor-capable nodes such as Ubuntu, Debian, SUSE, and other distributions that use AppArmor as the primary LSM. Does not apply to nodes using SELinux as the primary LSM. Profile loading must be consistent across all nodes in a node pool.
  primary_enforcement_point: Node provisioning automation, machine image preparation, DaemonSet-based profile loading, and node readiness verification for AppArmor profile availability.
  implementation_surface: AppArmor profile files loaded on nodes via DaemonSets, cloud-init, Ansible, or machine image baking; node provisioning automation for consistent profile distribution; node-level AppArmor verification such as sys/module/apparmor/parameters/enabled and aa-status; and scheduling gates or readiness checks that confirm required profiles are present before dependent workloads run.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Application Development teams
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-13'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0303-008
  domain_code: D03
  domain_name: Workload and Pod Security
  knowledge_area: '3.3'
  control_seq: 008
  control_title: AppArmor workload profile assignment and unconfined-mode restriction
  control_statement: Clusters using AppArmor-enabled nodes must assign the appropriate AppArmor profile to each protected workload and must not permit containers to run in unconfined mode unless a documented exception with compensating controls exists and is actively enforced.
  objective: Enforce workload-specific AppArmor confinement by ensuring pods are explicitly assigned approved profiles and that unconfined execution remains prohibited except through controlled exceptions.
  rationale: Loading profiles onto nodes is not sufficient if workloads are left unannotated or permitted to run unconfined. Workload-level assignment and exception control ensure AppArmor actually constrains file access, network operations, and capability use for the containers that need confinement.
  scope: Applies to clusters running on AppArmor-capable nodes such as Ubuntu, Debian, SUSE, and other distributions that use AppArmor as the primary LSM. Does not apply to nodes using SELinux as the primary LSM.
  primary_enforcement_point: Pod specification validation, admission policy enforcement for AppArmor assignment, and exception governance for unconfined workloads.
  implementation_surface: Pod annotations (container.apparmor.security.beta.kubernetes.io) or securityContext.appArmorProfile for profile assignment, policy engine rules validating required AppArmor profiles at admission, mutation or defaulting rules for runtime/default where appropriate, and documented exception workflows with compensating controls and periodic review for unconfined containers.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Application Development teams
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
