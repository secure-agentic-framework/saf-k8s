- control_id: SAF-K8S-0905-009
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: 009
  control_title: Model provenance verification at deployment
  control_statement: Model origin and integrity must be verified at deploy time using Kubernetes admission controllers or deployment pipeline hooks that validate cryptographic signatures, verify in-toto attestation chain completeness, and confirm OCI digest integrity before allowing model deployment to production inference endpoints.
  objective: Ensure that only signed and verified models from known provenance reach production by enforcing verification at the deployment boundary.
  rationale: Build-time signing (SAF-K8S-0905-002) creates the cryptographic evidence, but without deploy-time enforcement an unsigned or tampered model can still be deployed by bypassing the signing pipeline. Admission controller verification provides an independent enforcement point that catches supply chain bypasses.
  scope: Applies to all model deployments to production inference endpoints on Kubernetes. Covers admission controller signature verification, attestation chain validation, and OCI digest confirmation. Excludes build-time signing and attestation generation covered by SAF-K8S-0905-002.
  primary_enforcement_point: Kubernetes admission controllers (Kyverno, Gatekeeper) or deployment pipeline verification hooks.
  implementation_surface: Admission controllers (Kyverno, Gatekeeper) verifying model signatures and attestation chain completeness at deploy time, deployment pipeline verification hooks, OCI digest validation against registry metadata, and verification failure alerting and blocking.
  owner_primary: Security Engineering
  owner_supporting: ML Platform Engineering; DevOps Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
