  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.4'
  control_seq: '14'
  control_title: Managed Kubernetes audit log retention enforcement
  control_statement: Organizations must retain cloud provider audit logs and Kubernetes audit events according to policy and verify that retention settings on the common monitoring platform meet organizational and regulatory requirements.
  objective: Ensure centralized managed Kubernetes audit telemetry remains available for required operational, investigative, and compliance time horizons.
  rationale: Audit telemetry loses operational and forensic value when centralized ingestion is not paired with enforced retention. Without retention governance, key cloud and Kubernetes audit records may age out before investigations, incident response, or compliance reviews require them.
  scope: Applies to all managed Kubernetes clusters on cloud providers including EKS, GKE, and AKS. Retention requirements apply to centralized cloud and Kubernetes audit records stored in the common security monitoring platform or any approved long-term archive used by that platform.
  primary_enforcement_point: Retention configuration and verification for centralized cloud and Kubernetes audit telemetry.
  implementation_surface: Retention controls on SIEM or log analytics platforms, approved archival tiers for audit telemetry, and verification workflows confirming cloud and Kubernetes audit records remain available for required policy periods.
  owner_primary: Security Engineering
  owner_supporting: Cloud Platform Engineering; Platform Engineering; SOC
