- control_id: SAF-K8S-0102-013
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.2'
  control_seq: '013'
  control_title: etcd compaction and periodic defragmentation
  control_statement: Production Kubernetes clusters must configure automated etcd compaction and run periodic member-safe defragmentation to prevent revision-history growth and storage fragmentation from exhausting quota or degrading control-plane performance.
  objective: Prevent storage-related denial of service in etcd by controlling revision-history growth and reclaiming storage headroom safely.
  rationale: Uncompacted revision history and fragmented storage can cause etcd to exceed quota or operate with degraded performance, pushing the cluster toward read-only behavior or instability. Compaction and defragmentation are maintenance controls that preserve safe storage headroom.
  scope: Applies to all production clusters running self-managed etcd and to managed services where provider compaction and defragmentation settings or SLAs are exposed. Covers auto-compaction retention configuration and sequential defragmentation procedures. Excludes health monitoring and alert generation.
  primary_enforcement_point: Audit / Telemetry
  implementation_surface: etcd auto-compaction configuration, scheduled defragmentation automation, and documented operational procedures ensuring members are defragmented sequentially without quorum loss.
  owner_primary: Platform Engineering
  owner_supporting: Site Reliability Engineering; Security Operations
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
