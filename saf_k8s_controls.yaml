- control_id: SAF-K8S-0803-006
  domain_code: D08
  domain_name: GPU, Accelerator, and Confidential Computing
  knowledge_area: '8.3'
  control_seq: '006'
  control_title: DPU and SmartNIC host trust boundary definition and policy engine administrative restriction
  control_statement: DPU and SmartNIC devices used for AI workload acceleration or network offload must enforce clear trust boundaries between offloaded and host-processed functions, and policy enforcement capabilities on the device must be restricted to authorized administrators.
  objective: Prevent DPUs and SmartNICs from becoming opaque enforcement points that bypass host security controls or permit unauthorized changes to offloaded networking and storage policies.
  rationale: The host-to-DPU offload boundary introduces a security gap where policies enforced on the device may not be visible to host monitoring. Clear trust-boundary definition and restricted administration of DPU policy engines are distinct from firmware integrity because they govern how offloaded functions are delegated, observed, and changed after the device has booted trusted firmware.
  scope: Applies to Kubernetes nodes equipped with DPUs or SmartNICs with programmable policy engines. Covers documented host-to-DPU trust boundaries, visibility of offloaded enforcement, and administrative restriction of DPU policy engines or management interfaces.
  primary_enforcement_point: DPU Offload Trust Boundary and Policy Engine Governance
  implementation_surface: Host-to-DPU trust boundary documentation and configuration, DPU policy engine access controls, DPU-enforced policy consistency checks against Kubernetes and host controls, and management interface RBAC restricting unauthorized administrative access.
