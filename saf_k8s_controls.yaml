- control_id: SAF-K8S-1007-016
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.7'
  control_seq: '016'
  control_title: GPU node hardware attestation, driver integrity, and taint verification
  control_statement: Organizations must verify hardware attestation where required, GPU driver integrity, and GPU node taint configuration before new GPU nodes are allowed to schedule AI workloads.
  objective: Ensure newly added GPU nodes are attested, run approved GPU drivers, and advertise the correct scheduling constraints before they join the trusted pool.
  rationale: Baseline-hardening checks alone do not prove that a new GPU node is running trusted hardware state, approved GPU drivers, or correct taint configuration. Attestation, driver verification, and taint checks reduce the risk of compromised or misconfigured nodes entering sensitive AI compute pools.
  scope: Applies to GPU-capable nodes added through scaling or onboarding workflows in clusters hosting AI workloads.
  primary_enforcement_point: Attestation and integrity verification steps within node onboarding automation.
  implementation_surface: Hardware attestation workflows, GPU driver checksum verification, GPU taint validation, and scheduling-readiness gates for new GPU nodes.
