- control_id: SAF-K8S-0702-028
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.2'
  control_seq: 028
  control_title: Classification-driven admission policy enforcement for pipeline resources
  control_statement: Organizations must use data classification labels in admission controls to validate required metadata presence and block noncompliant pipeline resources before they are created or updated.
  objective: Ensure data classification metadata drives admission-time enforcement decisions for pipeline resources.
  rationale: Classification labels only change risk if the platform actively rejects resources that omit, misuse, or violate required classification metadata. Admission-time enforcement is therefore a distinct obligation from downstream storage or network restrictions.
  scope: Applies to all data pipeline workloads where admission decisions depend on classification metadata. Covers admission validation of required labels and classification-policy alignment on pipeline resources.
  primary_enforcement_point: Admission control decisions tied to data classification labels.
  implementation_surface: Admission control policies validating label presence and alignment on pipeline resources, admission test cases, and policy enforcement outputs showing noncompliant resources are rejected before scheduling.
