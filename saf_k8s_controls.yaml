- control_id: SAF-K8S-0505-004
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.5'
  control_seq: '004'
  control_title: API server audit log analysis for network-based attack detection
  control_statement: API server audit logs must be continuously analyzed for network-based attack indicators including unauthorized access attempts from unexpected source IPs, anomalous API request patterns indicating reconnaissance or exploitation, and authentication failures correlated with network origin to detect credential-based attacks.
  objective: Detect network-based attacks against the Kubernetes API server through continuous audit log analysis, enabling rapid identification of unauthorized access attempts and attack patterns.
  rationale: API server audit logs capture every request to the control plane including source IP, authenticated identity, requested resource, and response code. Without continuous analysis, brute-force authentication attempts, reconnaissance scans of API resources, and exploitation attempts go undetected until damage occurs. Correlating authentication failures with source network origin enables detection of distributed credential attacks and identification of compromised network segments.
  scope: Applies to all production Kubernetes clusters with audit logging enabled. Audit logs must be forwarded to a centralized SIEM or log analysis platform in near real-time. Detection rules must cover authentication failures, access from unauthorized networks, and anomalous API request patterns. Managed Kubernetes audit log delivery mechanisms must be configured and validated.
  primary_enforcement_point: API server audit policy configuration, log forwarding pipeline to SIEM, and detection rule library covering network-based attack patterns.
  implementation_surface: Kubernetes API server audit policy configuration (RequestResponse and Metadata logging levels), audit log forwarding pipelines to SIEM platforms (GKE Cloud Audit Logs, EKS CloudWatch log groups, Fluentd/Fluent Bit forwarders), SIEM detection rules for unauthorized source IPs, brute-force authentication (401 response spikes), API reconnaissance (multi-resource list operations), service account token usage from external IPs, and AI-specific detection rules for bulk Secret reads, GPU resource enumeration (nvidia.com/gpu), training job manipulation, and inference Deployment modification from unknown sources.
  owner_primary: Security Operations
  owner_supporting: Platform Engineering; Network Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0505-005
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.5'
  control_seq: '005'
  control_title: Identity-based internal service access control
  control_statement: Access to internal service endpoints must be governed by service account-based authentication and authorization patterns rather than relying solely on network reachability, using service mesh authorization policies or application-level authentication for sensitive internal services.
  objective: Ensure that network reachability alone does not constitute authorization for internal service access, requiring identity-based verification for sensitive services in multi-tenant or zero trust environments.
  rationale: Relying solely on network reachability for internal service authorization means any pod in an allowed network segment can access any service, which is insufficient in multi-tenant or zero trust environments. Identity-based access control binds authorization to workload identity (service accounts) rather than network location, enabling fine-grained access decisions for sensitive internal services such as model registries, experiment trackers, feature stores, and GPU metrics exporters.
  scope: Applies to production clusters where service mesh or application-level authentication is available. Priority should be given to sensitive internal services including model registries, experiment trackers, feature stores, distributed training rendezvous endpoints, and GPU metrics exporters.
  primary_enforcement_point: Service mesh authorization policies for service account-based access control (Istio AuthorizationPolicy, Linkerd ServerAuthorization) or application-level authentication and authorization.
  implementation_surface: Service mesh authorization policies for service account-based access control (Istio AuthorizationPolicy with source principal matching, Linkerd ServerAuthorization with ServiceAccount selectors), application-level authentication and authorization for sensitive internal services (model registry, experiment tracker, feature store, distributed training rendezvous, GPU metrics exporter), and service account token projection for workload identity attestation.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Application Development
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-06'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0505-006
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.5'
  control_seq: '006'
  control_title: API server private endpoint and authorized network enforcement
  control_statement: Kubernetes API server endpoints must be exposed only through private cluster endpoints or authorized network allowlists and firewall rules that limit reachability to approved management networks.
  objective: Reduce control-plane attack surface by limiting API server network reachability to explicitly approved management networks.
  rationale: Private endpoints, authorized network allowlists, and firewall restrictions prevent direct discovery and reachability of the API server from unapproved networks, eliminating a large portion of opportunistic and credential-driven attacks before authentication is even attempted.
  scope: Applies to all production Kubernetes clusters. Managed Kubernetes services must use private endpoint or authorized network features. Self-managed clusters must place API servers on private networks with bastion or VPN access. Non-production clusters with access to production secrets or infrastructure must also restrict API server access.
  primary_enforcement_point: Cloud provider private cluster configuration, API server authorized network settings, and VPC firewall or security-group rules restricting API server endpoint reachability.
  implementation_surface: Cloud provider private cluster settings (GKE private endpoint and master authorized networks, EKS endpointPublicAccess and endpointPrivateAccess, AKS private cluster and authorized IP ranges), self-managed API server bind and advertise addresses, VPC firewall rules, cloud security groups, and external reachability validation for port 6443.
  owner_primary: Platform Engineering
  owner_supporting: Network Engineering; Security Engineering; Cloud Platform Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
