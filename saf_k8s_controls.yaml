- control_id: SAF-K8S-0905-053
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: '053'
  control_title: Approved external model source periodic review and allowlist update governance
  control_statement: Organizations must periodically review approved external model source allowlists and update or remove entries when publishers, repositories, or trust conditions no longer meet organizational approval requirements.
  objective: Ensure that approved external model source allowlists remain current through periodic review, documented updates, and removal of stale or no-longer-trusted sources.
  rationale: A source allowlist degrades over time if it is never revalidated. Periodic review reduces exposure to compromised publishers, ownership changes, abandoned repositories, and other trust shifts that can make previously approved model sources unsafe.
  scope: Applies to all external model source allowlists used from Kubernetes infrastructure. Covers periodic review cadence, review records, update decisions, and removal or modification of stale or no-longer-trusted external sources.
  primary_enforcement_point: Allowlist review cadence and update decision process.
  implementation_surface: Review records showing periodic revalidation of approved external model sources, update records for additions or removals, and governance evidence showing stale or risky sources are removed when approval conditions change.
