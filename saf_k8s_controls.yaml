- control_id: SAF-K8S-0603-011
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.3'
  control_seq: '011'
  control_title: Attestation policy definition, signing, and change governance
  control_statement: Organizations must define signed attestation policies that encode artifact requirements for each pipeline stage, and those policies must be versioned, signed, and subject to documented change control before they are used to govern artifact promotion or deployment.
  objective: Ensure attestation requirements are defined in a controlled, reviewable policy artifact so the organization can prove what rules governed artifact trust decisions and who approved policy changes.
  rationale: If attestation requirements are undocumented, unsigned, or weakly governed, operators cannot prove which controls should have been enforced at a given pipeline stage and attackers can weaken policy content without reliable detection. Signed, versioned policy governance makes downstream trust decisions auditable and resistant to tampering.
  scope: Applies to all CI/CD pipelines and admission controllers that rely on attestation requirements. Policy definitions must be stored in version-controlled repositories or equivalent controlled stores with branch protection and change approval.
  primary_enforcement_point: Policy authoring and approval workflow for attestation requirements.
  implementation_surface: Signed attestation policy documents, OCI-stored or repository-stored policy artifacts, version control protections, and change-management workflows for attestation policy updates.
  owner_primary: Security Engineering
  owner_supporting: DevSecOps / Release Engineering; Platform Engineering
