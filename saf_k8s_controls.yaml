- control_id: SAF-K8S-0702-026
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.2'
  control_seq: '026'
  control_title: Pipeline data classification taxonomy definition
  control_statement: Organizations must define and maintain a data type classification taxonomy for pipeline data flows so data sensitivity and handling categories are consistently understood across AI pipeline resources and stages.
  objective: Ensure pipeline data sensitivity categories are explicitly defined so downstream controls can reason about data type and sensitivity consistently.
  rationale: Classification-based controls depend on a stable, shared taxonomy. Without a defined data classification model, downstream policy, audit, logging, and handling decisions become inconsistent and teams cannot reliably distinguish data sensitivity across pipeline stages.
  scope: Applies to all data pipeline workloads, including ETL jobs, preprocessing steps, feature engineering pipelines, training jobs, and model-serving data paths. Covers taxonomy definition for pipeline data types and sensitivity categories.
  primary_enforcement_point: Data governance taxonomy definition and governance process.
  implementation_surface: Organizational data classification taxonomy documentation, sensitivity category definitions, and governance records establishing how pipeline data types are classified.
  owner_primary: Data Governance
  owner_supporting: Platform Engineering; Security Engineering
