- control_id: SAF-K8S-0405-020
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.5'
  control_seq: '020'
  control_title: Break-glass recovery exercise validation
  control_statement: Organizations must periodically test break-glass emergency access procedures to verify authorized personnel can successfully regain cluster access when normal authentication pathways are unavailable.
  objective: Verify through recurring exercises that defined emergency recovery access paths function as intended under realistic outage conditions.
  rationale: An untested break-glass path may fail during an actual outage because credentials, storage, approvals, or recovery steps are stale or incomplete. Periodic validation reduces recovery risk and exposes procedural drift before an incident.
  scope: Applies to production Kubernetes clusters that depend on OIDC providers or external identity systems for normal administrative access. Covers documented runbooks, authorized activation steps, storage and retrieval workflow, and periodic validation exercises.
  primary_enforcement_point: Break-glass exercise execution and recovery validation.
  implementation_surface: Scheduled break-glass exercises, recovery test execution records, after-action reviews, and validation of emergency kubeconfig or client certificate usability during simulated authentication outages.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Identity and Access Management
