  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.3'
  control_seq: '022'
  control_title: Orphaned AI workload credential detection and remediation
  control_statement: Organizations running AI workloads at scale must detect and remediate orphaned credentials left behind by completed or failed jobs.
  objective: Ensure credentials are reconciled against workload state so abandoned secrets, tokens, and leases do not remain active after workload completion or failure.
  rationale: Credential reconciliation is independently auditable from credential inventory. This control isolates orphaned credential detection and remediation so teams can verify that completed or failed AI jobs do not leave active credentials behind.
  scope: Applies to all credentials issued to AI and ML workloads including Vault dynamic secrets, cloud IAM temporary credentials, Kubernetes service account tokens, API keys for external services, and model registry authentication tokens. Covers orphaned credential detection, job-state correlation, and remediation workflows. Inventory collection remains governed by SAF-K8S-0403-021.
  primary_enforcement_point: Credential reconciliation engine and orphan-remediation workflow tied to workload state.
  implementation_surface: Workload lifecycle correlation, orphaned lease or token scans, remediation workflows, and credential revocation or deletion automation tied to completed or failed AI jobs.
