- control_id: SAF-K8S-0905-048
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: 048
  control_title: OCI model artifact digest pinning in deployment and promotion workflows
  control_statement: Models stored and promoted through OCI registries must be referenced by immutable digests in deployment and promotion workflows so that reviewed model artifacts cannot be silently replaced through mutable tag resolution.
  objective: Ensure that model promotion and deployment workflows consume digest-pinned OCI artifact references rather than mutable tags that can later resolve to different artifacts.
  rationale: Mutable tags let a deployment or promotion workflow resolve to a different artifact than the one that was reviewed. Digest pinning binds the workflow to a specific reviewed model artifact and prevents silent substitution during rollout, replication, or rollback.
  scope: Applies to deployment manifests, promotion metadata, release records, and policy checks that reference OCI-backed model artifacts. Covers digest-pinned references and validation that mutable-tag references are not used for approved model deployments.
  primary_enforcement_point: Deployment manifests, promotion metadata, and policy checks that validate model artifact references.
  implementation_surface: Deployment and promotion manifests referencing models by digest (@sha256:...), CI or admission policy checks rejecting mutable-tag model references, and release records that preserve the reviewed digest for each model version.
  owner_primary: ML Platform Engineering
  owner_supporting: Security Engineering; DevOps Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
