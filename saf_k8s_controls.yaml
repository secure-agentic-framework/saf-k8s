- control_id: SAF-K8S-0201-016
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.1'
  control_seq: '016'
  control_title: Node audit log forwarding and centralized reviewability
  control_statement: Node audit daemon settings and log forwarding must ensure kubelet access events are retained, forwarded to the centralized audit pipeline, and reviewable for investigation and alerting.
  objective: Ensure node-level kubelet audit events reach centralized detection and investigation workflows.
  rationale: Local audit rules are insufficient if node compromise, storage loss, or isolated logging prevents investigation. Centralized forwarding and reviewability make kubelet access telemetry operationally useful for detection, triage, and forensic analysis.
  scope: Applies to all cluster nodes. Covers auditd or equivalent host audit rules for kubelet configuration and credential paths, audit pipeline forwarding, and recurring validation that those rules remain active. Managed Kubernetes services may satisfy this through provider-documented equivalent node audit telemetry.
  primary_enforcement_point: Node audit daemon retention and forwarding configuration and centralized audit pipeline ingestion.
  implementation_surface: Host audit daemon settings, forwarding agents, SIEM or audit pipeline ingestion, and review workflows for node-level kubelet access telemetry.
