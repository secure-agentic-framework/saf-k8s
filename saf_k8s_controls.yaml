- control_id: SAF-K8S-0403-019
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.3'
  control_seq: 019
  control_title: Kubernetes Secrets external KMS provider integration
  control_statement: Kubernetes Secrets encryption at rest must use an external KMS provider as the key management backend.
  objective: Ensure Kubernetes Secrets encryption relies on a key management service outside the cluster trust boundary.
  rationale: Externalizing key management is a distinct control claim from governing the permissions on the key itself. This control isolates KMS backend integration so teams can independently verify that Kubernetes Secrets encryption uses an external KMS provider or customer-managed key path.
  scope: Applies to all production Kubernetes clusters. Covers KMS provider selection and integration, Kubernetes EncryptionConfiguration KMS backends, KMS v2 adoption, and customer-managed key configuration for managed Kubernetes services. Key policy restrictions remain governed by SAF-K8S-0403-020, and the underlying API-resource encryption mechanism remains governed by SAF-K8S-0101-003.
  primary_enforcement_point: Kubernetes EncryptionConfiguration and managed-service customer-managed key integration settings.
  implementation_surface: Kubernetes EncryptionConfiguration with KMS provider plugins, KMS v2 API integration, and customer-managed key configuration for managed Kubernetes services.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Key Management/Cryptography; Cloud Platform Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
