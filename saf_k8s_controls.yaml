- control_id: SAF-K8S-0203-011
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.3'
  control_seq: '011'
  control_title: Immutable node root filesystem enforcement
  control_statement: Kubernetes node operating systems must enforce immutable root filesystems where supported by the platform so persistent host-level modifications are prevented or made directly detectable through image drift.
  objective: Prevent persistent host compromise by enforcing immutable node root filesystems where the platform supports it.
  rationale: Immutable root filesystems prevent persistent rootkits and unauthorized host modifications from surviving reboot or image replacement. This is a distinct obligation from minimizing installed software because it governs host mutability and drift resistance after deployment.
  scope: Applies to all production cluster node OS images. Cloud-managed node pools must use the provider's hardened or minimal node image options. Custom node images must document their base image, removed packages, and hardening steps. Development clusters may use standard OS images with documented exceptions.
  primary_enforcement_point: Node OS image selection, platform immutability settings, and validation of immutable root filesystem behavior on supported node pools.
  implementation_surface: Immutable OS distributions, root filesystem immutability settings, dm-verity or equivalent platform enforcement, and validation of host drift resistance.
  owner_primary: Platform Engineering
  owner_supporting: OS/Infrastructure; Security Engineering
  baseline_or_ai_specific: baseline
