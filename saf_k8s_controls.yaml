- control_id: SAF-K8S-0304-012
  domain_code: D03
  domain_name: Workload and Pod Security
  knowledge_area: '3.4'
  control_seq: '012'
  control_title: Training scratch volume size limits and ephemeral-storage quotas
  control_statement: AI training workloads that use scratch volumes must enforce emptyDir sizeLimit constraints, and training namespaces must enforce ephemeral-storage quota or equivalent policy boundaries so scratch-space growth cannot exhaust node or namespace storage capacity.
  objective: Prevent disk exhaustion and training job runaway behavior by bounding scratch-volume size and aggregate ephemeral-storage consumption.
  rationale: Training jobs generate large caches, tokenized samples, and intermediate artifacts that can rapidly consume local disk. emptyDir size limits bound individual scratch volumes, while namespace ephemeral-storage quotas prevent a team or job set from consuming all available storage across the cluster.
  scope: Applies to AI and ML training workloads that use emptyDir or equivalent ephemeral scratch space for staging data, caches, gradients, or intermediate outputs.
  primary_enforcement_point: Pod specification validation and namespace quota enforcement for emptyDir size limits and ephemeral-storage ceilings.
  implementation_surface: Pod spec emptyDir sizeLimit settings, ephemeral-storage requests and limits, and namespace quota or policy objects governing scratch-space consumption.
  owner_primary: AI/ML Platform team
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
