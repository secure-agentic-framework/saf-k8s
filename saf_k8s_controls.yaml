- control_id: SAF-K8S-1005-008
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.5'
  control_seq: 008
  control_title: AI-specific incident response playbooks for Kubernetes
  control_statement: Organizations must develop and maintain AI-specific incident response playbooks for Kubernetes environments covering compromised training jobs, model poisoning detection, GPU cryptomining, and inference endpoint abuse.
  objective: Ensure that AI workload security incidents have purpose-built response playbooks with specialized detection and containment procedures tailored to AI-specific incident types.
  rationale: 'AI workload incident types differ from standard Kubernetes security events: compromised training jobs require pipeline suspension, model poisoning requires hash verification and rollback, GPU cryptomining requires driver-level detection, and inference endpoint abuse requires rate limiting and model version quarantine. Without purpose-built AI incident playbooks, responders apply generic procedures that fail to address these specialized detection and containment requirements.'
  scope: Applies to all Kubernetes clusters hosting AI workloads in production. AI-specific playbooks must address the four named incident types at minimum. Playbooks must be tested through tabletop or live exercises at least annually.
  primary_enforcement_point: IR playbook repository, SOC runbook management system, and exercise/drill scheduling process.
  implementation_surface: AI-specific IR playbook documentation (compromised training job, model poisoning detection, GPU cryptomining, inference endpoint abuse), GPU telemetry anomaly triggers from DCGM exporter, model accuracy drift alert triggers.
  owner_primary: Security Operations
  owner_supporting: AI/ML Engineering; Platform Engineering; Legal
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
