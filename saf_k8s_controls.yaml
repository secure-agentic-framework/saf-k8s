  date_modified: '2026-03-17'
- control_id: SAF-K8S-0604-003
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.4'
  control_seq: '003'
  control_title: SBOM storage and distribution as OCI artifacts
  control_statement: SBOMs must be stored as OCI artifacts attached to their corresponding container image digests in the container registry, enabling registry-based SBOM discovery. SBOMs must be retrievable by image digest reference, and registry access controls must ensure SBOM integrity and prevent unauthorized modification.
  objective: Ensure SBOMs are co-located with their corresponding images in a standardized, discoverable format so that consumers, scanners, and admission controllers can reliably retrieve component inventories.
  rationale: SBOMs stored separately from their images (e.g., in file shares or databases) quickly become disassociated, creating stale or missing inventory data. Without OCI artifact attachment, there is no standard mechanism for downstream consumers to discover and retrieve the SBOM for a given image digest. This breaks automated vulnerability correlation workflows and prevents admission controllers from making SBOM-informed deployment decisions.
  scope: Applies to all container registries used for production and staging images. Includes OCI-compliant registries (Harbor, ECR, ACR, GCR, Artifact Registry) that support referrers API or OCI artifact manifests. Registries that do not support OCI artifacts must store SBOMs using a documented fallback mechanism with equivalent discovery capabilities.
  primary_enforcement_point: CI/CD pipeline post-build SBOM attachment step and registry configuration for OCI artifact support.
  implementation_surface: OCI Distribution Spec 1.1+ referrers API for SBOM-to-image artifact attachment, container registries with OCI referrers support (Harbor 2.10+, Artifact Registry, ECR, ACR), cosign attach sbom CLI for registries without OCI 1.1 support, registry access controls preventing unauthorized SBOM modification (write restrictions matching image push RBAC), and OCI artifact manifest configurations enabling registry-based SBOM discovery by image digest reference.
  owner_primary: DevSecOps / Release Engineering
  owner_supporting: Platform Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
