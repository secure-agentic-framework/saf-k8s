- control_id: SAF-K8S-0606-025
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.6'
  control_seq: '025'
  control_title: Artifact freshness limit enforcement for CI/CD promotion
  control_statement: CI pipelines must enforce artifact freshness limits so artifacts exceeding the organization-defined maximum age from committed code cannot be promoted or deployed.
  objective: Reduce reliance on stale build outputs by enforcing build-horizon limits as a promotion prerequisite.
  rationale: An artifact that passed security checks days or weeks ago may no longer reflect current vulnerability, dependency, or configuration risk. Build-horizon enforcement is independently auditable because it measures artifact age against policy and blocks stale deployments even when the repository itself remains acceptable.
  scope: Applies to production deployment pipelines and promoted artifacts derived from source repositories. Covers build timestamp validation, commit age comparison, and deployment-time freshness gates.
  primary_enforcement_point: Artifact promotion gate and deployment approval logic.
  implementation_surface: Build timestamp validation, artifact age calculation relative to committed code, and promotion or deployment controls that reject stale artifacts exceeding policy thresholds.
  owner_primary: DevSecOps / Release Engineering
  owner_supporting: Security Engineering; Development Teams
  baseline_or_ai_specific: baseline
