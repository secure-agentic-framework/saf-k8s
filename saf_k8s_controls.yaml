- control_id: SAF-K8S-1005-001
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.5'
  control_seq: '001'
  control_title: Kubernetes incident response lifecycle
  control_statement: Organizations must implement a complete incident response lifecycle for Kubernetes environments covering preparation, detection and analysis, containment, eradication and recovery, and post-incident activity.
  objective: Ensure that incident response processes are tailored to Kubernetes operational patterns across all lifecycle phases, from preparation through post-incident activity.
  rationale: Standard enterprise incident response procedures do not address Kubernetes-specific lifecycle phases such as pod-aware detection, namespace-scoped containment, and workload-specific eradication steps. Without a Kubernetes-tailored IR lifecycle, responders apply generic procedures that increase mean time to containment and risk losing forensic evidence through incorrect pod deletion or node actions during the eradication phase.
  scope: Applies to all Kubernetes clusters hosting AI workloads in production. Covers the full IR lifecycle with Kubernetes-specific procedures at each phase. Lifecycle procedures must be tested through tabletop or live exercises at least annually.
  primary_enforcement_point: IR playbook repository, SOC runbook management system, and exercise/drill scheduling process.
  implementation_surface: NIST SP 800-61r2 IR lifecycle implementation, Kubernetes-specific forensic tooling (kubectl debug with ephemeral containers, container filesystem snapshot capability, audit log export scripts), pre-staged NetworkPolicy containment templates, out-of-band communication channels, SIEM correlation rule triggers, and severity classification criteria for AI-specific incident types.
  owner_primary: Security Operations
  owner_supporting: AI/ML Engineering; Platform Engineering; Legal
  baseline_or_ai_specific: ai-specific
