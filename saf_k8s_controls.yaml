- control_id: SAF-K8S-0702-022
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.2'
  control_seq: '022'
  control_title: Virtual cluster isolation guarantee and residual risk documentation
  control_statement: Organizations using virtual cluster technologies for tenant isolation must document the isolation guarantees, architectural assumptions, and residual risks of the chosen virtual cluster approach so the tenant boundary is explicitly understood and governed.
  objective: Ensure the guarantees and limitations of virtual-cluster-based tenant isolation are documented rather than assumed.
  rationale: Virtual cluster technologies improve tenant isolation, but the strength of that isolation depends on the architecture chosen and the assumptions it makes about host-cluster boundaries, API mediation, and privileged access. Documenting guarantees and residual risks is necessary so operators, auditors, and tenant owners understand what protections exist and what risks remain.
  scope: Applies to multi-tenant Kubernetes environments that rely on virtual cluster or equivalent tenant control-plane separation. Documentation must cover isolation guarantees, boundary assumptions, and residual risks for the selected approach.
  primary_enforcement_point: Residual risk documentation and architecture review for the selected virtual cluster isolation model.
  implementation_surface: Isolation model documentation, residual risk assessments, architecture decision records, and governance records describing the chosen virtual cluster guarantees and limitations.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Cloud Platform Engineering
  baseline_or_ai_specific: baseline
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
