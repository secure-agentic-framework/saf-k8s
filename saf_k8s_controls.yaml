  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.10'
  control_seq: '033'
  control_title: Cross-cluster registry endpoint enrollment approval
  control_statement: Model registry replication across clusters must require explicit approval and enrollment of source and destination registry endpoints before those endpoints may participate in federation or replication workflows.
  objective: Prevent unauthorized registries from joining cross-cluster model replication workflows by requiring explicit endpoint enrollment approval.
  rationale: Authenticated channels alone do not decide which registries are allowed to participate. Explicit endpoint enrollment approval limits federation membership to approved source and destination registries before artifacts can be exchanged or trust can be established.
  scope: Applies to model registry replication and federation topologies spanning clusters or regions. Covers explicit enrollment and approval of participating source and destination registry endpoints. Excludes ongoing endpoint authorization, revocation, and reconciliation governance after enrollment.
  primary_enforcement_point: Registry endpoint enrollment approval workflow and approved endpoint registry.
  implementation_surface: Endpoint allowlists or federation enrollment approvals for source and destination registries, onboarding review workflows, and controls that block unenrolled registry peers from joining replication or federation workflows.
