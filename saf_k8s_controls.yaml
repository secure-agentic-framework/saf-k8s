- control_id: SAF-K8S-0907-002
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.7'
  control_seq: '002'
  control_title: Training data privacy controls
  control_statement: Training data must be subject to PII handling procedures, data classification, anonymization or pseudonymization where required, and data access audit trails that record who accessed which datasets and when.
  objective: Protect personal and sensitive information within training datasets through classification, handling controls, and comprehensive access auditing to support regulatory compliance and breach investigation.
  rationale: Training datasets frequently contain PII, proprietary information, or data subject to regulatory requirements. Without data classification, sensitive data is treated identically to public data, lacking appropriate protections. Without anonymization, PII can be memorized by models and exposed through inference. Without access audit trails, organizations cannot demonstrate compliance with data protection regulations or investigate unauthorized data access during security incidents.
  scope: 'Applies to all training datasets on Kubernetes, including raw data, processed data, and feature data containing PII or sensitive information. Covers data classification, PII handling, anonymization, and access audit trails. References Appendix A: AI Data Privacy Governance for consent management, privacy notices, and individual data rights. Excludes inference-time data controls.'
  primary_enforcement_point: Data classification tooling, anonymization pipeline configuration, and storage and compute platform access audit logging settings.
  implementation_surface: Data classification tooling and labels (public, internal, confidential, restricted), PII detection and scanning at data ingestion, anonymization and pseudonymization pipelines with k-anonymity/l-diversity/t-closeness validation, automated residual PII scanning, data access audit logging (principal, dataset ID, version, timestamp) shipped to centralized SIEM, and storage platform access audit configuration for PersistentVolumes, object storage, and feature stores.
  owner_primary: Data Engineering
  owner_supporting: Privacy Engineering; Security Engineering; Compliance
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
