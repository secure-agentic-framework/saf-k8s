  control_seq: '040'
  control_title: Centralized AI log backend immutability and integrity verification
  control_statement: Organizations must protect centralized AI workload log backends against tampering through cryptographic verification, append-only immutability, or equivalent integrity controls so retained log evidence remains trustworthy for audit and investigation.
  objective: Preserve the integrity and evidentiary trustworthiness of centralized AI workload logs through backend immutability or cryptographic verification controls.
  rationale: Centralized collection does not preserve evidentiary value if logs can be altered or truncated after ingestion. Backend immutability and integrity verification ensure centralized AI log evidence remains trustworthy for incident response, audit, and regulatory review.
  scope: Applies to centralized logging backends for AI workloads, including audit logs, training and inference logs, GPU hardware logs, and platform security telemetry retained for operational or regulatory purposes. Covers append-only storage, immutable backend settings, signed log batches, and integrity verification mechanisms. Excludes retention period assignment and lifecycle enforcement.
  primary_enforcement_point: Centralized log backend immutability and integrity verification controls.
  implementation_surface: Append-only or WORM-compliant storage, signed log batches or hash-chain integrity verification, immutable object storage controls, and periodic validation that centralized logs remain unmodified and trustworthy.
