- control_id: SAF-K8S-0704-005
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.4'
  control_seq: '005'
  control_title: Restricted use policies for non-organizationally owned systems and external AI services
  control_statement: Organizations must establish and enforce restricted use policies governing the use of non-organizationally owned systems and external AI services from within Kubernetes clusters.
  objective: Prevent unauthorized use of external AI services that may expose organizational data to unapproved service providers or introduce data handling risks.
  rationale: Unrestricted access to external AI services (third-party LLM APIs, external model registries, shadow AI platforms) from within Kubernetes clusters can result in sensitive training data or inference inputs being transmitted to unapproved services without proper data handling agreements. Restricted use policies enforced through network egress controls and allowlist governance close this exposure.
  scope: Applies to all Kubernetes clusters with egress internet access. Restricted use policies must enumerate approved external AI services and prohibit all others through network egress controls.
  primary_enforcement_point: Network egress policies (NetworkPolicy, service mesh egress rules, cloud firewall rules) blocking unapproved external service endpoints.
  implementation_surface: Egress NetworkPolicy rules and DNS-based filtering enforcing external AI service allowlists, secrets management integration (HashiCorp Vault, cloud KMS) for external AI service API key governance, outbound API call logging for cost tracking and data exposure auditing, data classification gates preventing Confidential/Restricted workloads from communicating with external AI services without explicit approval.
  owner_primary: Security Engineering
  owner_supporting: Cloud Platform Engineering; Platform Engineering; Legal; Procurement
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
