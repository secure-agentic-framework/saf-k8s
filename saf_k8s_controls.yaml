  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.10'
  control_seq: '034'
  control_title: Cross-cluster traffic anomaly monitoring for distributed AI workloads
  control_statement: Cross-cluster network communication for distributed AI workloads must monitor traffic for anomalous sources, destinations, volumes, or transfer patterns that may indicate misuse, lateral movement, or data exfiltration across cluster boundaries.
  objective: Detect suspicious cross-cluster AI communication patterns that authorized peer connectivity alone may not prevent or explain.
  rationale: Even when cross-cluster peers are authenticated and authorized, allowed communication paths can still be abused for misuse, lateral movement, or covert transfer activity. A dedicated monitoring control is needed to surface suspicious cross-cluster traffic patterns early enough for investigation before material harm occurs.
  scope: Applies to all cross-cluster network communication for distributed AI workloads, including distributed training gradient exchange, multi-cluster inference routing, and cross-cluster pipeline data transfer. Covers telemetry collection, dashboarding, and anomaly detection for inter-cluster communication patterns.
  primary_enforcement_point: Cross-cluster traffic telemetry collection, dashboarding, and anomaly detection.
  implementation_surface: Cross-cluster traffic dashboards, anomaly detection rules for unexpected sources and data volumes, and alert generation for suspicious inter-cluster communication patterns.
