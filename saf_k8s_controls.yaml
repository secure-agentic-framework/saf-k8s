- control_id: SAF-K8S-0904-012
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.4'
  control_seq: '012'
  control_title: Cross-classification pipeline data transfer authorization gates
  control_statement: Data transfers between pipeline stages with different classification levels must require explicit authorization through pipeline-level authorization gates.
  objective: Enforce approved, policy-governed movement of data across classification boundaries inside ML pipelines.
  rationale: Even when stages are separately isolated, data-classification boundaries can still be bypassed if outputs are automatically transferred across sensitivity levels without explicit policy approval. Authorization gates are required to prevent uncontrolled classification downgrades or unauthorized access to restricted data.
  scope: Applies to ML pipelines on Kubernetes that move data, artifacts, or derived outputs between stages with different classification levels. Covers policy evaluation for cross-classification transfers, approval gates, and classification-aware transfer controls. Excludes artifact encryption and storage access controls covered by SAF-K8S-0904-002.
  primary_enforcement_point: Data classification gateway policy and transfer authorization control point.
  implementation_surface: Data classification gateway policies, admission or workflow authorization gates for cross-classification transfers, and logs or policy decisions showing approved and denied movement of data between differently classified pipeline stages.
  owner_primary: Data Engineering
  owner_supporting: ML Platform Engineering; Security Engineering
