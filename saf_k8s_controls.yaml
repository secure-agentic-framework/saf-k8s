- control_id: SAF-K8S-1007-014
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.7'
  control_seq: '014'
  control_title: AI asset classification and criticality governance for Kubernetes environments
  control_statement: Organizations must classify AI infrastructure assets on Kubernetes by sensitivity, business criticality, and regulatory exposure, and must maintain those classifications so they can drive risk analysis, response prioritization, and governance decisions.
  objective: Ensure AI assets carry consistent risk-relevant classification metadata so monitoring, incident response, and governance decisions can be prioritized correctly.
  rationale: Inventory without classification does not tell defenders which AI assets are most sensitive, business critical, or regulatorily significant. Classification governance enables scoped incident response, criticality-aware vulnerability prioritization, and consistent compliance treatment.
  scope: Applies to AI infrastructure assets discovered in Kubernetes environments, including models, datasets, pipelines, endpoints, and GPU-backed services.
  primary_enforcement_point: Classification policy enforcement, metadata governance, and asset review workflows.
  implementation_surface: Classification label standards, policy-enforced metadata fields, criticality and regulatory-exposure tagging, and asset registry classification records.
