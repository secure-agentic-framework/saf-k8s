- control_id: SAF-K8S-0905-038
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: 038
  control_title: Model registry RBAC and workload pull authorization scoping
  control_statement: Model registries must enforce role-based access controls for publish, pull, modify, and delete operations and must scope workload and service-account access to approved repositories, projects, and environments. Human and machine identities must receive only the registry permissions required for their approved use cases.
  objective: Prevent unauthorized publication, retrieval, and modification of model artifacts by enforcing scoped registry authorization for human and workload identities.
  rationale: The model registry is the operational source of truth for deployable model artifacts. If registry roles or workload pull permissions are overly broad, an attacker or over-privileged workload can publish malicious models, retrieve restricted weights, or bypass environment boundaries.
  scope: Applies to all model registry deployments on Kubernetes, including Harbor, MLflow Model Registry, and on-premises Hugging Face Hub instances. Covers project-scoped roles, OIDC or IAM integration, and workload pull permissions scoped to approved repositories and environments.
  primary_enforcement_point: Model registry authorization policy and workload identity scoping.
  implementation_surface: Project-scoped registry roles, OIDC and cloud IAM integration, registry robot or service-account credentials, per-environment repository access rules, and pull-only permissions for inference workloads.
  owner_primary: ML Platform Engineering
  owner_supporting: Security Engineering; Platform Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
