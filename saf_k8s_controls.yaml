- control_id: SAF-K8S-0702-025
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.2'
  control_seq: '025'
  control_title: Tenant admission boundary enforcement for cross-tenant resource isolation
  control_statement: Organizations must use admission controls to reject cross-tenant resource references and other tenant-isolation violations before workloads or resources are created or updated in the cluster.
  objective: Prevent cross-tenant resource-manipulation paths by enforcing tenant isolation rules at admission time.
  rationale: RBAC alone cannot stop every isolation-model violation because workloads and resource definitions can still request unsafe configurations or cross-tenant references. Admission control blocks those noncompliant resources before scheduling and makes tenant-boundary policy enforceable at creation time.
  scope: Applies to all multi-tenant Kubernetes clusters. Admission policies must reject cross-tenant resource references and other workload or resource definitions that violate the tenant isolation model. Shared-service exceptions must be explicitly documented and reviewed.
  primary_enforcement_point: Admission control policies enforced at create and update time.
  implementation_surface: Admission control policies such as Kyverno or OPA/Gatekeeper preventing cross-namespace resource references, Pod Security Admission enforcement, image allowlisting, required label validation, and admission test cases confirming rejection of violating resources.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Network Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
