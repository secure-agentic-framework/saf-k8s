- control_id: SAF-K8S-0503-014
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.3'
  control_seq: '014'
  control_title: Ingress rate limiting and abuse throttling
  control_statement: Ingress controllers protecting internet-facing services must apply rate limiting controls appropriate to the exposed service so backend systems are protected from abuse, credential stuffing, and application-layer denial-of-service attacks.
  objective: Throttle abusive ingress traffic before it can overwhelm backend services or enable high-volume online attacks.
  rationale: Request filtering and rate limiting address different attack modes. Separating abuse throttling from WAF integration makes capacity protection and request-shaping controls independently auditable.
  scope: Applies to internet-facing ingress controllers and to internal ingress paths where risk assessment requires request filtering or abuse throttling. Covers WAF integrations, request filtering rules, and per-route or per-client rate limiting.
  primary_enforcement_point: Ingress abuse throttling controls.
  implementation_surface: Ingress annotations, CRDs, or gateway policies implementing per-route or per-client rate limiting, plus telemetry showing abuse throttling triggers and enforcement.
