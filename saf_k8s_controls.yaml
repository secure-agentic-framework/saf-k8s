  date_modified: '2026-03-17'
- control_id: SAF-K8S-0102-015
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.2'
  control_seq: '015'
  control_title: etcd certificate rotation testing and recovery validation
  control_statement: Production Kubernetes clusters must test and document the etcd certificate rotation process, including recovery or rollback procedures, so that certificate replacement can be executed safely without prolonged control-plane disruption if rotation fails or partially completes.
  objective: Ensure that etcd certificate rotation procedures are rehearsed and recoverable so certificate maintenance does not create avoidable outages during planned or emergency renewal events.
  rationale: Even when certificate rotation is configured, organizations often fail when the procedure has never been rehearsed or when rollback steps are undefined. This control isolates testing and recovery validation so teams can independently prove that rotation failures can be detected, contained, and remediated.
  scope: Applies to all self-managed Kubernetes clusters using etcd. Covers rotation test execution, documented recovery steps, and evidence that failed or partial rotations can be handled safely.
  primary_enforcement_point: Change Validation and Recovery
  implementation_surface: tested rotation runbooks, maintenance rehearsal records, rollback procedures, and incident or drill evidence for certificate renewal failures.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
