- control_id: SAF-K8S-0606-019
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.6'
  control_seq: 019
  control_title: Helm chart provenance and signature verification
  control_statement: Helm charts used for Kubernetes deployments must have verified provenance and validated signatures before installation or reconciliation, and externally sourced charts must be accepted only from approved repositories after authenticity validation.
  objective: Prevent deployment of tampered or spoofed Helm charts by requiring provenance and signature verification before charts are installed or reconciled.
  rationale: A Helm chart can fully define privileged Kubernetes resources, hooks, and dependent sub-charts. If teams install charts without verifying provenance and signatures, an attacker can substitute a malicious chart or repository source and obtain execution inside the cluster. Independent provenance validation is therefore a distinct control from dependency governance or values-hardening.
  scope: Applies to Helm charts used in staging and production Kubernetes environments, including charts for AI platforms, operators, and application workloads. Covers internal and external chart sources.
  primary_enforcement_point: Helm chart verification step in CI/CD and GitOps reconciliation before installation.
  implementation_surface: Helm provenance files (.prov), helm verify execution, chart signature validation in CI/CD or GitOps workflows, and repository acceptance controls for external charts prior to use.
  owner_primary: DevSecOps / Release Engineering
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
