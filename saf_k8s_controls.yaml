- control_id: SAF-K8S-0904-001
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.4'
  control_seq: '001'
  control_title: Pipeline orchestrator hardening
  control_statement: ML pipeline orchestrators (Kubeflow Pipelines, Argo Workflows, Airflow, Tekton) must enforce RBAC for pipeline definition creation and modification, execute pipeline steps in isolated security contexts, and manage secrets through Kubernetes-native or external secret stores rather than embedding credentials in pipeline definitions.
  objective: Prevent unauthorized pipeline creation or modification, contain the blast radius of compromised pipeline steps, and protect secrets used by pipeline stages from exposure.
  rationale: ML pipelines orchestrate the end-to-end workflow from data ingestion through model deployment. Without RBAC on pipeline definitions, any authenticated user can create or modify pipelines to exfiltrate data or deploy malicious models. Without execution isolation, a compromised pipeline step can access resources belonging to other steps or namespaces. Secrets embedded in pipeline definitions are exposed in pipeline logs, version history, and API responses.
  scope: Applies to all ML pipeline orchestration platforms deployed on Kubernetes, including Kubeflow Pipelines, Argo Workflows, Airflow on Kubernetes, and Tekton. Covers pipeline definition RBAC, step execution contexts, and secret management. Excludes CI/CD pipelines for application code unless they execute ML workloads.
  primary_enforcement_point: Pipeline orchestrator RBAC configuration, Kubernetes namespace and pod security policies for pipeline execution, and external secret store integrations (Vault, AWS Secrets Manager, Kubernetes Secrets with encryption).
  implementation_surface: ML pipeline orchestrator RBAC configuration (Kubeflow Pipelines namespace-scoped profiles, Argo Workflows WorkflowTemplate restrictions, Airflow DAG-level RBAC, Tekton Pipeline/Task RBAC), per-step pod security contexts with isolated service accounts, external secret store integrations (HashiCorp Vault sidecar injection, AWS Secrets Manager, Kubernetes External Secrets Operator), GitOps pipeline definition deployment with PR review requirements, and CI credential scanning for hardcoded secrets in pipeline definitions.
  owner_primary: ML Platform Engineering
  owner_supporting: Security Engineering; DevOps Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0904-003
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.4'
  control_seq: '003'
  control_title: Notebook and experimentation environment security
  control_statement: Interactive notebook environments must enforce per-user isolation, kernel security hardening, resource limits, network restrictions, approved base images, extension vetting, and data access controls that prevent unauthorized dataset access, model exfiltration, and credential harvesting from interactive environments.
  objective: Contain the security risks inherent in interactive notebook environments by isolating users, restricting capabilities, and controlling data access from experimentation workspaces.
  rationale: Notebook environments provide interactive code execution with direct access to cluster resources, training data, and model artifacts. Without user isolation, one researcher can access another's data and credentials. Without network restrictions, notebooks can exfiltrate data to external endpoints. Without extension vetting and approved base images, malicious code can execute in the kernel. Notebooks are a common vector for credential harvesting and model theft.
  scope: Applies to all interactive notebook deployments on Kubernetes used for ML experimentation (e.g., JupyterHub, VS Code Server, Zeppelin, RStudio Server). Covers user pod isolation, kernel configuration, resource limits, network policies, image provenance, extension management, and data access from notebook pods. Excludes production pipeline execution environments.
  primary_enforcement_point: Notebook platform spawner configuration, notebook pod security context, Kubernetes NetworkPolicy resources for notebook namespaces, and image allow-list admission policies.
  implementation_surface: Notebook platform spawner configuration (JupyterHub, VS Code Server, Zeppelin, RStudio Server), per-user notebook pod isolation with dedicated service accounts, pod security context and resource limits (CPU, memory, GPU), Kubernetes NetworkPolicy restricting notebook pod egress to authorized data sources and package repositories, approved base image allowlists enforced by admission control, notebook extension vetting procedures, terminal access controls, egress data transfer monitoring, and data access audit logging from notebook environments.
  owner_primary: ML Platform Engineering
  owner_supporting: Security Engineering; Data Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0904-007
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.4'
  control_seq: '007'
  control_title: Scheduled feature computation job hardening
  control_statement: Kubernetes CronJobs and batch Jobs used for scheduled feature computation, data refresh, or retraining preparation must be hardened for secure execution with least privilege, bounded runtime, and change control over job definitions.
  objective: Ensure that scheduled ML data processing jobs execute securely so recurring feature computation and refresh tasks cannot be abused to exfiltrate data, run unauthorized code, or persist malicious changes.
  rationale: Scheduled ML jobs often run unattended with broad data access and are easy to overlook once the initial pipeline is deployed. If CronJobs or batch Jobs are not hardened, an attacker can abuse recurring execution to inject malicious logic, exfiltrate data, or establish durable persistence through modified job definitions.
  scope: Applies to all Kubernetes CronJobs and batch Jobs performing scheduled feature computation, data refresh, scheduled preprocessing, or retraining preparation for ML workloads. Covers pod security context, service account scope, execution bounds, and governance of scheduled job definitions.
  primary_enforcement_point: Kubernetes CronJob and Job specifications, admission policies for scheduled workloads, and RBAC controlling job creation and modification.
  implementation_surface: CronJob and Job specifications with security context hardening (readOnlyRootFilesystem, non-root, dropped capabilities), dedicated service accounts with minimum data access, activeDeadlineSeconds and concurrency policy settings, RBAC restricting CronJob creation and modification, and change monitoring for CronJob definitions and schedules.
  owner_primary: Data Engineering
  owner_supporting: ML Platform Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
