  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.3'
  control_seq: '026'
  control_title: Secret leak prevention gate and enforcement controls
  control_statement: Organizations must enforce preventive secret leak controls such as pre-commit checks, push protection, or CI/CD secret detection gates to block publication of exposed credentials where the workflow supports prevention.
  objective: Prevent credential leaks from being committed or published by enforcing automated blocking controls at supported workflow stages.
  rationale: Preventive enforcement is independently auditable from broad leak-detection coverage. This control isolates blocking gates and enforcement controls so teams can prove that secret exposure is actively prevented at commit, push, or pipeline stages rather than merely detected after publication.
  scope: Applies to developer workflows and CI/CD paths where preventive blocking is supported. Covers pre-commit hooks, push protection, pipeline gates, and similar enforcement controls that block publication of exposed credentials. Broad detection coverage remains governed by SAF-K8S-0403-025, and response remains governed by SAF-K8S-0403-015.
  primary_enforcement_point: Preventive secret leak enforcement in developer and CI/CD workflows.
  implementation_surface: Pre-commit scanning, push protection, CI/CD secret detection gates, and workflow-blocking controls for exposed credentials.
