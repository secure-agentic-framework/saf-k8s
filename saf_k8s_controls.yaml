- control_id: SAF-K8S-0904-018
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.4'
  control_seq: 018
  control_title: Pipeline definition immutable version storage and controlled rollback governance
  control_statement: Pipeline definitions must be stored as immutable versions and changed only through controlled rollback procedures that preserve version integrity and prevent silent reintroduction of tampered ML workflows.
  objective: Preserve recoverable, tamper-resistant pipeline definition history so trusted rollback is possible without undermining workflow integrity.
  rationale: Signing alone does not guarantee safe recovery if prior workflow definitions can be overwritten or rollback is performed without governance. Immutable version history and controlled rollback procedures ensure teams can recover to known-good pipeline definitions without reintroducing unreviewed or silently modified workflows.
  scope: Applies to ML pipeline definitions, templates, and workflow manifests stored and executed on Kubernetes-based orchestration platforms such as Argo Workflows and Kubeflow Pipelines. Covers immutable version storage, retained version history, and governed rollback procedures. Excludes cryptographic signing and verification, which are addressed separately.
  primary_enforcement_point: Pipeline definition version repository and rollback process.
  implementation_surface: Immutable workflow or template version storage, protected version history, rollback authorization or approval records, and recovery evidence showing rollback uses known-good preserved definitions rather than mutable replacements.
  owner_primary: ML Platform Engineering
  owner_supporting: Security Engineering; ML Engineering
