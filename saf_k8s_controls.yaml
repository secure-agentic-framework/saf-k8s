- control_id: SAF-K8S-0905-034
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: '034'
  control_title: Canary and A/B candidate version isolation and traffic-splitting integrity
  control_statement: Canary and A/B deployment infrastructure must isolate candidate and stable model versions and preserve traffic-splitting integrity so a compromised or faulty candidate cannot interfere with the stable production version or silently capture unintended production traffic.
  objective: Ensure multi-version serving infrastructure keeps candidate and stable versions isolated and enforces approved traffic distribution during staged rollout.
  rationale: Without version isolation, a compromised candidate model can affect the stable model through shared resources or runtime interference. Without traffic-splitting integrity, a rollout controller or routing layer can silently direct more traffic to a candidate than intended, expanding the blast radius of a bad release.
  scope: Applies to all multi-version model serving on Kubernetes, including canary deployments, A/B testing, and blue-green deployments. Covers resource and runtime isolation between versions and integrity of traffic-splitting configuration. Excludes rollback triggers and recovery automation, which are addressed separately.
  primary_enforcement_point: Canary or A/B rollout controller configuration and service-mesh or ingress routing policy.
  implementation_surface: Canary and A/B rollout controllers, Istio VirtualService or Envoy route configuration for traffic splitting, resource isolation between candidate and stable model versions, and isolation settings such as separate GPU devices or MIG partitions where needed.
  owner_primary: ML Platform Engineering
  owner_supporting: DevOps Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-17'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0905-035
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: '035'
  control_title: Automatic canary rollback on error-rate and latency degradation
  control_statement: Canary and A/B deployment infrastructure must automatically roll back candidate model versions when defined error-rate, latency, or related degradation thresholds are exceeded during staged rollout.
  objective: Limit the blast radius of a failed model rollout by automatically reverting to the stable version when health degradation is detected.
  rationale: Even when versions are isolated and traffic splitting is correct, a candidate model can still degrade service quality or safety. Automatic rollback shortens exposure time by reverting to the stable version as soon as predefined health thresholds indicate an unsafe rollout.
  scope: Applies to all multi-version model serving on Kubernetes, including canary deployments, A/B testing, and blue-green deployments. Covers degradation thresholds, rollback triggers, and automatic reversion behavior. Excludes promotion gate policy and approval workflow controls, which remain on adjacent promotion controls.
  primary_enforcement_point: Rollout controller health checks, analysis configuration, and rollback process.
  implementation_surface: Automatic rollback triggers on error rate, latency, or related health degradation, rollback event logs, and controller policies proving failed candidate versions revert without manual delay.
  owner_primary: ML Platform Engineering
  owner_supporting: DevOps Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
