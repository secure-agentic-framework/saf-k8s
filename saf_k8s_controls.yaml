- control_id: SAF-K8S-0104-019
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.4'
  control_seq: 019
  control_title: Kubernetes CVE risk prioritization framework
  control_statement: Organizations must maintain a documented Kubernetes CVE prioritization framework that classifies vulnerabilities by severity, exploitability, exposure, and cluster-specific impact to drive timely triage decisions.
  objective: Ensure remediation effort is focused first on the Kubernetes vulnerabilities with the highest real risk to the organization's clusters and workloads.
  rationale: Awareness of Kubernetes CVEs is insufficient if teams treat every disclosure equally. A documented prioritization framework makes triage consistent and risk-informed by accounting for exploitability, exposed attack surface, tenant impact, and operational context so the most dangerous vulnerabilities are addressed first.
  scope: Applies to all production and non-production clusters. Covers Kubernetes core component CVEs, container runtime CVEs, and critical add-on vulnerabilities where prioritization must consider CVSS, exploitability, exposed components, tenant impact, and provider patch timelines.
  primary_enforcement_point: Vulnerability triage governance
  implementation_surface: Documented CVE prioritization workflow, severity and SLA criteria, exploitability or exposure scoring inputs, and triage decision records for Kubernetes-related vulnerabilities.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Incident Response
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
