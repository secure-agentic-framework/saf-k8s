- control_id: SAF-K8S-0104-016
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.4'
  control_seq: '016'
  control_title: CIS Benchmark remediation workflow tracking
  control_statement: Failing CIS Kubernetes Benchmark checks must be tracked through a documented remediation workflow with assigned ownership and defined resolution timelines so that benchmark findings produce accountable corrective action rather than unmanaged backlog.
  objective: Ensure benchmark findings drive timely, accountable remediation through an auditable workflow with owners and due dates.
  rationale: Benchmark scans do not improve security unless findings are converted into owned corrective actions. This control isolates the remediation workflow obligation so teams can independently verify that failing checks are assigned, tracked, and resolved on a defined timeline.
  scope: Applies to all production clusters and to all failing CIS Benchmark checks identified through recurring assessment.
  primary_enforcement_point: Workflow / Governance
  implementation_surface: Issue tracking, remediation management, and ownership assignment workflow tied to CIS Benchmark findings.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Governance Risk and Compliance
  baseline_or_ai_specific: baseline
  maturity: Foundational
