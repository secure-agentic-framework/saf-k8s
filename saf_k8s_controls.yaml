- control_id: SAF-K8S-0802-006
  domain_code: D08
  domain_name: GPU, Accelerator, and Confidential Computing
  knowledge_area: '8.2'
  control_seq: '006'
  control_title: Device plugin socket directory access restriction and unauthorized socket access monitoring
  control_statement: Device plugin Unix domain socket directories must be protected with restrictive filesystem permissions and admission controls, and unauthorized processes or pods must be prevented from mounting or accessing the kubelet device-plugin socket path.
  objective: Protect the kubelet device-plugin socket directory from unauthorized access so rogue pods or local processes cannot tamper with GPU allocation interfaces or observe plugin communication paths.
  rationale: The device-plugin socket directory is a trust boundary on GPU nodes. Restrictive permissions and hostPath controls reduce the chance that unapproved workloads can access or interfere with device plugin sockets, while monitoring unauthorized socket access provides evidence that the boundary remains enforced.
  scope: Applies to all Kubernetes nodes where GPU device plugins are registered with the kubelet. Covers the /var/lib/kubelet/device-plugins directory, device plugin Unix domain sockets, and controls preventing unauthorized hostPath access to that directory.
  primary_enforcement_point: Device-Plugin Socket Directory Access Control
  implementation_surface: Filesystem permissions on /var/lib/kubelet/device-plugins and Unix domain sockets, admission control policies restricting hostPath mounts to the device-plugins directory, and host runtime monitoring for unauthorized socket access or creation.
