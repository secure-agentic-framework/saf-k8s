- control_id: SAF-K8S-0802-004
  domain_code: D08
  domain_name: GPU, Accelerator, and Confidential Computing
  knowledge_area: '8.2'
  control_seq: '004'
  control_title: GPU firmware integrity monitoring
  control_statement: GPU firmware integrity must be monitored for unauthorized modifications, firmware version changes outside authorized upgrade windows must be detected and alerted, and hardware anomaly monitoring must identify indicators of firmware-level tampering.
  objective: Detect unauthorized firmware modifications on GPU hardware that could compromise the confidentiality and integrity of all AI workloads running on the affected device.
  rationale: GPU firmware operates below the driver and OS layers. A compromised firmware image can intercept all data processed on the GPU, including model weights, training data, and inference inputs, while remaining invisible to OS-level security tools. Without firmware integrity monitoring, an attacker with one-time physical or privileged access can establish persistent GPU-level compromise that survives driver reinstallation and node reimaging.
  scope: Applies to all Kubernetes GPU nodes with firmware that supports integrity verification (NVIDIA GPUs with InfoROM, firmware signing). Covers GPU firmware version tracking, firmware checksum validation, and hardware anomaly detection. Nodes using GPUs without firmware integrity features must document compensating controls.
  primary_enforcement_point: Node-level firmware integrity checking tools (nvidia-smi, InfoROM verification), DCGM hardware anomaly monitoring, and authorized firmware upgrade window controls.
  implementation_surface: GPU firmware version tracking via nvidia-smi -q, NVIDIA InfoROM firmware integrity verification, DCGM hardware anomaly monitoring (ECC error patterns, clock throttling, power consumption), GPU firmware version and checksum inventory management, and authorized firmware upgrade window controls.
  owner_primary: GPU Infrastructure Engineering
  owner_supporting: Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
