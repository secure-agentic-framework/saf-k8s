  control_title: Cross-cluster transport encryption for distributed AI traffic
  control_statement: Cross-cluster network communication for distributed AI workloads must use encrypted transport channels so gradient exchange, inference routing, and pipeline data transfer cannot be intercepted or tampered with across cluster boundaries.
  objective: Protect cross-cluster AI data in transit from interception and tampering by enforcing encrypted transport across federated clusters.
  rationale: Distributed AI traffic often crosses network paths and trust boundaries that single-cluster controls cannot protect. Transport encryption prevents eavesdropping and tampering on cross-cluster links before higher-level identity, authorization, or workload logic is evaluated.
  scope: Applies to all cross-cluster network communication for AI workloads, including distributed training gradient exchange, multi-cluster inference routing, and cross-cluster pipeline data transfer. Covers encrypted transport channels across cluster boundaries. Excludes endpoint identity authentication and authorization decisions for those channels.
  primary_enforcement_point: Encrypted transport configuration for cross-cluster links.
  implementation_surface: Multi-cluster service mesh mTLS encryption, VPN or WireGuard tunnel encryption, certificate-based transport protection for cross-cluster AI data paths, and verification of encrypted transport on cross-cluster links.
