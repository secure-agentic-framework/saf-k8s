- control_id: SAF-K8S-0703-012
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.3'
  control_seq: '012'
  control_title: Node affinity rules, taints, and tolerations for AI workload isolation
  control_statement: Organizations must configure node affinity rules, taints, and tolerations to isolate AI workloads from non-AI services, ensuring GPU nodes are dedicated to AI workloads and preventing noisy-neighbor effects on latency-sensitive services.
  objective: Prevent AI workloads from degrading co-located non-AI services by enforcing node-level scheduling isolation through Kubernetes taints, tolerations, and pod affinity rules.
  rationale: AI training workloads consume massive CPU, memory, and network bandwidth, causing noisy-neighbor effects that degrade co-located non-AI services. Without node-level isolation through taints and tolerations, AI workloads can be scheduled on nodes running latency-sensitive services, causing unpredictable performance degradation. GPU nodes have distinct kernel and driver requirements that make them unsuitable for general-purpose workloads.
  scope: Applies to all Kubernetes clusters running mixed AI and non-AI workloads. Node taints must designate GPU nodes for AI workloads only. Pod specs for AI workloads must carry matching tolerations and nodeAffinity selectors.
  primary_enforcement_point: Node taint configuration and pod spec toleration and affinity settings enforced at scheduling time.
  implementation_surface: Kubernetes node taints (nvidia.com/gpu=present:NoSchedule), pod spec tolerations matching the GPU taint, pod spec.affinity.nodeAffinity with nodeSelectorTerms matching GPU product labels (nvidia.com/gpu.product), and node labels designating AI-only nodes.
  owner_primary: Platform Engineering
  owner_supporting: ML Engineering, SRE
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
