- control_id: SAF-K8S-0905-037
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: '037'
  control_title: Manual emergency halt governance and forensic evidence preservation
  control_statement: Organizations must maintain governed manual emergency halt procedures that authorized operators can invoke within a defined maximum response time for AI workloads exhibiting unsafe, compromised, or non-compliant behavior. Emergency halt procedures must preserve forensic evidence needed for investigation and recovery.
  objective: Enable human-directed containment of AI workloads through governed emergency halt procedures that preserve evidence for investigation and post-incident analysis.
  rationale: Not all unsafe AI behavior is captured by automated thresholds. Authorized operators need a reliable manual emergency halt path for ambiguous, emerging, or policy-driven situations, and that halt process must preserve evidence so the event can be investigated and recovered cleanly.
  scope: Applies to AI training jobs, inference services, and data pipelines where authorized responders may need to halt workloads manually under emergency conditions.
  primary_enforcement_point: Operator-run emergency halt procedures and supporting evidence-preservation steps.
  implementation_surface: Emergency halt runbooks, authorized operator procedures, incident-response coordination, evidence preservation workflows, and post-halt forensic collection steps.
  owner_primary: AI/ML Engineering
  owner_supporting: Security Operations; SRE
  baseline_or_ai_specific: ai-specific
