- control_id: SAF-K8S-1002-002
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.2'
  control_seq: '002'
  control_title: Distributed tracing for ML pipelines
  control_statement: Organizations must implement end-to-end distributed tracing across ML pipeline stages, including data ingestion, training, and inference serving, with trace context propagated across service boundaries to enable rapid root-cause analysis of pipeline failures and security incidents.
  objective: Provide full observability into ML pipeline execution to enable rapid root-cause analysis of failures and detection of malicious interference across pipeline stages.
  rationale: ML pipelines span multiple Kubernetes services and batch jobs, making it difficult to trace failures or malicious interference across pipeline stages without distributed tracing. Trace context propagation enables correlation of events across data ingestion, training, model registry, and inference serving stages.
  scope: Applies to all ML pipeline orchestration systems running on Kubernetes, including data ingestion services, training job controllers, model registries, and inference serving platforms. Trace propagation must cover both synchronous and asynchronous pipeline transitions. Alerting is covered by SAF-K8S-1002-004.
  primary_enforcement_point: Tracing instrumentation libraries and trace collector deployment configuration.
  implementation_surface: OpenTelemetry instrumentation libraries and trace collector deployment (OTel Collector), W3C Trace Context propagation (traceparent header) across ML pipeline stages (data ingestion, training, model registry, inference serving), and trace context injection via environment variables and Kubernetes annotations on training jobs and InferenceService CRDs.
  owner_primary: AI/ML Engineering
  owner_supporting: Platform Engineering; SRE
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
