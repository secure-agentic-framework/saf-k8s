  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.3'
  control_seq: '18'
  control_title: GPU cost attribution metering and billing correlation
  control_statement: Organizations must measure and attribute GPU consumption at the namespace, team, and job level by correlating Kubernetes workload metadata with billing and utilization telemetry.
  objective: Provide granular, trustworthy visibility into GPU consumption so organizations can identify which namespaces, teams, and jobs are responsible for incurred GPU spend.
  rationale: Without reliable attribution, organizations cannot determine which workloads are driving GPU cost, cannot distinguish productive consumption from waste, and cannot make defensible budget, capacity, or optimization decisions for expensive AI infrastructure.
  scope: Applies to all Kubernetes clusters with GPU resources. Attribution must cover per-namespace, per-team, and per-job granularity and must align Kubernetes labels or namespaces with cloud billing or equivalent cost telemetry sources.
  primary_enforcement_point: GPU monitoring and cost attribution tooling integrated with billing and workload metadata sources.
  implementation_surface: Cloud billing tags or labels mapped to Kubernetes namespace, team, project, and job dimensions, plus cost monitoring tools that calculate attributable GPU spend from workload and utilization telemetry.
