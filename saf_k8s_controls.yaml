- control_id: SAF-K8S-0702-031
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.2'
  control_seq: '031'
  control_title: Production promotion gate enforcement on validated classification metadata
  control_statement: Organizations must block model promotion or production deployment when required classification metadata is missing, invalid, or not validated for the target environment.
  objective: Ensure production promotion events are gated on validated classification metadata before deployment into sensitive environments.
  rationale: Even when classification metadata is preserved and reclassification logic exists, production deployment remains unsafe if promotion proceeds with missing or invalid metadata. Gating and rejection logic is therefore a separate auditable obligation from performing reclassification itself.
  scope: Applies to CI/CD and model promotion pipelines, promotion approval gates, and production admission or deployment checks for AI model artifacts moving into staging or production environments.
  primary_enforcement_point: Promotion pipeline gates and production deployment validation controls.
  implementation_surface: CI/CD promotion pipelines with classification validation gates, approval logic for target-environment metadata validation, and admission or deployment rejection controls for models missing required classification metadata in production namespaces.
  owner_primary: ML Engineering
  owner_supporting: Data Governance; Platform Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
