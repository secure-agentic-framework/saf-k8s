- control_id: SAF-K8S-0801-001
  domain_code: D08
  domain_name: GPU, Accelerator, and Confidential Computing
  knowledge_area: '8.1'
  control_seq: '001'
  control_title: GPU device plugin security configuration and hardening
  control_statement: GPU device plugins (NVIDIA device plugin, GPU Operator, GPU Feature Discovery) must be deployed with hardened security configurations, restricted RBAC permissions, validated container images, and secure communication with the kubelet to prevent unauthorized accelerator exposure or scheduling manipulation.
  objective: Ensure that the device plugin framework exposing GPU accelerators to the Kubernetes scheduler operates with least-privilege permissions and tamper-resistant configurations, preventing unauthorized GPU allocation or kubelet-level exploitation.
  rationale: GPU device plugins run as privileged DaemonSets with direct access to host hardware and the kubelet gRPC interface. A compromised or misconfigured device plugin can advertise false GPU capacity, redirect workloads to attacker-controlled devices, or grant unauthorized containers access to accelerator hardware. Without hardening, the device plugin becomes a high-value target for cluster-level privilege escalation.
  scope: Applies to all Kubernetes clusters running GPU device plugins, including NVIDIA device plugin, GPU Operator, and GPU Feature Discovery components. Covers both self-managed and managed Kubernetes services where GPU node pools are provisioned. Exceptions require documented risk acceptance for development-only clusters with no multi-tenant workloads.
  primary_enforcement_point: Device plugin DaemonSet manifests, GPU Operator Helm values, RBAC policies for device plugin service accounts, and admission control policies restricting device plugin deployment.
  implementation_surface: NVIDIA device plugin DaemonSet manifests and Helm values, GPU Operator CRDs and ClusterRole/ClusterRoleBinding RBAC policies, GPU Feature Discovery (GFD) DaemonSet configuration, kubelet device plugin registration gRPC interface, device plugin container image digest pinning and admission-time signature verification, /var/lib/kubelet/device-plugins/ socket directory permissions, GitOps-managed device plugin configuration (sharing mode, resource naming, health checks), and Dynamic Resource Allocation (DRA) ResourceClaim/DeviceClass/ResourceClaimTemplate objects.
  owner_primary: ML Platform Engineering
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0801-002
  domain_code: D08
  domain_name: GPU, Accelerator, and Confidential Computing
  knowledge_area: '8.1'
  control_seq: '002'
  control_title: MIG partitioning for hardware-enforced GPU isolation
  control_statement: Multi-tenant GPU clusters must use Multi-Instance GPU (MIG) partitioning where supported hardware is available, with MIG profiles configured to enforce hardware-level isolation between tenants and resource advertisements accurately reflecting partitioned GPU instances to the Kubernetes scheduler.
  objective: Provide hardware-enforced memory and compute isolation between GPU tenants, preventing cross-tenant data leakage and ensuring that resource scheduling accurately reflects the isolated GPU partitions available to each workload.
  rationale: Without MIG or equivalent hardware partitioning, multiple tenants sharing a GPU operate in the same fault domain with shared memory spaces. This enables cross-tenant GPU memory scraping, side-channel attacks through shared caches, and resource contention that can degrade model training integrity. Inaccurate MIG resource advertisement can cause scheduling failures or over-commitment.
  scope: Applies to Kubernetes clusters with NVIDIA A100, H100, or later GPUs that support MIG, where multiple tenants or security domains share GPU nodes. Single-tenant dedicated GPU pools may document an exception. Managed Kubernetes GPU offerings must verify MIG configuration through provider controls.
  primary_enforcement_point: NVIDIA MIG manager configuration, GPU Operator MIG strategy settings, device plugin MIG resource advertisement, and admission control policies validating MIG partition requests.
  implementation_surface: NVIDIA MIG Manager and nvidia-smi MIG CLI (nvidia-smi mig -i <gpu-id> -cgi <profile> -C), GPU Operator MIGConfig CRDs and MIG strategy settings, device plugin MIG resource advertisements (nvidia.com/mig-<profile> extended resources), Kubernetes ResourceQuota objects scoped to nvidia.com/mig-* resources per namespace, admission control policies (OPA/Gatekeeper, Kyverno) validating MIG profile requests, and MIG reconfiguration access controls restricting GPU quiescing to platform administrators.
  owner_primary: ML Platform Engineering
  owner_supporting: GPU Infrastructure Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0801-004
  domain_code: D08
  domain_name: GPU, Accelerator, and Confidential Computing
  knowledge_area: '8.1'
  control_seq: '004'
  control_title: vGPU virtualization security controls
  control_statement: Hypervisor-based vGPU deployments must enforce vendor-specific security controls including vGPU profile isolation, resource allocation limits, hypervisor escape prevention, and validated driver compatibility between host and guest vGPU components.
  objective: Ensure that virtualized GPU resources maintain isolation guarantees enforced by the hypervisor layer, preventing guest-to-host escapes and cross-VM GPU resource interference in virtualized Kubernetes environments.
  rationale: vGPU implementations rely on hypervisor-mediated GPU access where a vulnerability in the vGPU manager or driver can enable hypervisor escape from a GPU-enabled VM. Misconfigured vGPU profiles can allow a single VM to consume all GPU memory or compute, causing denial of service to other tenants. Driver version mismatches between host vGPU manager and guest drivers create instability and potential security gaps.
  scope: Applies to Kubernetes clusters running on virtualized infrastructure (VMware vSphere, KVM/QEMU, Citrix) with NVIDIA vGPU, Intel GVT-g, or equivalent GPU virtualization. Bare-metal GPU deployments using MIG or passthrough are covered by other controls. Cloud provider virtual GPU instances must verify provider security controls meet organizational requirements.
  primary_enforcement_point: Hypervisor vGPU manager configuration, vGPU profile assignments, host-guest driver compatibility validation, and VM security policy settings for GPU passthrough restrictions.
  implementation_surface: Hypervisor vGPU manager configuration (NVIDIA GRID/vGPU, Intel GVT-g), vGPU profile assignments and resource allocation limits, host-guest GPU driver version compatibility matrices, hypervisor security patch management (VMware vSphere, KVM/QEMU, Citrix), VM security policy settings for GPU passthrough restrictions, and hypervisor escape vulnerability scanning for GPU virtualization components.
  owner_primary: GPU Infrastructure Engineering
  owner_supporting: Virtualization Engineering; ML Platform Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0801-006
  domain_code: D08
  domain_name: GPU, Accelerator, and Confidential Computing
  knowledge_area: '8.1'
  control_seq: '006'
  control_title: GPU memory clearing between workload transitions
  control_statement: Organizations must ensure that GPU memory is cleared between workload transitions to prevent data remnants from one workload being accessible to subsequent workloads on the same GPU device, particularly when GPU devices are shared across tenants or sensitivity levels.
  objective: Prevent cross-workload data leakage through GPU memory remnants by ensuring that GPU device memory is sanitized between workload transitions.
  rationale: GPU memory is not automatically cleared when a workload completes and releases its GPU allocation. Training data, model weights, gradients, and intermediate activations may persist in GPU memory and be accessible to the next workload scheduled on the same device. In multi-tenant environments or when GPU devices transition between workloads of different sensitivity levels, this creates a data leakage vector that bypasses Kubernetes namespace isolation.
  scope: Applies to all Kubernetes clusters where GPU devices are shared between workloads, particularly in multi-tenant environments or when workloads of different sensitivity levels share GPU node pools. Covers GPU memory clearing mechanisms, verification testing, and scheduling controls.
  primary_enforcement_point: GPU memory clearing configuration on workload completion, scheduling policies preventing cross-sensitivity workload transitions without clearing, and periodic verification testing.
  implementation_surface: CUDA memory management APIs for explicit GPU memory clearing, device plugin configuration for post-allocation cleanup, node-level cleanup scripts triggered on pod termination, admission policies restricting multi-sensitivity GPU sharing without clearing, and GPU memory scan tools for verification testing.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; AI/ML Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-07'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0801-009
  domain_code: D08
  domain_name: GPU, Accelerator, and Confidential Computing
  knowledge_area: '8.1'
  control_seq: 009
  control_title: GPU topology metadata protection and node label visibility restriction
  control_statement: Kubernetes node labels, device plugin advertisements, and topology information exposing GPU hardware details must be restricted so unauthorized users and workloads cannot enumerate sensitive accelerator metadata.
  objective: Prevent reconnaissance and tenant-placement inference by limiting exposure of GPU topology and hardware metadata.
  rationale: GPU feature discovery and device plugin metadata can reveal hardware models, interconnect layouts, driver versions, MIG capabilities, and co-tenant placement clues. Restricting visibility reduces the value of topology information for targeted attacks and reconnaissance against shared GPU infrastructure.
  scope: Applies to all Kubernetes clusters with GPU nodes where device plugin advertisements or GPU Feature Discovery labels expose accelerator metadata. Visibility exceptions require documented justification.
  primary_enforcement_point: GPU metadata publication controls and RBAC restrictions on node and label visibility.
  implementation_surface: GPU Feature Discovery configuration, node label exposure controls, device plugin metadata filtering, and RBAC limiting node object and label reads.
