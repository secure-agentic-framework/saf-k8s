  date_modified: '2026-03-17'
- control_id: SAF-K8S-0805-004
  domain_code: D08
  domain_name: GPU, Accelerator, and Confidential Computing
  knowledge_area: '8.5'
  control_seq: '004'
  control_title: GPU side-channel attack awareness and mitigation
  control_statement: Organizations operating multi-tenant GPU infrastructure must assess side-channel risks including GPU shared memory timing attacks, memory access pattern leakage, and cross-tenant information disclosure, and must implement mitigation measures appropriate to the sensitivity of co-located workloads.
  objective: Reduce the risk of information leakage through GPU hardware side channels in multi-tenant environments by ensuring organizations understand, assess, and mitigate GPU-specific side-channel attack vectors.
  rationale: GPUs share hardware resources (L2 cache, memory controllers, shared memory banks) between concurrent workloads, creating side channels through which a malicious workload can infer information about co-located tenants. Timing variations in shared memory access reveal memory access patterns that can leak model architecture details or training data characteristics. Cache-based side channels on GPUs are less studied than CPU equivalents, meaning organizations may underestimate the risk. Without awareness and assessment, sensitive AI workloads may be unknowingly co-located with adversarial workloads capable of exploiting these channels.
  scope: Applies to Kubernetes clusters where multiple tenants or security domains share GPU hardware, including time-sliced, MPS, and vGPU configurations. MIG-partitioned workloads have reduced but not eliminated side-channel risk. Single-tenant dedicated GPU pools with physical isolation may document reduced requirements. This control requires periodic reassessment as GPU side-channel research evolves.
  primary_enforcement_point: Workload co-location policies, GPU sharing mode selection (MIG preferred over time-slicing for sensitive workloads), scheduling anti-affinity rules for sensitive workloads, and periodic side-channel risk assessment process.
  implementation_surface: Workload co-location policies restricting cross-trust-domain GPU sharing, GPU sharing mode selection guidance (MIG preferred for medium/high sensitivity, dedicated nodes for high sensitivity), scheduling anti-affinity rules for sensitive AI workloads, periodic GPU side-channel risk assessment process covering shared memory timing attacks, memory access pattern leakage, power analysis, and GPU scheduler observation vectors, workload sensitivity classification integrated with GPU placement decisions, and documented risk acceptance records for residual side-channel exposure in shared GPU environments.
  owner_primary: Security Engineering
  owner_supporting: ML Platform Engineering; GPU Infrastructure Engineering; Risk Management
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
