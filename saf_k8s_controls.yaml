  control_seq: '014'
  control_title: MPS and time-slicing side-channel risk assessment
  control_statement: Clusters using NVIDIA MPS or GPU time-slicing must assess side-channel leakage risks for shared GPU deployments and document whether timing, contention, or memory access pattern channels create unacceptable cross-workload exposure.
  objective: Provide technical assurance that shared GPU deployments have undergone explicit side-channel risk assessment before multi-tenant or mixed-sensitivity use is permitted.
  rationale: Even when memory remnants are prevented, shared GPU deployments may still expose timing, contention, cache, or memory access pattern channels. This control is separate from remnant prevention because it requires threat-informed assessment of leakage mechanisms that are not resolved solely by clearing memory between workload transitions.
  scope: Applies to any Kubernetes cluster using NVIDIA MPS or GPU time-slicing. Covers side-channel assessment activities, documented findings, and risk characterization for shared GPU deployments.
  primary_enforcement_point: Shared-GPU Side-Channel Assessment
  implementation_surface: Threat-informed side-channel assessment processes, shared GPU leakage testing, and documented findings or risk determinations for MPS and time-sliced GPU deployments.
