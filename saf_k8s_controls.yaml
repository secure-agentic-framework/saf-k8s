- control_id: SAF-K8S-0101-018
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.1'
  control_seq: 018
  control_title: API server anonymous authentication disablement
  control_statement: Production Kubernetes clusters must disable anonymous authentication on the API server.
  objective: Prevent unauthenticated access attempts from reaching the Kubernetes API server as anonymous requests.
  rationale: Anonymous API access bypasses the identity controls that protect the control plane and can expose discovery paths or weakly guarded endpoints to unauthenticated callers. Disabling anonymous authentication forces all API access through authenticated identities.
  scope: Applies to all production Kubernetes clusters and to non-production clusters that host sensitive data, shared workloads, or provide a path to production. For managed services, applies to all customer-exposed API server authentication settings and compensating controls when provider-managed settings are fixed.
  primary_enforcement_point: API server authentication configuration.
  implementation_surface: API server manifest flags, managed Kubernetes security settings, cluster provisioning templates, and periodic configuration assessment for anonymous authentication status.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Cloud Platform Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
