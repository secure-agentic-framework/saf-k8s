- control_id: SAF-K8S-0104-023
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.4'
  control_seq: '023'
  control_title: Stage-based approval and risk assessment for production feature gates
  control_statement: Production Kubernetes clusters must govern alpha- and beta-stage feature gate enablement through explicit approval and documented security risk assessment before those gates are allowed in production.
  objective: Ensure unstable or incompletely assessed feature gates do not enter production clusters without stage-appropriate security review and approval.
  rationale: Alpha and beta feature gates change cluster behavior in ways that may be unstable, insufficiently reviewed, or unsupported in production. Stage-based approval and documented risk assessment prevent experimental feature behavior from bypassing security review.
  scope: Applies to all production clusters and all alpha- or beta-stage feature gates on API server, controller-manager, scheduler, kubelet, kube-proxy, and managed service surfaces where feature gate behavior can be influenced or must be tracked.
  primary_enforcement_point: Cluster change approval and security review processes governing production feature gate enablement.
  implementation_surface: Change approval workflows for production feature gates, documented security risk assessments for alpha or beta gates, prohibition of unapproved alpha gates, and production configuration scans verifying only approved feature gates are active.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Architecture Review
  baseline_or_ai_specific: baseline
  maturity: Practitioner
