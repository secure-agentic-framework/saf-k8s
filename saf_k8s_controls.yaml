- control_id: SAF-K8S-0904-008
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.4'
  control_seq: 008
  control_title: Feature freshness and integrity monitoring
  control_statement: Feature data used by training and inference pipelines must be monitored for freshness, staleness, poisoning indicators, and integrity violations before the features are consumed by downstream ML workflows.
  objective: Ensure that stale, poisoned, or tampered features are detected before they degrade model quality, bias outputs, or compromise downstream training and inference behavior.
  rationale: Feature values can silently degrade or be maliciously altered without breaking pipeline execution. Without dedicated freshness and integrity monitoring, stale refreshes, poisoned feature inputs, or tampered feature sets can reach training and inference undetected until model behavior fails in production.
  scope: Applies to scheduled and on-demand feature refresh outputs, feature stores, and pipeline gates that validate features before training or inference consumption. Covers timestamp freshness, anomaly detection, integrity verification, and operational response to detected feature issues.
  primary_enforcement_point: Feature store freshness monitoring, feature validation gates in training and inference pipelines, and alerting or incident workflows for anomalous feature updates.
  implementation_surface: Feature freshness timestamp tracking and alerting, validation hooks before model consumption, statistical drift or anomaly detection on refreshed feature values, integrity checksums or equivalent verification on feature datasets, and incident handling procedures for stale, poisoned, or tampered features.
  owner_primary: Data Engineering
  owner_supporting: ML Platform Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
