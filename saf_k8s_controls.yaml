- control_id: SAF-K8S-0403-020
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.3'
  control_seq: '020'
  control_title: Kubernetes Secrets KMS key least-privilege access policy
  control_statement: KMS keys used to protect Kubernetes Secrets must enforce least-privilege access to encryption and decryption operations.
  objective: Ensure only approved Kubernetes control-plane or managed encryption identities can use the KMS keys protecting Kubernetes Secrets.
  rationale: Using an external KMS backend is insufficient if the KMS key policy is over-broad. This control isolates least-privilege key governance so teams can independently verify that only approved identities may encrypt or decrypt Kubernetes Secrets.
  scope: Applies to all production Kubernetes clusters. Covers key policies, grants, IAM bindings, and periodic access review for KMS keys protecting Kubernetes Secrets. External KMS provider integration remains governed by SAF-K8S-0403-019.
  primary_enforcement_point: External KMS key policies, grants, and IAM bindings for Secrets-protecting keys.
  implementation_surface: Cloud KMS or HSM key policies, grants, IAM roles, and service-account bindings used by the Kubernetes control plane or managed encryption service.
