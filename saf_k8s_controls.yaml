- control_id: SAF-K8S-0703-014
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.3'
  control_seq: '014'
  control_title: EDoS spending guardrails and autoscaling limits for AI resources
  control_statement: Organizations must implement Economic Denial of Sustainability (EDoS) controls for cloud-hosted AI infrastructure, including enforced auto-scaling maximum limits, cloud spending guardrails, and automated responses that prevent runaway GPU and compute spend from malicious or misconfigured workloads.
  objective: Prevent uncontrolled cloud spending and resource amplification from AI workload auto-scaling by enforcing explicit economic guardrails on GPU and cloud resource consumption.
  rationale: Cloud-hosted AI systems can turn abusive or faulty workloads into rapid economic loss through autoscaling and GPU allocation. Explicit spend ceilings, scaling limits, and automated enforcement reduce the financial blast radius of denial-of-wallet and resource amplification attacks before they exhaust budgets or impair other workloads.
  scope: Applies to cloud-hosted Kubernetes clusters with auto-scaling enabled for AI workloads. Covers cloud spending guardrails, auto-scaling limits, queue and quota reactions tied to spend controls, and enforcement workflows for GPU-backed AI infrastructure.
  primary_enforcement_point: Cloud auto-scaling maximum limits and spending guardrails with automatic enforcement.
  implementation_surface: Cloud provider spending alerts with automatic enforcement, scale-down or job-suspension triggers, namespace quota reductions tied to budget policy, autoscaling caps for GPU node groups, and runbooks for denial-of-wallet containment.
  owner_primary: SRE
  owner_supporting: Platform Engineering; Security Engineering; FinOps
  baseline_or_ai_specific: ai-specific
