  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.1'
  control_seq: '036'
  control_title: Centralized AI workload log collection and routing
  control_statement: Organizations must collect and route AI workload logs, including training job logs, inference service operational logs, and pipeline execution logs, into the enterprise logging platform so investigators and operators have centralized visibility into AI workload activity.
  objective: Provide unified visibility into AI workload activity by collecting AI-specific operational log streams into the enterprise logging platform.
  rationale: AI workloads emit operational logs that are not fully captured by standard cluster logging. Without centralized collection and routing, investigators cannot reconstruct training failures, inference anomalies, or pipeline manipulation events across AI workloads.
  scope: Applies to all AI/ML workloads running on Kubernetes, including training jobs, inference services, and ML pipeline controllers. Covers centralized collection and routing of AI workload logs into the enterprise logging platform. Excludes context-label segregation requirements and content-redaction logic applied before storage.
  primary_enforcement_point: Log pipeline routing rules and centralized logging platform ingestion configuration.
  implementation_surface: Log pipeline collection rules for training, inference, and pipeline controllers; cloud logging service routing for AI workload logs; and centralized logging platform indexes or views that ingest AI workload log streams.
