- control_id: SAF-K8S-0902-004
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.2'
  control_seq: '004'
  control_title: Multi-model serving isolation and encryption
  control_statement: Multi-model serving environments must enforce model mesh isolation with per-model memory boundaries, shared-memory protections, per-model resource accounting, and end-to-end TLS encryption for all inference traffic including internal service-to-service model calls.
  objective: Prevent cross-model data leakage and resource interference in shared serving infrastructure and protect inference data confidentiality across all communication paths.
  rationale: Multi-model serving platforms co-locate multiple models within shared infrastructure to optimize GPU utilization. Without memory isolation, one model's process can read another model's weights or inference data from shared memory. Without per-model resource accounting, a single model can consume all available GPU memory and starve co-located models. Without end-to-end TLS, inference traffic between services is exposed to interception.
  scope: Applies to all multi-model serving deployments using model mesh, ModelMesh Serving, or equivalent multi-model hosting on Kubernetes. Covers shared-memory configurations, GPU memory allocation, resource limit enforcement, and TLS configuration for both external and internal inference traffic. Single-model deployments are in scope only for TLS requirements.
  primary_enforcement_point: Model mesh serving configuration, pod resource limits and GPU memory allocation, service mesh or sidecar proxy TLS configuration, and Kubernetes NetworkPolicy resources.
  implementation_surface: Model mesh serving configuration (KServe ModelMesh, Triton multi-model mode), MIG partitioning and vGPU configuration for GPU memory isolation between models, /dev/shm size limits and shared memory scoping, per-model resource limit settings, service mesh mTLS configuration (Istio, Linkerd) for internal model-to-model calls, TLS termination at inference pods, Kubernetes NetworkPolicy for multi-model serving traffic, and per-model GPU utilization and memory monitoring.
  owner_primary: ML Platform Engineering
  owner_supporting: Network Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
