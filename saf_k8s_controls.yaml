- control_id: SAF-K8S-0701-009
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.1'
  control_seq: 009
  control_title: Immutable storage protection for training data and model artifacts
  control_statement: Training data and model artifacts stored in Kubernetes-native or attached storage must be protected by immutability controls that prevent silent modification, overwrite, or retroactive tampering.
  objective: Protect high-value training data and model artifacts against unauthorized or accidental modification by enforcing immutable storage controls.
  rationale: Version identifiers alone do not stop an attacker or operator from altering stored datasets or model artifacts. Immutable storage, retention locks, and tamper-evident controls prevent silent replacement of training inputs or model outputs and preserve trustworthy investigation and recovery points.
  scope: Applies to persistent storage containing training datasets, model checkpoints, model weights, feature store snapshots, and retained pipeline-stage snapshots in production and pre-production clusters.
  primary_enforcement_point: Storage platform controls enforcing immutable snapshots, object lock, retention lock, or equivalent write-protection on stored AI data and artifacts.
  implementation_surface: Volume snapshot protection, object storage immutability settings, retention policies, checkpoint integrity verification, and storage controls preventing overwrite or retroactive modification.
  owner_primary: ML Engineering
  owner_supporting: Platform Engineering; Data Governance; Security Engineering
  baseline_or_ai_specific: ai-specific
