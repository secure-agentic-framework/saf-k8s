  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.1'
  control_seq: '043'
  control_title: Regulatory audit log immutability and deletion prevention before retention expiry
  control_statement: Organizations subject to regulatory retention requirements must enforce immutable or WORM-compliant controls that prevent ordinary deletion of regulatory audit logs before the configured retention period expires.
  objective: Prevent premature deletion of regulatory audit logs before required retention periods expire by enforcing immutable or WORM-compliant storage controls.
  rationale: Configured retention periods can still be bypassed if ordinary deletion, truncation, or alteration is possible before expiry. Regulatory retention enforcement therefore requires distinct immutability or WORM mechanisms that actually prevent early removal of required audit evidence.
  scope: Applies to audit log storage systems receiving Kubernetes and AI workload audit data subject to regulatory retention requirements. Covers retention locks, immutable storage settings, and WORM-compliant deletion prevention controls. Excludes period selection and automated under-configuration scanning.
  primary_enforcement_point: Immutable retention enforcement and deletion-prevention controls on audit log storage.
  implementation_surface: Object storage retention lock configuration, WORM-compliant storage settings, immutable storage controls, and enforcement settings that block ordinary deletion before required retention periods expire.
