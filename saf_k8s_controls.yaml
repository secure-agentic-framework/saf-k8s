  control_title: Model access and training provenance forensic preservation for Kubernetes AI incidents
  control_statement: Organizations must extend forensic evidence collection for Kubernetes incidents to preserve model access audit trails and training data, pipeline, or provenance records needed to reconstruct AI workload compromise or misuse.
  objective: Preserve AI model-access and training-provenance evidence that would otherwise be lost during Kubernetes incident response so investigators can determine whether models, training runs, or data lineage were impacted.
