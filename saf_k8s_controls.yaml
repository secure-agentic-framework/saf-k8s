- control_id: SAF-K8S-0907-007
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.7'
  control_seq: '007'
  control_title: Model deployment authorization and namespace-scoped release control
  control_statement: Model download and deployment operations must be authorized so that only approved principals can pull specific models and deploy them into authorized namespaces after required promotion and policy checks have passed.
  objective: Control which principals can release specific models into specific Kubernetes namespaces.
  rationale: Without model deployment authorization, any principal with broad namespace access can deploy unapproved, untested, or malicious models into serving environments. Namespace-scoped release controls reduce the blast radius of compromised identities and enforce promotion-gate integrity before model rollout.
  scope: Applies to model download and deployment workflows for Kubernetes AI serving environments. Covers registry pull authorization as consumed by deployment workflows, admission control, and namespace-scoped deployment authorization. Excludes direct dataset access controls for training data storage.
  primary_enforcement_point: Admission control and deployment pipeline policies governing model pull, release approval, and namespace-scoped deployment authorization.
  implementation_surface: Model deployment authorization policies showing per-principal and per-namespace release controls, admission checks verifying required promotion state before deployment, and namespace-scoped deployment restrictions for serving resources.
  owner_primary: ML Platform Engineering
  owner_supporting: Data Engineering; Security Engineering; Platform Engineering
