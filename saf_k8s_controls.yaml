- control_id: SAF-K8S-0606-020
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.6'
  control_seq: '020'
  control_title: Helm values override restriction and dependency integrity governance
  control_statement: Helm chart deployments must restrict override of security-critical values, pin and verify chart dependencies with integrity metadata, and enforce trusted repository or mirror governance for dependency retrieval and chart consumption.
  objective: Prevent security regression through unsafe values overrides and unpinned or silently substituted Helm dependencies.
  rationale: Even when a chart is authentic, unsafe values injection can disable security settings or redirect image sources, and unpinned dependencies allow malicious or unexpected sub-chart substitution. Dependency locking, integrity verification, and override governance are independently auditable obligations separate from chart provenance validation.
  scope: Applies to all Helm-based deployment workflows in staging and production Kubernetes clusters, including internal charts, mirrored third-party charts, and AI platform dependency trees.
  primary_enforcement_point: Chart dependency resolution, values schema enforcement, and repository / mirror governance in CI/CD and GitOps.
  implementation_surface: Chart.lock files with pinned dependencies and digests, dependency verification steps, values schema or policy controls blocking security-critical overrides, and trusted repository or mirror configuration for approved dependency retrieval.
  owner_primary: DevSecOps / Release Engineering
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
