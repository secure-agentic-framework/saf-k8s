- control_id: SAF-K8S-0903-008
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.3'
  control_seq: 008
  control_title: Budget-aware inference autoscaling suppression and degraded-service fallback
  control_statement: GPU-aware autoscaling for inference workloads must integrate budget or spend thresholds that suppress further scale-up and invoke bounded degraded-service behavior when projected inference cost exceeds approved limits.
  objective: Prevent inference denial-of-wallet by linking autoscaling decisions to approved budget thresholds and controlled degraded-service responses.
  rationale: Replica ceilings alone do not prevent economically abusive scale-out if the allowed ceiling itself is financially unsafe. Budget-aware suppression provides a second safety layer that disables additional scale-up or shifts service to bounded fallback behavior when spending thresholds are crossed, reducing the blast radius of sustained adversarial demand.
  scope: Applies to autoscaled inference deployments on Kubernetes that use cloud GPU capacity or other billable elastic accelerators. Covers budget-threshold integration, autoscaler suppression logic, and bounded degraded-service responses such as request throttling or queueing. Excludes general team or namespace spend governance, which remains on existing GPU budget controls.
  primary_enforcement_point: Autoscaler budget integration, spend policy engine, and degraded-service decision logic in the inference path.
  implementation_surface: Budget-policy outputs linked to autoscaler behavior, cloud spend or projected-cost thresholds that disable further scale-out, and degraded-service automation such as bounded queueing, throttling, or HTTP 429 responses when cost limits are reached.
