- control_id: SAF-K8S-0606-024
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.6'
  control_seq: '024'
  control_title: Policy-as-code and runtime configuration integrity governance
  control_statement: Runtime settings and policy-as-code definitions must be stored in integrity-protected configuration code repositories, with authorized modification controls preventing unauthorized changes to network policies, RBAC, pod security, admission rules, and other runtime governance settings.
  objective: Ensure security-critical runtime configuration remains tamper-evident, reviewable, and protected from unauthorized modification.
  rationale: Even when infrastructure templates are scanned, attackers can still weaken the runtime environment by changing policy-as-code definitions or runtime governance settings if those repositories lack integrity protection. Protecting policy code and runtime configuration is therefore independently auditable from IaC scanning.
  scope: Applies to policy-as-code and runtime configuration repositories used to define Kubernetes security settings in staging and production environments, including RBAC, network policy, admission policy, and pod security definitions.
  primary_enforcement_point: Integrity controls on policy-as-code repositories and runtime configuration sources.
  implementation_surface: Integrity-protected configuration code repositories, signed or otherwise verified policy changes, protected change workflows for runtime settings, and auditability for modifications to policy-as-code and security configuration definitions.
