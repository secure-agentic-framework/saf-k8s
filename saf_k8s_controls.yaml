- control_id: SAF-K8S-0602-001
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.2'
  control_seq: '001'
  control_title: Sigstore/cosign keyless signing and Rekor transparency logging
  control_statement: All container images promoted to production must be signed using Sigstore/cosign keyless signing with identity tokens issued by Fulcio, and all signatures must be recorded in the Rekor transparency log. Verification workflows must validate both the signature and the transparency log entry before image deployment.
  objective: Establish cryptographic proof of image provenance and integrity using keyless signing infrastructure, enabling auditable verification without long-lived signing key management.
  rationale: Without cryptographic signatures, there is no mechanism to verify that a container image was produced by an authorized build pipeline and has not been tampered with in transit or at rest. Keyless signing via Fulcio eliminates the operational burden and risk of long-lived signing keys, while Rekor transparency log entries provide an immutable audit trail that enables detection of unauthorized signing events.
  scope: Applies to all container images destined for production and staging clusters. Includes model-serving images, operator images, and sidecar images. Development-only images in isolated namespaces may be exempted with documented approval.
  primary_enforcement_point: CI/CD pipeline post-build signing step and admission controller signature verification at deployment time.
  implementation_surface: Sigstore/cosign CLI and CI/CD pipeline integration (cosign sign, cosign verify), Fulcio short-lived signing certificate issuance via OIDC identity tokens (GitHub Actions, GitLab CI, organizational IdP), Rekor transparency log entries and inclusion proofs, Sigstore policy-controller for Kubernetes admission, cosign-installer GitHub Action, and OIDC subject/issuer verification configuration in admission policies.
