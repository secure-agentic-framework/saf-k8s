- control_id: SAF-K8S-0907-004
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.7'
  control_seq: '004'
  control_title: Feature store access boundary enforcement and serving authentication
  control_statement: Feature stores must enforce authorization on feature definitions and feature views, maintain distinct access policies for online and offline stores, and authenticate feature serving requests so that only approved workloads and principals can discover or retrieve feature data.
  objective: Protect feature stores from unauthorized discovery and access by enforcing feature view authorization, online and offline store separation, and authenticated serving paths.
  rationale: Feature stores centralize reusable features for many models and teams. Without strong access boundaries and serving authentication, unauthorized principals can enumerate schemas, query sensitive feature views, or pivot from real-time serving access into broader historical feature data.
  scope: Applies to Kubernetes-hosted and managed feature store deployments, including Feast, Tecton, Vertex Feature Store, and equivalent platforms. Covers feature definition authorization, online and offline access separation, and authenticated feature serving requests. Excludes training-data privacy handling and leakage validation controls implemented inside preprocessing jobs.
  primary_enforcement_point: Feature store RBAC and authorization policies, online and offline store separation controls, and feature serving authentication settings.
  implementation_surface: Feature store RBAC on feature definitions and views, distinct policies for online and offline stores, workload identity or service-account authentication for serving requests, and tenant-scoped access boundaries for shared feature stores.
  owner_primary: Data Engineering
  owner_supporting: ML Platform Engineering; Security Engineering; Privacy Engineering
  baseline_or_ai_specific: ai-specific
