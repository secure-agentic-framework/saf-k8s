- control_id: SAF-K8S-0905-039
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: 039
  control_title: Model registry access review and stale-permission remediation
  control_statement: Organizations must perform periodic reviews of model registry access for human, service, and workload identities to identify excessive, stale, or mis-scoped permissions and must remediate identified entitlement issues within a defined governance process.
  objective: Reduce lingering or excessive registry privileges by requiring periodic entitlement review and remediation for model registry access.
  rationale: Even when registry RBAC is designed correctly at initial provisioning, privileges drift over time as projects change, workloads are retired, and emergency access accumulates. Periodic access review and timely remediation are required to keep registry entitlements aligned with current operational need.
  scope: Applies to all model registry deployments on Kubernetes, including Harbor, MLflow Model Registry, and on-premises Hugging Face Hub instances, wherever human or machine identities retain standing access to model repositories.
  primary_enforcement_point: Periodic registry entitlement review and remediation workflow.
  implementation_surface: Registry access review records, identity and repository entitlement inventories, stale-permission removal workflows, and governance procedures for remediation of excessive access.
  owner_primary: ML Platform Engineering
  owner_supporting: Security Engineering; Platform Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
