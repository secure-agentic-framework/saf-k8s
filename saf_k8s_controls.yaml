- control_id: SAF-K8S-0104-017
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.4'
  control_seq: '017'
  control_title: CIS Benchmark exception approval and re-review governance
  control_statement: Any accepted exceptions to failing CIS Kubernetes Benchmark checks must be formally approved by a risk owner, documented with justification and compensating controls, and re-reviewed on a defined schedule so that waived benchmark findings remain explicitly governed risk decisions.
  objective: Ensure waived benchmark findings are governed as explicit risk acceptances with approval, justification, compensating controls, and scheduled re-review.
  rationale: Security teams often accumulate informal waivers that are never re-examined. This control isolates exception governance so organizations can independently prove that accepted benchmark gaps remain documented, approved, and periodically revalidated.
  scope: Applies to all production clusters and to any CIS Benchmark findings accepted as exceptions rather than remediated immediately.
  primary_enforcement_point: Risk Acceptance Governance
  implementation_surface: GRC exception approval workflow, risk-owner attestations, compensating control records, and scheduled re-review process for benchmark exceptions.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Governance Risk and Compliance
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
