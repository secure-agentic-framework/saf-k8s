- control_id: SAF-K8S-0801-010
  domain_code: D08
  domain_name: GPU, Accelerator, and Confidential Computing
  knowledge_area: '8.1'
  control_seq: '010'
  control_title: Admission validation of authorized GPU resource requests
  control_statement: Admission control policies must validate GPU resource requests against authorized workload scope, namespace quotas, and approved accelerator profiles to prevent unauthorized or excessive GPU allocation.
  objective: Ensure only authorized workloads receive GPU resources and that requested accelerator quantities or profiles remain within approved limits.
  rationale: Without admission validation, workloads can request accelerators beyond their authorization, manipulate placement, or bypass intended resource governance. Policy-driven request validation prevents unauthorized consumption and reduces opportunities for adversarial co-location or resource abuse.
  scope: Applies to all Kubernetes clusters that schedule GPU workloads, including managed services where accelerator request validation is enforced through admission controls or equivalent policy gates.
  primary_enforcement_point: Admission policies validating GPU resource requests before scheduling.
  implementation_surface: OPA Gatekeeper, Kyverno, or equivalent admission controls validating GPU counts, MIG profiles, workload authorization, and namespace-level accelerator quotas.
