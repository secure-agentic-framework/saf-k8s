- control_id: SAF-K8S-1001-004
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.1'
  control_seq: '004'
  control_title: Audit volume management for AI workloads
  control_statement: Organizations must manage audit event volume for high-throughput AI workloads through selective audit policy design (tiered levels and omitStages to reduce low-value events at the source), audit backend tuning (batching, throttling, buffer sizing, and capacity planning), and continuous monitoring for event drops or backpressure, ensuring that security-critical AI events remain captured at full fidelity while the audit subsystem operates within capacity.
  objective: Maintain audit system availability and completeness under the elevated API call volumes generated by AI training jobs and high-frequency inference workloads.
  rationale: AI workloads, particularly distributed training jobs and high-throughput inference services, can generate API call volumes that overwhelm the Kubernetes audit subsystem, causing dropped audit records, increased API server latency, or audit backend failures. The Kubernetes audit policy model controls volume through level selection (None, Metadata, Request, RequestResponse) and omitStages, not through rate-limiting rules. Backend capacity is managed through webhook batching parameters (--audit-webhook-batch-max-size, --audit-webhook-batch-max-wait), log file rotation, and backend sizing. Without deliberate policy design and backend tuning, organizations face degraded cluster performance or audit gaps that conceal malicious activity.
  scope: Applies to Kubernetes clusters running AI workloads that generate sustained high-volume API traffic, including distributed training orchestrators, batch inference services, and ML pipeline controllers. Audit policy and backend configuration must be reviewed when onboarding new high-throughput workloads.
  primary_enforcement_point: API server audit policy level and stage configuration, audit webhook batching and throttle parameters, audit backend capacity planning, and audit volume monitoring alerts.
  implementation_surface: Kube-apiserver audit policy level and stage configuration (tiered None/Metadata/Request/RequestResponse levels, omitStages directives), user and service account audit exclusions (system:serviceaccount:kube-system:*), audit webhook batching parameters (--audit-webhook-batch-max-size, --audit-webhook-batch-max-wait, --audit-webhook-batch-buffer-size), audit log rotation flags (--audit-log-maxsize, --audit-log-maxbackup, --audit-log-maxage), audit backend capacity planning and sizing, separate audit sinks via log forwarders (Fluent Bit, Vector) for routing high-volume events to dedicated backends, and Prometheus monitoring of apiserver_audit_event_total, apiserver_audit_error_total, and apiserver_audit_requests_rejected_total metrics with alerting on dropped events and backpressure conditions.
  owner_primary: Security Operations
  owner_supporting: Platform Engineering; AI/ML Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-1001-007
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.1'
  control_seq: '007'
  control_title: Supplemental application-level telemetry for AI workload events
  control_statement: Organizations must deploy supplemental application-level or runtime telemetry to capture AI workload events not visible to the Kubernetes API server, including model loading, GPU process activity, and inference request content.
  objective: Ensure that security-relevant AI workload events occurring below the API layer are captured through supplemental telemetry to support detection, investigation, and compliance requirements.
  rationale: The Kubernetes API server audit log captures API requests but does not observe in-process runtime events such as model loading inside an inference server, GPU memory operations, or inference request content. Without supplemental telemetry for these application-level events, organizations have no visibility into unauthorized model loading, GPU process hijacking, or inference abuse patterns.
  scope: Applies to all Kubernetes clusters hosting AI/ML workloads where application-level events are security-relevant. Covers inference serving frameworks, GPU runtime monitoring, and training job application logs. For managed Kubernetes services, this control applies to customer-deployed telemetry agents and application-level log forwarding.
  primary_enforcement_point: Supplemental telemetry pipeline configuration and application-level logging configuration for AI workload pods.
  implementation_surface: Supplemental telemetry from inference servers (Triton, vLLM, TorchServe application logs and metrics), DCGM exporter GPU process telemetry, service mesh sidecar access logs for inference request content capture, and log forwarding configuration for application-level AI events.
  owner_primary: AI/ML Engineering
  owner_supporting: Security Operations; Platform Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-06'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-1001-008
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.1'
  control_seq: 008
  control_title: Permitted responses to audit findings
  control_statement: Organizations must define and document permitted responses to audit findings, establishing an approved decision framework for investigation, escalation, policy adjustment, and access control modification actions.
  objective: Ensure that responses to audit findings follow a consistent, approved decision framework rather than ad hoc actions.
  rationale: Without documented permitted responses, audit findings may be handled inconsistently, with some findings ignored, over-escalated, or addressed through unauthorized remediation actions. A defined response framework ensures that audit findings lead to appropriate, proportionate, and traceable corrective actions.
  scope: Applies to all audit findings generated from Kubernetes and AI workload audit data. Covers the response decision framework, escalation procedures, and permitted remediation actions.
  primary_enforcement_point: Audit findings response policy documentation and enforcement through workflow automation.
  implementation_surface: Documented permitted-response procedures for audit findings (investigation, escalation, policy adjustment, access control modification), ticketing system workflow templates for audit finding response, escalation matrix defining severity-based response requirements, and audit finding response tracking and closure verification.
  owner_primary: GRC/Compliance
  owner_supporting: Security Operations; Identity and Access Management
  baseline_or_ai_specific: baseline
  maturity: Practitioner
