- control_id: SAF-K8S-0101-003
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.1'
  control_seq: '003'
  control_title: Encryption at rest for Secrets and sensitive API resources
  control_statement: Production Kubernetes clusters must encrypt Secrets and other sensitive API resources at rest using EncryptionConfiguration with a supported encryption provider (KMS v2 preferred for new deployments), and must verify that targeted resources are stored as ciphertext in etcd.
  objective: Protect sensitive Kubernetes API resources from exposure through direct etcd access or etcd backup compromise by ensuring resource data is encrypted at rest using organization-approved cryptographic providers.
  rationale: Kubernetes Secrets are base64-encoded but not encrypted by default in etcd. An attacker or insider with access to etcd data, whether directly or through backups, can read all Secrets in plaintext. EncryptionConfiguration targets specific API resources for encryption before they are written to etcd. KMS v2 is preferred over KMS v1 (deprecated since Kubernetes 1.28, disabled by default since 1.29) because it uses a single DEK per API server, reducing KMS call volume and improving performance. This control addresses API-resource-level encryption; see SAF-K8S-0102-001 for etcd storage-layer and provider envelope encryption, and SAF-K8S-0403-001 for KMS key lifecycle management requirements.
  scope: Applies to all production clusters. Covers Kubernetes Secrets at minimum; organizations should evaluate extending EncryptionConfiguration to ConfigMaps, custom resources, and other API resources that contain sensitive data, or use the wildcard resource (`*.`) to encrypt all resources. For managed Kubernetes services, applies to enabling and verifying provider-managed API-resource encryption settings.
  primary_enforcement_point: API Server Configuration
  implementation_surface: EncryptionConfiguration resource applied to API server, encryption provider selection (KMS v2 preferred), and periodic verification that targeted resources are encrypted.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Key Management/Cryptography
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0101-005
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.1'
  control_seq: '005'
  control_title: Streaming connection idle timeout enforcement
  control_statement: Production Kubernetes clusters must configure the API server streaming connection idle timeout (--streaming-connection-idle-timeout) to automatically terminate idle streaming connections, including exec, attach, and port-forward sessions, within an organization-defined maximum idle period.
  objective: Limit the window during which abandoned or forgotten interactive sessions remain open to the cluster, reducing the risk of session hijacking, credential reuse, and unmonitored privileged access through stale exec or port-forward tunnels.
  rationale: Streaming connections (kubectl exec, attach, port-forward) create long-lived authenticated channels into pods. An idle session left open by an administrator or CI pipeline can be hijacked if the client workstation or runner is compromised. The default timeout of 4 hours is excessive for most operational patterns. A shorter idle timeout forces re-authentication and reduces the exposure window. This is especially important for AI clusters where exec sessions into training pods or notebook servers may carry access to model weights, training data, or GPU resources.
  scope: Applies to all production Kubernetes clusters. Covers the API server --streaming-connection-idle-timeout flag. For managed Kubernetes services, verify whether the provider exposes this setting or applies a default timeout, and document as a provider-managed control if not configurable.
  primary_enforcement_point: API Server Configuration
  implementation_surface: API server manifest or managed-service configuration (--streaming-connection-idle-timeout flag), audit log monitoring for long-lived streaming connections.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-01'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0101-007
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.1'
  control_seq: '007'
  control_title: API server request rate limiting and API Priority and Fairness
  control_statement: Production Kubernetes clusters must configure API Priority and Fairness (APF) to classify and throttle API requests, ensuring that control-plane management traffic (leader election, node heartbeats, critical controllers) is prioritized over bulk workload operations. Clusters must define flow schemas that prevent any single tenant, namespace, or controller from monopolizing API server capacity. Legacy --max-requests-inflight and --max-mutating-requests-inflight flags must be reviewed and set appropriately where APF is not fully enabled.
  objective: Protect API server availability and responsiveness under load by ensuring fair resource allocation across request categories and preventing denial-of-service from runaway controllers or high-volume workloads.
  rationale: AI/ML workloads frequently generate high API server load through large-scale job submissions, frequent status updates from distributed training coordinators, and batch pod creation. Without rate limiting and prioritization, these bursts can starve critical control-plane operations (leader election, node heartbeat processing), leading to cascading failures. API Priority and Fairness provides a structured mechanism to classify requests into priority levels and apply fair queuing, replacing the coarse-grained legacy rate limits.
  scope: Applies to all production Kubernetes clusters, especially those running large-scale AI/ML workloads. Covers APF FlowSchema and PriorityLevelConfiguration resources, as well as legacy rate limit flags. For managed Kubernetes services, verify provider APF defaults and configure customer-accessible flow schemas.
  primary_enforcement_point: API Server Configuration
  implementation_surface: FlowSchema and PriorityLevelConfiguration custom resources, API server flags (--max-requests-inflight, --max-mutating-requests-inflight, --enable-priority-and-fairness), monitoring dashboards for APF queue depth and rejection rates.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; AI/ML Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-06'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0101-008
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.1'
  control_seq: 008
  control_title: API server audit policy coverage and event detail
  control_statement: Production Kubernetes clusters must enable API server audit logging with an audit policy that captures at least Metadata-level events for all resource types, Request-level events for sensitive resources (including Secrets, ConfigMaps, RBAC bindings, and TokenReviews), and RequestResponse-level events for authentication and authorization decisions.
  objective: Ensure that API server activity is captured at the right audit verbosity so investigators can reconstruct sensitive requests and decision points without blind spots.
  rationale: Audit logging fails as a forensic control when the policy omits high-value resources or records them at insufficient detail. This control isolates the audit policy design obligation from backend storage so teams can separately verify event coverage and verbosity tuning.
  scope: Applies to all production Kubernetes clusters, including managed services where the customer controls or can verify API server audit policy settings.
  primary_enforcement_point: Audit Policy Definition
  implementation_surface: Audit policy YAML file, kube-apiserver audit policy configuration, and managed service audit policy settings.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Compliance
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-15'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0101-012
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.1'
  control_seq: '012'
  control_title: API server TLS enforcement
  control_statement: Production Kubernetes clusters must enforce TLS 1.2 or later with organization-approved cipher suites for all API server communication paths, including client-facing and back-end connections, using certificates issued by a trusted CA.
  objective: Protect API server communication paths from eavesdropping, tampering, and impersonation by enforcing strong TLS on every connection path.
  rationale: The API server communicates with external clients and internal cluster components across multiple connection paths. Weak or absent TLS exposes credentials, cluster state, and control-plane operations to network attackers and intermediary systems.
  scope: 'Applies to all API server communication paths: client to API server (front-end), API server to etcd, API server to kubelet, API server to aggregated API servers, and webhook backends. For managed Kubernetes services, applies to customer-configurable TLS settings and to verification that provider-managed connections meet organizational TLS requirements.'
  primary_enforcement_point: API Server Configuration
  implementation_surface: Cluster provisioning templates, PKI configuration, managed-service TLS settings, and periodic TLS configuration assessment.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; PKI/Certificate Management
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0101-013
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.1'
  control_seq: '013'
  control_title: API server certificate rotation and validation
  control_statement: Production Kubernetes clusters must implement automated rotation and validation of API server certificates before expiry so that expired, self-signed, or otherwise invalid certificates do not remain in use on any API server communication path.
  objective: Ensure API server certificate lifecycle controls prevent expiry, invalid trust chains, and stale certificates from weakening authenticated TLS protection.
  rationale: Expired or invalid certificates create opportunities for man-in-the-middle attacks, break trust validation, and undermine otherwise-correct TLS configuration. Rotation and validation are a distinct lifecycle obligation from basic TLS enablement.
  scope: 'Applies to all API server communication paths: client to API server (front-end), API server to etcd, API server to kubelet, API server to aggregated API servers, and webhook backends. For managed Kubernetes services, applies to customer-configurable TLS settings and to verification that provider-managed connections meet organizational TLS requirements.'
  primary_enforcement_point: Certificate Lifecycle Management
  implementation_surface: Certificate management infrastructure, renewal automation, managed-service certificate posture checks, and periodic certificate validity assessment.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; PKI/Certificate Management
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0101-014
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.1'
  control_seq: '014'
  control_title: API server authorization mode baseline enforcement
  control_statement: Production Kubernetes clusters must enable Node and RBAC authorization and must not use ABAC or AlwaysAllow in the API server authorization mode chain.
  objective: Ensure API server authorization decisions follow an auditable, least-privilege baseline that avoids legacy or unsafe authorization modes.
  rationale: Authorization modes determine how every API request is evaluated. Node and RBAC provide scoped, auditable authorization paths, while ABAC and AlwaysAllow create hard-to-review or outright unsafe authorization behavior that can grant unintended access.
  scope: Applies to all production clusters and managed Kubernetes services where authorization mode configuration is customer-visible or customer-selectable.
  primary_enforcement_point: API server authorization mode configuration and authorization review.
  implementation_surface: API server authorization mode flags or managed-service settings, removal of ABAC policy files, prohibition of AlwaysAllow, and review of Node plus RBAC authorization configuration.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Identity and Access Management
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0101-015
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.1'
  control_seq: '015'
  control_title: API server webhook authorizer endpoint trust controls
  control_statement: Webhook authorization may be enabled only for approved endpoints that are authenticated, integrity-protected, and reviewed as trusted external authorization dependencies.
  objective: Ensure any external webhook authorizer used by the API server is treated as a trusted security dependency with authenticated and protected transport.
  rationale: Webhook authorizers extend API access decisions to external services. If those endpoints are unauthenticated, weakly protected, or poorly governed, they create a hidden authorization bypass or integrity failure in the control plane.
  scope: Applies to production clusters that enable API server webhook authorization, including managed clusters where webhook authorization backends are customer-managed.
  primary_enforcement_point: Webhook authorizer endpoint configuration and trust validation.
  implementation_surface: Webhook authorizer configuration, endpoint TLS settings, authenticated backend identity, certificate validation, and periodic review of approved webhook authorization dependencies.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Identity and Access Management
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0101-016
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.1'
  control_seq: '016'
  control_title: API server audit log backend delivery and durable storage
  control_statement: Production Kubernetes clusters must direct API server audit logs to a durable backend, either a rotated log file or an approved webhook destination such as a SIEM, so audit events remain available and searchable after restart or backend disruption.
  objective: Ensure API server audit records are delivered to a durable storage or forwarding destination that preserves availability for investigation and monitoring.
  rationale: Audit event selection is ineffective if records are lost during restart, disk pressure, or forwarding failure. Durable local rotation or approved webhook delivery to downstream log infrastructure preserves the audit trail through control-plane failures and operational churn.
  scope: Applies to all production Kubernetes clusters, including managed services exposing customer-configurable audit export settings. Covers kube-apiserver audit log path, rotation settings, webhook export configuration, and downstream durable ingestion.
  primary_enforcement_point: API server audit backend configuration and downstream durable ingestion path.
  implementation_surface: API server manifest or managed-service audit export settings, log rotation configuration, webhook destination configuration, and SIEM or log platform ingestion controls.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Compliance
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0101-017
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.1'
  control_seq: '017'
  control_title: API server audit log retention enforcement
  control_statement: Production Kubernetes clusters must retain API server audit logs for at least the minimum period defined by organizational policy and enforce that retention in downstream log storage.
  objective: Ensure API server audit records remain available for the required investigation, compliance, and evidence window through enforced retention policies.
  rationale: Even when audit logs reach a durable backend, they lose security and compliance value if they are aged out too quickly or deleted before the required retention window. Explicit retention enforcement preserves the audit trail for investigation and regulatory evidence needs.
  scope: Applies to all production Kubernetes clusters and downstream storage systems that retain API server audit logs, including centralized logging platforms, SIEM repositories, and archival stores.
  primary_enforcement_point: Retention policy configuration on audit log storage and downstream aggregation systems.
  implementation_surface: Retention settings on rotated log files, centralized log aggregation or SIEM storage policies, archival retention controls, and validation that API server audit logs are preserved for the required minimum period.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Compliance
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
