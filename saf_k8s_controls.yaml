  domain_code: D08
  domain_name: GPU, Accelerator, and Confidential Computing
  knowledge_area: '8.2'
  control_seq: 008
  control_title: GPU kernel module signing and Secure Boot enforcement
  control_statement: GPU kernel module loading must be restricted to signed and approved modules through kernel module signing enforcement and Secure Boot validation on GPU nodes.
  objective: Prevent unauthorized GPU kernel modules from loading by enforcing signed-module trust at the kernel and boot chain boundary.
  rationale: Unauthorized kernel module loading can replace legitimate GPU drivers with backdoored versions that intercept GPU operations at the kernel level. Secure Boot and kernel module signing are distinct trust controls at the OS and boot boundary and should be audited independently from filesystem monitoring of driver binaries.
  scope: Applies to all Kubernetes GPU nodes running NVIDIA kernel modules. Covers Secure Boot status, kernel module signing enforcement, and validation that only approved GPU kernel modules can load.
  primary_enforcement_point: Kernel Module Trust Enforcement
  implementation_surface: Kernel module signing enforcement, Secure Boot configuration and attestation on GPU nodes, modinfo or module signature validation, and runtime detection of unauthorized module load events.
