- control_id: SAF-K8S-0601-020
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.1'
  control_seq: '020'
  control_title: Container registry authentication and role-based authorization
  control_statement: Container registries must enforce authenticated access for all push and pull operations and apply role-based authorization restricting write access to authorized CI/CD service accounts, release engineers, and other approved identities.
  objective: Prevent unauthorized image upload, overwrite, or pull operations by enforcing authenticated and role-scoped registry access.
  rationale: 'Authentication and authorization are independently auditable registry access controls: they ensure only approved human and non-human identities can push, pull, or administer registry content, preventing malicious image upload or tampering by unauthorized actors.'
  scope: Applies to all container registries used for storing production, staging, and development images, including model-serving image registries and OCI artifact stores. Public mirror registries must be proxied through an authenticated pull-through cache.
  primary_enforcement_point: Container registry authentication configuration and registry RBAC or IAM access policies.
  implementation_surface: Container registry authentication settings, registry RBAC policies, robot or service account identities, repository access scope controls, and cloud registry IAM bindings for push and pull operations.
