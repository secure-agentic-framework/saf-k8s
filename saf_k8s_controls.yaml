- control_id: SAF-K8S-0703-002
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.3'
  control_seq: '002'
  control_title: Pod Disruption Budgets for workload availability
  control_statement: Organizations must configure PodDisruptionBudget objects for all production workloads and stateful AI services to define minimum availability or maximum unavailable pod counts during voluntary disruptions such as node maintenance, cluster upgrades, and node pool scaling operations.
  objective: Maintain workload availability during planned disruptions by preventing the scheduler from evicting more pods than the service can tolerate at any given time.
  rationale: Without PodDisruptionBudgets, node drain operations during maintenance or upgrades can simultaneously evict all replicas of a service, causing a complete outage. For AI inference services, this means request failures and SLA violations. For stateful training workloads, disruption can cause checkpoint loss and wasted compute hours. PDBs give the scheduler a contract about minimum availability, ensuring graceful disruption handling.
  scope: Applies to all production deployments, statefulsets, and long-running AI workloads (inference services, model serving endpoints, distributed training jobs) across all Kubernetes clusters. Batch training jobs with checkpointing may have relaxed PDB settings. Development and ephemeral workloads may be excluded with documented justification.
  primary_enforcement_point: PodDisruptionBudget objects associated with deployments and statefulsets, validated by admission control policies that require PDBs for production-labeled workloads.
  implementation_surface: 'PodDisruptionBudget (policy/v1) objects with minAvailable and maxUnavailable specifications, label selectors targeting inference services and stateful training workloads, percentage-based minAvailable for autoscaled services, node drain and cluster upgrade coordination, and documentation of operational trade-offs for maxUnavailable: 0 on non-interruptible training jobs.'
  owner_primary: Platform Engineering
  owner_supporting: ML Engineering; SRE
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0703-005
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.3'
  control_seq: '005'
  control_title: AI workload resource exhaustion guardrails
  control_statement: Organizations must implement resource exhaustion guardrails for AI workloads including bounded queue management with backpressure handling, job-level memory ceilings, training data size limits, and per-job time caps to prevent resource exhaustion from cascading into service failures.
  objective: Ensure that AI infrastructure degrades gracefully under resource pressure through enforced resource boundaries at the job, queue, and namespace level.
  rationale: 'AI workloads are uniquely susceptible to resource exhaustion: a single training job can consume all available memory, an unbounded job queue can overwhelm the scheduler, and a training data pipeline with no size limits can fill all available storage. Bounded queues and backpressure handling prevent queue-based denial of service.'
  scope: Applies to all Kubernetes clusters hosting AI workloads. Covers job queue management (Kueue, Volcano), per-job resource limits, training data size limits, and time caps.
  primary_enforcement_point: Job queue configuration with bounded queue depths and backpressure policies, and per-job resource limit enforcement.
  implementation_surface: Kubernetes Job spec.activeDeadlineSeconds for training job time caps, LimitRange memory ceilings, admission policies validating PVC size against namespace allowances, and Kueue/Volcano bounded queue depth configuration with backpressure handling (retry-after signaling).
  owner_primary: Platform Engineering
  owner_supporting: SRE; AI/ML Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0703-007
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.3'
  control_seq: '007'
  control_title: Fair-share GPU queue management for multi-tenant clusters
  control_statement: Organizations must deploy queue management (Kueue, Volcano, or equivalent) for fair-share GPU scheduling across tenants in clusters shared by multiple teams submitting GPU workloads.
  objective: Enable fair and predictable access to GPU resources across teams by using queue-based scheduling that prevents resource hoarding and GPU starvation.
  rationale: Without queue management, GPU scheduling in multi-tenant clusters relies solely on Kubernetes native scheduling, which cannot enforce fair-share policies, gang scheduling for distributed training, or quota-aware queuing. This leads to GPU starvation for some teams and resource hoarding by others. Kueue and Volcano provide queue abstractions that enable fair-share scheduling, resource borrowing, and preemption policies that are not achievable with PriorityClass alone.
  scope: Applies to all Kubernetes clusters shared across multiple teams submitting GPU workloads. Single-tenant dedicated clusters may use simplified scheduling with documented justification. The queue management system must support fair-share scheduling, resource borrowing policies, and gang scheduling for distributed training jobs.
  primary_enforcement_point: Kueue or Volcano queue configuration with fair-share policies and borrowing limits for GPU resources.
  implementation_surface: Kueue ClusterQueues with borrowing limits and fair-share policies, Volcano queue management and gang scheduling configuration, resource flavor definitions for GPU types, and cohort-level fair-sharing policies across tenants.
  owner_primary: Platform Engineering
  owner_supporting: ML Engineering; FinOps
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-06'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0703-008
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.3'
  control_seq: 008
  control_title: Idle GPU detection and resource reclamation
  control_statement: Organizations must deploy idle GPU detection to identify and reclaim resources from abandoned training jobs, over-provisioned inference deployments, and unused GPU reservations.
  objective: Reclaim wasted GPU resources by detecting idle or abandoned GPU allocations and returning them to the available resource pool.
  rationale: Abandoned training jobs, over-provisioned inference endpoints, and reserved-but-unused GPUs can accumulate thousands of dollars in daily waste. Without automated idle detection, these resources remain allocated indefinitely until manual intervention occurs. Idle GPU detection monitors utilization metrics and flags resources below configurable thresholds for configurable time periods, enabling automated or assisted reclamation.
  scope: Applies to all Kubernetes clusters with GPU resources. Idle detection must monitor GPU utilization and flag resources below configurable thresholds for configurable time periods. Reclamation actions may include automated termination, scale-down, or notification to resource owners depending on workload criticality.
  primary_enforcement_point: Idle resource detection controllers using GPU utilization metrics (NVIDIA DCGM, Prometheus) with configurable thresholds and reclamation actions.
  implementation_surface: NVIDIA DCGM (Data Center GPU Manager) metrics exported to Prometheus for GPU utilization monitoring, idle GPU detection alerting rules with configurable utilization thresholds and time windows, CronJob-based auto-cleanup for idle GPU pods, and admission control policies requiring activeDeadlineSeconds on training Jobs.
