- control_id: SAF-K8S-0908-001
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.8'
  control_seq: '001'
  control_title: Oracle attack prevention
  control_statement: Inference serving infrastructure must implement rate limiting per principal, query pattern analysis, and anomaly detection to prevent oracle attacks including model extraction through systematic queries, model inversion to reconstruct training data, and membership inference to determine training set membership.
  objective: Detect and prevent systematic query-based attacks that extract model weights, reconstruct training data, or infer training set membership through infrastructure-level controls at the serving boundary.
  rationale: Oracle attacks exploit normal inference APIs to steal model intellectual property or compromise training data privacy. Model extraction duplicates the model through systematic querying, eliminating the victim's competitive advantage. Model inversion reconstructs sensitive training data from model outputs. Membership inference reveals whether specific individuals' data was used in training, creating privacy violations. Without rate limiting and behavioral analysis, these attacks are indistinguishable from legitimate usage.
  scope: Applies to all production inference endpoints on Kubernetes that serve models containing proprietary logic or trained on sensitive data. Covers per-principal rate limiting, query pattern monitoring, and anomaly detection at the API gateway and inference server layers. Excludes model-level robustness techniques covered by SAF-K8S-0908-004.
  primary_enforcement_point: API gateway rate limiting configuration, inference server query monitoring middleware, and security analytics platform anomaly detection rules.
  implementation_surface: API gateway rate limiting configuration (per-principal requests per minute, tokens per minute, compute cost per time window), tiered rate limits by authentication level, HTTP 429 response with Retry-After headers, query pattern analysis middleware detecting systematic feature-space sweeping and decision boundary probing, anomaly detection rules on query input distributions in the security analytics platform (SIEM), and correlated alerting combining rate limit violations with extraction-like query patterns.
  owner_primary: Security Engineering
  owner_supporting: ML Platform Engineering; API Platform Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0908-002
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.8'
  control_seq: '002'
  control_title: Inference API information exposure controls
  control_statement: Inference APIs must be designed to minimize information disclosure by restricting output confidence scores, controlling access to logit and probability distributions, preventing feature leakage, and obfuscating model architecture details at the serving boundary.
  objective: Reduce the information available to attackers through inference API responses, limiting the effectiveness of model extraction, inversion, and reverse engineering attacks.
  rationale: Verbose inference API responses that include confidence scores, full probability distributions, or logit values provide attackers with the precise information needed to execute efficient model extraction and inversion attacks. Feature leakage in responses reveals model internals. Exposed architecture details (layer counts, parameter sizes, model family) enable targeted adversarial attacks. Restricting this information significantly increases the cost and difficulty of attacks without degrading legitimate use.
  scope: Applies to all inference API response configurations on Kubernetes. Covers output field selection, confidence score precision, logit access controls, error message content, and API metadata that reveals model architecture. Excludes internal debugging endpoints that are network-isolated from external access.
  primary_enforcement_point: Inference API response serialization configuration, API gateway response transformation policies, and model serving endpoint configuration.
  implementation_surface: Inference API response serialization configuration (top-K only or argmax-only output, confidence score precision rounding), API gateway response transformation policies removing logit/probability distributions, model architecture metadata stripping from API responses, generic error message configuration with server-side-only detailed logging, response time jitter injection, separate internal and external inference API configurations, and API response audit tooling verifying information minimization.
  owner_primary: Security Engineering
  owner_supporting: ML Platform Engineering; API Platform Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0908-003
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.8'
  control_seq: '003'
  control_title: Model watermarking and fingerprinting
  control_statement: Production model serving infrastructure must integrate watermarking or fingerprinting mechanisms that embed verifiable markers in model outputs to enable detection of stolen or unauthorized copies of model outputs.
  objective: Enable detection and attribution of stolen model outputs by embedding imperceptible but verifiable markers that survive downstream use.
  rationale: Even with extraction prevention controls, determined adversaries may successfully copy model behavior through distillation or output scraping. Without watermarking or fingerprinting, organizations cannot prove that a competitor's model was derived from their proprietary model, limiting legal and contractual recourse. Output watermarks provide forensic evidence of model theft that persists in downstream applications.
  scope: Applies to production inference endpoints serving models with significant intellectual property value on Kubernetes. Covers watermark embedding at the serving layer, fingerprint verification tooling, and marker durability testing. Excludes internal-only models where theft attribution is not a concern.
  primary_enforcement_point: Inference server output postprocessing configuration and watermark embedding middleware deployed as part of the model serving pipeline.
  implementation_surface: Inference server output postprocessing configuration for watermark embedding (output watermarking for token sequence patterns in LLM output), model weight watermarking integrated into training pipelines, fingerprinting via adversarial example databases, radioactive data marking in training data pipelines, watermark verification key storage in Kubernetes Secrets or external secret stores, and external model output scanning and monitoring services for watermark detection on public platforms.
  owner_primary: Security Engineering
  owner_supporting: ML Platform Engineering; Legal
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0908-005
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.8'
  control_seq: '005'
  control_title: Model abuse logging and alerting
  control_statement: Inference platforms must log and alert on model abuse patterns including query volume anomalies, input distribution shifts, coordinated extraction campaigns, and evasion attack detection, and must monitor external sites and channels for leaked or stolen model outputs.
  objective: Detect ongoing model abuse campaigns and stolen model output distribution through comprehensive monitoring of inference traffic patterns and external exposure.
  rationale: Model extraction and evasion attacks unfold over time through patterns of queries that individually appear normal. Without behavioral logging and anomaly detection, these campaigns succeed before they are noticed. Without external monitoring, organizations discover model theft only when a competitor publicly deploys a cloned model. Input distribution shifts indicate either data drift or adversarial probing; without detection, both degrade model reliability and security posture.
  scope: Applies to all production inference endpoints on Kubernetes. Covers inference request logging, query pattern analysis, input distribution monitoring, and external monitoring for model output leakage. Includes evasion attack detection (adversarial inputs designed to cause misclassification). Excludes general application logging and infrastructure monitoring not specific to model abuse.
  primary_enforcement_point: Inference server access logging configuration, security analytics platform detection rules, and external threat intelligence and brand monitoring service integration.
  implementation_surface: Inference server access logging configuration (timestamp, principal identity, model ID, input metadata, output metadata, latency), SIEM integration for inference log correlation, anomaly detection rules for query volume anomalies (3x baseline), KL divergence and KS test for input distribution shift detection, coordinated extraction campaign detection across multiple principals, evasion attack correlation with adversarial detection (SAF-K8S-0903-001), external monitoring services for public model hosting platforms and dark web channels, and watermark-based theft attribution investigation procedures.
  owner_primary: Security Engineering
  owner_supporting: ML Platform Engineering; Security Operations
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0908-006
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.8'
  control_seq: '006'
  control_title: Secure aggregation for privacy-preserving model outputs
  control_statement: Inference endpoints must implement secure aggregation protocols for privacy-preserving model outputs when serving aggregate queries.
  objective: Prevent decomposition of aggregate query results into individual-level information through privacy-preserving aggregation protocols at the inference serving boundary.
  rationale: Without secure aggregation, aggregate queries can be decomposed to reveal individual-level information, enabling reconstruction of individual data points from batch inference responses. This control complements differential privacy and output perturbation (SAF-K8S-0908-004) by specifically protecting the aggregation pathway, ensuring that adversaries cannot reconstruct individual data points by analyzing aggregate query responses. See SAF-K8S-0908-001 for rate limiting controls that reduce the number of queries an adversary can issue.
  scope: Applies to inference endpoints on Kubernetes serving models trained on sensitive data where aggregate or batch query privacy guarantees are required. Covers secure aggregation configuration for federated and batch inference workflows. Excludes individual (non-aggregate) inference serving, which is addressed in SAF-K8S-0908-004.
  primary_enforcement_point: Secure aggregation service configuration and aggregate query routing middleware.
  implementation_surface: Secure aggregation service configuration for aggregate or federated query workflows, per-query aggregation parameter validation, batch size enforcement for privacy guarantees, and monitoring of aggregation pathway integrity.
  owner_primary: Security Engineering
  owner_supporting: ML Platform Engineering; Privacy Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-12'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0908-008
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.8'
  control_seq: 008
  control_title: Inference output perturbation and privacy-preserving response shaping
  control_statement: Inference endpoints must apply calibrated output perturbation or response shaping controls to reduce information leakage from model responses, including perturbation of confidence-bearing outputs and other response elements that would otherwise facilitate model extraction, inversion, or membership inference attacks.
  objective: Reduce exploitable information leakage from inference responses by shaping or perturbing what the endpoint returns to untrusted callers.
  rationale: 'Some inference privacy protections rely on response shaping rather than formal differential privacy accounting: limiting confidence disclosure, perturbing sensitive scores, and reducing high-fidelity output features that enable repeated extraction or inversion. These controls are distinct from privacy budget governance and must be implemented and validated at the response layer.'
  scope: Applies to inference endpoints on Kubernetes where model responses expose confidence scores, probabilities, rankings, or other detailed outputs that increase disclosure risk. Covers output perturbation configuration and utility-impact monitoring. Excludes formal differential privacy budget accounting and secure aggregation for aggregate queries.
  primary_enforcement_point: Inference server response transformation and output perturbation configuration.
  implementation_surface: Calibrated noise addition to confidence scores or probability distributions, response shaping rules that suppress or coarsen sensitive output features, LLM output-level perturbation settings where applicable, and monitoring of utility degradation caused by privacy-preserving response transformations.
  owner_primary: Security Engineering
  owner_supporting: ML Platform Engineering; Privacy Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-13'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0908-009
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.8'
  control_seq: 009
  control_title: Differential privacy parameter governance for inference endpoints
  control_statement: Inference endpoints serving models trained on sensitive data must configure differential privacy parameters with documented privacy guarantees so that epsilon, delta, and related calibration choices are approved, reviewable, and aligned to the intended privacy and utility bounds before responses are served.
  objective: Govern differential privacy parameter selection and formal privacy guarantees for sensitive inference endpoints.
  rationale: Differential privacy is only defensible when privacy parameters are explicitly selected, documented, and reviewed against the intended guarantees. Without parameter governance, teams can deploy arbitrary epsilon and delta values that overstate privacy claims or silently erode utility and protection.
  scope: Applies to Kubernetes-hosted inference endpoints serving models trained on sensitive data where formal differential privacy guarantees are required. Covers parameter configuration, guarantee documentation, and validation of the claimed privacy posture. Excludes cumulative privacy budget accounting and threshold enforcement over repeated access.
  primary_enforcement_point: Differential privacy parameter configuration and guarantee documentation for inference endpoints.
  implementation_surface: Differential privacy parameter settings per model or endpoint, documented epsilon and delta selections, guarantee review records, and privacy audit validation of the formal privacy claims attached to deployed endpoints.
  owner_primary: Security Engineering
  owner_supporting: ML Platform Engineering; Privacy Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
