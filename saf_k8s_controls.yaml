  knowledge_area: '8.2'
  control_seq: 009
  control_title: GPU driver binary path file integrity monitoring
  control_statement: GPU driver binary and shared library paths must be monitored with file integrity tools to detect unauthorized replacement, tampering, or drift from approved baselines.
  objective: Detect unauthorized replacement or tampering of GPU driver binaries and shared libraries on the filesystem before compromised driver code is used by workloads.
  rationale: Driver binary replacement on the filesystem can subvert GPU workloads even when kernel module trust controls are in place. File integrity monitoring is a distinct detection obligation because it validates the integrity of driver binary paths and shared libraries linked by workloads after installation.
  scope: Applies to all Kubernetes GPU nodes running NVIDIA driver shared libraries and binaries. Covers approved GPU driver binary paths, baseline establishment, and monitoring for unauthorized modification or replacement.
  primary_enforcement_point: Driver Binary Path Integrity Monitoring
  implementation_surface: File integrity monitoring tools on GPU driver binary paths and shared libraries, approved baseline capture for libnvidia paths, and alerting on unauthorized replacement or tampering.
