- control_id: SAF-K8S-0606-002
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.6'
  control_seq: '002'
  control_title: CI/CD build environment hardening
  control_statement: CI/CD build environments must use isolated, ephemeral build platforms (sandboxed CI runner pods or ephemeral build VMs) that are destroyed after each build. CI/CD runner pods in Kubernetes must enforce credential isolation, network restrictions, and ephemeral storage. Signing keys, cloud credentials, and sensitive environment variables must be injected at runtime from secret management systems and must not persist in build environments.
  objective: Prevent build environment compromise from propagating to production artifacts by ensuring builds execute in isolated, ephemeral environments with minimal credential exposure.
  rationale: Persistent build environments accumulate credentials, cached artifacts, and configuration that adversaries can exploit. A compromised build runner with access to signing keys can produce signed malicious images indistinguishable from legitimate ones. Shared or long-lived build environments enable lateral movement between build jobs. Runtime credential injection from secret management systems limits the window of credential exposure to the duration of each build.
  scope: Applies to all CI/CD build infrastructure, including self-hosted Kubernetes-based runners, cloud-managed build services, and dedicated build VMs. Covers credential management for signing keys, registry credentials, cloud provider tokens, and API keys used during builds.
  primary_enforcement_point: CI/CD platform configuration and Kubernetes pod security policies for runner pods.
  implementation_surface: 'Ephemeral CI runner pod configurations (Kubernetes-based GitHub Actions runners with ephemeral: true, GitLab Runner [[runners.kubernetes]] pod-per-build), Kubernetes NetworkPolicy restricting runner pod egress to dependency mirrors, registries, and secret stores, secret management system integration (HashiCorp Vault, cloud KMS) for runtime credential injection, and rootless container build tools (Kaniko, BuildKit rootless, Buildah) replacing Docker-in-Docker privileged builds.'
  owner_primary: DevSecOps / Release Engineering
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0606-007
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.6'
  control_seq: '007'
  control_title: CI/CD build activity monitoring
  control_statement: Real-time monitoring of CI/CD build server and runner activity must detect tampering, credential exfiltration attempts, and anomalous process execution. Monitoring agents must alert on credential file access, unexpected outbound network connections, and unauthorized process spawning within build environments.
  objective: Detect build environment compromise and credential theft in real time, providing a detective control layer that complements the preventive hardening of build environments.
  rationale: Preventive controls (ephemeral runners, credential isolation) reduce the attack surface but cannot eliminate all compromise vectors. Without monitoring, credential theft from build environments goes undetected until the stolen credentials are used in a downstream attack. Real-time detection enables rapid response to build infrastructure compromise before malicious artifacts are signed and promoted.
  scope: Applies to all CI/CD build infrastructure, including self-hosted Kubernetes-based runners, cloud-managed build services, and dedicated build VMs. Covers monitoring of process execution, network connections, and file access within build environments.
  primary_enforcement_point: Build environment monitoring agents and security information platform.
  implementation_surface: Build pod process execution monitoring agents (Falco, Tetragon) with rules for credential file access detection (/var/run/secrets/, ~/.docker/config.json, signing key paths), network connection monitoring with alerting on unexpected outbound connections from build pods, CI/CD server audit logging for pipeline configuration changes and credential access events, and SIEM integration for build environment security event correlation and alerting.
  owner_primary: Security Engineering
  owner_supporting: DevSecOps / Release Engineering; SRE / Operations
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-06'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0606-009
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.6'
  control_seq: 009
  control_title: SSDF v1.1 alignment for secure development practices
  control_statement: Development practices must align with NIST SSDF v1.1 (Secure Software Development Framework) task groups (Prepare the Organization, Protect the Software, Produce Well-Secured Software, Respond to Vulnerabilities) for secure development lifecycle requirements. Organizations must maintain documented SSDF task mappings and audit evidence demonstrating alignment.
  objective: Ensure secure development practices are systematic and auditable by aligning with the NIST SSDF v1.1 framework rather than relying on ad hoc practices.
  rationale: Without SSDF alignment, secure development practices are ad hoc and inconsistent across teams. SSDF v1.1 provides a structured framework that maps development activities to security outcomes, enabling organizations to identify gaps, demonstrate compliance to auditors, and progressively improve their development security posture. The framework is particularly relevant for organizations subject to federal supply chain security requirements.
  scope: Applies to all software development practices across the organization producing artifacts deployed to Kubernetes clusters. Covers all four SSDF task groups (PS, PW, PO, RV). Organizations not subject to federal requirements may use SSDF as a voluntary maturity benchmark.
  primary_enforcement_point: Development governance and compliance review processes.
  implementation_surface: SSDF v1.1 task mapping (PS - Prepare the Organization, PW - Protect the Software, PO - Produce Well-Secured Software, RV - Respond to Vulnerabilities) for secure development lifecycle audit evidence, organizational self-assessment against SSDF tasks, gap analysis and remediation tracking, and periodic compliance review documentation.
  owner_primary: Compliance / GRC
  owner_supporting: DevSecOps / Release Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-06'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0606-011
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.6'
  control_seq: '011'
  control_title: CI build-time security gate enforcement
  control_statement: CI pipelines must enforce mandatory build-time security gates including SAST, DAST where applicable, SCA scanning, secret scanning with push protection, and dependency review before artifact promotion. Pipelines must block artifacts that fail any mandatory gate unless an approved exception exists.
  objective: Prevent vulnerable code, leaked credentials, and unsafe dependencies from progressing through CI by enforcing automated build-time security gates and promotion blocking.
  rationale: Security defects and hardcoded secrets are cheapest and most reliably stopped before artifacts leave the build stage. Mandatory CI gates and enforced promotion blocking are a distinct obligation from freshness or repository posture checks, and they directly determine whether unsafe artifacts are allowed to move downstream.
  scope: Applies to all CI pipelines producing deployable artifacts for Kubernetes clusters. DAST is required for externally facing services; SAST, SCA, secret scanning, and dependency review are required for all pipelines.
  primary_enforcement_point: CI Build Gate
  implementation_surface: CI pipeline gate configuration, SCM push-protection settings, dependency review bots, and artifact promotion policies.
  owner_primary: DevSecOps / Release Engineering
  owner_supporting: Security Engineering; Development Teams
  baseline_or_ai_specific: baseline
  maturity: Practitioner
