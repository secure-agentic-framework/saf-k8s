  date_modified: '2026-03-17'
- control_id: SAF-K8S-0702-020
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.2'
  control_seq: '020'
  control_title: Namespace ResourceQuota enforcement for GPU and AI workloads
  control_statement: Namespace ResourceQuota objects SHALL enforce approved per-namespace limits for GPU, CPU, memory, storage, and relevant object counts for AI and accelerator-consuming workloads so that no tenant or workload can exceed its authorized share of cluster resources.
  objective: Prevent any single namespace from exceeding its approved share of GPU and related cluster resources by enforcing namespace-level ResourceQuota boundaries for AI workloads.
  rationale: GPU and AI workload capacity is scarce, expensive, and easy to exhaust. Namespace ResourceQuota enforcement prevents tenant monopolization, quota bypass through uncontrolled namespace growth, and cross-tenant disruption caused by runaway training or inference workloads.
  scope: Applies to AI or accelerator-consuming namespaces where GPU, CPU, memory, storage, and relevant object-count ceilings must be enforced through ResourceQuota. LimitRange defaults remain a separate companion control.
  primary_enforcement_point: Namespace ResourceQuota objects enforced by the Kubernetes resource quota admission controller and validated through periodic configuration review.
  implementation_surface: ResourceQuota objects specifying requests and limits for CPU, memory, storage, pods, persistent volume claims, services, and GPU or MIG resources; scope selectors where approved; and namespace configuration review evidence.
  owner_primary: Platform Engineering
  owner_supporting: ML Engineering; FinOps
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0702-021
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.2'
  control_seq: '021'
  control_title: Namespace quota utilization monitoring and exhaustion alerting for GPU and AI workloads
  control_statement: Quota utilization for GPU and AI workload namespaces SHALL be continuously monitored, and alerts SHALL be generated before namespace resource quotas are exhausted so operators can prevent tenant disruption, runaway consumption, or billing anomalies.
  objective: Detect approaching namespace quota exhaustion for GPU and AI workloads before tenant capacity limits cause service disruption, scheduling failure, or unbounded spend.
  rationale: Namespace quotas only reduce risk if operators can see when tenants are approaching exhaustion. Utilization monitoring and lead-time alerting prevent silent saturation, enable capacity planning, and surface runaway usage before it impacts shared cluster operations or cloud cost.
  scope: Applies to AI or accelerator-consuming namespaces where quota utilization, saturation trends, or exhaustion risk must be monitored and alerted on for GPU and related constrained resources.
  primary_enforcement_point: Quota telemetry, dashboards, and alerting integrated with cluster monitoring and operational review processes.
  implementation_surface: Quota utilization reports, dashboards, alert thresholds, and operational evidence showing approaching exhaustion is detected and acted on before namespace quotas are exceeded.
  owner_primary: Platform Engineering
  owner_supporting: ML Engineering; FinOps
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
