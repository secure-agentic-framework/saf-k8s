- control_id: SAF-K8S-0702-029
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.2'
  control_seq: 029
  control_title: Classification-driven storage and network restriction enforcement
  control_statement: Organizations must use data classification labels to enforce storage access restrictions and network policies appropriate to the sensitivity of the data being processed so sensitive pipeline data cannot move or persist outside approved boundaries.
  objective: Ensure data classification metadata drives storage and network restrictions for sensitive pipeline data.
  rationale: Sensitive data controls fail when labels are not translated into concrete storage and network restrictions. Storage and network enforcement based on classification metadata is independently auditable and distinct from admission validation of labeled resources.
  scope: Applies to all data pipeline workloads where classification metadata determines how sensitive data may be stored, accessed, or moved across namespaces, services, or external destinations.
  primary_enforcement_point: Storage access policy and network policy decisions tied to data classification labels.
  implementation_surface: Storage access controls aligned to classification levels, egress or cross-namespace network restrictions enforced according to data sensitivity labels, and verification that high-sensitivity data flows remain within approved boundaries.
