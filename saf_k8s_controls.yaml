- control_id: SAF-K8S-0905-041
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: '041'
  control_title: Model registry sensitive-operation alerting and anomalous activity review
  control_statement: Organizations must alert on sensitive model registry operations and perform operational review of anomalous publish, pull, deletion, permission-change, and administrative activity to support investigation and response.
  objective: Provide accountable detection and triage for suspicious registry behavior by reviewing sensitive registry operations and anomalous activity.
  rationale: Generating and forwarding audit events is insufficient if no one monitors them. Alerting and operational review are required to detect model disclosure, tampering, or abuse patterns in time to investigate and respond.
  scope: Applies to all model registry deployments on Kubernetes, including Harbor, MLflow Model Registry, and on-premises Hugging Face Hub instances. Covers alerting and operational review of suspicious registry activity after audit events have been captured and forwarded.
  primary_enforcement_point: Centralized monitoring review workflow and alert handling for sensitive registry operations.
  implementation_surface: Alerts for sensitive registry actions, periodic review of anomalous registry operations, analyst investigation workflow, and review records for suspicious publish, pull, deletion, and permission-change activity.
