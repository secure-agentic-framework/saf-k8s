- control_id: SAF-K8S-0102-022
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.2'
  control_seq: '022'
  control_title: etcd backup repository least-privilege access restriction
  control_statement: Production Kubernetes clusters must restrict read and write access to etcd backup repositories and restore media to dedicated backup automation identities and explicitly approved operational roles only.
  objective: Ensure etcd backups do not become a broadly accessible copy of full cluster state by enforcing least-privilege access to backup repositories and restore media.
  rationale: Even when backups are encrypted, excessive repository access expands the attack surface and weakens separation of duties. Restricting routine access to dedicated backup automation identities and approved operational roles reduces the risk that backup repositories become a secondary path to full cluster-state exposure.
  scope: Applies to all production clusters. Covers object storage policies, IAM roles, and restore media handling controls for etcd backup repositories.
  primary_enforcement_point: Backup repository authorization
  implementation_surface: Backup storage IAM policies, bucket or repository access policies, dedicated backup automation identities, and restore media handling restrictions.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Backup and Recovery Operations
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
