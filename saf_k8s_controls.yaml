- control_id: SAF-K8S-0404-009
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.4'
  control_seq: 009
  control_title: Compromised certificate revocation and re-issuance execution
  control_statement: Organizations must maintain and exercise incident response procedures for revoking compromised certificates and re-issuing new certificates and key pairs after private key compromise.
  objective: Ensure compromised certificates are invalidated and replaced rapidly after private key compromise.
  rationale: Revocation and re-issuance are independently auditable from the validation that services have fully recovered on the new credentials. This control isolates the credential replacement action so teams can verify that compromised certificates and key pairs are actually retired and replaced.
  scope: Applies to compromise scenarios affecting API server, etcd, kubelet, webhook, service mesh, and application certificates. Covers certificate revocation, issuance of new certificates and key pairs, and rollout of replacement credentials. Recovery validation remains governed by SAF-K8S-0404-010.
  primary_enforcement_point: Certificate compromise revocation and re-issuance workflow.
  implementation_surface: Documented certificate compromise playbooks, revocation procedures, issuance of new key pairs, and replacement certificate deployment workflows.
