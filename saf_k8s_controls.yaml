- control_id: SAF-K8S-0503-011
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.3'
  control_seq: '011'
  control_title: External traffic policy mode selection and tradeoff governance
  control_statement: Services exposed to external traffic must use externalTrafficPolicy settings appropriate for their security and availability requirements, and Local versus Cluster routing decisions must be documented with the associated tradeoffs.
  objective: Ensure external traffic routing mode is chosen deliberately per service with documented security and availability tradeoffs.
  rationale: Choosing Local versus Cluster externalTrafficPolicy affects availability and observability characteristics. Separating mode-selection governance from source IP preservation makes the routing decision independently auditable from the client identity handling requirement.
  scope: Applies to all Services of type LoadBalancer or NodePort in production clusters that receive external traffic. The choice between Local and Cluster externalTrafficPolicy must be documented per service with security and availability justification.
  primary_enforcement_point: Kubernetes Service externalTrafficPolicy mode governance.
  implementation_surface: Kubernetes Service spec externalTrafficPolicy field (Local vs. Cluster mode), pod topology and scheduling constraints for Local policy availability, and per-service documentation of traffic policy decisions with security and availability tradeoffs.
  owner_primary: Network Engineering
  owner_supporting: Application Development; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
