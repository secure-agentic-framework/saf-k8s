  date_modified: '2026-03-17'
- control_id: SAF-K8S-0402-023
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.2'
  control_seq: '023'
  control_title: Long-lived workload token exception governance and retirement tracking
  control_statement: Organizations must inventory any remaining legacy, manually created, or extended-lifetime workload service account tokens, drive that population toward zero, and require documented, re-reviewed exceptions for any non-expiring or extended-lifetime token use that remains.
  objective: Prevent insecure long-lived workload token use from becoming a hidden persistent exception by forcing explicit tracking and governance until it is eliminated.
  rationale: Time-bounded projected tokens do not remove risk if organizations still tolerate legacy or manually created long-lived workload tokens without active governance. Inventory, trend monitoring, and re-reviewed exception handling prevent those exceptional credentials from becoming permanent blind spots.
  scope: Applies to any remaining legacy token secrets, manually created long-lived service account tokens, or extended-lifetime workload tokens retained for constrained compatibility scenarios.
  primary_enforcement_point: Legacy token discovery, exception review, and retirement governance for long-lived workload credentials.
  implementation_surface: Legacy token inventory and trend reports, documented long-lived token exceptions, and re-review records showing retirement progress.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Application Development
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
