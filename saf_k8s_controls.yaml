- control_id: SAF-K8S-1005-014
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.5'
  control_seq: '014'
  control_title: Ransomware recovery prioritization and post-incident preparedness improvement
  control_statement: Organizations must prioritize Kubernetes workload recovery based on business criticality during ransomware or destructive attack response and must conduct post-incident lessons-learned processes that feed preparedness improvements back into response playbooks, containment procedures, and related recovery planning.
  objective: Ensure ransomware and destructive-attack recovery for Kubernetes environments is governed by business-priority restoration decisions and structured post-incident improvement.
  rationale: Validated backups alone do not minimize business impact if critical AI inference services are restored after lower-priority workloads or if lessons from the incident never improve future readiness. Recovery prioritization and post-incident improvement are separate governance obligations that shape response outcomes and preparedness maturity.
  scope: Applies to production Kubernetes clusters and their AI workloads during ransomware or destructive attack response. Covers workload recovery prioritization by business criticality and post-incident lessons-learned processes with tracked preparedness improvements. Excludes backup verification and restoration test execution mechanics.
  primary_enforcement_point: Disaster recovery prioritization framework and post-incident review process.
  implementation_surface: Workload recovery prioritization matrices for control plane, logging, monitoring, inference, training, and pipeline infrastructure; business criticality criteria for restoration order; post-incident lessons-learned reports; and tracked improvement actions feeding back into playbooks, containment procedures, and audit policy updates.
  owner_primary: Security Operations
  owner_supporting: Platform Engineering; SRE; AI/ML Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
