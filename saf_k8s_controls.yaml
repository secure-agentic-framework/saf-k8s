- control_id: SAF-K8S-1005-017
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.5'
  control_seq: '017'
  control_title: Recovery-time lateral movement containment for compromised AI workloads
  control_statement: Organizations must enforce recovery-time controls that prevent compromised AI workloads from moving laterally to the cluster control plane or other tenants during and after incident recovery.
  objective: Ensure compromised AI workloads cannot pivot into cluster control plane components or co-tenant environments while recovery operations are in progress.
  rationale: Compromised AI workloads with elevated privileges, GPU access, or mounted storage can pivot to control plane components or other tenants if recovery does not preserve strict isolation. Recovery procedures must contain the blast radius until affected workloads are verified and stabilized.
  scope: Applies to all Kubernetes clusters recovering from security incidents affecting AI workloads. Covers RBAC, network segmentation, namespace isolation, and credential controls used to contain compromised AI workloads during recovery.
  primary_enforcement_point: Recovery runbooks, RBAC policy review, NetworkPolicy enforcement, namespace isolation, and credential rotation controls for compromised AI workloads.
  implementation_surface: RBAC least-privilege verification for AI workload ServiceAccounts, NetworkPolicy segmentation between AI workloads and the control plane, namespace isolation for compromised workloads, and credential rotation for secrets accessible from compromised components.
  owner_primary: Security Operations
  owner_supporting: Platform Engineering; AI/ML Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
