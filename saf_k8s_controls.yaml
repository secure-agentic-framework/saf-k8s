  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.4'
  control_seq: '005'
  control_title: Adversarial ML threat taxonomy and structured classification
  control_statement: Organizations must apply the NISTIR 8269 adversarial ML taxonomy and maintain adversarial ML attack pattern libraries so that Kubernetes AI threats are classified consistently and mapped to structured detection, triage, and risk analysis workflows.
  objective: Standardize adversarial ML threat classification for Kubernetes AI environments so detections, triage decisions, and risk assessments use a consistent attack taxonomy.
  rationale: AI-specific attacks such as evasion, model extraction, or poisoning are hard to compare and prioritize when teams classify them ad hoc. Structured adversarial ML taxonomy use creates a shared language for detection engineering, incident classification, and threat analysis, reducing ambiguity when new attack patterns emerge.
  scope: Applies to security operations, threat intelligence, and detection teams responsible for classifying threats affecting Kubernetes-hosted AI workloads, models, and supporting pipelines.
  primary_enforcement_point: Threat classification standard, adversarial ML attack pattern library, and incident classification workflow.
  implementation_surface: NISTIR 8269 taxonomy adoption, adversarial ML attack pattern library maintenance, structured threat classification in incident tooling, mapping of adversarial ML patterns to detections and controls, and analyst workflows for updating classifications as new AI attack techniques emerge.
