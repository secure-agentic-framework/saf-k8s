  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.3'
  control_seq: '19'
  control_title: GPU chargeback and showback reporting accountability
  control_statement: Organizations must generate and distribute GPU chargeback or showback reports to accountable team owners and use those reports in periodic cost accountability review processes.
  objective: Create accountability for GPU consumption by translating attributed usage data into recurring chargeback or showback reporting that is reviewed by responsible team owners.
  rationale: Attribution data alone does not change behavior if it is not turned into accountable reporting. Chargeback or showback reporting is what makes GPU consumption visible to the teams that control workloads, enabling cost review, optimization pressure, and ownership for waste reduction.
  scope: Applies to all Kubernetes clusters with GPU resources where multiple teams, projects, or cost centers consume shared AI infrastructure. Reporting may be chargeback or showback depending on organizational cost policy, but accountable review is required.
  primary_enforcement_point: Chargeback or showback reporting pipelines and cost accountability review workflows.
  implementation_surface: Recurring GPU spend reports by team, namespace, or project, report distribution workflows to accountable owners, and review records demonstrating that attributed GPU cost is examined and acted on through FinOps governance.
