- control_id: SAF-K8S-0405-012
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.5'
  control_seq: '012'
  control_title: Privileged MFA enforcement for cluster administration
  control_statement: Organizations must enforce multi-factor authentication for all privileged human access to Kubernetes clusters and AI infrastructure, with explicitly governed non-interactive workload exceptions and emergency access dependencies handled through approved break-glass procedures.
  objective: Ensure privileged administrative access requires a second factor so compromise of a single password or primary credential does not grant cluster-administrative control.
  rationale: Privileged access without MFA leaves the cluster vulnerable to straightforward credential theft and phishing. MFA for human administrators materially reduces the chance that a single compromised credential yields full control over cluster or AI infrastructure administration.
  scope: Applies to privileged human access paths for Kubernetes clusters, OIDC provider-backed administration, and cloud-provider administrative integrations. Covers MFA enforcement for administrators and clarified exceptions for non-interactive workload identities.
  primary_enforcement_point: MFA enforcement policy in identity providers and privileged access paths for cluster administration.
  implementation_surface: OIDC provider MFA policies, cloud IAM privileged access requirements, API server authentication integrations, and documented exception handling for non-interactive service identities and break-glass dependencies.
  owner_primary: Identity and Access Management
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
