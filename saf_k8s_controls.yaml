  date_modified: '2026-03-17'
- control_id: SAF-K8S-0102-014
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.2'
  control_seq: '014'
  control_title: etcd certificate rotation coverage and execution
  control_statement: Production Kubernetes clusters must implement automated rotation of etcd server certificates, peer certificates, and API server-to-etcd client certificates before expiration, with operational procedures or automation that ensure each certificate class is renewed and deployed without omission.
  objective: Ensure that all etcd-related certificate classes are rotated before expiration so trust paths remain intact and expired credentials do not disrupt etcd availability.
  rationale: Certificate failures commonly occur when one certificate class is excluded from the rotation path or renewal automation is incomplete. This control isolates certificate coverage and execution so teams can verify that server, peer, and client certificates are all renewed and deployed on schedule.
  scope: Applies to all self-managed Kubernetes clusters using etcd. Covers etcd server, peer, and API server client certificates and the automation or operational procedures used to renew and deploy them.
  primary_enforcement_point: Certificate Rotation Workflow
  implementation_surface: kubeadm or PKI automation configuration, cert-manager or equivalent issuance workflows, etcd manifest certificate references, and rotation execution records.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
