- control_id: SAF-K8S-0301-006
  domain_code: D03
  domain_name: Workload and Pod Security
  knowledge_area: '3.1'
  control_seq: '006'
  control_title: Scoped PSA exception enforcement and compensating controls
  control_statement: Organizations must enforce compensating controls for privileged workloads exempted from Pod Security Standards through policy engine rules and namespace or service-account scoping so exemptions do not widen privileges beyond the intended infrastructure components.
  objective: Allow required infrastructure workloads to operate with narrowly scoped exemptions while preventing privilege expansion to unrelated workloads.
  rationale: Scoped enforcement and compensating controls are the technical enforcement half of PSA exception management. They are distinct from documenting and reviewing the exemptions themselves.
  scope: Applies to all workloads requesting privileges beyond their namespace PSS level, including GPU device plugins, CNI agents, CSI drivers, log collectors, and monitoring DaemonSets. Each exemption must specify the exact privileges required and the compensating controls applied.
  primary_enforcement_point: Policy engine (OPA Gatekeeper, Kyverno) exemption rules scoped to specific service accounts or pod labels, with PSA namespace-level exemption configuration for system workloads.
  implementation_surface: Policy engines (OPA Gatekeeper, Kyverno) with exemption rules scoped to specific ServiceAccounts and pod labels, PSA namespace-level exemption configuration, formal exemption register in version control, NVIDIA device plugin DaemonSets (nvidia-device-plugin, GPU Operator, DCGM exporter, MIG manager), CNI agent DaemonSets (Cilium, Calico, Multus), CSI driver pods, network policies for compensating isolation, and audit logging at RequestResponse level for exempted namespaces.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; AI/ML Platform team; Infrastructure team
