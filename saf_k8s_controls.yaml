- control_id: SAF-K8S-0604-011
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.4'
  control_seq: '011'
  control_title: SLSA provenance generation and target-level governance
  control_statement: Build pipelines must generate SLSA provenance for deployable artifacts at the target SLSA level defined by organizational policy, and the required target level and improvement roadmap must be documented, reviewed, and verifiable through policy or admission checks before artifacts are trusted downstream.
  objective: Establish auditable provenance records and an explicit SLSA assurance target so the organization can prove how each artifact was built and what provenance threshold governed its acceptance.
  rationale: Without standardized SLSA provenance and a documented target assurance level, organizations cannot reliably distinguish approved builds from artifacts produced by tampered or weakly controlled pipelines. Provenance generation plus target-level governance makes build trust decisions explicit, reviewable, and enforceable.
  scope: Applies to all CI/CD pipelines producing deployable Kubernetes artifacts, including application images, AI workload images, and infrastructure operator images. The target SLSA level and roadmap must be reviewed at least annually or when pipeline risk materially changes.
  primary_enforcement_point: CI/CD provenance generation step and provenance policy verification gate.
  implementation_surface: SLSA provenance generation tooling, provenance attachment to image digests, documented target SLSA level policy, roadmap records, and admission or policy-engine verification of required provenance level.
  owner_primary: DevSecOps / Release Engineering
  owner_supporting: Security Engineering; Platform Engineering
