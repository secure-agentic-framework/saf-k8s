- control_id: SAF-K8S-0404-001
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.4'
  control_seq: '001'
  control_title: cert-manager deployment and Issuer configuration
  control_statement: Clusters requiring automated certificate lifecycle management must deploy cert-manager with properly configured Issuers or ClusterIssuers, Certificate resources defining key algorithm and validity requirements, and ACME or internal CA integration validated through certificate issuance testing.
  objective: Automate TLS certificate provisioning, renewal, and revocation across the cluster, eliminating manual certificate management that leads to expired certificates, service outages, and insecure fallback to plaintext communication.
  rationale: Manual certificate management is error-prone and does not scale. Expired certificates cause service outages and may force operators to disable TLS verification as a quick fix. cert-manager automates the entire certificate lifecycle including issuance, renewal, and key rotation. Misconfigured Issuers can issue certificates from untrusted CAs, and missing Certificate resources leave services without TLS protection.
  scope: Applies to all clusters requiring internal or external TLS certificates. Covers cert-manager installation, Issuer and ClusterIssuer configurations for ACME (Let's Encrypt) and internal PKI (Vault, AWS Private CA), Certificate resource definitions, and integration validation. Managed services with built-in certificate management may satisfy this control with equivalent functionality.
  primary_enforcement_point: cert-manager deployment manifests, Issuer and ClusterIssuer resource configurations, Certificate resource definitions with key algorithm and validity parameters, and issuance health monitoring.
  implementation_surface: cert-manager deployment (Helm chart or manifest), Issuer and ClusterIssuer custom resources configured for ACME (Let's Encrypt) or internal CA (Vault PKI, AWS Private CA), Certificate custom resources with key algorithm (RSA 2048+, ECDSA P-256), validity duration, and renewBefore parameters, ACME challenge solver configurations (HTTP-01, DNS-01), and certificate issuance health monitoring dashboards.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0404-002
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.4'
  control_seq: '002'
  control_title: TLS provisioning for webhooks, API aggregation, and internal services
  control_statement: All admission webhooks, API aggregation layer endpoints, and internal service-to-service communication endpoints must be provisioned with valid TLS certificates signed by a trusted cluster CA, and the API server must be configured to validate these certificates.
  objective: Ensure that all internal Kubernetes control plane extensions and service communication channels are protected by authenticated TLS, preventing man-in-the-middle attacks on webhook calls, API aggregation, and inter-service traffic.
  rationale: Admission webhooks receive all API requests matching their rules and can modify or reject them. An attacker who can intercept webhook traffic via a man-in-the-middle attack could manipulate admission decisions to allow malicious workloads or block legitimate ones. API aggregation layer endpoints extend the Kubernetes API surface. Without proper TLS, these critical control plane communication paths are vulnerable to interception and tampering.
  scope: Applies to all ValidatingWebhookConfigurations, MutatingWebhookConfigurations, and APIService resources in all clusters. Covers both built-in webhooks (e.g., Pod Security Admission) and third-party webhooks (OPA Gatekeeper, Kyverno, operator webhooks). Internal service endpoints that serve as backends for API aggregation are also in scope.
  primary_enforcement_point: Webhook and APIService configurations specifying caBundle or cert-manager Certificate resources, with TLS certificate validity verified by the API server during webhook and aggregation calls.
  implementation_surface: 'ValidatingWebhookConfiguration and MutatingWebhookConfiguration resources (caBundle field, cert-manager CA injection annotations), APIService resources for aggregation layer endpoints, cert-manager Certificate resources for webhook and aggregation TLS, API server TLS verification settings for webhook and aggregation calls, and audit tooling verifying absence of --insecure-skip-tls-verify flags and failurePolicy: Ignore on security-critical webhooks.'
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0404-003
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.4'
  control_seq: '003'
  control_title: mTLS for service-to-service authentication
  control_statement: Clusters must implement mutual TLS (mTLS) for service-to-service authentication, ensuring that both the client and server present valid certificates during the TLS handshake, with certificates bootstrapped through an automated identity framework or service mesh.
  objective: Establish cryptographic mutual authentication between services, preventing unauthorized services from communicating with cluster workloads and enabling identity-based authorization at the transport layer.
  rationale: Standard TLS only authenticates the server to the client. Without mTLS, any pod in the cluster that can reach a service endpoint can communicate with it, regardless of identity. An attacker who gains execution in any pod can reach and interact with services that accept unauthenticated connections. mTLS ensures both parties present verified certificates, enabling transport-layer identity verification and restricting communication to authorized workloads only.
  scope: Applies to all service-to-service communication within production clusters. Implementation may use a service mesh (Istio, Linkerd, Cilium) or standalone SPIFFE/SPIRE identity framework. Exceptions for performance-critical paths (e.g., high-throughput GPU training communication) must document compensating network segmentation controls.
  primary_enforcement_point: Service mesh mTLS mode configuration (STRICT mode), SPIFFE/SPIRE workload attestation and SVID issuance, or application-level TLS configuration with client certificate verification.
  implementation_surface: Service mesh mTLS configuration (Istio PeerAuthentication STRICT mode, Linkerd automatic mTLS, Cilium mutual authentication), SPIFFE/SPIRE workload attestation agents and SVID-based mTLS, application-level TLS client certificate verification, cert-manager Certificate resources for service identities, and documented mTLS exemptions for high-throughput GPU training communication (NCCL) with compensating network segmentation controls.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Application Development
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0404-007
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.4'
  control_seq: '007'
  control_title: Automated certificate rotation before expiry
  control_statement: Organizations must automate certificate rotation before expiry across cluster and workload PKI assets.
  objective: Prevent certificate-expiry outages by ensuring certificate renewal occurs before certificates expire.
  rationale: Executing renewal before expiry is independently auditable from the telemetry used to observe upcoming expirations. This control isolates renewal automation so teams can verify that PKI assets are configured to rotate before their notAfter date without manual intervention.
  scope: Applies to API server, etcd peer, kubelet, webhook, service mesh, and application certificates managed in the cluster. Covers rotation configuration and renew-before settings. Expiry monitoring and alerting remain governed by SAF-K8S-0404-008.
  primary_enforcement_point: Certificate renewal configuration for cluster PKI assets.
  implementation_surface: cert-manager Certificate resources with renewBefore settings, issuer integrations, and automated renewal workflows for cluster and workload certificates.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Security Operations
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0404-008
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.4'
  control_seq: 008
  control_title: Certificate expiry monitoring and alerting
  control_statement: Organizations must implement monitoring and alerting for certificates approaching defined expiration thresholds across cluster and workload PKI assets.
  objective: Provide actionable visibility into certificates nearing expiry so renewal failures can be corrected before service impact.
  rationale: Expiry telemetry is independently auditable from the renewal mechanism itself. This control isolates dashboards, age telemetry, and alerting so teams can verify that impending expirations are visible and routed before outage windows are reached.
  scope: Applies to API server, etcd peer, kubelet, webhook, service mesh, and application certificates managed in the cluster. Covers expiry thresholds, dashboards, telemetry collection, and alert routing. Renewal execution remains governed by SAF-K8S-0404-007.
  primary_enforcement_point: Certificate age telemetry and alerting for cluster PKI assets.
  implementation_surface: Expiry dashboards, Prometheus or scanner-based certificate age telemetry, and alerting integrations for certificates nearing expiration thresholds.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Security Operations
  baseline_or_ai_specific: baseline
  maturity: Practitioner
