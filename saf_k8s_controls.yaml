  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.6'
  control_seq: '031'
  control_title: GitOps reconciliation health and integrity monitoring
  control_statement: GitOps controllers must continuously verify reconciliation health and integrity so teams can determine whether declared Git state is being processed successfully and whether controller reconciliation behavior remains trustworthy in production environments.
  objective: Ensure GitOps-managed clusters retain reconciliation health and integrity telemetry sufficient to confirm controllers are successfully reconciling approved state and to detect reconciliation failures or degraded controller behavior.
  rationale: Without reliable reconciliation health and integrity monitoring, teams cannot tell whether GitOps controllers are actually applying approved state or whether reconciliation failures are leaving environments silently unmanaged. This is distinct from detecting post-deployment drift and automatically correcting it.
  scope: Applies to production Kubernetes clusters managed through GitOps. Covers controller reconciliation status, health, and integrity monitoring for approved Git-declared state processing.
  primary_enforcement_point: Flux or Argo CD reconciliation status and health telemetry.
  implementation_surface: Argo CD application sync and health status, Flux reconciliation status, controller health telemetry, reconcile interval status, and monitoring of failed or stalled reconciliation operations.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; SRE / Operations
