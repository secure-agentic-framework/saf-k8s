- control_id: SAF-K8S-1002-006
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.2'
  control_seq: '006'
  control_title: Sensitive metric redaction and access restriction
  control_statement: Organizations must redact or restrict access to sensitive metrics that reveal GPU topology, training hyperparameters, or proprietary AI model behavior data, using Prometheus relabeling, recording rules, or namespace-scoped metric APIs to prevent exposure to unauthorized tenants.
  objective: Prevent leakage of competitively sensitive or security-relevant AI infrastructure data through metric exposition, ensuring GPU topology, model hyperparameters, and inference performance data are accessible only to authorized teams.
  rationale: 'Metric data can carry high-value intellectual property: GPU NVLink topology reveals hardware layout (competitive intelligence), training hyperparameters reveal model architecture choices (IP), and inference accuracy trends reveal model performance (business data).'
  scope: Applies to all metric labels, dimensions, and time series that expose GPU topology, training job internals, and inference serving internals. Covers both Prometheus-scraped metrics and custom metrics pushed via push gateway.
  primary_enforcement_point: Prometheus relabeling configuration (metric_relabel_configs) and recording rules that aggregate or drop sensitive label dimensions before storage.
  implementation_surface: Prometheus metric_relabel_configs to drop or hash sensitive label values (GPU device UUIDs, NVLink topology labels), Prometheus recording rules to produce safe aggregated summaries from detailed training metrics, namespace-scoped metric APIs restricting training hyperparameter metrics.
  owner_primary: AI/ML Engineering
  owner_supporting: Security Operations,Platform Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-13'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-1003-001
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.3'
  control_seq: '001'
  control_title: STRIDE threat modeling for Kubernetes AI systems
  control_statement: Organizations must conduct STRIDE-based threat modeling for Kubernetes clusters hosting AI workloads, systematically analyzing each Kubernetes component, including the API server, etcd, kubelet, scheduler, container runtime, and AI-specific operators, for Spoofing, Tampering, Repudiation, Information Disclosure, Denial of Service, and Elevation of Privilege threats, and must document identified threats with corresponding mitigations.
  objective: Systematically identify and document threats to Kubernetes AI infrastructure using the STRIDE methodology to ensure comprehensive threat coverage and traceable risk mitigation.
  rationale: Kubernetes AI environments introduce complex trust boundaries across control plane components, GPU schedulers, model serving endpoints, and training orchestrators. Without systematic STRIDE analysis mapped to each component, organizations overlook threat categories such as spoofing of AI operator identities or tampering with training job specifications that ad-hoc threat assessments fail to surface.
  scope: Applies to all Kubernetes clusters hosting AI workloads. Threat modeling must cover core Kubernetes components, AI-specific custom resources and operators, GPU device plugins, and model serving infrastructure. Must be updated when significant architectural changes occur.
  primary_enforcement_point: Security architecture review process, threat model documentation repository, and architecture change review gates.
  implementation_surface: STRIDE threat model documentation repository, security architecture review process and change review gates, threat-to-mitigation mapping documents covering Kubernetes components (API server, etcd, kubelet, scheduler, container runtime) and AI-specific operators (Kubeflow, KServe, GPU device plugin, model serving controllers) analyzed for Spoofing, Tampering, Repudiation, Information Disclosure, Denial of Service, and Elevation of Privilege threat categories, data flow diagrams with trust boundary annotations, and periodic review cadence aligned with architecture changes.
  owner_primary: Security Architecture
  owner_supporting: Platform Engineering; AI/ML Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-1003-002
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.3'
  control_seq: '002'
  control_title: OCTAVE risk-based threat assessment for Kubernetes AI environments
  control_statement: Organizations must perform OCTAVE-based risk assessments for Kubernetes AI environments, identifying critical AI assets (models, training data, GPU infrastructure, inference endpoints), profiling threats specific to those assets, and prioritizing risk treatment based on organizational risk tolerance and business impact.
  objective: Ensure that threat assessment for Kubernetes AI infrastructure is grounded in organizational risk context, asset criticality, and business impact rather than purely technical vulnerability scanning.
  rationale: Technical vulnerability assessments alone do not capture the business risk posed by AI asset compromise, such as the impact of a proprietary model being extracted or training data being poisoned. OCTAVE's asset-centric, risk-based approach ensures that security investments are aligned with the actual business value of AI assets and the organization's risk appetite, preventing both under-protection of critical models and over-investment in low-impact controls.
  scope: Applies to Kubernetes environments hosting AI workloads with significant business value or regulatory exposure. Covers asset identification, threat profiling, and risk prioritization for models, datasets, training pipelines, and inference services. Must be refreshed annually or upon major AI platform changes.
  primary_enforcement_point: Enterprise risk management process, security architecture review cadence, and AI asset classification framework.
  implementation_surface: Enterprise risk management process and OCTAVE three-phase assessment methodology, AI asset inventory with criticality classifications (models, training data, GPU infrastructure, inference endpoints), threat profile documentation per asset class, organizational risk tolerance and business impact analysis, security architecture review cadence, AI asset classification framework (proprietary vs. open models, PII vs. public datasets, production vs. staging endpoints), and risk treatment decision documentation with business justification.
  owner_primary: Security Architecture
  owner_supporting: AI/ML Engineering; GRC/Compliance; Business Stakeholders
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-1003-004
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.3'
  control_seq: '004'
  control_title: MITRE ATT&CK for Containers coverage mapping and gap analysis
  control_statement: Organizations must map their Kubernetes AI infrastructure defenses to the MITRE ATT&CK Threat Matrix for Containers and identify coverage gaps across tactics and techniques relevant to AI workload attack scenarios.
  objective: Validate defensive coverage against known container and Kubernetes attack techniques and surface ATT&CK-aligned coverage gaps that require remediation.
  rationale: MITRE ATT&CK for Containers provides a structured view of adversary behavior against containerized environments. Without explicit coverage mapping, security teams cannot tell which tactics and techniques are already mitigated, which are only partially detected, and where meaningful blind spots remain for AI infrastructure.
  scope: Applies to all Kubernetes clusters hosting AI workloads. Coverage mapping must include infrastructure-level and AI workload-level defensive coverage and must be refreshed when ATT&CK matrix versions or core AI infrastructure architecture materially change.
  primary_enforcement_point: Detection engineering review process and ATT&CK coverage mapping documentation.
  implementation_surface: MITRE ATT&CK Threat Matrix for Containers coverage mapping documentation, tactic-by-tactic and technique-level coverage analysis, AI workload-specific attack path mapping, gap identification across ATT&CK tactics, remediation planning for uncovered techniques, and periodic review aligned with ATT&CK matrix updates.
  owner_primary: Security Architecture
  owner_supporting: Detection Engineering; Security Operations; AI/ML Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-13'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-1003-005
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.3'
  control_seq: '005'
  control_title: Technique-aligned detection engineering for Kubernetes AI attack scenarios
  control_statement: Organizations must develop and maintain detection rules aligned to MITRE ATT&CK for Containers techniques relevant to Kubernetes AI workload attack scenarios so that prioritized adversary behaviors are covered by actionable detections.
  objective: Ensure ATT&CK-relevant Kubernetes AI attack scenarios are translated into actionable detection logic rather than remaining only as analytical coverage mappings.
  rationale: Coverage mapping alone does not improve operational security if identified adversary behaviors are never translated into usable detections. Technique-aligned detection engineering turns ATT&CK analysis into concrete SIEM, runtime, and workflow detections that can identify active attacks against AI workloads and supporting platform components.
  scope: Applies to all Kubernetes clusters hosting AI workloads. Detection development must cover prioritized container and Kubernetes attack techniques relevant to AI training, inference, orchestration, and supporting platform components.
  primary_enforcement_point: Detection rule management platform and detection engineering review process.
  implementation_surface: ATT&CK technique-to-detection mappings, SIEM and runtime detection rule development, AI workload-specific technique prioritization, rule coverage reviews for prioritized attack scenarios, and analyst workflows that maintain technique-aligned detections as ATT&CK content and AI platform architecture evolve.
  owner_primary: Security Architecture
  owner_supporting: Detection Engineering; Security Operations; AI/ML Engineering
  baseline_or_ai_specific: ai-specific
