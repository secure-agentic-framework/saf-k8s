  date_modified: '2026-03-17'
- control_id: SAF-K8S-0908-010
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.8'
  control_seq: '010'
  control_title: Inference privacy budget tracking and threshold enforcement
  control_statement: Inference endpoints serving models trained on sensitive data must track cumulative privacy budget consumption per model or principal and enforce privacy-loss thresholds before additional responses are served.
  objective: Enforce cumulative privacy budget accounting and cutoffs for repeated access to sensitive inference endpoints.
  rationale: Even when differential privacy parameters are well chosen, repeated queries can exhaust the intended privacy guarantee. Without budget accounting and threshold enforcement, privacy loss accumulates silently and the formal protection bound becomes meaningless in practice.
  scope: Applies to Kubernetes-hosted inference endpoints serving models trained on sensitive data where formal differential privacy guarantees are required. Covers cumulative privacy budget accounting, spend monitoring, threshold enforcement, and request blocking or equivalent control once the allowable privacy loss is exhausted. Excludes initial parameter selection and guarantee documentation.
  primary_enforcement_point: Privacy budget accounting middleware and threshold enforcement logic for inference endpoints.
  implementation_surface: Per-principal or per-model privacy budget accounting middleware, cumulative spend monitoring, threshold enforcement logic, and request blocking or equivalent controls once privacy-loss limits are reached.
  owner_primary: Security Engineering
  owner_supporting: ML Platform Engineering; Privacy Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
