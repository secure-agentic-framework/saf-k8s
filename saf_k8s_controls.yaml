- control_id: SAF-K8S-0201-008
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.1'
  control_seq: 008
  control_title: Kubelet configuration and credential file ownership and permissions
  control_statement: Kubelet configuration files, kubeconfig files, and certificate key material on each node must be owned by root with permissions no more permissive than 0644 for configuration files and 0600 for private keys so that unauthorized local users or escaped workloads cannot read or modify kubelet configuration or credential material.
  objective: Protect kubelet configuration, kubeconfig material, and node credential files from unauthorized local access or tampering through restrictive ownership and permission settings.
  rationale: Kubelet configuration and credential files contain authentication material, certificate references, and runtime parameters that control node behavior. This control isolates filesystem protection so teams can independently verify that kubelet-related files are not exposed to local attackers or compromised workloads.
  scope: Applies to all files in /etc/kubernetes/, /var/lib/kubelet/, and kubelet certificate directories on every cluster node. Managed Kubernetes services where the node filesystem is provider-controlled satisfy this control through provider hardening attestation.
  primary_enforcement_point: Node image build pipeline, configuration management tooling, and periodic file permission audit scans.
  implementation_surface: Node image build pipeline, configuration management tooling, file permission auditing, and CIS Benchmark scanning for kubelet file ownership and mode checks.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; OS/Infrastructure
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
