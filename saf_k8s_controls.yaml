- control_id: SAF-K8S-0501-009
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.1'
  control_seq: 009
  control_title: Model download path isolation from training data paths
  control_statement: Model download paths must be isolated from training data paths through distinct network policy and egress controls so that external model retrieval cannot contaminate training data flows.
  objective: Separate software supply-chain ingress from training data ingress to prevent malicious or unreviewed model artifacts from traversing the same paths as training data sources.
  rationale: Model download traffic and training data traffic serve different trust domains and attack surfaces. Isolating them reduces the chance that a compromised artifact source, registry, or download mirror can influence or masquerade as a trusted training data path.
  scope: Applies to AI training and model preparation environments that retrieve external model artifacts, base models, weights, or dependencies while also accessing training data stores.
  primary_enforcement_point: Egress and path-isolation controls on AI training environments and artifact retrieval components.
  implementation_surface: Network policies, egress controls, and path validation between model registries, artifact mirrors, training data stores, and model preparation workloads.
  owner_primary: Network Engineering
  owner_supporting: ML Platform Engineering
  baseline_or_ai_specific: ai-specific
