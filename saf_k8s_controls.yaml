- control_id: SAF-K8S-0303-003
  domain_code: D03
  domain_name: Workload and Pod Security
  knowledge_area: '3.3'
  control_seq: '003'
  control_title: SELinux context assignment and multi-tenancy isolation
  control_statement: Clusters using SELinux-enabled nodes must assign SELinux contexts to containers with appropriate type enforcement labels and MCS (Multi- Category Security) labels for multi-tenancy isolation, and must not permit containers to run with unconfined or overly permissive SELinux types.
  objective: Enforce mandatory access control through SELinux type enforcement and MCS category labels that provide kernel-level isolation between containers and between tenants, preventing unauthorized cross-container data access.
  rationale: SELinux type enforcement restricts which kernel objects (files, sockets, processes) a container can access based on security labels rather than discretionary permissions. MCS labels provide an additional isolation layer by assigning unique category pairs to containers, preventing one container from accessing another's files even when they share the same SELinux type. Without SELinux context assignment, containers inherit permissive defaults that allow cross-container access through shared volumes and host filesystem paths.
  scope: Applies to all clusters running on nodes with SELinux in enforcing mode (RHEL, CentOS, Fedora, and other distributions using SELinux as the default LSM). Does not apply to nodes using AppArmor as the primary LSM. MCS labels are particularly important for multi-tenant clusters sharing GPU or storage resources.
  primary_enforcement_point: Pod securityContext.seLinuxOptions (level, type, role, user) fields, enforced by policy engine rules validating SELinux context assignments at admission time.
  implementation_surface: Pod securityContext.seLinuxOptions fields (level, type, role, user), SELinux MCS (Multi-Category Security) label allocation per tenant namespace, SELinux type enforcement labels (container_t), policy engine rules validating SELinux context assignments at admission, node-level SELinux enforcing mode configuration (RHEL, CentOS, Fedora, OpenShift), getenforce verification tooling, SELinux AVC denial log monitoring, and /proc/self/attr/current label inspection for running containers.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Application Development teams
  baseline_or_ai_specific: baseline
  maturity: Practitioner
