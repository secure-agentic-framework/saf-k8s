- control_id: SAF-K8S-0606-027
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.6'
  control_seq: '027'
  control_title: GitOps repository access restriction and least-privilege deploy credentials
  control_statement: GitOps deployment repositories must enforce repository access controls and least-privilege GitOps service account, deploy-key, or repository credential access so only authorized identities can read or modify deployment sources at the minimum required scope.
  objective: Protect GitOps deployment sources from unauthorized access and over-privileged repository credentials.
  rationale: Even with signed commits and branch protection, an attacker who can access the repository or abuse over-privileged GitOps credentials can still expose or alter deployment sources. Repository access restriction and least-privilege deploy credentials are independently auditable because they govern who can reach deployment sources and with what scope.
  scope: Applies to Git repositories used as deployment sources for Flux or Argo CD in staging and production environments. Covers repository access controls and GitOps repository credentials, deploy keys, or service accounts.
  primary_enforcement_point: Git repository access settings and GitOps repository credential scope.
  implementation_surface: Repository access controls in GitHub, GitLab, or Bitbucket; least-privilege deploy keys or service accounts for Flux or Argo CD; and repository credential scope limiting GitOps controllers to required read paths and actions.
  owner_primary: Platform Engineering
  owner_supporting: DevSecOps / Release Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
