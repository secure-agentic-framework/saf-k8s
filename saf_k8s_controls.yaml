  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.3'
  control_seq: '025'
  control_title: Automated secret leak detection coverage across development and runtime surfaces
  control_statement: Organizations must deploy automated secret leak detection across source repositories, container images, CI/CD artifacts, runtime logs, and log aggregation systems to identify credential exposure before or immediately after publication.
  objective: Ensure credential leaks are automatically detected across the artifact and runtime surfaces where they commonly appear.
  rationale: Detection coverage is independently auditable from preventive enforcement and response. This control isolates the requirement to scan the major development, artifact, and runtime surfaces where secrets may leak so teams can verify that exposure is observable across the platform.
  scope: Applies to source repositories, developer workflows, container image registries, CI/CD artifacts, runtime logs, and centralized log platforms where credentials may be exposed. Covers scanning coverage and alert generation for detected leaks. Preventive blocking and push-protection enforcement remain governed by SAF-K8S-0403-026, and incident response remains governed by SAF-K8S-0403-015.
  primary_enforcement_point: Automated secret scanning coverage across development, artifact, and runtime platforms.
  implementation_surface: Repository scanning, image and artifact scanning, CI/CD secret discovery, runtime log scanning, and log aggregation pattern detection with alert routing.
