- control_id: SAF-K8S-0901-007
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.1'
  control_seq: '007'
  control_title: AI operator privilege management
  control_statement: AI-specific Kubernetes operators (NVIDIA GPU Operator, KServe, Kubeflow, Ray, Volcano, Kueue) must be deployed with least-privilege RBAC scoping, namespace restrictions, dedicated service accounts, and maintained under a defined vulnerability management and upgrade cadence.
  objective: Minimize the blast radius of AI operators that require elevated cluster privileges by constraining their RBAC scope, isolating their operational namespaces, and ensuring timely patching of operator vulnerabilities.
  rationale: AI operators often require cluster-wide privileges to manage CRDs, schedule GPU workloads, and configure device plugins. These elevated privileges make operators high-value targets; a compromised operator can gain broad cluster access. Without RBAC scoping and namespace restrictions, operator compromise grants lateral movement across the cluster. Without vulnerability management, known CVEs in operators and their dependencies remain exploitable.
  scope: Applies to all AI-specific operators deployed on Kubernetes clusters, including NVIDIA GPU Operator, KServe, Kubeflow, Ray, Volcano, and Kueue. Covers operator service accounts, ClusterRole and Role bindings, namespace restrictions, and operator container images and dependencies. Excludes general-purpose Kubernetes operators not specific to AI workloads.
  primary_enforcement_point: Operator deployment manifests, RBAC ClusterRole and Role bindings, operator namespace policies, and container image vulnerability scanning pipelines.
  implementation_surface: AI operator deployment manifests (NVIDIA GPU Operator, KServe, Kubeflow, Ray, Volcano, Kueue), RBAC ClusterRole and Role bindings with least-privilege scoping, dedicated operator service accounts, operator namespace restriction policies, CRD access controls (InferenceService, RayCluster, PyTorchJob), NetworkPolicy for operator namespaces, container image vulnerability scanning pipelines, GitOps-pinned operator versions, and documented upgrade cadence and CVE tracking.
  owner_primary: ML Platform Engineering
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
