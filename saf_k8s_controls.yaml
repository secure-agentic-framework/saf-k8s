- control_id: SAF-K8S-0304-003
  domain_code: D03
  domain_name: Workload and Pod Security
  knowledge_area: '3.4'
  control_seq: '003'
  control_title: QoS class assignment for workload stability
  control_statement: Security-critical and stateful workloads must be configured with Guaranteed QoS class (requests equal to limits for all resource types), and organizations must document the security implications of BestEffort and Burstable QoS classes, ensuring that no security-sensitive workload runs with BestEffort QoS.
  objective: Ensure security-critical workloads receive predictable resource allocation and are protected from eviction during node pressure events, while preventing security-sensitive workloads from being assigned the lowest eviction priority.
  rationale: 'Kubernetes evicts pods in QoS priority order: BestEffort first, then Burstable, then Guaranteed. Security-critical workloads (security monitoring agents, policy engines, log collectors) running with BestEffort or Burstable QoS can be evicted during node memory pressure, creating windows where security controls are absent. An attacker could intentionally trigger node pressure to evict security monitoring pods before launching an attack. Guaranteed QoS also prevents CPU throttling that could cause monitoring gaps.'
  scope: Applies to all workloads in production clusters. Security-critical workloads (admission controllers, security agents, audit log forwarders, monitoring DaemonSets) must use Guaranteed QoS. Application workloads may use Burstable QoS with documented acceptance of eviction risk. BestEffort QoS is prohibited for any workload handling sensitive data or performing security functions.
  primary_enforcement_point: Policy engine rules validating QoS class for workloads in security- critical namespaces, CI/CD pipeline checks verifying resource requests equal limits for designated workload classes.
  implementation_surface: Pod spec resources.requests and resources.limits fields (setting requests equal to limits for Guaranteed QoS), policy engine rules validating QoS class for security-critical namespaces, CI/CD pipeline checks verifying Guaranteed QoS for designated workload classes, pod eviction monitoring dashboards, and Kubernetes scheduler QoS-based eviction priority configuration.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Application Development teams
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0304-004
  domain_code: D03
  domain_name: Workload and Pod Security
  knowledge_area: '3.4'
  control_seq: '004'
  control_title: Ephemeral container security context enforcement
  control_statement: Ephemeral debug containers must be subject to the same security context restrictions as regular containers, and clusters must enforce this through RBAC restrictions on the pods/ephemeralcontainers subresource and policy engine rules that deny ephemeral containers violating the namespace's Pod Security Standards level.
  objective: Prevent ephemeral debug containers from bypassing the security context restrictions applied to regular containers, closing a privilege escalation path through the kubectl debug side door.
  rationale: Ephemeral containers added for debugging bypass normal deployment pipelines and may not inherit security context restrictions, allowing privileged access through a side door. Because ephemeral containers are injected after initial pod admission, they can circumvent review processes applied to regular deployments. An attacker or careless operator using kubectl debug with elevated privileges can gain root access, mount host filesystems, or disable seccomp profiles within a running pod.
  scope: Applies to all pods in production clusters whenever kubectl debug or equivalent tooling is used to inject ephemeral containers. Includes init containers promoted to ephemeral debug containers.
  primary_enforcement_point: RBAC rules restricting access to the pods/ephemeralcontainers subresource, Pod Security Admission enforcing PSS levels on ephemeral containers, and policy engine rules denying ephemeral containers with privileged settings or capabilities beyond the pod's PSS level.
  implementation_surface: RBAC rules for pods/ephemeralcontainers subresource restricted to authorized debugging roles, Pod Security Admission and policy engine rules enforcing security contexts on ephemeral containers (privileged, allowPrivilegeEscalation, capabilities, runAsNonRoot, seccomp, AppArmor), and audit logging for ephemeral container creation events at high severity.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0304-006
  domain_code: D03
  domain_name: Workload and Pod Security
  knowledge_area: '3.4'
  control_seq: '006'
  control_title: Host volume mount restriction
  control_statement: Host volume mounts (hostPath) must be denied by default through admission control, with exemptions only for documented infrastructure workloads (log collectors, monitoring agents) that have compensating controls and are tracked in the exemption register.
  objective: Prevent containers from accessing the host node's filesystem through hostPath volume mounts, blocking a direct path to node compromise and cross-workload data access.
  rationale: HostPath volumes mount arbitrary host directories into containers, enabling read/write access to node filesystems including /etc/shadow, kubelet credentials, and container runtime sockets. An attacker with write access to a hostPath mount can modify host binaries, cron jobs, or systemd units to achieve node-level persistence. HostPath also exposes data from other containers on the same node through shared filesystem paths.
  scope: Applies to all pods in production clusters. Infrastructure workloads that legitimately require host filesystem access (log collectors, node monitoring agents) must be isolated in dedicated namespaces with formal exemptions and compensating controls documented in the exemption register (SAF-K8S-0301-004).
  primary_enforcement_point: Policy engine rules (OPA Gatekeeper, Kyverno) denying hostPath volume mounts, with scoped exemptions for infrastructure workloads in dedicated namespaces.
  implementation_surface: Policy engine rules (OPA Gatekeeper, Kyverno) denying hostPath volume mounts with scoped exemptions for infrastructure workloads, exemption register for hostPath exceptions (log collectors, monitoring agents), and audit logging for any pod admitted with hostPath volumes.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-06'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0304-007
  domain_code: D03
  domain_name: Workload and Pod Security
  knowledge_area: '3.4'
  control_seq: '007'
  control_title: Service account token automount opt-out
  control_statement: Pods that do not require Kubernetes API access must set automountServiceAccountToken to false at the ServiceAccount or pod level, preventing unnecessary API credentials from being mounted into containers.
  objective: Reduce the attack surface of compromised containers by removing Kubernetes API credentials from pods that never use them, eliminating free credentials for API reconnaissance and privilege escalation.
  rationale: Most application pods never call the Kubernetes API, yet by default Kubernetes mounts a service account token in every pod. After container compromise, an attacker can use this token for API reconnaissance, listing secrets, or escalating privileges through RBAC misconfigurations. Removing the token from pods that do not need it eliminates this credential exposure without affecting workload functionality.
  scope: Applies to all workloads in production clusters that do not make Kubernetes API calls. Workloads that require API access (operators, controllers, monitoring agents) retain token mounts with least-privilege RBAC bindings.
  primary_enforcement_point: ServiceAccount configuration with automountServiceAccountToken set to false at the ServiceAccount level, overridden to true only for pods that require API access; policy engine rules enforcing opt-out by default.
  implementation_surface: ServiceAccount and pod-level automountServiceAccountToken field set to false, policy engine rules enforcing automountServiceAccountToken false by default with exemptions for API-accessing workloads, and cluster scanning tools identifying pods with unnecessary service account tokens mounted.
  owner_primary: Application Development teams
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-06'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0304-009
  domain_code: D03
  domain_name: Workload and Pod Security
  knowledge_area: '3.4'
  control_seq: 009
  control_title: Temporary checkpoint storage encryption, integrity, and access control
  control_statement: AI training jobs that store temporary checkpoints outside tmpfs must encrypt that storage, restrict checkpoint read and write access to authorized training identities, and verify checkpoint integrity before checkpoint reuse, resume, or promotion to later pipeline stages.
  objective: Protect temporary checkpoint data from tampering and unauthorized access during multi-stage AI training workflows.
  rationale: Temporary checkpoints can contain sensitive model state and training data derivatives, and they influence future training outcomes. Without encryption, scoped access control, and integrity verification, checkpoints can be read, altered, or replayed to introduce model backdoors or leak sensitive information.
  scope: Applies to temporary or intermediate checkpoint storage used during AI training workflows, whether stored on ephemeral local disks, attached temporary volumes, or short-lived persistent storage prior to promotion or deletion. Long-term persistent volume encryption remains governed by storage security controls.
  primary_enforcement_point: Checkpoint storage configuration and integrity validation processes for temporary training checkpoints.
  implementation_surface: Temporary checkpoint storage encryption settings, service account or workload identity-based access controls on checkpoint locations, checksum or signature verification before checkpoint resume, and operational controls governing checkpoint lifecycle and cleanup.
  owner_primary: AI/ML Platform team
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
