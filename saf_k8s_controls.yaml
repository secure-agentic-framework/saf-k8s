- control_id: SAF-K8S-0606-033
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.6'
  control_seq: '033'
  control_title: Git-only production deployment path enforcement
  control_statement: Production clusters managed by GitOps must prohibit direct runtime changes through cluster RBAC and enforce Git as the sole approved deployment path for production configuration changes.
  objective: Prevent human or ad hoc tooling from bypassing GitOps by enforcing Git as the only approved production change path and tightly restricting direct cluster modification rights.
  rationale: If operators can directly modify production resources outside Git, review and deployment discipline can be bypassed even when GitOps controllers are healthy. Enforcing Git as the sole production deployment path is distinct from governing and logging exceptional emergency access.
  scope: Applies to production namespaces and clusters governed through GitOps. Covers RBAC restrictions on direct create, update, and delete operations and Git-only deployment path enforcement for production changes.
  primary_enforcement_point: Cluster RBAC and operational controls governing approved production change paths.
  implementation_surface: Cluster RBAC denying create, update, and delete permissions on deployed resources for human users in production namespaces, GitOps-only deployment operating procedures, and controls preventing routine direct kubectl changes in production.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; SRE / Operations
