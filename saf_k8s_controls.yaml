  knowledge_area: '9.10'
  control_seq: '026'
  control_title: Cross-cluster model provenance chain-of-custody preservation
  control_statement: Model registry federation across clusters must preserve provenance chain-of-custody metadata for replicated model artifacts so downstream registries and clusters can trace replicated artifacts to their originating training, signing, and promotion workflow.
  objective: Preserve artifact traceability across cluster boundaries by ensuring replicated model artifacts retain their provenance chain-of-custody metadata.
  rationale: Cross-cluster replication can erode supply-chain assurance if provenance metadata is stripped, truncated, or no longer traceable after federation. Preserving chain-of-custody metadata ensures downstream clusters can validate where replicated model artifacts originated and what training, signing, and promotion workflow produced them.
  scope: Applies to federated model registries and cross-cluster artifact replication topologies that replicate model metadata, signing identity, promotion gate results, and originating cluster lineage across clusters or regions. Excludes endpoint membership authorization and revocation governance for the federation itself.
  primary_enforcement_point: Provenance metadata preservation configuration and verification for replicated model artifacts.
  implementation_surface: Registry replication settings that preserve provenance metadata, post-replication verification of preserved chain-of-custody fields, and downstream traceability checks for replicated model artifacts.
