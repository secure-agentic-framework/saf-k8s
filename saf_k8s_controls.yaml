- control_id: SAF-K8S-0901-010
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.1'
  control_seq: '010'
  control_title: Encrypted inter-worker gradient transport
  control_statement: Multi-node distributed training jobs must protect inter-worker gradient communication with encrypted transport where the communication framework supports it.
  objective: Protect distributed training traffic against eavesdropping and in-transit tampering by enabling framework-supported encryption for gradient exchange.
  rationale: Gradient traffic can reveal model internals, training data characteristics, or proprietary model updates. When frameworks support encrypted transport, operators must enable it to reduce exposure to interception or tampering on the cluster or fabric network.
  scope: Applies to multi-node distributed training workloads using NCCL, MPI, TensorFlow gRPC, or equivalent transports that support encrypted inter-worker communication.
  primary_enforcement_point: Training framework and transport configuration controlling encrypted worker-to-worker communication.
  implementation_surface: NCCL encryption settings, MPI transport encryption, TensorFlow gRPC TLS, and related certificate or key distribution supporting encrypted gradient exchange.
