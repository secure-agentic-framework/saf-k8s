- control_id: SAF-K8S-0905-036
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: '036'
  control_title: Automated AI workload circuit-breaker threshold enforcement
  control_statement: Organizations must define and enforce automated circuit-breaker thresholds that halt or isolate AI workloads when predefined safety, security, integrity, or resource-consumption conditions are breached. Automated circuit-breakers must execute through workload controllers, serving controls, or orchestration logic without requiring manual operator intervention.
  objective: Contain unsafe or compromised AI workload behavior rapidly by ensuring automated threshold-based circuit-breakers trigger predictable enforcement actions.
  rationale: AI workloads can cross safety, integrity, or resource-risk thresholds faster than operators can respond manually. Automated circuit-breaker enforcement limits blast radius when training jobs, inference services, or pipeline stages begin exhibiting anomalous or unsafe behavior.
  scope: Applies to AI training jobs, inference services, and pipeline stages running on Kubernetes where automated threshold-triggered containment is implemented.
  primary_enforcement_point: Automated workload controller and serving-layer enforcement that halts, scales down, or isolates workloads when configured thresholds are exceeded.
  implementation_surface: Kubernetes Job limits, Deployment scale-to-zero or quarantine actions, HPA or KEDA triggers, service mesh circuit-breakers, custom controller health checks, and automated remediation policies.
  owner_primary: AI/ML Engineering
  owner_supporting: Security Operations; SRE
  baseline_or_ai_specific: ai-specific
