- control_id: SAF-K8S-0801-011
  domain_code: D08
  domain_name: GPU, Accelerator, and Confidential Computing
  knowledge_area: '8.1'
  control_seq: '011'
  control_title: MPS and time-slicing residual-risk acceptance and compensating control approval
  control_statement: Clusters using NVIDIA MPS or GPU time-slicing must document the reduced isolation guarantees compared to MIG, define required compensating controls for those weaker sharing modes, and require explicit risk acceptance before sensitive workloads use them.
  objective: Ensure organizations make an explicit governance decision before permitting weaker GPU-sharing modes and approve the compensating controls required when MIG-equivalent hardware isolation is unavailable.
  rationale: MPS and time-slicing provide weaker isolation than MIG and therefore require a separate governance decision about when that risk is acceptable. Risk acceptance should record why stronger isolation is not used, which compensating controls are required, and which workload sensitivity levels may be approved for those modes.
  scope: Applies to any Kubernetes cluster using NVIDIA MPS or GPU time-slicing for multi-workload GPU sharing. Covers shared-GPU risk decisions, approved use cases, and required compensating controls when weaker GPU-sharing modes are used.
  primary_enforcement_point: GPU Sharing Governance and Risk Acceptance
  implementation_surface: GPU sharing policy, risk acceptance workflow, approved workload class definitions, and documented compensating control requirements for MPS or time-slicing deployments.
  owner_primary: ML Platform Engineering
  owner_supporting: Security Engineering; Data Protection Office
  baseline_or_ai_specific: ai-specific
