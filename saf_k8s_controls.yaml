- control_id: SAF-K8S-1005-015
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.5'
  control_seq: '015'
  control_title: Post-incident AI model integrity verification
  control_statement: Organizations must verify AI model integrity after infrastructure compromises that could have affected AI workloads by performing signature, checksum, hash, or behavioral validation checks sufficient to determine whether restored or candidate models remain trustworthy.
  objective: Ensure AI models are not silently compromised during infrastructure incidents by requiring post-incident integrity validation before restored or candidate models are returned to service.
  rationale: Infrastructure compromises that touch AI workloads can introduce model tampering, backdoors, or corrupted artifacts that are not detectable through standard infrastructure recovery checks. Without dedicated post-incident model validation, organizations may restore and serve compromised models.
  scope: Applies to AI workloads in Kubernetes clusters affected by a security incident. Covers post-incident model signature, hash, checksum, and behavioral validation workflows. Excludes the separate governance decision about whether to retrain, quarantine, or roll back based on those validation results.
  primary_enforcement_point: Incident response recovery procedures and model integrity verification tooling.
  implementation_surface: Model signature verification tooling, model registry checksum comparison, behavioral validation against reference datasets for statistical divergence detection, and post-compromise elevated monitoring used to confirm restored models remain trustworthy.
  owner_primary: Security Operations
  owner_supporting: AI/ML Engineering; Digital Forensics
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
