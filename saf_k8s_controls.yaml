- control_id: SAF-K8S-0501-003
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.1'
  control_seq: '003'
  control_title: Workload egress controls
  control_statement: Each workload must have egress NetworkPolicy rules that restrict outbound traffic to only the required external endpoints, and DNS-based egress policies must be used where FQDN-level control is needed to limit access to approved external services.
  objective: Limit outbound network access from workloads to only explicitly authorized destinations, preventing data exfiltration and command-and-control communication.
  rationale: Unrestricted egress allows compromised workloads to exfiltrate sensitive data, download additional payloads, or establish reverse shells to attacker-controlled infrastructure. Without workload-specific egress rules, network-based data loss prevention is ineffective and post-compromise containment depends entirely on higher-layer controls.
  scope: Applies to all workloads in production clusters. Workloads requiring internet access must have egress rules limited to specific IP ranges or FQDNs. DNS-based egress policies apply where the CNI supports FQDN-based filtering (e.g., Cilium, Calico Enterprise).
  primary_enforcement_point: Kubernetes NetworkPolicy egress rules and CNI-specific DNS-aware egress policies, enforced at the pod network interface.
  implementation_surface: Kubernetes NetworkPolicy egress rules (IP/port-based), CNI-specific FQDN-based egress policies (Cilium CiliumNetworkPolicy toFQDNs, Calico Enterprise destination.domains), Cilium Hubble flow logging for observe-first rollout, Calico flow logs, egress proxy configurations, and cloud metadata service (169.254.169.254) access restrictions tied to workload identity federation.
  owner_primary: Network Engineering
  owner_supporting: Application Development; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
