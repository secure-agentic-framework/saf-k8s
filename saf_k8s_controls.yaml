- control_id: SAF-K8S-0202-002
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.2'
  control_seq: '002'
  control_title: RuntimeClass configuration for workload-appropriate isolation
  control_statement: Clusters must define RuntimeClass resources that map workloads to appropriate container runtime handlers, ensuring that security-sensitive or AI/ML workloads use sandboxed runtimes (gVisor, Kata Containers) where required, and that GPU-accelerated workloads use validated GPU-compatible runtime configurations.
  objective: Enable workload-specific runtime isolation by assigning appropriate container runtime sandboxing levels based on workload risk profile, with particular attention to AI/ML workloads requiring GPU access.
  rationale: A single default runtime provides uniform isolation regardless of workload risk. Untrusted or multi-tenant AI workloads sharing a standard runc runtime can exploit kernel vulnerabilities to escape container boundaries. Without RuntimeClass configuration, GPU-accelerated workloads may require overly permissive security contexts to function, or sandboxed runtimes may block legitimate GPU device access. Explicit RuntimeClass mapping ensures each workload receives the appropriate isolation level.
  scope: Applies to all production clusters running mixed workload types or AI/ML workloads requiring GPU access. Clusters running exclusively trusted first-party workloads with homogeneous isolation requirements may document a single-runtime exception. Managed services must configure available RuntimeClass options or document provider-enforced isolation equivalents.
  primary_enforcement_point: Kubernetes RuntimeClass resource definitions and admission policies enforcing RuntimeClass assignment for designated namespaces or workload labels.
  implementation_surface: Kubernetes RuntimeClass API resource definitions, runtime handler configuration (nvidia, runsc, kata), node selectors for GPU scheduling, GPU compatibility validation matrix (runtime/driver/CUDA versions), and admission policies enforcing RuntimeClass selection.
  owner_primary: Platform Engineering
  owner_supporting: AI/ML Platform; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0202-003
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.2'
  control_seq: '003'
  control_title: Container runtime patching and version management
  control_statement: Container runtime versions must be tracked against a supported version matrix, patched within defined SLA timelines for security vulnerabilities, and validated for compatibility with the Kubernetes version and workload requirements before deployment to production nodes.
  objective: Ensure that known container runtime vulnerabilities are remediated promptly and that runtime updates do not introduce compatibility regressions that could affect workload availability or security posture.
  rationale: Container runtime vulnerabilities (e.g., CVE-2024-21626 in runc) can enable container escape, host filesystem access, or denial of service. Delayed patching leaves nodes exposed to publicly known exploits. However, untested runtime updates can break container networking, storage drivers, or GPU passthrough, causing workload failures. A structured patching cadence with compatibility validation balances timely remediation against operational stability.
  scope: Applies to containerd, CRI-O, runc, and any supplementary runtime components (gVisor runsc, Kata Containers runtime) on all cluster nodes. Managed Kubernetes services satisfy this control when the provider documents their runtime patching SLA and the customer validates provider compliance. Version pinning documentation must accompany all production runtime deployments.
  primary_enforcement_point: Node image build pipeline, vulnerability scanning integration, and change management process for runtime version updates.
  implementation_surface: Runtime version tracking matrix (containerd, runc, NVIDIA Container Runtime), CVE monitoring feeds (GitHub advisories, NVIDIA security bulletins), node pool rolling update procedures, and runtime compatibility validation tooling.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Vulnerability Management
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0202-004
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.2'
  control_seq: '004'
  control_title: Runtime socket mount prevention
  control_statement: Container workloads must not mount the container runtime socket into pod containers, enforced through admission controllers that block hostPath volume mounts to runtime socket paths, with CI/CD build pods using rootless or daemonless build tools instead of runtime socket mounting.
  objective: Prevent containers from gaining direct access to the runtime control plane by blocking runtime socket mounts at the admission layer.
  rationale: The container runtime socket (e.g., /run/containerd/containerd.sock) provides full control over container lifecycle operations including creation, exec, and image pulling. Mounting this socket inside a pod grants that container full control over all containers on the node, enabling privilege escalation to host root. Admission-layer blocking prevents this attack vector before pods are scheduled.
  scope: Applies to all workloads on production cluster nodes. CI/CD build pods that require container image building must use rootless or daemonless build tools (kaniko, buildah) rather than runtime socket mounting. Exceptions for runtime socket access require documented risk acceptance and compensating monitoring controls.
  primary_enforcement_point: Admission controllers (e.g., Pod Security Admission, OPA Gatekeeper, Kyverno) blocking hostPath mounts to runtime socket paths.
  implementation_surface: Admission controllers (Pod Security Admission, OPA Gatekeeper, Kyverno) blocking hostPath mounts for runtime sockets, CI/CD manifest scanning, and rootless build tools (kaniko, buildah, BuildKit).
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Application Development
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0202-007
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.2'
  control_seq: '007'
  control_title: Container runtime user namespace isolation
  control_statement: Clusters must enable container runtime user namespace isolation on supported nodes and runtimes, and must validate that privileged user IDs inside containers do not map directly to host root unless a documented exception with compensating controls is approved.
  objective: Reduce the blast radius of container escape paths by isolating container user identities from host user identities at the runtime and kernel namespace boundary.
  rationale: User namespace isolation prevents UID 0 inside a container from being equivalent to root on the host. This weakens a common post-exploitation path for container escapes and limits the impact of workloads that require elevated in-container privileges.
  scope: Applies to production node pools and runtime configurations that support user namespace isolation. Unsupported workloads or runtimes must have documented exceptions and compensating controls.
  primary_enforcement_point: Container runtime and node configuration governing user namespace remapping or isolation for supported workloads.
  implementation_surface: Container runtime user namespace configuration, node pool capability validation, workload compatibility testing, and operational exception handling for runtimes or workloads that cannot yet run with user namespaces enabled.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; OS/Infrastructure
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-13'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0202-008
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.2'
  control_seq: 008
  control_title: Container runtime socket root-only protection
  control_statement: Container runtime control sockets must be owned by root and protected with permissions that prevent non-root processes and workloads from accessing the runtime control plane.
  objective: Prevent unauthorized local access to the container runtime control socket on cluster nodes.
  rationale: The container runtime socket provides full control over container lifecycle operations. If non-root users, compromised workloads, or local processes can reach the socket, they can create privileged containers, escape isolation boundaries, or interfere with other workloads. Socket ownership and permission controls are independently auditable from broader runtime configuration settings.
  scope: Applies to all nodes running containerd or CRI-O in production clusters. Managed Kubernetes services where the runtime is provider-managed satisfy this control through provider security documentation and compensating network controls. Custom or alternative CRI implementations must demonstrate equivalent hardening.
  primary_enforcement_point: Node image build pipeline and node-level runtime socket ownership and permission settings.
  implementation_surface: Runtime socket filesystem paths such as /run/containerd/containerd.sock or CRI-O equivalents, file ownership, file mode, and validation of non-root access denial.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; OS/Infrastructure
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0202-009
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.2'
  control_seq: 009
  control_title: Container runtime secure baseline settings and debug endpoint disablement
  control_statement: Container runtimes must be configured according to an approved security baseline that enforces secure default settings and disables unnecessary features such as deprecated API versions or debug endpoints.
  objective: Minimize container runtime attack surface through approved baseline configuration settings.
  rationale: Even when socket access is restricted, insecure runtime defaults and exposed debug or deprecated interfaces expand the runtime attack surface. An approved runtime baseline with unnecessary features disabled is a distinct hardening obligation from filesystem protection of the socket itself.
  scope: Applies to all nodes running containerd or CRI-O in production clusters. Managed Kubernetes services where the runtime is provider-managed satisfy this control through provider security documentation and compensating network controls. Custom or alternative CRI implementations must demonstrate equivalent hardening.
  primary_enforcement_point: Node image build pipeline and container runtime configuration files.
  implementation_surface: containerd config.toml, CRI-O crio.conf, debug endpoint settings, deprecated API toggles, and approved secure default runtime options.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; OS/Infrastructure
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0202-010
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.2'
  control_seq: '010'
  control_title: Node default seccomp profile enforcement
  control_statement: Nodes must enforce approved default seccomp profiles for container workloads, with policy mechanisms ensuring workloads inherit those seccomp protections by default unless a documented exception exists.
  objective: Reduce container escape risk by constraining workload system-call access through default seccomp enforcement.
  rationale: Default seccomp profiles reduce the kernel attack surface available to workloads before a runtime vulnerability is exploited. Enforcing seccomp inheritance by default is independently auditable from broader mandatory access control activation because it governs system-call mediation for container processes.
  scope: Applies to production cluster nodes and the workloads scheduled onto them. Seccomp defaults and AppArmor or SELinux activation must be validated for supported operating systems, node pools, and runtime configurations, with exceptions documented and reviewed.
  primary_enforcement_point: Node seccomp default configuration and workload policy enforcement for seccomp profile inheritance.
  implementation_surface: Default seccomp profile configuration, kubelet or runtime defaults, and admission or policy controls that require approved seccomp settings on workloads.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; OS/Infrastructure
  baseline_or_ai_specific: baseline
