- control_id: SAF-K8S-0604-014
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.4'
  control_seq: '014'
  control_title: Source-to-artifact integrity linkage for built images
  control_statement: Build pipelines must maintain source-to-artifact integrity links tying each deployed image to its exact source commit, dependency lock files, and build configuration.
  objective: Preserve an auditable chain from source and dependency state to the produced artifact so investigators and reviewers can prove exactly what produced each deployed image.
  rationale: Hermetic builds and pinned inputs reduce tampering opportunities, but organizations still need a durable linkage from source state and build configuration to the resulting artifact digest. Source-to-artifact integrity records provide that traceability and make downstream review reproducible.
  scope: Applies to all CI/CD pipelines producing deployable Kubernetes artifacts, including application images, AI workload images, and infrastructure operator images.
  primary_enforcement_point: Build provenance capture and artifact metadata binding at image production time.
  implementation_surface: Source commit capture, dependency lock file references, build configuration records, and integrity metadata linking those inputs to produced image digests or equivalent artifact identifiers.
  owner_primary: DevSecOps / Release Engineering
  owner_supporting: Security Engineering; Platform Engineering
  baseline_or_ai_specific: baseline
