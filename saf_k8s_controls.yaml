  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.3'
  control_seq: '17'
  control_title: PriorityClass assignment restriction and admission enforcement
  control_statement: Organizations must restrict which namespaces, service accounts, and workload types may claim elevated AI workload PriorityClasses, and must enforce admission controls that require approved PriorityClass assignment on pods in AI namespaces.
  objective: Prevent priority abuse and unauthorized workload escalation by governing who may claim elevated AI workload PriorityClasses and by enforcing approved PriorityClass assignment at admission time.
  rationale: If workloads can self-assign elevated PriorityClasses without restriction, tenants or users can preempt legitimate inference services, bypass intended scheduling policy, and create cross-tenant denial-of-service conditions. Admission enforcement and assignment restrictions are necessary to ensure the declared priority hierarchy cannot be abused by unauthorized workloads.
  scope: Applies to all Kubernetes clusters with GPU resources or dedicated AI workloads. Restrictions must cover elevated or protected PriorityClasses used for inference, system-critical services, or other reserved AI workload tiers.
  primary_enforcement_point: Admission policies and authorization checks governing PriorityClassName assignment on AI workload pods.
  implementation_surface: Admission control policies requiring approved PriorityClassName values on pods in AI namespaces, plus namespace and service-account restrictions that limit use of protected PriorityClasses to authorized workloads.
