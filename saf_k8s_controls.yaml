  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.3'
  control_seq: '024'
  control_title: Credential lifecycle metrics publication and governance
  control_statement: Organizations running AI workloads at scale must publish credential lifecycle metrics, including issuance rate, average TTL, orphan rate, and scope exceptions, to govern credential sprawl across the platform.
  objective: Provide platform-level governance over credential lifecycle behavior by publishing metrics that expose issuance, retention, orphaning, and scope-exception trends.
  rationale: Lifecycle metrics are independently auditable from per-credential scope analysis. This control isolates the requirement to publish governance metrics so teams can prove that credential sprawl trends are measured and reviewed over time.
  scope: Applies to all credentials issued to AI and ML workloads including Vault dynamic secrets, cloud IAM temporary credentials, Kubernetes service account tokens, API keys for external services, and model registry authentication tokens. Covers platform-level publication and review of issuance rate, average TTL, orphan rate, and scope-exception metrics. Scope drift analysis remains governed by SAF-K8S-0403-023.
  primary_enforcement_point: Credential governance dashboard and metric publication workflow.
  implementation_surface: Credential governance dashboards, published lifecycle reports, and review workflows for issuance rate, average TTL, orphan rate, and scope-exception metrics.
