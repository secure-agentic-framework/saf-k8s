- control_id: SAF-K8S-0403-027
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.3'
  control_seq: '027'
  control_title: Secret leak incident triage and containment workflow
  control_statement: Organizations must implement incident response procedures for secret leak events that drive rapid triage, containment, escalation, and documented response actions when leaked secrets are detected.
  objective: Ensure detected secret leaks trigger a defined response workflow that contains exposure quickly and records the incident for follow-up.
  rationale: Incident triage and containment are independently auditable from the credential lifecycle actions that revoke or replace the exposed secret. This control isolates the response workflow so teams can verify that leak findings trigger timely containment, escalation, and incident documentation.
  scope: Applies to any detected exposure of credentials, tokens, keys, or secrets in repositories, images, CI/CD artifacts, logs, and runtime outputs. Covers response initiation, containment, escalation, and incident documentation. Credential revocation and replacement remain governed by SAF-K8S-0403-028.
  primary_enforcement_point: Incident response workflow triggered by secret leak findings.
  implementation_surface: Secret leak triage workflows, containment actions, notification and escalation paths, and incident records showing response timing and handling.
