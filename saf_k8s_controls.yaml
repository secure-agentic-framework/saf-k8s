- control_id: SAF-K8S-0606-018
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.6'
  control_seq: 018
  control_title: Zero-trust CI/CD handoff verification and independent evidence generation
  control_statement: CI/CD pipelines must verify trust at every stage transition through authenticated handoffs, artifact integrity verification, and independently generated evidence artifacts whose trust does not depend solely on the build process, consistent with NIST SP 800-204D zero-trust CI/CD principles.
  objective: Ensure stage-to-stage trust in CI/CD is explicitly verified and supported by evidence sources that remain trustworthy even if the build process itself is compromised.
  rationale: A compromised CI/CD system can falsify success if downstream stages trust pipeline assertions without independent verification. Zero-trust CI/CD requires authenticated handoffs and independently trusted evidence so compromise in one stage does not automatically invalidate assurance for the rest of the delivery chain.
  scope: Applies to all CI/CD pipelines that transfer artifacts, attestations, or deployment intent between stages prior to Kubernetes deployment. Covers authenticated stage transitions, integrity checks, and independent evidence generation components.
  primary_enforcement_point: Inter-stage trust verification, authenticated stage identities, and evidence generation components.
  implementation_surface: Artifact digest verification between stages, authenticated handoff mechanisms such as OIDC or workload identities, independently generated signatures and attestations, and pipeline trust models showing evidence generation components are logically separate from and more trusted than the build step they validate.
  owner_primary: DevSecOps / Release Engineering
  owner_supporting: Security Engineering; Platform Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
