- control_id: SAF-K8S-0904-016
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.4'
  control_seq: '016'
  control_title: Experiment tracking access and modification audit logging
  control_statement: Experiment tracking systems must log access and modification activity for experiment metadata, hyperparameters, metrics, and administrative actions so unauthorized disclosure or tampering can be detected and attributed.
  objective: Preserve auditable records of experiment metadata access and change activity so misuse or tampering can be investigated and attributed.
  rationale: Even with strong access controls, experiment records can be misused or altered by compromised accounts, insiders, or platform administrators. Audit logging provides the attribution, detection, and forensic record needed to identify unauthorized reads, changes, and administrative actions against experiment metadata.
  scope: Applies to experiment tracking platforms such as MLflow and Weights & Biases deployed on Kubernetes or used by Kubernetes-based ML platforms. Covers logging of read, write, and administrative activity against experiment records and related audit-log handling. Excludes the authorization rules themselves, which are addressed separately.
  primary_enforcement_point: Experiment tracking server audit-log configuration and export pipeline.
  implementation_surface: Audit logging for read, write, delete, and administrative operations on experiment records, log export or retention settings, and verification that access and modification events are attributable to authenticated principals.
