- control_id: SAF-K8S-1001-025
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.1'
  control_seq: '031'
  control_title: Dual authorization for audit log deletion or modification
  control_statement: Any approved deletion or modification of audit logs must require dual authorization from at least two authorized individuals, and unilateral audit log purging must be prohibited.
  objective: Prevent any single administrator or automated process from unilaterally removing or altering audit evidence.
  rationale: Even when storage protections exist, administrative workflows for deletion, archival changes, or exceptional modification can undermine log integrity if a single actor can approve them. Dual authorization reduces insider risk and makes log tampering materially harder.
  scope: Applies to administrative and automated workflows that can delete, purge, modify, compact, or otherwise materially affect retained audit logs.
  primary_enforcement_point: Administrative workflow controls and privileged access governance for audit log lifecycle operations.
  implementation_surface: Ticketing workflows, privileged access controls, SIEM administration processes, retention exception workflows, and RBAC preventing unilateral log deletion or modification.
  owner_primary: Security Operations
  owner_supporting: GRC/Compliance; Identity and Access Management
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
