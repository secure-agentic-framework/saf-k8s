- control_id: SAF-K8S-0604-004
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.4'
  control_seq: '004'
  control_title: VEX (Vulnerability Exploitability eXchange) publication
  control_statement: Organizations must produce and consume VEX (Vulnerability Exploitability eXchange) documents to communicate the exploitability status of vulnerabilities identified in container image SBOMs. VEX statements must classify each vulnerability as exploitable, not exploitable, under investigation, or fixed, with justification. VEX data must be integrated into vulnerability management workflows to prioritize remediation and reduce false-positive noise.
  objective: Reduce vulnerability management noise and improve remediation prioritization by providing contextual exploitability information that distinguishes actionable findings from false positives.
  rationale: Vulnerability scanners produce high volumes of findings, many of which are not exploitable in the specific deployment context (e.g., a library is present but the vulnerable code path is unreachable). Without VEX, security teams waste remediation effort on non-exploitable findings while genuinely exploitable vulnerabilities are deprioritized. VEX documents provide the contextual signal needed for accurate risk-based prioritization.
  scope: Applies to all container images with generated SBOMs deployed in production clusters. VEX documents must be produced for internally built images and consumed from vendors for third-party images. Integration with vulnerability management platforms is required for production workloads.
  primary_enforcement_point: Vulnerability management platform configuration and CI/CD pipeline vulnerability assessment stage.
  implementation_surface: OpenVEX format documents attached as OCI artifacts alongside image SBOMs, VEX exploitability status classifications (exploitable, not_affected, under_investigation, fixed) with justification fields, vulnerability management platform VEX data ingestion configuration (Trivy, Grype, Snyk integration), CI/CD pipeline vulnerability assessment stage VEX consumption, and vendor VEX document collection and correlation workflows for third-party images.
  owner_primary: Security Engineering
  owner_supporting: DevSecOps / Release Engineering; ML Platform Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
