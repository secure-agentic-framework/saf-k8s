- control_id: SAF-K8S-0603-013
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.3'
  control_seq: '013'
  control_title: Lifecycle attestation chain verification across build, promote, and deploy
  control_statement: Organizations must verify attestation chains at each required lifecycle transition, including build, promote, and deploy, before artifacts advance to the next approved stage.
  objective: Ensure attestation checks are executed consistently across artifact lifecycle transitions so incomplete, invalid, or stale attestation chains are detected before downstream use.
  rationale: Attestation policies do not reduce supply chain risk unless every required lifecycle transition actually verifies the attestation chain before promotion, distribution, or deployment proceeds. Lifecycle verification provides the evidence that attestation requirements were evaluated when artifacts moved downstream.
  scope: Applies to all CI/CD pipelines, artifact promotion workflows, and deployment workflows that process signed artifact attestations from build through deployment.
  primary_enforcement_point: CI/CD and promotion gate verification steps at lifecycle transition points.
  implementation_surface: Policy engine evaluation within build, promotion, and deploy workflows; attestation chain verification checks at lifecycle transitions; and pass/fail logs showing whether artifacts satisfied attestation requirements before advancing.
  owner_primary: Security Engineering
  owner_supporting: DevSecOps / Release Engineering; Platform Engineering
