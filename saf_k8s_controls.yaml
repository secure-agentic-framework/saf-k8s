- control_id: SAF-K8S-0103-016
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.3'
  control_seq: '016'
  control_title: Controller-manager and scheduler loopback bind-address enforcement
  control_statement: Production Kubernetes clusters must bind the controller-manager and scheduler secure serving endpoints to the loopback address (127.0.0.1 or ::1) unless an explicitly approved alternate architecture requires a different local-only exposure pattern.
  objective: Prevent network-based access to controller-manager and scheduler secure endpoints by constraining those components to local-only bind addresses.
  rationale: Even when secure ports use authenticated serving, exposing controller-manager and scheduler endpoints on network-accessible interfaces increases attack surface for reconnaissance, abuse, and misconfiguration. Enforcing loopback bind addresses keeps these control-plane endpoints reachable only to local processes or explicitly brokered access paths.
  scope: Applies to all self-managed Kubernetes clusters. Covers `--bind-address` and equivalent local-interface exposure settings on kube-controller-manager and kube-scheduler. For managed Kubernetes services, this is provider-managed and should be documented in the shared responsibility model.
  primary_enforcement_point: Controller-manager and scheduler bind-address configuration
  implementation_surface: Controller-manager and scheduler static pod manifests or systemd unit configurations, secure-port bind-address settings, and local reachability validation.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0103-017
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.3'
  control_seq: '017'
  control_title: Controller-manager and scheduler insecure-port disablement and non-public health-metrics exposure
  control_statement: Production Kubernetes clusters must disable insecure serving ports for the controller-manager and scheduler, and must not expose health or metrics endpoints on network-accessible interfaces unless explicitly required and protected by authentication and approved access controls.
  objective: Eliminate unauthenticated control-plane exposure by disabling insecure ports and constraining health and metrics endpoints to non-public or explicitly protected access paths.
  rationale: Historically, controller-manager and scheduler components exposed insecure or weakly protected HTTP endpoints for health checks, metrics, and diagnostics. If these endpoints are reachable on network-accessible interfaces, attackers can harvest operational data, probe control-plane health, or exploit misconfigured monitoring paths. Disabling insecure ports and restricting health or metrics exposure reduces this risk.
  scope: Applies to all self-managed Kubernetes clusters. Covers deprecated `--port` / `--address` handling, secure health and metrics exposure configuration, and any approved authenticated path used for monitoring integration. For managed Kubernetes services, this is provider-managed and should be documented in the shared responsibility model.
  primary_enforcement_point: Controller-manager and scheduler endpoint exposure hardening
  implementation_surface: Controller-manager and scheduler static pod manifests or systemd unit configurations, metrics and health endpoint exposure settings, CIS Benchmark scanning, and network reachability assessment.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0103-018
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.3'
  control_seq: 018
  control_title: Control-plane replica distribution and etcd quorum topology
  control_statement: Production Kubernetes clusters must deploy control-plane components in a highly available configuration with a minimum of three replicas distributed across distinct failure domains and must configure etcd with an odd number of members sufficient to preserve quorum during a component or failure-domain outage.
  objective: Maintain control-plane resilience through replica placement and quorum-safe etcd topology that survives individual node or failure-domain loss.
  rationale: Leader election does not preserve availability when control-plane replicas or etcd members are concentrated in a single failure domain or sized without quorum tolerance. Requiring distributed replicas and quorum-safe etcd topology ensures the control plane can continue operating when nodes, racks, or zones fail.
  scope: Applies to production clusters. Covers control-plane replica count and placement and etcd member topology. For managed Kubernetes, verify provider HA replica and quorum guarantees.
  primary_enforcement_point: Control-plane topology and etcd quorum architecture
  implementation_surface: Control-plane topology inventory, replica placement across failure domains, etcd member configuration, and availability architecture documentation.
  owner_primary: Platform Engineering
  owner_supporting: Site Reliability Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0103-019
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.3'
  control_seq: 019
  control_title: API server load-balancer health-check failover
  control_statement: Production Kubernetes clusters must expose the API server through a load balancer with automated health-check failover so control-plane endpoint reachability does not depend on a single node or static upstream target.
  objective: Maintain API server availability during node or component failures by enforcing automated endpoint failover for the control-plane access path.
  rationale: A multi-replica control plane still becomes unavailable if clients depend on a single API server endpoint or if upstream failover is manual. Requiring health-checked load-balancer failover ensures clients are redirected away from failed API server instances quickly enough to preserve control-plane access during outages.
  scope: Applies to production clusters. Covers API server endpoint load-balancing, upstream health checks, and automatic failover behavior. For managed Kubernetes, verify provider-managed API endpoint failover architecture and SLA claims.
  primary_enforcement_point: API endpoint failover architecture
  implementation_surface: Load balancer health checks, upstream pool configuration, API endpoint failover behavior, and availability SLO dashboards or failover validation evidence.
  owner_primary: Platform Engineering
  owner_supporting: Site Reliability Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0104-005
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.4'
  control_seq: '005'
  control_title: Control plane configuration file permissions
  control_statement: Control plane nodes must enforce restrictive ownership and permissions on static pod manifests, kubeconfig files, certificate key material, and the etcd data directory, following the CIS Kubernetes Benchmark file permission requirements (section 1.1), and must verify compliance on node provisioning and on a recurring schedule.
  objective: Prevent unauthorized read or modification of control plane configuration, credentials, and cluster state by enforcing file-system-level access controls on control plane nodes.
  rationale: 'Control plane configuration files contain security-sensitive content: static pod manifests reveal API server flags, volume mounts, and host port bindings; kubeconfig files contain client credentials; private keys enable impersonation of cluster components; and the etcd data directory holds all cluster state. Overly permissive file ownership or modes allow local attackers or compromised processes on a control plane node to read credentials, modify component behavior, or tamper with cluster state.'
  scope: Applies to all self-managed control plane nodes. Covers static pod manifests, component kubeconfig files, PKI key material, and the etcd data directory. For managed Kubernetes services, this control is provider-managed and should be documented as such in the shared responsibility model.
  primary_enforcement_point: Node Configuration
  implementation_surface: Node provisioning automation (cloud-init, Ansible, Terraform), node image build pipelines, and periodic configuration management scans.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-01'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0104-007
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.4'
  control_seq: '007'
  control_title: Emergency Kubernetes patch deployment procedures
  control_statement: Organizations must maintain documented emergency upgrade procedures for Kubernetes components (API server, kubelet, container runtime, and critical add-ons) that enable critical patches to be applied within organization-defined SLA windows, including pre-tested rollback plans, change communication processes, and post-patch validation steps.
  objective: Minimize exploitation of known Kubernetes vulnerabilities by ensuring that emergency patches can be deployed rapidly, safely, and with operational continuity under time-pressure conditions.
  rationale: When a critical CVE is identified, exploit code often follows within days. Without pre-established emergency upgrade procedures, patch deployment under time pressure introduces operational risk and delays. Documented runbooks, tested rollback procedures, and defined SLA windows enable rapid response without improvisation.
  scope: Applies to all production and non-production clusters. Covers Kubernetes core component patches, container runtime patches, and critical add-on patches (CNI, CSI, ingress controllers). Also covers lifecycle management of cluster add-ons with independent release cycles (CoreDNS, CNI plugins, CSI drivers, ingress controllers, cert-manager).
  primary_enforcement_point: Governance / Process
  implementation_surface: Emergency change management procedures, upgrade runbooks, rollback documentation, and post-patch validation scripts.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Change Management; Incident Response
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-13'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0104-009
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.4'
  control_seq: 009
  control_title: Feature gate lifecycle transition tracking across Kubernetes upgrades
  control_statement: Production Kubernetes clusters must track feature gate lifecycle transitions across Kubernetes upgrades and must remove, disable, or otherwise resolve deprecated, removed, or graduated feature gate settings so explicit gate configuration does not mask version drift or unsupported behavior after upgrade.
  objective: Prevent stale or incompatible feature gate settings from persisting across Kubernetes version changes and creating opaque, unsupported, or insecure cluster behavior.
  rationale: 'Feature gates change lifecycle state over time: they graduate, rename, deprecate, or disappear. If operators do not track those transitions during upgrades, clusters can retain obsolete gate settings that hide configuration drift, break support assumptions, or unintentionally preserve non-standard behavior after a feature reaches general availability or is removed.'
  scope: Applies to production cluster upgrade planning and validation for all control-plane and node component feature gate settings, including managed services where providers change default gate states across versions.
  primary_enforcement_point: Upgrade planning and post-upgrade configuration review for feature gate lifecycle changes.
  implementation_surface: Upgrade runbooks, feature gate lifecycle tracking records, version-to-version gate transition reviews, and validation steps confirming deprecated or graduated gate settings were removed or updated during upgrade execution.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Architecture Review
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-13'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0104-013
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.4'
  control_seq: '013'
  control_title: Kubernetes upgrade strategy, validation, and rollback planning
  control_statement: Production Kubernetes clusters must maintain a documented upgrade strategy that includes deprecation tracking, pre-upgrade impact analysis, compatibility validation, upgrade runbooks, rollback procedures, and post-upgrade validation steps for control-plane components, nodes, and critical add-ons.
  objective: Ensure Kubernetes upgrades are planned and executed with controlled risk rather than ad hoc change activity that causes outages or breaks dependent workloads.
  rationale: 'Remaining on supported versions requires more than version inventory: organizations need repeatable upgrade planning, API deprecation tracking, validation of workload and add-on compatibility, and tested rollback paths. Without that discipline, upgrades are delayed or create avoidable service disruption.'
  scope: Applies to all production clusters and to routine as well as urgent version upgrades that affect Kubernetes components, node pools, and critical platform add-ons.
  primary_enforcement_point: Change Management / Operations
  implementation_surface: Upgrade planning documentation, validation workflows, rollback procedures, and post-upgrade verification integrated into change execution.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Change Management
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-15'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0104-014
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.4'
  control_seq: '014'
  control_title: Recurring CIS Kubernetes Benchmark scan execution
  control_statement: Production Kubernetes clusters must be assessed against the CIS Kubernetes Benchmark using automated tooling on a recurring schedule, including the applicable managed-service benchmark profile where relevant, so that baseline hardening checks are executed consistently across customer-assessable cluster surfaces.
  objective: Establish a repeatable Kubernetes hardening baseline by running recurring automated CIS Benchmark assessments against the applicable cluster scope.
  rationale: Baseline hardening fails in practice when benchmark scans are run only ad hoc, skipped after upgrades, or limited to partial cluster surfaces. This control isolates the recurring execution obligation so teams can verify that benchmark checks actually run on the required cadence and scope.
  scope: Applies to all production clusters. Covers recurring CIS Benchmark execution for control-plane, node, and policy sections that are customer-assessable, including managed-service benchmark profiles where applicable.
  primary_enforcement_point: Audit / Telemetry
  implementation_surface: Automated CIS Benchmark scanning pipeline, scheduled jobs, managed-service benchmark profile selection, and post-upgrade validation workflow.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Governance Risk and Compliance
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
