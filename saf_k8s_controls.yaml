- control_id: SAF-K8S-0905-052
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: '052'
  control_title: Approved external model source allowlist definition and maintenance
  control_statement: Organizations must define and maintain a curated allowlist of approved external model sources using documented approval criteria for permitted repositories, publishers, or registry namespaces.
  objective: Restrict external model ingestion to a governed set of explicitly approved sources through defined allowlist entries and documented approval criteria.
  rationale: Without a defined allowlist and explicit source-approval criteria, engineers can source pre-trained models and checkpoints from arbitrary public repositories, including typosquatted or impersonated publishers distributing malicious artifacts under trusted names.
  scope: Applies to all external model sources accessed from Kubernetes infrastructure. Covers approved-source criteria, repository URL and publisher allowlists, and governance ownership for deciding which external sources are permitted. Excludes periodic revalidation and stale-source review activities.
  primary_enforcement_point: Approved-source policy and allowlist definition process.
  implementation_surface: Approved external model source allowlists covering repository URLs, organization identifiers, or registry namespaces, with documented approval criteria and governance ownership for deciding which external sources may be used.
