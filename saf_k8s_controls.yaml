- control_id: SAF-K8S-0905-057
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: '057'
  control_title: External model trust-signal assessment and approval review
  control_statement: Organizations must review trust signals for externally sourced models before approving them for internal use and must document the resulting approval or rejection decision.
  objective: Use explicit trust-signal assessment to determine whether an externally sourced model is acceptable for internal use after provenance data is gathered.
  rationale: Provenance metadata alone does not resolve whether an externally sourced model is sufficiently trustworthy. Trust-signal review evaluates publisher reputation, maintenance signals, community confidence, and other contextual indicators needed to support an approval decision.
  scope: Applies to all externally sourced models considered for internal use. Covers trust-signal review, approval rationale, and documented disposition decisions for externally sourced models. Excludes internal re-signing, ML-BOM external-origin annotation, and internal registry admission, which remain covered by SAF-K8S-0905-031.
  primary_enforcement_point: Trust review and disposition decision workflow before internal acceptance.
  implementation_surface: Trust-signal review records for externally sourced models before approval, approval or rejection records documenting trust-based disposition decisions, and governance notes capturing the trust rationale for accepted external models.
