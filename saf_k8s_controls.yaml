- control_id: SAF-K8S-0302-001
  domain_code: D03
  domain_name: Workload and Pod Security
  knowledge_area: '3.2'
  control_seq: '001'
  control_title: Pod and container security context enforcement
  control_statement: All containers must define security contexts that set runAsNonRoot to true, specify an explicit runAsUser with a non-zero UID, set readOnlyRootFilesystem to true, and set allowPrivilegeEscalation to false, unless a documented exception with compensating controls is approved.
  objective: Constrain container runtime behavior to the minimum privilege required by enforcing non-root execution, immutable root filesystems, and privilege escalation prevention at the security context level.
  rationale: Containers running as root can modify system binaries, access sensitive host paths, and exploit kernel vulnerabilities for container escape. Writable root filesystems allow attackers to persist malware and modify application binaries. Without allowPrivilegeEscalation set to false, setuid binaries or kernel exploits can grant full root capabilities even to containers started with reduced privileges.
  scope: Applies to all pods and containers in production clusters, including init containers and sidecar containers. Managed services and third-party operator pods must comply or carry documented exceptions. System-level pods (kube-system) may require exceptions for specific fields.
  primary_enforcement_point: Pod Security Admission (Restricted level), supplemented by policy engine rules validating individual security context fields at admission time.
  implementation_surface: Pod and container securityContext fields (runAsNonRoot, runAsUser, runAsGroup, readOnlyRootFilesystem, allowPrivilegeEscalation), Pod Security Admission (Restricted level), policy engine mutation and validation rules (OPA Gatekeeper, Kyverno) for injecting and enforcing security context defaults, emptyDir volume mounts for writable paths (/tmp, cache directories), and CI/CD manifest scanning for security context completeness.
  owner_primary: Application Development teams
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0302-002
  domain_code: D03
  domain_name: Workload and Pod Security
  knowledge_area: '3.2'
  control_seq: '002'
  control_title: Linux capability drop-all and least-privilege add-back
  control_statement: All containers must drop ALL Linux capabilities and add back only the specific capabilities required for the workload to function, with GPU workloads documenting which elevated capabilities (e.g., SYS_ADMIN, SYS_RAWIO) are required for device access and whether least-privilege alternatives (device plugins, CDI) can replace them.
  objective: Minimize the kernel-level privileges available to containers by enforcing a drop-all-then-add-back capability model, preventing unnecessary access to dangerous kernel interfaces including those commonly over-provisioned for GPU workloads.
  rationale: Linux capabilities grant fine-grained kernel privileges that attackers can use for container escape, network manipulation, or host filesystem access. GPU workloads are frequently granted SYS_ADMIN or SYS_RAWIO for device access, but these capabilities also enable mount namespace manipulation and raw I/O to any device. Without a drop-all baseline, containers inherit a default capability set that includes NET_RAW, enabling network-level attacks within the cluster.
  scope: Applies to all containers in production clusters. GPU and accelerator workloads must document required capabilities and demonstrate that device-plugin or CDI-based alternatives have been evaluated before elevated capabilities are approved.
  primary_enforcement_point: Pod Security Admission (Restricted level requires drop ALL), policy engine rules validating capabilities.add lists against an approved allowlist per workload class.
  implementation_surface: 'Container securityContext.capabilities (drop: ALL, add: specific capabilities), Pod Security Admission (Restricted level), policy engine allowlists for per-workload-class capability grants, NVIDIA device plugins with CDI (Container Device Interface) support (--cdi-enabled flag), containerd 1.7+/CRI-O 1.28+ CDI runtime support, strace and seccomp log profiling for capability verification, GPU driver version documentation, and InfiniBand/RDMA capability scoping (IPC_LOCK, NET_RAW) for multi-GPU training pods.'
  owner_primary: Application Development teams
  owner_supporting: Platform Engineering; AI/ML Platform team; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0302-004
  domain_code: D03
  domain_name: Workload and Pod Security
  knowledge_area: '3.2'
  control_seq: '004'
  control_title: Host namespace isolation enforcement
  control_statement: Workloads must not use hostPID, hostIPC, or hostNetwork unless a documented exception with compensating controls is approved, and clusters must enforce this restriction through admission control that denies host namespace access by default.
  objective: Prevent containers from sharing the host's PID, IPC, and network namespaces, maintaining the isolation boundary between container workloads and the underlying node.
  rationale: Host PID namespace access allows a container to see and signal all host processes, enabling process injection and credential harvesting. Host IPC namespace access permits shared memory manipulation of host processes. Host network namespace access bypasses network policies and exposes the container to the node's network interfaces, including the kubelet API and metadata services. These capabilities collectively enable container escape, lateral movement, and cloud credential theft.
  scope: Applies to all workloads in production clusters. Infrastructure components that legitimately require host namespace access (e.g., CNI plugins, node monitoring agents) must be isolated in dedicated namespaces with formal exemptions. Host namespace restrictions are enforced at both Baseline and Restricted PSS levels.
  primary_enforcement_point: Pod Security Admission (Baseline and Restricted levels), policy engine rules denying hostPID, hostIPC, and hostNetwork except for explicitly exempted workloads.
  implementation_surface: Pod spec fields (hostPID, hostIPC, hostNetwork), Pod Security Admission (Baseline and Restricted levels), policy engine rules denying host namespace access with scoped exemptions, Kubernetes audit log queries for host namespace admission events, exemption register for infrastructure components (CNI plugins, node monitoring agents, NVIDIA MPS daemon), network policies for compensating controls on exempted pods, and AppArmor/seccomp profiles limiting exempted pods to required operations.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Application Development teams
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0302-005
  domain_code: D03
  domain_name: Workload and Pod Security
  knowledge_area: '3.2'
  control_seq: '005'
  control_title: AI workload security context hardening profiles
  control_statement: AI workloads (inference servers, training jobs, data pipelines) must enforce read-only root filesystems, non-root execution, and workload- specific seccomp or AppArmor profiles tailored to GPU syscall patterns (GPU ioctl, shared memory operations, RDMA verbs), rather than running with unconfined or default profiles that permit unnecessary syscalls.
  objective: Harden AI and ML workloads with security context configurations and mandatory access control profiles specifically tuned to the syscall patterns of GPU-accelerated workloads, closing attack surface without breaking GPU functionality.
  rationale: AI workloads running inference servers or training jobs are frequently deployed with overly permissive security contexts because teams assume GPU access requires unrestricted privileges. In practice, GPU workloads use a well-defined set of syscalls (ioctl for GPU device interaction, shmget/mmap for shared memory, RDMA verbs for high-performance networking) that can be profiled and enforced. Unconfined profiles allow attackers who compromise an ML container to execute arbitrary syscalls including those needed for container escape.
  scope: Applies to all AI/ML workloads in production clusters, including inference servers, training jobs, feature engineering pipelines, and model serving containers that use GPU or accelerator resources. Profiles must be validated against actual workload syscall behavior before enforcement.
  primary_enforcement_point: Security context fields in pod specifications, seccomp profile annotations or securityContext.seccompProfile, AppArmor annotations, enforced by PSA and policy engine admission rules.
  implementation_surface: Pod and container securityContext fields (readOnlyRootFilesystem, runAsNonRoot, runAsUser, seccompProfile, capabilities.drop), Security Profiles Operator (SPO) for custom seccomp profile generation and deployment, AppArmor profile annotations (container.apparmor.security.beta.kubernetes.io or securityContext.appArmorProfile), GPU workload syscall profiling tools (strace, seccomp log mode), emptyDir and PVC volume mounts for model cache and scratch space, NVIDIA device plugin with CDI for zero-capability GPU access, and policy engine admission rules enforcing workload-class-specific security context templates for inference servers, training jobs, and data pipelines.
  owner_primary: AI/ML Platform team
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0302-006
  domain_code: D03
  domain_name: Workload and Pod Security
  knowledge_area: '3.2'
  control_seq: '006'
  control_title: No-new-privileges execution enforcement
  control_statement: All containers must set allowPrivilegeEscalation to false so the runtime applies the no_new_privs flag, and admission controls must deny pods, init containers, and ephemeral debug containers that permit privilege escalation unless a documented exception with compensating controls is approved.
  objective: Prevent container processes from gaining additional privileges after start through setuid, setgid, or capability-raising execve paths.
  rationale: The no_new_privs execution flag blocks privilege-raising binaries and exec transitions even when an attacker reaches code execution inside the container. Without this control, a compromised workload can convert a limited foothold into higher-privilege execution through setuid binaries or similar runtime escalation paths.
  scope: Applies to all pods and containers in production clusters, including init containers and ephemeral debug containers.
  primary_enforcement_point: Pod Security Admission (Restricted level) and policy engine rules validating securityContext.allowPrivilegeEscalation for all container types.
  implementation_surface: Pod and container securityContext.allowPrivilegeEscalation settings and admission validation for no_new_privs enforcement.
  owner_primary: Application Development teams
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
