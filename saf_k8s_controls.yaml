  knowledge_area: '6.1'
  control_seq: 019
  control_title: Runtime container vulnerability exposure monitoring and exception governance
  control_statement: Deployed workloads must be continuously monitored for runtime vulnerability exposure, including AI-specific dependency findings, and unresolved critical or high-severity exposures must have documented risk acceptance and review records.
  objective: Maintain current visibility into vulnerability exposure in running workloads and govern unresolved high-risk findings until remediation is complete.
  rationale: 'Runtime exposure monitoring is a distinct operational control claim from registry rescanning: it identifies which vulnerabilities are present in deployed workloads, tracks AI-specific dependency exposure in use, and ensures unresolved critical or high findings are explicitly governed rather than silently tolerated.'
  scope: Applies to container registries and deployed workloads across all Kubernetes clusters, including runtime scanning of AI/ML images and continuous monitoring of native library exposure.
  primary_enforcement_point: Runtime scanning agents, exposure dashboards, and vulnerability exception governance workflows.
  implementation_surface: Runtime scanning operators, workload coverage telemetry, exposure dashboards for running containers and AI dependencies, and documented risk acceptance workflows for unresolved findings.
