- control_id: SAF-K8S-0603-009
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.3'
  control_seq: 009
  control_title: In-toto and SLSA provenance attestation generation
  control_statement: All container images promoted to production must have in-toto attestations generated during the CI/CD build process that record SLSA provenance metadata, build-time metadata, and builder identity, and those attestations must be attached to the image digest as signed OCI artifacts.
  objective: Provide tamper-evident provenance for each promoted image so reviewers can verify how the image was built, from which source inputs, and by which approved builder before the artifact is trusted downstream.
  rationale: Image signatures identify a signer, but they do not prove which source, build invocation, or builder produced the image. Provenance attestations close that gap by binding the promoted image digest to the build facts needed to detect tampering in the software supply chain.
  scope: Applies to all container images in production and staging registries, including model-serving images, training images, and infrastructure operator images. Third-party vendor images must have equivalent provenance attestations verified or compensating controls documented.
  primary_enforcement_point: CI/CD pipeline provenance generation and registry attachment step.
  implementation_surface: in-toto attestation generation, SLSA provenance predicate creation, cosign attest or equivalent signing workflows, and OCI artifact attachment of provenance attestations to promoted image digests.
  owner_primary: DevSecOps / Release Engineering
  owner_supporting: Security Engineering; Platform Engineering
  baseline_or_ai_specific: baseline
