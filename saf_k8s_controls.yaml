- control_id: SAF-K8S-1006-004
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.6'
  control_seq: '004'
  control_title: Automated audit readiness for Kubernetes AI platforms
  control_statement: Organizations must implement automated compliance evidence collection for Kubernetes AI platforms, including periodic configuration snapshot generation, framework crosswalk documentation linking controls to regulatory requirements, and continuous audit readiness dashboards that surface compliance posture and evidence gaps in real time.
  objective: Reduce audit preparation burden and improve audit outcomes by maintaining continuously collected, organized, and accessible compliance evidence for Kubernetes AI infrastructure.
  rationale: Manual audit evidence collection for Kubernetes AI environments is time-consuming, error-prone, and produces point-in-time snapshots that may not reflect the actual compliance posture at audit time. Without automated evidence collection and framework crosswalk documentation, audit teams spend excessive time gathering artifacts, control owners provide inconsistent evidence, and compliance gaps are discovered during audits rather than proactively, leading to audit findings, remediation pressure, and potential regulatory consequences.
  scope: Applies to all Kubernetes AI platform components subject to audit requirements. Covers configuration snapshots, control evidence collection, framework crosswalk maintenance, and audit readiness dashboards. Must support multiple compliance frameworks simultaneously and integrate with the GRC platform.
  primary_enforcement_point: Compliance automation tooling, configuration snapshot scheduling, and GRC platform evidence repository.
  implementation_surface: Automated configuration snapshot generation (kubectl get -o yaml across RBAC bindings, NetworkPolicies, PodSecurityStandards, admission controller configs, GPU device plugin configs, policy engine rules), kube-bench CIS Benchmark scan scheduling, policy engine audit report generation, version-controlled snapshot storage with timestamps, framework crosswalk documentation automation linking SAF-K8S controls to regulatory requirements with evidence packages, audit readiness dashboards (Grafana or GRC platform) displaying compliance posture per framework, evidence freshness tracking, policy violation trends, and open gap and compensating control status with alerting on stale evidence or coverage drops.
  owner_primary: GRC/Compliance
  owner_supporting: Platform Engineering; Security Operations; AI/ML Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
