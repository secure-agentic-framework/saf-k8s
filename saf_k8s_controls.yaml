- control_id: SAF-K8S-1004-006
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.4'
  control_seq: '006'
  control_title: Cross-source threat correlation with business context for AI incidents
  control_statement: Organizations must correlate technical audit data with business context and non-technical sources, including organizational risk indicators, physical security events, and HR actions, to support comprehensive threat assessment and incident prioritization for Kubernetes AI environments.
  objective: Improve threat assessment and incident prioritization by correlating technical Kubernetes AI telemetry with business-context and non-technical risk signals.
  rationale: Technical telemetry alone often fails to distinguish routine noise from targeted insider activity, coordinated abuse, or incidents with elevated business impact. Correlating audit data with organizational and non-technical context helps analysts prioritize the right incidents and assess whether suspicious activity is isolated, systemic, or business-critical.
  scope: Applies to security operations teams responsible for Kubernetes AI infrastructure and incident triage. Covers cross-source correlation workflows that join technical telemetry with business context and non-technical signals during threat assessment and investigation.
  primary_enforcement_point: Cross-source correlation workflow in SIEM or SOAR and incident triage process.
  implementation_surface: Correlation of technical audit data with organizational risk indicators, physical security events, HR actions, and other non-technical context; SIEM or SOAR enrichment workflows; analyst triage playbooks; and incident assessment procedures that incorporate contextual signals into prioritization and escalation.
