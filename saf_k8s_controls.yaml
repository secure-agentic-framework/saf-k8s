- control_id: SAF-K8S-0403-002
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.3'
  control_seq: '002'
  control_title: External secrets management integration
  control_statement: Organizations must integrate Kubernetes workloads with external secrets management systems (External Secrets Operator, Vault CSI Provider, or cloud-native secret stores) to centralize secret storage, enable automatic synchronization, and enforce rotation policies outside the Kubernetes control plane.
  objective: Centralize secrets in a dedicated secrets management platform with stronger access controls, audit logging, and rotation capabilities than native Kubernetes Secrets provide, while ensuring workloads receive up-to-date secret values automatically.
  rationale: Native Kubernetes Secrets lack built-in rotation, fine-grained audit logging, and centralized management across multiple clusters. Storing secrets exclusively in Kubernetes creates cluster-scoped blast radius and makes cross-cluster secret management difficult. External secrets management platforms provide centralized lifecycle management, automatic rotation, detailed access audit trails, and integration with enterprise compliance workflows.
  scope: Applies to all production clusters and workloads that consume secrets. Covers database credentials, API keys, TLS certificates, and any other sensitive configuration. Organizations using multiple clusters must ensure consistent external secrets integration across all clusters. Exceptions for bootstrapping secrets (e.g., initial Vault authentication) must be documented.
  primary_enforcement_point: External Secrets Operator or Vault CSI Provider deployment configuration, SecretStore and ExternalSecret custom resource definitions, and admission policies restricting direct creation of native Kubernetes Secrets.
  implementation_surface: External Secrets Operator (ESO) with SecretStore and ExternalSecret custom resources, Vault CSI Provider for direct pod volume mounting, Vault Agent sidecar injector, cloud-native secret stores (AWS Secrets Manager, GCP Secret Manager, Azure Key Vault), synchronization interval and event-driven refresh configurations, and admission policies restricting direct creation of native Kubernetes Secret objects.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Application Development
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0403-003
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.3'
  control_seq: '003'
  control_title: Approved secret injection pattern standards
  control_statement: Organizations must select approved secret injection patterns (volume mounts, CSI secret store volumes, init containers, and sidecar agents) based on a documented security assessment of each pattern's tradeoffs, and must maintain documented standards specifying which injection patterns are approved for each workload classification.
  objective: Ensure that secrets are delivered to workloads through injection patterns that minimize exposure risk by restricting filesystem permissions, enabling update without pod restart, or fetching secrets dynamically with automatic rotation.
  rationale: Volume-mounted secrets can be restricted by filesystem permissions and updated without pod restart. CSI secret store volumes fetch secrets directly from external stores without persisting them broadly in platform data stores. Init container and sidecar agent patterns enable dynamic secret fetching with automatic rotation. Selecting injection patterns without documented security assessment can negate the protections provided by encryption at rest and external secrets management. Environment variable prohibition is a separate obligation covered by SAF-K8S-0403-016.
  scope: Applies to all workloads that consume secrets in production clusters. Covers Kubernetes-native Secret volume mounts, CSI secret store volumes, init container injection, and sidecar-based secret agents. Excludes environment variable injection prohibition and exception governance, which are covered by SAF-K8S-0403-016. Development and testing environments should follow the same approved patterns where feasible.
  primary_enforcement_point: Documented Secret Injection Pattern Standards per Workload Classification
  implementation_surface: Pod spec volume mounts for Secret objects, CSI secret store volume drivers, Vault Agent sidecar and init container injection patterns, and documented standards specifying approved injection patterns by workload type.
  owner_primary: Application Development
  owner_supporting: Security Engineering; Platform Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0403-004
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.3'
  control_seq: '004'
  control_title: Secret rotation and expiration enforcement
  control_statement: Organizations must enforce secret rotation on a defined schedule, set expiration policies for all secrets, and implement revocation procedures for compromised credentials to limit the useful lifetime of any individual secret.
  objective: Limit the useful lifetime of any individual secret through enforced rotation and expiration, reducing the window of opportunity for credential-based attacks.
  rationale: Secrets that are never rotated remain valid indefinitely, giving attackers unlimited time to exploit stolen credentials. Without expiration enforcement, accumulated secrets create an ever-growing attack surface. Enforced rotation and expiration ensure that even if a credential is compromised, it becomes invalid within a bounded time window.
  scope: 'Applies to all secret types across all clusters: API keys, database credentials, TLS private keys, service account tokens, and cloud provider credentials. Covers rotation schedules, expiration policies, and revocation runbooks.'
  primary_enforcement_point: External secrets management rotation policies and credential expiration enforcement in secret stores.
  implementation_surface: External secrets manager rotation policies (Vault dynamic secret TTLs, AWS Secrets Manager rotation lambdas, GCP Secret Manager rotation schedules), credential expiration enforcement in secret stores, and incident response runbooks for credential revocation.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Application Development
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0403-005
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.3'
  control_seq: '005'
  control_title: AI pipeline secret leakage prevention
  control_statement: Organizations must prevent secret leakage through training logs, model artifacts, checkpoint files, and pipeline metadata by implementing output filtering, artifact scanning, and dedicated secrets management for model registry credentials, training data access tokens, and API keys used by inference endpoints.
  objective: Ensure that secrets used by AI/ML pipelines are not inadvertently persisted in training outputs, model artifacts, or pipeline logs where they could be extracted by anyone with access to those artifacts.
  rationale: AI/ML pipelines present unique secret leakage vectors beyond traditional application workloads. Training jobs may log environment variables including credentials to experiment tracking systems. Model checkpoint files can embed configuration objects containing API keys. Pipeline metadata in orchestrators like Kubeflow or Argo may persist secret values in workflow status fields. Inference endpoints with hardcoded API keys bake credentials into serving containers that may be widely distributed.
  scope: Applies to all AI/ML pipeline components including training jobs, experiment tracking systems, model registries, checkpoint storage, and inference serving infrastructure. Covers secrets for model registry authentication, training data access, feature store connections, GPU cluster access, and external API keys used by inference endpoints.
  primary_enforcement_point: Training log sanitization filters, model artifact scanning in CI/CD pipelines, pipeline metadata redaction in workflow orchestrators, and container image scanning for hardcoded credentials in inference containers.
  implementation_surface: Training log sanitization filters and structured logging with secret redaction, model artifact and checkpoint file scanning in CI/CD pipelines for embedded credentials, pipeline orchestrator metadata redaction (Kubeflow, Argo Workflow status field sanitization), container image scanning for hardcoded API keys in inference serving containers, experiment tracking client configuration (MLflow, Weights & Biases) with parameter filtering, and dedicated secret injection for model registry credentials, training data access tokens, and inference endpoint API keys.
  owner_primary: ML Engineering
  owner_supporting: Security Engineering; Platform Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0403-006
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.3'
  control_seq: '006'
  control_title: Per-workload credential scoping for AI jobs
  control_statement: Each AI workload (training job, inference server, pipeline step) must receive credentials scoped to exactly the resources it requires -- specific storage prefixes, model registry repositories, feature store tables, and API endpoints -- and must not share broadly-scoped platform credentials across workloads with different data access requirements.
  objective: Prevent lateral movement and blast radius expansion by ensuring that a compromised AI workload's credentials grant access only to the specific resources that workload legitimately needs, not to the entire AI platform's data and services.
  rationale: AI platforms commonly use a single "ML platform" service account or IAM role with broad access to data lakes, model registries, feature stores, and compute resources. When thousands of training jobs share one credential scope, any compromised job gains access to all training data, all models, and all downstream services. Per-workload scoping limits blast radius to the specific datasets, model repositories, and APIs that each job actually needs. SAF-K8S-0402-008 establishes service account segmentation by workload type; this control extends that principle to the credential scope granted to each individual job.
  scope: Applies to all AI/ML workloads including training jobs, inference servers, pipeline orchestrator steps, notebook sessions, and batch evaluation jobs. Covers cloud IAM policies, Vault dynamic secret policies, Kubernetes RBAC bindings, and external service API key scoping. Complements SAF-K8S-0402-008 (workload type segmentation) and SAF-K8S-0402-009 (ephemeral credential lifecycle).
  primary_enforcement_point: Cloud IAM policy conditions, Vault policy paths, Kubernetes RBAC bindings, and admission policies validating credential scope annotations.
  implementation_surface: Cloud IAM (AWS IAM policy conditions, GCP IAM conditions, Azure RBAC conditions), HashiCorp Vault policies with templated paths, Kubernetes service accounts with per-job RBAC bindings, pipeline orchestrators (Kubeflow, Argo, Ray) job templates.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; ML Engineering; Cloud Platform Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-05'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0403-011
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.3'
  control_seq: '011'
  control_title: Secrets KMS key rotation and re-encryption verification
  control_statement: Kubernetes Secrets encryption keys must rotate on a defined schedule, and periodic re-encryption verification must confirm that no Secrets remain encrypted under retired keys.
  objective: Ensure long-lived KMS keys protecting Kubernetes Secrets are rotated and that existing Secrets are re-encrypted so retired key material does not remain in use.
  rationale: Using an external KMS without key lifecycle enforcement leaves old keys in service indefinitely. This control isolates rotation and re-encryption verification so teams can independently prove that key retirement actually propagates to stored Secrets.
  scope: Applies to all production Kubernetes clusters using KMS-backed Secrets encryption. Covers automated key rotation schedules, retired-key re-encryption checks, and verification that existing Secrets are protected under current keys.
  primary_enforcement_point: KMS rotation automation and re-encryption verification.
  implementation_surface: Automated key rotation schedules, KMS metadata, and re-encryption verification tooling or procedures confirming current-key coverage for stored Secrets.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Key Management/Cryptography; Cloud Platform Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-15'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0403-017
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.3'
  control_seq: '017'
  control_title: AI platform key-domain hierarchy and envelope encryption architecture
  control_statement: Organizations operating AI platforms must implement a structured key hierarchy using envelope encryption with distinct key domains for training data encryption, model artifact encryption, model signing, inference payload protection, and other platform cryptographic functions, with HSM-backed or equivalently protected root keys and domain-specific rotation schedules.
  objective: Ensure AI platform cryptographic design separates key domains by function so compromise of one domain does not automatically expose every other protected asset.
  rationale: AI platforms protect multiple asset classes with different trust assumptions. A structured envelope-encryption hierarchy with domain-specific keys and protected root-of-trust material prevents a single compromised encryption key from collapsing the full cryptographic boundary for training, model, and inference systems.
  scope: Applies to AI platform cryptographic architecture for training data, model artifacts, model signing, checkpoints, and inference payload protection. Covers key hierarchy design, root-key protection, and domain-specific rotation scheduling.
  primary_enforcement_point: KMS and HSM architecture design for AI platform key hierarchy and root-of-trust management.
  implementation_surface: Cloud KMS key hierarchy, HSM-backed root keys, envelope encryption flows, model registry encryption configuration, training data encryption integration, model signing infrastructure, and per-domain rotation schedules.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; ML Engineering; Key Management/Cryptography
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0403-018
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.3'
  control_seq: 018
  control_title: AI platform cryptographic key access domain separation
  control_statement: Organizations operating AI platforms must enforce key access policies that separate training, serving, signing, and governance identities so that workload or operator access in one cryptographic domain does not grant cross-domain use of other keys.
  objective: Prevent cryptographic privilege crossover between training, serving, signing, and governance environments by enforcing domain-separated key access policies.
  rationale: A sound key hierarchy is insufficient if the same workloads or operators can still use every key. Domain-separated access policies ensure that training systems cannot sign production models, serving systems cannot decrypt training datasets, and governance identities cannot be bypassed through shared cryptographic permissions.
  scope: Applies to KMS and HSM key policies for AI platform cryptographic operations across training, serving, model signing, checkpoint handling, and governance environments.
  primary_enforcement_point: KMS key policies, workload identity bindings, and audit enforcement for domain-separated key use.
  implementation_surface: KMS key access policies, IAM bindings, workload identity permissions, and audit logs showing key usage by workload identity without cross-domain access.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; ML Engineering; Key Management/Cryptography
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
