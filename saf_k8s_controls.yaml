- control_id: SAF-K8S-1006-001
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.6'
  control_seq: '001'
  control_title: Regulatory compliance mapping for Kubernetes AI platforms
  control_statement: Organizations must maintain a documented mapping of Kubernetes AI platform controls to applicable regulatory frameworks, including NIST AI RMF, applicable EU AI Act obligations based on organizational role (provider or deployer) and AI system risk classification, and SOC 2 trust service criteria. The mapping must identify control coverage, gaps, and compensating controls for each applicable requirement.
  objective: Demonstrate and maintain regulatory compliance for Kubernetes AI infrastructure through explicit, auditable control-to-requirement mappings that support multiple regulatory frameworks simultaneously.
  rationale: AI workloads on Kubernetes are subject to overlapping regulatory requirements (AI-specific regulations, cloud security standards, data protection laws) that each impose distinct control expectations. Without a maintained compliance mapping, organizations cannot demonstrate coverage to auditors, risk duplicating compliance efforts across frameworks, or discover gaps only during audit findings, resulting in remediation under time pressure and potential regulatory penalties.
  scope: Applies to all Kubernetes clusters hosting AI workloads subject to regulatory requirements. Covers NIST AI RMF, EU AI Act, and SOC 2 at minimum; additional frameworks must be added based on jurisdictional and industry requirements. Mappings must be updated when regulations are revised or new AI workload types are deployed.
  primary_enforcement_point: GRC platform compliance mapping module, regulatory change management process, and audit preparation workflow.
  implementation_surface: Compliance mapping documentation (spreadsheet, database, or policy-as-code repository), regulatory framework crosswalk tables linking SAF-K8S controls to EU AI Act articles (Art. 12 record-keeping, Art. 15 accuracy/robustness/cybersecurity scoped by provider/deployer role and risk classification), NIST AI RMF functions (GOVERN, MAP, MEASURE), SOC 2 trust service criteria (CC6.1, CC7.2), SSDF practice groups and NIST SP 800-218A AI community profile task identifiers, organizational role determination (provider vs. deployer), AI system risk classification, gap analysis and compensating control documentation, and structured evidence linkage per regulatory requirement.
  owner_primary: GRC/Compliance
  owner_supporting: Security Architecture; Platform Engineering; Legal
