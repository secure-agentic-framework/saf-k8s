  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.10'
  control_seq: 019
  control_title: Centralized audit logging for cross-cluster orchestration actions
  control_statement: Multi-cluster AI workload orchestration control planes must centralize audit logs for cross-cluster placement, routing, and scheduling decisions so orchestration actions remain attributable and reviewable after compromise or failure of an individual member cluster.
  objective: Preserve traceability of cross-cluster orchestration actions through centralized audit collection and review.
  rationale: Logs stored only on the orchestrating cluster or a member cluster can be destroyed, altered, or made unavailable during compromise. Centralized audit logging preserves the evidence needed to reconstruct cross-cluster placement and routing decisions and to investigate orchestration abuse after an incident.
  scope: Applies to organizations operating AI workloads across multiple Kubernetes clusters, whether on-premises, multi-cloud, or hybrid. Covers centralized audit log collection for cross-cluster placement, routing, and scheduling decisions. Excludes federated identity issuance and authorization enforcement for cross-cluster APIs.
  primary_enforcement_point: Centralized collection of orchestration audit logs for cross-cluster actions.
  implementation_surface: Centralized audit logging pipelines, orchestration audit events recording requesting principal identity and target-cluster action, and log collection or retention settings for cross-cluster placement, routing, and scheduling decisions.
