  date_modified: '2026-03-17'
- control_id: SAF-K8S-0503-007
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.3'
  control_seq: '007'
  control_title: Ingress TLS termination and boundary configuration hardening
  control_statement: Ingress controllers must enforce TLS termination with organization-approved cipher suites and minimum TLS version for externally facing endpoints, using approved certificate management processes and ingress boundary configuration that prevents weak or unintended exposure.
  objective: Ensure encrypted and intentionally configured ingress paths protect backend services from downgrade, interception, and accidental insecure exposure.
  rationale: Ingress controllers are the main external boundary into cluster-hosted services. Weak TLS settings or poorly governed ingress boundary configuration expose traffic to interception, downgrade, and misconfiguration risk before any application-layer filtering takes effect. This is a distinct enforcement point from WAF and rate-limiting policy.
  scope: Applies to all ingress controllers in production clusters, including NGINX Ingress, Envoy, Traefik, and cloud-managed ALB/NLB ingress controllers. Covers TLS termination settings, approved certificate management, and secure ingress boundary configuration for externally exposed endpoints.
  primary_enforcement_point: Ingress Boundary / TLS
  implementation_surface: Ingress controller TLS configuration, boundary exposure settings, and cert-manager or equivalent certificate management integrations.
  owner_primary: Network Engineering
  owner_supporting: Application Security; Platform Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
