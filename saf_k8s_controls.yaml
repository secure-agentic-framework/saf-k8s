- control_id: SAF-K8S-0905-056
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: '056'
  control_title: External model publisher identity and provenance metadata verification
  control_statement: Organizations must verify available provenance metadata for externally sourced models, including publisher identity and available commit, release, or signature provenance, before the models are approved for internal use.
  objective: Preserve chain of custody for external model intake by validating publisher identity and available provenance metadata before internal acceptance.
  rationale: Even when a model passes malware or behavioral screening, deployment remains unsafe if the organization cannot establish who published it and what provenance metadata accompanies the artifact. Provenance verification provides the chain-of-custody context needed before internal use.
  scope: Applies to all externally sourced models admitted for internal use. Covers publisher identity verification, model card or source metadata review, and commit-signature or release-signature provenance checks. Excludes broader trust-signal risk assessment and disposition review.
  primary_enforcement_point: Provenance verification workflow before internal acceptance.
  implementation_surface: Publisher identity checks, model card or source metadata review, commit-signature or release-signature validation, and documented provenance verification records for approved external models.
