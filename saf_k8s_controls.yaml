- control_id: SAF-K8S-0902-003
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.2'
  control_seq: '003'
  control_title: Inference request validation and input sanitization
  control_statement: Inference endpoints must validate and sanitize all incoming requests through adversarial input detection, payload size limits, request format enforcement, and injection attack prevention to protect inference servers from malicious inputs.
  objective: Protect inference servers from malicious inputs that exploit model behavior or crash the server through adversarial examples, oversized payloads, malformed requests, or injection attacks.
  rationale: Inference APIs accept untrusted input that can contain adversarial examples, oversized payloads, malformed requests, or injection attacks designed to manipulate model behavior or crash the server. Without input validation, these attacks succeed silently. Input validation at the API gateway and inference preprocessing layer provides defense in depth.
  scope: Applies to all inference request processing paths on Kubernetes, including HTTP/gRPC inference APIs, batch prediction endpoints, and streaming inference channels. Covers input preprocessing pipelines. Excludes model-internal robustness (adversarial training) which is addressed in KA 9.3. Response filtering is covered by SAF-K8S-0902-009.
  primary_enforcement_point: Inference API gateway request validation policies and inference server input preprocessing configuration.
  implementation_surface: API gateway and ingress controller request validation policies (payload size limits, schema enforcement), inference server input preprocessing configuration, adversarial input detection middleware, and prompt injection detection for LLM endpoints.
  owner_primary: ML Platform Engineering
  owner_supporting: Security Engineering; Application Security
