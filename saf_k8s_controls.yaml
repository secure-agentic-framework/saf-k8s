- control_id: SAF-K8S-0103-014
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.3'
  control_seq: '014'
  control_title: Scheduler API and decision endpoint access restriction
  control_statement: Production Kubernetes clusters must restrict access to the scheduler API and scheduling decision endpoints to authorized control-plane components only.
  objective: Prevent unauthorized influence over workload placement decisions by limiting scheduler-access paths to authorized control-plane components only.
  rationale: The scheduler determines where workloads run, making it a high-value target for attackers seeking to place pods on compromised nodes, co-locate with sensitive workloads, or bypass security-aware placement controls. Restricting scheduler API and decision endpoints to authorized control-plane components reduces the opportunity for direct placement manipulation.
  scope: Applies to all production clusters. Covers default scheduler configuration, scheduler API exposure, bind-address constraints, and RBAC policies governing scheduler-related resources. For managed Kubernetes services, applies to customer-visible scheduler-access settings and compensating controls where scheduler internals are provider-managed.
  primary_enforcement_point: Scheduler API exposure and RBAC restriction
  implementation_surface: Scheduler configuration, bind address settings, scheduler RBAC bindings, and periodic validation that scheduler endpoints are not exposed beyond authorized control-plane paths.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Application Platform teams
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
