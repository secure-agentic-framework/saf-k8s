- control_id: SAF-K8S-0903-007
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.3'
  control_seq: '007'
  control_title: GPU inference autoscaling replica bounds and stabilization enforcement
  control_statement: GPU-aware autoscaling for inference workloads must enforce maximum replica bounds, scale-up rate constraints, and cooldown or stabilization settings to prevent runaway inference scale-out during adversarial or abusive demand spikes.
  objective: Bound inference autoscaler behavior so GPU-backed serving cannot expand uncontrollably under attack-driven demand or misbehaving metrics.
  rationale: GPU inference capacity is expensive and can expand quickly when autoscalers react directly to load or queue metrics. Hard replica ceilings and stabilization windows constrain the speed and extent of scale-out, limiting denial-of-wallet and service-instability risk even before financial controls or human intervention engage.
  scope: Applies to autoscaled inference deployments on Kubernetes using HPA, KEDA, or custom GPU-aware autoscalers. Covers autoscaler mechanical bounds, cooldown or stabilization behavior, and controlled scale-up limits. Excludes budget-threshold integration and queue backpressure controls, which are addressed separately.
  primary_enforcement_point: HPA and KEDA resource definitions, autoscaler policy, and metric-driven scale behavior settings.
  implementation_surface: HorizontalPodAutoscaler and KEDA ScaledObject configurations with max replica ceilings, scale-up policies, cooldown or stabilization windows, and guarded custom GPU utilization or queue-derived metrics.
  owner_primary: ML Platform Engineering
  owner_supporting: Platform Engineering; FinOps
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
