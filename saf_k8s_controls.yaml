  control_statement: Organizations must establish documented chain-of-custody procedures and evidence handling controls for forensic artifacts collected during Kubernetes AI incidents.
  objective: Preserve the integrity, traceability, and admissibility of forensic artifacts collected during Kubernetes AI incidents through defensible custody and evidence handling procedures.
  rationale: Collected evidence loses value if responders cannot show how it was handled, transferred, stored, and protected from tampering. Kubernetes AI investigations require explicit custody records and evidence handling workflows to support investigation, legal review, and regulator scrutiny.
