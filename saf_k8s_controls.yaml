  control_title: Unified multi-cluster compliance reporting
  control_statement: Organizations operating AI workloads across multiple Kubernetes clusters must aggregate compliance evidence and control status across the federation into unified reporting that presents a single multi-cluster view of security posture, exceptions, and audit coverage.
  objective: Provide unified governance visibility across multi-cluster AI platforms by consolidating compliance evidence and exception status into a single reporting view.
  rationale: Federated AI platforms become difficult to govern when compliance evidence remains fragmented by cluster. Unified multi-cluster reporting gives operators, auditors, and governance stakeholders a single view of which controls are enforced where, what exceptions exist, and how the aggregate posture changes across the federation.
  scope: Applies to organizations operating AI workloads across multiple Kubernetes clusters. Covers aggregation of compliance evidence, exception status, and audit coverage across cluster boundaries into a unified reporting view. Excludes centralized secret and certificate governance and cross-cluster incident coordination operations.
  primary_enforcement_point: Unified reporting platform and cross-cluster compliance evidence aggregation process.
  implementation_surface: Compliance evidence aggregation across clusters, normalized control-status dashboards, consolidated exception registers, and reporting workflows that present federation-wide audit posture rather than per-cluster views only.
