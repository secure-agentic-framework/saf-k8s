- control_id: SAF-K8S-0703-010
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.3'
  control_seq: '010'
  control_title: Host-level resource isolation for AI workload nodes
  control_statement: Organizations must enforce host-level resource isolation (cgroup v2, CPU pinning, NUMA awareness) on nodes hosting AI workloads to prevent noisy-neighbor effects in mixed clusters.
  objective: Prevent resource contention at the kernel level on nodes hosting AI workloads by enforcing cgroup, CPU, and memory topology controls.
  rationale: Kubernetes scheduling controls (node affinity, taints) determine which nodes pods run on, but do not prevent resource contention between pods co-located on the same node. Without host-level cgroup v2 enforcement, CPU pinning, and NUMA-aware memory allocation, AI training workloads can cause cache thrashing, memory bandwidth saturation, and CPU contention that degrades co-located inference services. These kernel-level controls operate at a different enforcement layer than Kubernetes scheduling.
  scope: Applies to all Kubernetes nodes hosting AI workloads, particularly nodes running both training and inference workloads. Cgroup v2 must be enabled and configured for resource isolation. CPU pinning and NUMA awareness must be configured for workloads with performance-sensitive requirements. Dedicated single-purpose clusters may have simplified configurations with documented justification.
  primary_enforcement_point: Node-level cgroup v2, CPU Manager, Memory Manager, and NUMA policy configuration on Kubernetes nodes hosting AI workloads.
  implementation_surface: Cgroup v2 configuration for per-container resource accounting, kubelet CPU Manager static policy for CPU pinning, kubelet Memory Manager for NUMA-aware memory allocation, Topology Manager policies (single-numa-node, best-effort), and InfiniBand interconnect configuration for multi-node distributed training.
  owner_primary: Platform Engineering
  owner_supporting: ML Engineering; SRE
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
