  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.10'
  control_seq: 018
  control_title: Cross-cluster orchestration identity federation and authorization
  control_statement: Multi-cluster AI workload orchestration control planes must authenticate cross-cluster API calls using short-lived federated workload identities and enforce authorization policies that restrict which orchestration principals may place, route, or schedule workloads across member clusters.
  objective: Ensure that only trusted orchestration components can issue authorized cross-cluster workload actions.
  rationale: Cross-cluster orchestration expands the attack surface beyond a single control plane. If orchestration identities rely on replicated kubeconfigs, long-lived tokens, or weak authorization, compromise of one environment can be leveraged to direct workloads or invoke actions across the federation from attacker-controlled infrastructure.
  scope: Applies to organizations operating AI workloads across multiple Kubernetes clusters, whether on-premises, multi-cloud, or hybrid. Covers federated workload identity for cross-cluster orchestration and authorization policies governing placement, routing, and scheduling actions. Excludes centralized orchestration audit log retention and review.
  primary_enforcement_point: Cross-cluster orchestration identity federation and authorization policy enforcement.
  implementation_surface: Multi-cluster orchestration control planes, federated workload identity mechanisms such as SPIFFE/SPIRE or cloud-native workload identity federation, short-lived orchestration credentials, authorization policies restricting orchestration principals, and certificate rotation or revocation workflows for federated orchestration identities.
  owner_primary: Platform Engineering
  owner_supporting: ML Platform Engineering; Security Engineering; SRE
  baseline_or_ai_specific: ai-specific
