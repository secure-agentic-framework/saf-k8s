  knowledge_area: '9.9'
  control_seq: '010'
  control_title: Vector database encryption in transit and at rest
  control_statement: Vector databases used for RAG retrieval must encrypt client connections in transit and encrypt vector storage at rest so embeddings and metadata remain protected on the network and on persistent storage volumes.
  objective: Protect vector embeddings and related metadata from interception and storage compromise through transport and storage encryption.
  rationale: Even when access is restricted, embeddings and metadata remain exposed if vector databases do not use TLS for client connections or storage-layer encryption for persistent volumes. Encryption reduces disclosure risk from network interception, stolen disks, snapshots, and underlying storage exposure.
  scope: Applies to vector database instances used for RAG retrieval on Kubernetes, including self-managed and managed vector database services. Covers TLS for client connections and encryption at rest for vector storage volumes or equivalent managed storage layers. Excludes authentication and collection-level authorization.
  primary_enforcement_point: TLS configuration for vector database client connections and storage-layer encryption for vector persistence.
  implementation_surface: TLS certificate configuration for vector database client connections, encryption-at-rest settings for persistent volumes or managed vector storage, and verification that vector storage volumes inherit approved encryption controls.
