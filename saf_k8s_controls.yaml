- control_id: SAF-K8S-0205-010
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.5'
  control_seq: '010'
  control_title: Node-level firewall rule restriction for cluster communication
  control_statement: Kubernetes nodes must implement host-level firewall rules that restrict inbound and outbound traffic to required cluster communication ports and protocols.
  objective: Provide defense-in-depth network segmentation at the node level by constraining node communication to approved cluster paths.
  rationale: Node-level firewall rules provide an independent protection layer even if pod-level policy enforcement is bypassed or misconfigured. Restricting allowed ports and protocols is independently auditable from periodic review or change governance because it governs the active network exposure of each node.
  scope: Applies to all production cluster nodes. Cloud environments may use security groups or VPC firewall rules as the node-level firewall layer. On-premises environments may use iptables, nftables, or firewalld.
  primary_enforcement_point: Cloud security group or host firewall rules applied through infrastructure provisioning and node bootstrap.
  implementation_surface: Cloud security groups, VPC firewall rules, NSGs, iptables, nftables, firewalld, and firewall verification scripts for allowed cluster communication paths.
