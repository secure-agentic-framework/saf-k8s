- control_id: SAF-K8S-1007-005
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.7'
  control_seq: '005'
  control_title: Change management for production AI model deployments
  control_statement: Organizations must enforce change management procedures for production model deployments, including approval workflows, defined deployment windows, and tested rollback procedures.
  objective: Ensure that AI model deployments follow controlled change processes to prevent introduction of compromised or inadequately tested models into production.
  rationale: Uncontrolled model deployments can introduce compromised or inadequately tested models into production without security review. Without formal change management, there is no assurance that deployed models have passed security validation, and no tested rollback path exists if a deployment introduces issues.
  scope: Applies to all production Kubernetes clusters hosting AI workloads. Change management covers model deployment, update, and rollback operations.
  primary_enforcement_point: Change management approval system and ML pipeline promotion gates.
  implementation_surface: Model deployment approval workflows (promotion gates in ML pipelines requiring model owner and platform security team review), deployment window definitions for production inference services, InferenceService spec rollback procedures (revert to previous model version, health check verification, accuracy metric confirmation), and canary deployment configuration (traffic percentage routing, accuracy and latency metric monitoring).
  owner_primary: Platform Engineering
  owner_supporting: AI/ML Engineering; Security Operations
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
