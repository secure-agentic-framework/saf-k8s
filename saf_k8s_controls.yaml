- control_id: SAF-K8S-1001-024
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.1'
  control_seq: '030'
  control_title: Audit log append-only storage and tamper protection
  control_statement: Audit logs must be stored with append-only or equivalent integrity protections that prevent unauthorized deletion, alteration, or silent overwriting of retained audit records.
  objective: Preserve the integrity and evidentiary value of audit logs by enforcing storage-side protections against tampering.
  rationale: Audit records only support investigation and compliance when their integrity can be trusted. Append-only storage, immutability controls, and restricted write paths prevent insiders or compromised administrators from erasing or rewriting evidence of malicious activity.
  scope: Applies to centralized logging platforms, SIEM repositories, immutable storage backends, and archival systems receiving Kubernetes or AI workload audit data.
  primary_enforcement_point: Audit log storage configuration and access controls enforcing append-only or immutable log retention.
  implementation_surface: Object lock or immutability settings, write-only logging credentials, storage integrity controls, and RBAC preventing direct mutation of retained audit logs.
  owner_primary: Security Operations
  owner_supporting: GRC/Compliance; Identity and Access Management
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
