- control_id: SAF-K8S-0405-023
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.5'
  control_seq: '023'
  control_title: Break-glass access audit logging coverage
  control_statement: Organizations must ensure all break-glass access is fully audited so emergency privilege use remains attributable, reviewable, and available for post-use investigation.
  objective: Preserve accountability for emergency access by ensuring all break-glass activity generates complete audit records.
  rationale: Break-glass access is an intentional exception to normal controls. Complete audit logging is required so emergency actions can be reconstructed, reviewed, and investigated after use.
  scope: Applies to all break-glass credentials, kubeconfigs, or certificates issued for production Kubernetes clusters, including managed and multi-tenant environments. Covers audit trails, post-use review evidence, automatic revocation, and expiration after emergency access use.
  primary_enforcement_point: Emergency access audit logging controls.
  implementation_surface: Audit logging for break-glass activation and usage, log retention in central audit systems, and post-use access review evidence.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Identity and Access Management
  baseline_or_ai_specific: baseline
  maturity: Practitioner
