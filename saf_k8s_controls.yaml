- control_id: SAF-K8S-0102-001
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.2'
  control_seq: '001'
  control_title: etcd storage-layer disk encryption with externally managed keys
  control_statement: Production Kubernetes clusters must protect etcd data at the storage layer using provider-managed or infrastructure-level disk encryption with externally managed keys (KMS, CMK, or equivalent), ensuring that key material is not stored on the same node as the data it protects.
  objective: Provide a defense-in-depth encryption layer beneath API-resource encryption (SAF-K8S-0101-003) by ensuring that etcd storage volumes are encrypted at the infrastructure level with externally managed, access-controlled keys, protecting against physical media access and volume snapshot theft.
  rationale: API-resource encryption via EncryptionConfiguration (SAF-K8S-0101-003) protects targeted resource values within etcd, but does not encrypt etcd metadata, non-targeted resources, or WAL and snapshot files at the storage level. Storage-layer encryption, whether provided through cloud disk encryption, dm-crypt or LUKS on self-managed nodes, or KMS envelope encryption, ensures that all etcd data is protected against physical media access, volume snapshot theft, and backup exfiltration. Externally managed keys ensure that key material is not stored alongside the data it protects, reducing the blast radius of a node-level compromise. KMS v2 integration (preferred for new deployments) reduces KMS call volume by using a single DEK per API server instance.
  scope: Applies to all production Kubernetes clusters and to non-production clusters that store sensitive data or provide a path to production. Covers etcd data directory disk encryption and KMS provider deployment. For managed Kubernetes services, applies to enabling and verifying provider-managed envelope encryption and CMK integration where available. Key rotation is governed by SAF-K8S-0102-006; backup encryption by SAF-K8S-0102-007.
  primary_enforcement_point: Node / OS
  implementation_surface: Infrastructure disk encryption configuration (cloud provider KMS, LUKS, or equivalent), KMS plugin deployment for envelope encryption, backup storage encryption policies, and periodic key rotation verification.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Key Management/Cryptography; Cloud Platform Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0102-006
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.2'
  control_seq: '006'
  control_title: etcd encryption key rotation scheduling and verification
  control_statement: Production Kubernetes clusters must enforce automated rotation of etcd encryption keys within organization-defined intervals and verify successful rotation through key version audit logs.
  objective: Ensure that etcd encryption keys are rotated on a scheduled basis and that rotation events are logged and verifiable, limiting the exposure window of any single compromised key.
  rationale: Long-lived encryption keys increase the blast radius of a key compromise. Automated rotation within defined intervals limits the time window during which a compromised key can decrypt etcd data. Most cloud KMS implementations support transparent rotation with no operational downtime. Audit logs of rotation events provide evidence for compliance and incident response.
  scope: Applies to all production Kubernetes clusters using KMS-managed etcd encryption keys (SAF-K8S-0102-001). Covers external KMS key rotation policies and verification that rotation occurred within the policy interval.
  primary_enforcement_point: Key Management Service
  implementation_surface: KMS key rotation policy configuration and key version audit log review process.
  owner_primary: Key Management/Cryptography
  owner_supporting: null
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-13'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0102-007
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.2'
  control_seq: '007'
  control_title: etcd backup storage encryption
  control_statement: Production Kubernetes clusters must ensure that etcd backups and snapshot files inherit equivalent encryption protections to the live etcd volumes, with backup storage using separate encryption keys from the primary etcd volume encryption.
  objective: Prevent exposure of cluster state through etcd backup exfiltration by requiring that backup storage is encrypted with separately managed keys, providing protection even if the primary etcd volume key is compromised.
  rationale: etcd backups contain the complete cluster state including all Secrets. A backup encrypted only with the source volume key provides no incremental protection if that key is compromised. Requiring separate key management for backup storage ensures a node-level key compromise does not simultaneously expose both live etcd data and backup archives. Backup encryption is a distinct audit obligation from live-volume encryption (SAF-K8S-0102-001).
  scope: Applies to all etcd snapshot files and backup archives from production clusters, regardless of storage destination. Backup integrity requirements are governed by SAF-K8S-0102-003.
  primary_enforcement_point: Backup Storage Configuration
  implementation_surface: Backup storage encryption configuration and backup encryption key management separate from primary etcd volume keys.
  owner_primary: Platform Engineering
  owner_supporting: null
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-13'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0102-008
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.2'
  control_seq: 008
  control_title: etcd backup integrity verification and restore assurance
  control_statement: Production Kubernetes clusters must generate and verify integrity evidence for every etcd backup, using checksums or digital signatures at snapshot creation time, verifying that evidence before committing the backup to storage, and re-verifying it before any restore operation.
  objective: Ensure that restored etcd state is demonstrably authentic and untampered before backup media is trusted for recovery.
  rationale: Backup confidentiality does not prevent restoration of corrupted or malicious state. This control isolates the integrity-verification and restore-readiness obligation so operators can independently test checksum generation, signature validation, and pre-restore verification procedures.
  scope: Applies to all production clusters and managed service backup exports where the customer can validate backup artifacts or restore packages.
  primary_enforcement_point: Backup / Restore Validation
  implementation_surface: Backup automation, checksum or signature generation tooling, restore runbooks, and recovery test evidence.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Backup and Recovery Operations
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-15'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0102-012
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.2'
  control_seq: '012'
  control_title: etcd health monitoring and alerting
  control_statement: Production Kubernetes clusters must implement continuous etcd health monitoring with alerts for quorum loss, storage quota pressure, replication lag, and disk or peer latency degradation so control-plane availability threats are detected before they cause write outages.
  objective: Detect etcd degradation early enough to preserve control-plane availability and prevent operational faults from becoming security-impacting outages.
  rationale: An unhealthy etcd cluster directly undermines Kubernetes control-plane availability. Without explicit monitoring and alerting, quorum loss, latency spikes, or storage pressure can progress into write outages that block security-critical actions such as certificate rotation, policy updates, and incident response.
  scope: Applies to all production clusters running self-managed etcd and to managed services where provider-exposed etcd or control-plane health telemetry is available. Covers health endpoints, quorum status, latency, and storage pressure alerting. Excludes compaction and defragmentation maintenance operations.
  primary_enforcement_point: Audit / Telemetry
  implementation_surface: Monitoring and alerting infrastructure for etcd health endpoints, quorum metrics, storage quota metrics, disk latency, and peer latency.
  owner_primary: Platform Engineering
  owner_supporting: Site Reliability Engineering; Security Operations
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
