- control_id: SAF-K8S-0504-001
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.4'
  control_seq: '001'
  control_title: Zero trust networking principles for Kubernetes
  control_statement: Kubernetes clusters must implement zero trust networking principles including identity-centric access control where workload identity rather than network location determines access, continuous verification of communication authorization, microsegmentation of all workload communication, and least-privilege network access granting only the minimum required connectivity.
  objective: Shift network security from perimeter-based trust to identity-based, continuously verified access control for all intra-cluster communication.
  rationale: Traditional perimeter-based network security assumes that traffic within the cluster is trusted, which is invalid in multi-tenant, multi-workload environments where any compromised pod becomes an insider threat. Without identity-centric access, any workload that can reach a service endpoint is implicitly authorized. Without continuous verification, a compromised token or identity remains usable until expiry. Without microsegmentation and least-privilege networking, lateral movement is unconstrained once an attacker gains any foothold.
  scope: Applies to all production Kubernetes clusters. Zero trust principles must be implemented progressively, starting with workload identity and microsegmentation. Full implementation includes continuous authorization verification via service mesh or equivalent. Non-production clusters with access to production data must also adopt zero trust networking.
  primary_enforcement_point: Service mesh authorization policies, workload identity (SPIFFE/mTLS), network policies, and continuous policy evaluation at the data plane.
  implementation_surface: Service mesh authorization policies (Istio AuthorizationPolicy, Linkerd ServerAuthorization, Cilium L7 CiliumNetworkPolicy), workload identity infrastructure (SPIFFE/SPIRE, service mesh mTLS certificates), Kubernetes NetworkPolicy for microsegmentation, Istio PeerAuthentication (STRICT mTLS mode), continuous policy evaluation at the data plane (Envoy proxy, eBPF datapath), and zero trust posture assessment scripts checking mTLS coverage and AuthorizationPolicy presence per namespace.
  owner_primary: Security Architecture
  owner_supporting: Network Engineering; Platform Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0504-002
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.4'
  control_seq: '002'
  control_title: Service mesh mTLS and authorization policies
  control_statement: A service mesh (Istio, Linkerd, or Cilium service mesh) must be deployed to provide automatic mutual TLS for all service-to-service communication, enforce authorization policies that restrict which services can communicate with each other, and deliver traffic observability including request-level metrics and distributed tracing.
  objective: Establish transparent, identity-based encryption and authorization for all service communication with full traffic observability.
  rationale: Without a service mesh, mTLS must be implemented application-by-application, leading to inconsistent coverage and certificate management burden. Application-level authorization is fragmented and difficult to audit centrally. The absence of mesh-level observability means security teams lack visibility into service communication patterns, making it difficult to detect anomalous traffic, unauthorized access, or lateral movement attempts.
  scope: Applies to all production Kubernetes clusters with multi-service architectures. The service mesh must cover all application workloads. System namespaces may be excluded if compensating controls exist. Performance overhead of sidecar proxies must be evaluated and documented.
  primary_enforcement_point: Service mesh control plane configuration (Istio PeerAuthentication, AuthorizationPolicy; Linkerd Server, ServerAuthorization), sidecar injection policies, and mesh-level telemetry pipelines.
  implementation_surface: Service mesh control plane (Istio, Linkerd, Cilium service mesh), Istio PeerAuthentication resources (STRICT mTLS mode), Istio AuthorizationPolicy resources restricting inter-service communication by service account principal, Linkerd Server and HTTPRoute with AuthorizationPolicy, Cilium eBPF-based mTLS and L7 CiliumNetworkPolicy, sidecar injection policies and namespace labels, mesh-level telemetry pipelines (request metrics, distributed tracing), and documentation of mesh exclusions with compensating controls.
  owner_primary: Platform Engineering
  owner_supporting: Network Engineering; Security Engineering; Application Development
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0504-005
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.4'
  control_seq: '005'
  control_title: Service mesh tuning for AI workloads
  control_statement: Service mesh deployments must account for AI workload requirements including evaluating and mitigating mTLS overhead on high-throughput GPU training traffic, managing sidecar proxy resource consumption to avoid contention with GPU workloads, and hardening ingress and API gateway configurations for model serving endpoints against inference-specific attacks.
  objective: Ensure service mesh security controls are effectively applied to AI workloads without degrading training performance or GPU utilization, while hardening model serving endpoints.
  rationale: AI workloads have unique performance characteristics that conflict with standard service mesh configurations. mTLS encryption overhead on high-throughput GPU training traffic (multi-gigabit NCCL all-reduce operations) can significantly degrade training performance. Sidecar proxies consume CPU and memory resources on GPU nodes where those resources are critical for data loading and preprocessing. Model serving endpoints face unique threats including prompt injection, model extraction via repeated inference queries, and adversarial input attacks that require specialized ingress hardening.
  scope: Applies to Kubernetes clusters running AI/ML workloads within a service mesh. Covers GPU training workloads with high-bandwidth inter-node communication, inference serving endpoints exposed via ingress, and AI pipeline orchestration services. Performance exemptions from mTLS must be documented with compensating controls.
  primary_enforcement_point: Service mesh sidecar resource limits, mesh policy exceptions for high-throughput training traffic, and API gateway/ingress configuration for model serving endpoints.
  implementation_surface: 'Service mesh sidecar injection annotations (sidecar.istio.io/inject: false for training pods), Cilium eBPF service mesh (sidecar-free), Envoy sidecar resource limit tuning (CPU, memory, concurrency, buffer settings), CNI-level WireGuard encryption as compensating control for sidecar-exempt training pods, NCCL traffic exemption from proxy paths, API gateway configurations for inference endpoints (request size limits, response size limits, per-client rate limiting, input schema validation), and performance benchmarks comparing AI training throughput with and without mesh mTLS.'
  owner_primary: ML Platform Engineering
  owner_supporting: Network Engineering; Security Engineering; Platform Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0504-006
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.4'
  control_seq: '006'
  control_title: SPIFFE/SPIRE workload identity issuance and lifecycle management
  control_statement: Workload identity must be established using SPIFFE-compliant identities issued by SPIRE or an equivalent workload identity provider, with workload registration, attestation, issuance, and automatic identity rotation configured to maintain verifiable service identity over time.
  objective: Provide cryptographically verifiable workload identities that enable identity-based access control independent of network location.
  rationale: Without cryptographic workload identity issuance and rotation, services fall back to network-based trust that can be spoofed or bypassed. Separating identity lifecycle management from federation governance makes local workload identity controls independently auditable.
  scope: Applies to all production Kubernetes clusters implementing zero trust networking. SPIRE server and agent deployments must follow high-availability patterns. Trust domain naming must align with organizational boundaries. Cross-cluster federation applies where workloads in separate clusters need to authenticate to each other.
  primary_enforcement_point: SPIFFE/SPIRE workload identity issuance and attestation controls.
  implementation_surface: SPIRE server and agent deployments, workload registration entries, workload attestation plugins, SVID issuance, automatic SVID renewal, and integration with service mesh or application-level mTLS for identity-based access control.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Network Engineering
  baseline_or_ai_specific: baseline
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0504-007
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.4'
  control_seq: '007'
  control_title: SPIFFE trust domain scoping and cross-cluster federation governance
  control_statement: SPIFFE trust domains must be explicitly configured and scoped to organizational boundaries, and cross-cluster workload identity federation must use explicit trust bundle exchange and enrolled federation relationships rather than implicit trust.
  objective: Enable secure cross-cluster identity trust only where intended by governing trust-domain boundaries and explicit federation exchange.
  rationale: Improperly scoped trust domains or implicit federation relationships allow workloads in one environment to impersonate identities from another. Separating federation governance from local identity issuance makes trust-boundary control independently auditable.
  scope: Applies to all production Kubernetes clusters implementing zero trust networking. SPIRE server and agent deployments must follow high-availability patterns. Trust domain naming must align with organizational boundaries. Cross-cluster federation applies where workloads in separate clusters need to authenticate to each other.
  primary_enforcement_point: Trust domain and federation boundary governance.
  implementation_surface: Trust domain configuration and naming, federation endpoint configuration, explicit trust bundle exchange, and approval of cross-cluster identity trust relationships.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Network Engineering
  baseline_or_ai_specific: baseline
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0504-008
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.4'
  control_seq: 008
  control_title: L7 service authorization policy enforcement
  control_statement: Microsegmentation must extend beyond L3/L4 network policies to include L7 authorization that restricts service access based on HTTP method, path, and headers at the application protocol layer.
  objective: Achieve fine-grained authorization on allowed service connections so authorized network paths cannot be used for unauthorized operations.
  rationale: L3/L4 network policies only control who can connect, not what operations are performed once connected. Separating L7 authorization from API contract validation makes per-request service authorization independently auditable.
  scope: Applies to production clusters running a service mesh or CNI with L7 policy support. Priority should be given to services handling sensitive data, admin operations, or cross-trust-boundary communication. L7 policies require application protocol awareness and may not apply to non-HTTP workloads without protocol-specific support.
  primary_enforcement_point: Application-layer authorization policy enforcement.
  implementation_surface: Service mesh L7 authorization policies, envoy or gateway authorization rules, and policy tests verifying blocked HTTP methods, paths, and headers on otherwise allowed network connections.
  owner_primary: Security Engineering
  owner_supporting: Network Engineering; Application Development
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0504-009
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.4'
  control_seq: 009
  control_title: API-aware request contract validation
  control_statement: Service-level access control must include API-aware security policies that validate request patterns against expected service contracts so malformed or unexpected operations are rejected before reaching backend logic.
  objective: Validate request behavior against expected API contracts so allowed clients cannot abuse application-layer interfaces with unexpected request patterns.
  rationale: Authorized traffic can still abuse services through unexpected request shapes or unsupported operations. Separating API contract validation from L7 authorization makes request-shape enforcement independently auditable.
  scope: Applies to production clusters running a service mesh or CNI with L7 policy support. Priority should be given to services handling sensitive data, admin operations, or cross-trust-boundary communication. L7 policies require application protocol awareness and may not apply to non-HTTP workloads without protocol-specific support.
  primary_enforcement_point: API-aware request validation controls.
  implementation_surface: API gateway or envoy policy enforcement validating requests against OpenAPI or expected service contracts, plus tests showing invalid request patterns are rejected.
  owner_primary: Security Engineering
  owner_supporting: Network Engineering; Application Development
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0505-002
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.5'
  control_seq: '002'
  control_title: LoadBalancer, NodePort, and ExternalIP restriction policies
  control_statement: Admission control policies must prevent the creation of LoadBalancer and NodePort type Services and the use of the spec.externalIPs field unless explicitly approved, ensuring that no Kubernetes service is unintentionally exposed to external networks through these mechanisms.
  objective: Prevent accidental or unauthorized external exposure of cluster services by enforcing policy-based controls on service types and fields that create external network endpoints or intercept external traffic.
  rationale: 'Any developer with permission to create a Service can expose an internal workload to the internet by specifying type LoadBalancer or NodePort. The spec.externalIPs field poses an additional risk: it allows a Service to claim an arbitrary IP address, enabling man-in-the-middle interception of traffic intended for other destinations (CVE-2020-8554). Without admission-time enforcement, detection of unintended exposure relies on post-deployment scanning, leaving a window of exposure.'
  scope: Applies to all production Kubernetes clusters. Admission policies must cover Service creation, Service type modification, and spec.externalIPs field usage. Approved exceptions must be tracked in a service exposure registry with periodic review. Managed Kubernetes environments must verify that admission policies apply before cloud load balancer provisioning.
  primary_enforcement_point: Admission controller policies (OPA/Gatekeeper, Kyverno) with constraints on Service type field values and spec.externalIPs, enforced at both creation and update time. The DenyServiceExternalIPs feature gate (stable since 1.25) can disable externalIPs at the API server level.
  implementation_surface: Admission controller policies (Kyverno ClusterPolicy, OPA Gatekeeper ConstraintTemplates) denying Service type LoadBalancer, NodePort, and spec.externalIPs field usage, DenyServiceExternalIPs feature gate (API server --feature-gates=DenyServiceExternalIPs=true, stable since 1.25), approval annotation workflows for exception management, service exposure registry with periodic review, API server audit log detection rules for unauthorized LoadBalancer/NodePort/externalIP creation, and cluster-wide kubectl audit scripts for unapproved externally exposed services.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Application Development
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0505-003
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.5'
  control_seq: '003'
  control_title: Internal service endpoint protection
  control_statement: Internal services must use ClusterIP type by default, and headless services must be secured with network policies restricting direct pod access to authorized consumers.
  objective: Minimize internal service exposure to the ClusterIP scope and ensure that headless services have compensating network policies preventing unauthorized direct pod access.
  rationale: ClusterIP services are only reachable within the cluster, providing a baseline level of network isolation. However, headless services expose individual pod IPs directly, allowing targeted access that bypasses service load balancing and potentially service-level access controls. Without network policies on headless services, any pod in an allowed network segment can directly address individual pods by IP.
  scope: Applies to all internal services in production Kubernetes clusters. Headless services used for StatefulSets or service discovery must have compensating network policies restricting which consumers can access the exposed pod endpoints.
  primary_enforcement_point: Kubernetes Service type defaults and network policies for headless service pod endpoints.
  implementation_surface: 'Kubernetes Service type ClusterIP (default), NetworkPolicy objects restricting access to headless service (clusterIP: None) pod endpoints by pod label selectors, admission controller policies enforcing ClusterIP as default service type, and periodic audit scripts identifying services without covering network policies.'
  owner_primary: Platform Engineering
  owner_supporting: Application Development
  baseline_or_ai_specific: baseline
  maturity: Practitioner
