- control_id: SAF-K8S-0905-055
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: '055'
  control_title: Admission-time rejection of unapproved external model source references
  control_statement: Organizations must deploy admission controllers that reject pods or workloads that reference external models from sources not present on the approved external model source allowlist.
  objective: Prevent workload admission when model source references do not match the approved external model source allowlist.
  rationale: Runtime network controls alone do not prevent a workload from being created with an unapproved model source reference. Admission-time validation blocks these workloads before they enter protected environments and provides explicit policy enforcement at creation time.
  scope: Applies to production and protected Kubernetes namespaces that consume external models. Covers admission controller validation of model source URLs, image references, registry namespaces, or equivalent identifiers against the approved source allowlist. Excludes quarantine and vetting workflow obligations, which remain covered by SAF-K8S-0905-044 and SAF-K8S-0905-045.
  primary_enforcement_point: Admission controller policy evaluation at workload creation time.
  implementation_surface: Admission controllers such as Kyverno or Gatekeeper rejecting unapproved external model sources, policy definitions validating source references against approved allowlists, and rejected workload events for attempted policy bypasses.
  owner_primary: Security Engineering
  owner_supporting: ML Platform Engineering; Governance
