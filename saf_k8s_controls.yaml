- control_id: SAF-K8S-1007-010
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.7'
  control_seq: '010'
  control_title: Pre-upgrade Kubernetes API compatibility testing for AI workloads
  control_statement: Organizations must perform compatibility testing against the target Kubernetes version for AI operators, custom resources, training workflows, and inference services before production upgrades, and must block production upgrades until test results confirm removed or changed APIs will not break required workload behavior.
  objective: Validate AI workloads and platform components against upcoming Kubernetes versions before production upgrades are approved.
  rationale: Even when deprecated API usage is identified, production failures still occur if teams do not verify migrated manifests, operators, admission webhooks, and workload flows against the target Kubernetes version. Pre-upgrade compatibility testing catches API removal breakage before upgrades impact production AI services.
  scope: Applies to all Kubernetes clusters scheduled for version upgrades. Testing must validate AI-specific operators, CRDs, training jobs, inference serving paths, GPU scheduling behavior, policy enforcement, and admission workflows against the target version.
  primary_enforcement_point: Pre-upgrade compatibility test gates and upgrade approval checklists.
  implementation_surface: Target-version test clusters such as kind or minikube, CI-based compatibility suites that deploy AI operators and workloads against the target Kubernetes version, integration tests for training job creation, inference service deployment, GPU allocation, policy enforcement, and admission webhook validation, and upgrade readiness gates tied to test outcomes.
  owner_primary: Platform Engineering
  owner_supporting: AI/ML Engineering; DevOps; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
