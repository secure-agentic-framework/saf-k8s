- control_id: SAF-K8S-0702-030
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.2'
  control_seq: '030'
  control_title: Promotion-time automatic classification uplift and reclassification execution
  control_statement: Organizations must implement automated reclassification during model promotion so classification metadata is adjusted when the target environment or promoted artifact requires a higher or different protection level than the source environment.
  objective: Ensure model promotion events trigger the correct automated classification uplift or reclassification actions before deployment.
  rationale: Promotion into a more sensitive environment can change the required classification level of an artifact. Automated reclassification is a distinct operational obligation from simply checking whether metadata exists, because the system must actively compute and apply the correct higher classification when promotion context changes.
  scope: Applies to CI/CD and model promotion pipelines where artifacts move into environments with different sensitivity or governance requirements. Covers automatic classification uplift and reclassification event recording during promotion.
  primary_enforcement_point: Promotion pipeline reclassification logic and event recording.
  implementation_surface: CI/CD promotion pipelines with automated reclassification hooks, environment-aware classification uplift logic, and reclassification event logs showing original classification, applied classification, environment, and promotion timestamp.
  owner_primary: ML Engineering
  owner_supporting: Data Governance; Platform Engineering; Security Engineering
