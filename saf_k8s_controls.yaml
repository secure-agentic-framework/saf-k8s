- control_id: SAF-K8S-0401-007
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.1'
  control_seq: '007'
  control_title: GPU resource governance permission boundaries
  control_statement: Organizations must restrict GPU resource management permissions, including GPU quota requests, scheduling priority overrides, and GPU metrics access, to explicitly authorized roles so that users who deploy or operate AI workloads cannot unilaterally change GPU allocation or observability boundaries without approved authorization.
  objective: Prevent GPU resource abuse, cost overruns, and unfair scheduling by separating routine AI workload operation from privileged GPU quota, priority, and observability controls.
  rationale: GPU-enabled environments introduce privileged controls that can materially affect cost, availability, and fairness across AI workloads. If model deployers or tenant operators can independently raise GPU quotas, override scheduling priority, or access privileged GPU telemetry, they can starve other workloads or bypass shared governance intended to protect cluster stability and multi-tenant fairness.
  scope: Applies to all clusters running AI and ML workloads with GPU resources. Covers RBAC for GPU ResourceQuota objects, PriorityClass resources, and protected GPU monitoring or metrics endpoints. Exceptions require documented risk acceptance.
  primary_enforcement_point: RBAC restrictions on GPU quota objects, scheduling priority controls, and GPU metrics endpoint authorization.
  implementation_surface: GPU ResourceQuota RBAC restrictions, PriorityClass resource RBAC controls, GPU metrics endpoint access policies, and identity provider group-to-role mapping configurations for privileged GPU administration boundaries.
  owner_primary: Identity and Access Management
  owner_supporting: Platform Engineering; ML Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
