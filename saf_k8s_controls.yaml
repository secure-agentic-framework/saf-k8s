- control_id: SAF-K8S-0102-025
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.2'
  control_seq: '025'
  control_title: etcd backup repository access review and alerting
  control_statement: Production Kubernetes clusters must review etcd backup repository access records or generate alerts for unauthorized or anomalous backup access activity.
  objective: Ensure etcd backup access activity is not only logged but actively reviewed or alerted so suspicious repository access can be detected and investigated.
  rationale: Audit records alone do not reduce risk if no one reviews them or if anomalous backup access fails to trigger operator attention. Review workflows and alerting make backup repository misuse operationally detectable before it becomes an undetected path to full cluster-state exposure.
  scope: Applies to all production clusters. Covers periodic review workflows, alert thresholds, and response routing for etcd backup repository and restore-media access activity.
  primary_enforcement_point: Backup repository access monitoring review
  implementation_surface: Periodic access review workflows, anomaly detection or alert rules, and response routing for monitored repository access.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Backup and Recovery Operations
