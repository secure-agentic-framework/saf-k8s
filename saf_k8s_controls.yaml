- control_id: SAF-K8S-1007-007
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.7'
  control_seq: '007'
  control_title: Cluster service protection from AI training resource exhaustion
  control_statement: Organizations must protect cluster-level services (DNS, metrics, logging) from resource exhaustion caused by large-scale training jobs through resource quota enforcement, priority class configuration, and cluster service health monitoring.
  objective: Ensure that shared cluster services remain available despite resource-intensive AI workload demands.
  rationale: Large-scale training jobs that consume excessive CPU, memory, or network bandwidth can starve cluster-level services (DNS, metrics collection, log forwarding), creating observability blind spots that adversaries can exploit to operate undetected.
  scope: Applies to Kubernetes clusters where large-scale training jobs run alongside shared cluster services. Covers resource quota enforcement on training namespaces and cluster service health monitoring during training job execution.
  primary_enforcement_point: Resource quota enforcement for training namespaces and PriorityClass configuration for cluster services.
  implementation_surface: PriorityClass configuration (system-cluster-critical, system-node-critical) for cluster services, ResourceQuota headroom enforcement on training namespaces, and cluster service health monitoring (CoreDNS resolution latency, metrics scrape success rate, log forwarding lag) during training job execution.
  owner_primary: Platform Engineering
  owner_supporting: SRE; AI/ML Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
