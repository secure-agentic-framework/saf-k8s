- control_id: SAF-K8S-0804-004
  domain_code: D08
  domain_name: GPU, Accelerator, and Confidential Computing
  knowledge_area: '8.4'
  control_seq: '004'
  control_title: Confidential AI workload operational constraints and risk assessment
  control_statement: Organizations must assess and document the performance overhead, hardware compatibility limitations, software stack constraints, and operational complexity of confidential AI workloads on Kubernetes, with risk-based decisions recorded for workloads where confidential computing is not yet operationally feasible.
  objective: Ensure that organizations make informed, risk-based decisions about confidential computing adoption for AI workloads by understanding the real-world constraints, and that workloads excluded from TEE protection have documented compensating controls.
  rationale: Confidential computing for AI workloads introduces measurable performance overhead (memory encryption latency, reduced available GPU memory for encryption metadata), restricts supported hardware and driver versions, and may be incompatible with certain training frameworks or multi-GPU communication libraries. Without documented assessment of these constraints, organizations may either forgo TEE protection without understanding the residual risk or deploy confidential computing without accounting for performance impacts on training job completion times and costs.
  scope: Applies to all organizations evaluating or deploying confidential AI workloads on Kubernetes. Covers performance benchmarking, compatibility testing, and risk acceptance documentation. This is an emerging control; the assessment itself is required even if confidential computing adoption is deferred. Assessments must be reviewed and updated as hardware and software support matures.
  primary_enforcement_point: Architecture review board approval process, confidential computing readiness assessment documentation, and risk register entries for workloads excluded from TEE protection.
  implementation_surface: Architecture review board approval process for confidential computing adoption, performance benchmarking tooling for GPU CC mode overhead measurement (5-15% throughput impact), hardware compatibility assessment for TEE-capable GPU and CPU combinations, ML framework compatibility validation in CC staging environments, risk register entries for workloads excluded from TEE protection with documented compensating controls (storage encryption, network isolation, access controls), and periodic reassessment scheduling as CC platform maturity evolves.
  owner_primary: ML Platform Engineering
  owner_supporting: GPU Infrastructure Engineering; Security Engineering; Architecture Review Board
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
