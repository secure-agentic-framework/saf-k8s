- control_id: SAF-K8S-0603-010
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.3'
  control_seq: '010'
  control_title: SBOM attestation binding to image digests
  control_statement: For each container image promoted to production, organizations must generate and maintain an SBOM attestation that is cryptographically bound to the same image digest as the promoted artifact so consumers can verify that the software bill of materials applies to the exact deployed image.
  objective: Ensure SBOM evidence remains tied to the exact artifact that is deployed so vulnerability, license, and component review decisions are made against the correct image digest rather than a detached or stale inventory record.
  rationale: An SBOM that is not bound to the deployed image digest can be swapped, reused across different builds, or reviewed out of context. Digest-bound SBOM attestations preserve the integrity of component inventory evidence and make downstream policy and audit decisions defensible.
  scope: Applies to all container images promoted to production and staging registries, including model-serving images, training images, and infrastructure operator images. Equivalent controls are required when managed registries or vendor tooling emit SBOM attestations on the organization's behalf.
  primary_enforcement_point: CI/CD artifact publication step and registry metadata attachment workflow.
  implementation_surface: SBOM attestation generation and signing tooling, OCI referrers or equivalent registry attachment mechanisms, and digest-based verification workflows that confirm the SBOM attestation applies to the promoted image artifact.
  owner_primary: DevSecOps / Release Engineering
  owner_supporting: Security Engineering; Platform Engineering
  baseline_or_ai_specific: baseline
