- control_id: SAF-K8S-0101-019
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.1'
  control_seq: 019
  control_title: API server AlwaysAllow prohibition
  control_statement: Production Kubernetes clusters must not enable AlwaysAllow authorization on the API server.
  objective: Prevent authorization bypass on the Kubernetes API server by prohibiting the AlwaysAllow authorizer.
  rationale: AlwaysAllow turns authorization into an unconditional permit decision and defeats policy-based access control on the control plane. Prohibiting it ensures API requests remain subject to explicit authorization controls such as Node and RBAC modes.
  scope: Applies to all production Kubernetes clusters and to non-production clusters that host sensitive data, shared workloads, or provide a path to production. For managed services, applies to all customer-exposed API server authorization settings and compensating controls when provider-managed settings are fixed.
  primary_enforcement_point: API server authorization configuration.
  implementation_surface: API server authorization mode settings, managed Kubernetes security settings, provisioning templates, and periodic assessment verifying AlwaysAllow is absent.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Cloud Platform Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
