- control_id: SAF-K8S-0703-009
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.3'
  control_seq: 009
  control_title: GPU spending limits and budget enforcement
  control_statement: Organizations must configure GPU spending limits and budget alerts with automatic enforcement actions (job suspension, scale-down triggers) to prevent uncontrolled GPU expenditure at the namespace or team level.
  objective: Prevent GPU budget overruns by establishing spending boundaries with automated enforcement that halts or reduces consumption when limits are approached or exceeded.
  rationale: Without spending limits and automatic enforcement, a single misconfigured job or runaway training loop can exhaust an organization's entire GPU budget before manual intervention occurs. Budget alerts without enforcement actions provide awareness but cannot prevent overruns during off-hours or when responsible parties are unavailable. Automatic enforcement actions (job suspension, scale-down) provide a safety net.
  scope: Applies to all Kubernetes clusters with GPU resources. Spending limits and automatic enforcement must be configured at the namespace or team level. Enforcement actions must include job suspension and scale-down triggers. Budget alerts must notify relevant stakeholders before limits are reached. Integration with FinOps platforms is required for accurate cost tracking.
  primary_enforcement_point: Budget alert integrations and automated enforcement controllers that suspend jobs or scale down deployments upon budget threshold breach.
  implementation_surface: Cloud budget alerts (AWS Budgets, GCP Budget API, Azure Cost Management) with automatic enforcement actions, namespace-level spending limits enforced by custom controllers, job suspension and scale-down triggers on budget threshold breach, and alert notification pipelines.
  owner_primary: FinOps
  owner_supporting: Platform Engineering; ML Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
