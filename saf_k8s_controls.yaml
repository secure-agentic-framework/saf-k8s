  control_title: MPS and time-slicing memory remnant prevention verification
  control_statement: Clusters using NVIDIA MPS or GPU time-slicing must verify that GPU memory remnants are not recoverable between workload transitions and must validate the effectiveness of memory clearing or reset controls for shared GPU contexts.
  objective: Provide technical assurance that weaker GPU-sharing modes do not expose recoverable memory remnants between co-located or successive workloads on the same GPU context.
  rationale: Approving weaker GPU-sharing modes is insufficient without independent evidence that prior workload data cannot be recovered from shared GPU memory. This control focuses on testable remnant-prevention outcomes and validation of the memory clearing mechanisms used to support those outcomes.
  scope: Applies to any Kubernetes cluster using NVIDIA MPS or GPU time-slicing. Covers GPU memory remnant testing and validation of memory clearing or reset behavior between workload transitions in shared GPU deployments.
  primary_enforcement_point: Shared-GPU Memory Remnant Prevention Verification
  implementation_surface: GPU memory isolation verification tests, GPU reset or clearing validation, and technical evidence showing no recoverable data remnants across workload transitions in shared GPU modes.
