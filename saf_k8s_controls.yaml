- control_id: SAF-K8S-0905-028
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: 028
  control_title: ML framework and Python dependency vulnerability management
  control_statement: Organizations must perform software composition analysis and vulnerability triage for ML frameworks and Python ecosystem dependencies used in training and inference environments, and must track remediation or compensating actions for identified vulnerabilities.
  objective: Reduce exploitability of vulnerable ML frameworks and Python dependencies by continuously identifying, prioritizing, and remediating defects in those software components.
  rationale: ML workloads depend on large dependency graphs across frameworks and Python packages. Without focused vulnerability management, known defects in PyTorch, TensorFlow, JAX, model-loading libraries, and transitive Python dependencies remain deployable and exploitable across training and inference environments.
  scope: Applies to ML software dependencies used in training and inference environments on Kubernetes. Covers ML frameworks, model-loading libraries, Python packages, and transitive dependencies. Excludes CUDA and GPU accelerator library vulnerability management, which is covered by SAF-K8S-0905-029.
  primary_enforcement_point: CI/CD and image-build SCA scanning plus framework dependency triage workflow.
  implementation_surface: SCA scanning for PyTorch, TensorFlow, JAX, Python packages, model-loading libraries, and related transitive dependencies; vulnerability triage workflows; dependency update records; compensating-control approvals; and tracking of deserialization or dependency-related exposure in ML libraries.
  owner_primary: Security Engineering
  owner_supporting: ML Platform Engineering; DevOps Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
