- control_id: SAF-K8S-0906-007
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.6'
  control_seq: '007'
  control_title: Integrity verification at each training data transformation stage
  control_statement: Organizations must enforce integrity checks at each data transformation stage in the training data pipeline to detect tampering or corruption before altered data propagates downstream.
  objective: Detect tampering or corruption at each transformation stage in training pipelines before poisoned or corrupted data reaches model training.
  rationale: Without integrity checks at transformation stages, an attacker can inject poisoned or corrupted data at any point in the pipeline and the corruption propagates undetected through downstream transformations into the trained model.
  scope: Applies to all training data pipelines on Kubernetes from ingestion through feature engineering to model training input. Covers stage-level integrity verification, hash or manifest comparison, and validation hooks at data transformation steps. Excludes end-to-end provenance recordkeeping.
  primary_enforcement_point: Integrity verification hooks at pipeline transformation stages.
  implementation_surface: Integrity check logs at each transformation stage, pipeline configuration showing validation hooks, manifest or hash verification between pipeline stages, and alerting or rejection records for failed stage-integrity checks.
  owner_primary: Data Engineering
  owner_supporting: ML Platform Engineering; Security Engineering
