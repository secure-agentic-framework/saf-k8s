- control_id: SAF-K8S-0905-040
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: '040'
  control_title: Model registry audit event generation and centralized forwarding
  control_statement: Model registries must generate audit logs for model publish, pull, tag, permission, deletion, and administrative operations and must forward those events to centralized monitoring or SIEM platforms with verified delivery and retention.
  objective: Create reliable telemetry coverage for model-registry abuse by ensuring registry operations are recorded and forwarded into centralized monitoring.
  rationale: Registry compromises often manifest first as unusual publish, pull, deletion, or permission-change activity. Without complete event generation and forwarding, malicious model substitution, unauthorized access, and registry tampering can occur without durable telemetry or centralized visibility.
  scope: Applies to all model registry deployments on Kubernetes, including Harbor, MLflow Model Registry, and on-premises Hugging Face Hub instances. Covers registry audit event generation and forwarding into centralized monitoring. Excludes alert triage and operational review procedures.
  primary_enforcement_point: Registry audit log configuration and forwarding pipeline into centralized monitoring or SIEM.
  implementation_surface: Registry audit log enablement, event export or webhook forwarding, log ingestion verification, and delivery checks for sensitive registry operations.
  owner_primary: ML Platform Engineering
  owner_supporting: Security Engineering; Platform Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
