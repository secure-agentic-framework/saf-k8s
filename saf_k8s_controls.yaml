- control_id: SAF-K8S-1007-011
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.7'
  control_seq: '011'
  control_title: Kubernetes cluster upgrade planning, sequencing, and rollback governance
  control_statement: Organizations must maintain documented Kubernetes cluster upgrade plans that enforce version skew policy compliance, component-by-component upgrade sequencing, and tested rollback procedures for control plane, node, and add-on changes affecting AI workload environments.
  objective: Ensure Kubernetes platform upgrades are executed safely with version-skew discipline, ordered sequencing, and tested rollback paths that reduce service disruption and security regression risk.
  rationale: Kubernetes upgrades that violate version-skew rules, skip sequencing, or lack tested rollback procedures can leave clusters in partially upgraded and insecure states. Formal upgrade planning reduces outage risk and supports controlled recovery when upgrades fail.
  scope: Applies to Kubernetes clusters hosting AI workloads, including control plane, worker node, and cluster add-on upgrades managed directly or through managed-service coordination.
  primary_enforcement_point: Cluster lifecycle management tooling, change management approval process, and upgrade testing pipeline.
  implementation_surface: Kubernetes version skew verification, control plane and node upgrade sequencing documentation, add-on upgrade runbooks, rollback procedures, and non-production validation environments.
  owner_primary: Platform Engineering
  owner_supporting: AI/ML Engineering; Security Engineering; SRE
  baseline_or_ai_specific: ai-specific
