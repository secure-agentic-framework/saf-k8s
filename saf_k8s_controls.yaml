- control_id: SAF-K8S-0101-021
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.1'
  control_seq: '021'
  control_title: API server approved admission controller chain configuration
  control_statement: Production Kubernetes clusters must restrict the API server admission controller chain to approved components and must document and govern any deviations from the approved admission baseline.
  objective: Reduce API server policy bypass risk by ensuring only approved admission controllers are enabled and that deviations are explicitly governed.
  rationale: Unapproved or weakly governed admission controllers can disable, weaken, or bypass policy enforcement at the API server entry point. Constraining the admission chain to approved components preserves centralized enforcement of validation and policy decisions for cluster access and workload admission.
  scope: Applies to all production Kubernetes clusters and to non-production clusters that host sensitive data, shared workloads, or provide a path to production. For managed Kubernetes services, this control applies to all customer-exposed API server admission controller settings and to compensating controls where provider-managed settings are not directly configurable.
  primary_enforcement_point: Admission Control Baseline Enforcement
  implementation_surface: Cluster provisioning templates, API server configuration management, managed Kubernetes security settings, and periodic configuration assessment.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Cloud Platform Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
