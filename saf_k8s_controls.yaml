- control_id: SAF-K8S-0606-022
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.6'
  control_seq: '022'
  control_title: Admission-time verification of Kubernetes manifest signatures
  control_statement: Admission control must verify Kubernetes manifest signatures before cluster acceptance and reject manifests that do not present a valid signature from an authorized signing identity.
  objective: Ensure only manifests with valid approved signatures can be admitted to the cluster.
  rationale: Signing alone does not stop deployment of unsigned or improperly signed manifests unless the cluster enforces verification at admission. Admission-time verification is independently auditable because it governs cluster acceptance behavior, rejection logic, and authorized signing trust roots.
  scope: Applies to production and staging Kubernetes clusters that admit manifests through direct apply, GitOps reconciliation, or deployment automation. Covers signature trust roots, admission policies, and rejection behavior.
  primary_enforcement_point: Admission controller verification policy and cluster rejection logic.
  implementation_surface: Admission controller policy verifying manifest signatures, configured trust roots or authorized signing identities, and validation records showing unsigned or invalidly signed manifests are rejected.
  owner_primary: DevSecOps / Release Engineering
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: baseline
