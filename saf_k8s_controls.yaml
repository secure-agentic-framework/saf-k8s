- control_id: SAF-K8S-0704-015
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.4'
  control_seq: '15'
  control_title: Cloud IAM to Kubernetes RBAC entitlement mapping definition
  control_statement: Organizations must establish and maintain a documented mapping between cloud provider IAM identities and Kubernetes RBAC bindings for managed Kubernetes services so intended Kubernetes permissions remain explicit and traceable.
  objective: Ensure cloud IAM identities are intentionally translated into Kubernetes permissions through an explicit, documented entitlement mapping rather than implicit or undocumented access paths.
  rationale: Managed Kubernetes environments bridge cloud IAM and Kubernetes RBAC, creating a two-layer authorization model. Without a documented entitlement mapping, teams cannot reliably determine which cloud identities resolve to which Kubernetes permissions, and access paths become opaque to design, review, and investigation.
  scope: Applies to managed Kubernetes services and any self-managed clusters using cloud IAM or external cloud identity for Kubernetes authentication. The mapping must cover administrative users, automation identities, CI/CD roles, monitoring roles, and any other cloud identity granted Kubernetes access.
  primary_enforcement_point: Cloud IAM identity definitions and Kubernetes authentication-to-RBAC mapping documentation.
  implementation_surface: EKS access entries or aws-auth mappings, GKE IAM-to-cluster role bindings, AKS Entra ID or equivalent identity integration, and documented mapping matrices tying cloud identities to Kubernetes RBAC subjects and grants.
  owner_primary: Cloud Platform Engineering
  owner_supporting: Security Engineering; Platform Engineering
