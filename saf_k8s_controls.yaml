- control_id: SAF-K8S-0104-020
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.4'
  control_seq: '020'
  control_title: Kubernetes supported version window compliance
  control_statement: Production Kubernetes clusters must run a Kubernetes version that remains within the project or provider active support window.
  objective: Keep clusters inside supported version boundaries so security patches remain available and vendor support is not lost.
  rationale: Unsupported Kubernetes versions stop receiving security patches and provider support, leaving clusters exposed to known vulnerabilities without an endorsed remediation path. Enforcing supported-version compliance keeps clusters on versions that still receive security fixes and compatible vendor support.
  scope: Applies to all production clusters. Covers Kubernetes control-plane and worker node version selections, including managed-service versions subject to provider support windows.
  primary_enforcement_point: Supported-version governance
  implementation_surface: Cluster version inventory, support-window tracking, provider lifecycle bulletins, and periodic compliance checks against supported minor versions.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Change Management
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0104-021
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.4'
  control_seq: '021'
  control_title: Kubernetes component version skew compliance
  control_statement: Production Kubernetes clusters must maintain component versions within the Kubernetes version skew policy across the API server, kubelet, controller-manager, scheduler, and administrative clients.
  objective: Prevent interoperability failures and control-plane instability caused by unsupported version skew between Kubernetes components and clients.
  rationale: Even when clusters are nominally supported, unsupported skew between API servers, kubelets, control-plane components, and administrative clients can create API incompatibilities, unstable behavior, and failed operations. Enforcing skew compliance keeps component interactions inside tested compatibility boundaries.
  scope: Applies to all production clusters. Covers Kubernetes control-plane components, worker node kubelets, and administrative client versions that must remain within published skew policy boundaries.
  primary_enforcement_point: Component compatibility governance
  implementation_surface: Version skew compliance reports, component inventory comparisons against skew policy, and periodic checks of administrative client compatibility.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Change Management
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0104-022
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.4'
  control_seq: '022'
  control_title: Non-default feature gate inventory for production clusters
  control_statement: Production Kubernetes clusters must maintain an inventory of all non-default feature gates enabled or explicitly configured across production control plane and node components.
  objective: Maintain authoritative visibility into all non-default Kubernetes feature gate usage in production so governance, upgrade, and risk review decisions start from a complete baseline.
  rationale: Feature gate governance fails when organizations do not know which non-default gates are enabled or configured across production clusters. A current inventory is the prerequisite for approval review, upgrade transition tracking, and supportability decisions.
  scope: Applies to all production clusters and all customer- or operator-configurable feature gates on API server, controller-manager, scheduler, kubelet, kube-proxy, and managed service surfaces where feature gate behavior can be influenced or must be tracked.
  primary_enforcement_point: Cluster provisioning, configuration inventory, and change tracking processes for production feature gate settings.
  implementation_surface: Feature gate inventory records, cluster configuration reconciliation, provisioning templates, and scans of configured non-default feature gates across production control plane and node components.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Architecture Review
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
