- control_id: SAF-K8S-1006-009
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.6'
  control_seq: 009
  control_title: Continuous policy decision evidence generation and export for AI workload compliance
  control_statement: Organizations must continuously generate, retain, and export compliance evidence from policy-as-code enforcement decisions for Kubernetes AI workloads, including policy reports, admission allow and deny events, and policy version history.
  objective: Produce audit-ready evidence of policy enforcement outcomes so compliance and control effectiveness can be demonstrated without manual reconstruction.
  rationale: Without retained decision evidence and policy history, organizations cannot prove that policy-as-code controls were operating as intended at the time of deployment or admission. Continuous evidence generation supports audit readiness, investigations, and ongoing governance assurance.
  scope: Applies to policy-enforced Kubernetes AI workloads and the associated evidence pipelines that capture, retain, and export policy decision records.
  primary_enforcement_point: Policy reporting pipelines, admission decision logs, and evidence export integrations.
  implementation_surface: PolicyReport and Gatekeeper audit outputs, admission controller decision logs, policy source control history, SIEM exports, and GRC evidence repositories.
