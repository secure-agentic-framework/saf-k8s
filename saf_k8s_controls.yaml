- control_id: SAF-K8S-1006-008
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.6'
  control_seq: 008
  control_title: NIST SP 800-218A AI/ML profile alignment for Kubernetes AI development
  control_statement: Organizations must map their Kubernetes and AI/ML development security practices to the NIST SP 800-218A AI/ML-specific community profile, identifying AI-focused adaptations for training data integrity, model provenance, and ML pipeline security.
  objective: Ensure Kubernetes AI development practices align to the AI/ML-specific secure development expectations in NIST SP 800-218A so training data, model provenance, and ML pipeline risks are addressed explicitly.
  rationale: Baseline SSDF interpretations do not fully address AI/ML-specific development risks such as treating training data as source, training runs as builds, model weight integrity as software integrity, and ML pipeline security as part of the development system. Explicit SP 800-218A alignment is required to demonstrate AI-focused secure development coverage.
  scope: Applies to all software development and ML engineering teams building or deploying AI workloads on Kubernetes. Covers the NIST SP 800-218A AI/ML community profile and its AI-specific secure development adaptations.
  primary_enforcement_point: AI/ML secure development profile documentation and AI-specific CI/CD compliance checks.
  implementation_surface: NIST SP 800-218A task alignment documentation, AI-specific adaptations for training data as source, training runs as builds, model weight integrity as software integrity, alignment mapping to SAF-K8S controls for training data integrity, model provenance, and ML pipeline security, and remediation documentation for AI-specific secure development gaps.
