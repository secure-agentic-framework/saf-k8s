- control_id: SAF-K8S-1001-015
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.1'
  control_seq: '015'
  control_title: PII redaction and sensitive payload minimization for inference logs
  control_statement: Organizations must apply redaction, masking, or minimization controls to inference request and response logs before storage so personally identifiable information and other sensitive payload content are not retained in centralized log repositories without explicit governance and compensating controls.
  objective: Reduce privacy and data-exposure risk by ensuring inference request and response logging retains only the minimum content needed for security and operational purposes.
  rationale: Inference logs often contain user-submitted prompts, generated responses, or embedded business data. If those payloads are stored without redaction or minimization, the logging system becomes a secondary sensitive-data repository that expands breach impact and creates regulatory exposure. Redaction and payload minimization keep security logging useful without retaining unnecessary sensitive content.
  scope: Applies to inference request and response logging for AI workloads on Kubernetes. Covers pattern-based and structured-field redaction, payload minimization, redacted forensic sample retention, and classification-aware handling of sensitive inference content. Excludes the broader collection of non-payload AI workload operational logs.
  primary_enforcement_point: PII redaction filters and sensitive-content handling rules in the log aggregation and storage pipeline.
  implementation_surface: Pattern-based redaction for identifiers, field-level masking for structured inference payloads, NER or equivalent redaction for unstructured text, bounded forensic sample retention with restricted access, and logging pipeline policies that suppress or transform sensitive inference content before centralized storage.
  owner_primary: Security Operations
  owner_supporting: AI/ML Engineering; Data Privacy
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
