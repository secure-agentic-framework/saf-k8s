- control_id: SAF-K8S-0704-017
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.4'
  control_seq: '17'
  control_title: Least-privilege cloud-to-cluster privileged access boundary enforcement
  control_statement: Organizations must enforce least-privilege cloud IAM roles for Kubernetes access and must prevent cloud IAM identities from resolving to broader Kubernetes permissions than intended by the RBAC design.
  objective: Prevent privilege escalation through cloud IAM identities that resolve to excessive Kubernetes permissions in managed Kubernetes environments.
  rationale: Even with a documented IAM-to-RBAC map, security fails if cloud identities still resolve to broader Kubernetes privileges than intended. Restricting privileged cloud-to-cluster access paths closes the gap between documented intent and actual effective privilege.
  scope: Applies to managed Kubernetes services and any cloud-authenticated administrative or automation identities that can obtain privileged Kubernetes access. Includes identities mapped to system:masters, cluster-admin, or equivalent broad authorization paths outside governed emergency procedures.
  primary_enforcement_point: Cloud IAM role design and privileged access boundary controls for Kubernetes administration.
  implementation_surface: Cloud IAM least-privilege role definitions, audits of system:masters or cluster-admin-equivalent mappings, and remediation evidence showing privileged cloud identities do not exceed intended Kubernetes RBAC boundaries.
