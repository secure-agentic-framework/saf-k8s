- control_id: SAF-K8S-0803-001
  domain_code: D08
  domain_name: GPU, Accelerator, and Confidential Computing
  knowledge_area: '8.3'
  control_seq: '001'
  control_title: NVLink and NVSwitch traffic isolation for multi-GPU training
  control_statement: Multi-GPU training environments using NVLink and NVSwitch must enforce traffic isolation between tenants, restrict NVSwitch topology information exposure, and implement controls to prevent cross-tenant data leakage over high-bandwidth GPU-to-GPU interconnects.
  objective: Ensure that high-bandwidth NVLink and NVSwitch interconnects used for distributed training do not become a channel for cross-tenant data exfiltration or topology reconnaissance in shared GPU infrastructure.
  rationale: NVLink provides up to 900 GB/s bandwidth between GPUs, and NVSwitch enables all-to-all GPU communication within a node. In multi-tenant environments, training jobs from different tenants may share NVSwitch fabric, enabling a malicious workload to sniff or inject traffic on the interconnect. NVSwitch topology information can reveal the physical GPU layout, enabling targeted scheduling attacks to co-locate with victim workloads on the same NVSwitch domain.
  scope: Applies to Kubernetes clusters with multi-GPU nodes connected via NVLink or NVSwitch (DGX systems, HGX baseboards, multi-GPU servers). Single-tenant dedicated GPU servers with no shared NVSwitch fabric may document reduced requirements. Cloud GPU instances with provider-managed NVLink topology must verify isolation through provider attestation.
  primary_enforcement_point: GPU Operator NVSwitch configuration, NCCL environment variable controls for communication topology, pod scheduling constraints for NVSwitch domain isolation, and network policy equivalents for GPU interconnects.
  implementation_surface: NVSwitch configuration and fabric partitioning on DGX/HGX systems, NCCL environment variables (NCCL_P2P_DISABLE, NCCL_NET, NCCL_SOCKET_IFNAME) controlling GPU-to-GPU communication topology, MIG partitioning for NVLink isolation within GPUs, topology-aware pod scheduling constraints (node affinity, NVSwitch domain boundaries), CUDA_VISIBLE_DEVICES environment variable restrictions per container, GPU Feature Discovery topology label suppression, and NVIDIA driver logs monitoring for cuCtxEnablePeerAccess calls across pod boundaries.
  owner_primary: GPU Infrastructure Engineering
  owner_supporting: ML Platform Engineering; Network Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0803-002
  domain_code: D08
  domain_name: GPU, Accelerator, and Confidential Computing
  knowledge_area: '8.3'
  control_seq: '002'
  control_title: InfiniBand and RoCE fabric security controls
  control_statement: InfiniBand and RoCE (RDMA over Converged Ethernet) fabrics used for distributed AI training must enforce subnet manager access controls, partition key (P_Key) isolation between tenants, and network fabric segmentation to prevent unauthorized cross-partition communication.
  objective: Secure the high-performance networking fabric that carries distributed training traffic (gradient synchronization, parameter updates) to prevent unauthorized access, traffic interception, and cross-tenant communication on shared InfiniBand or RoCE infrastructure.
  rationale: InfiniBand and RoCE fabrics bypass traditional IP-based network security controls, operating at Layer 2 with direct memory access semantics. The subnet manager controls all fabric routing and access policies; unauthorized subnet manager access enables complete traffic redirection. Without partition key enforcement, any node on the fabric can communicate with any other node, enabling training data interception or gradient poisoning attacks across tenant boundaries.
  scope: Applies to Kubernetes clusters using InfiniBand (ConnectX adapters, HDR/NDR switches) or RoCE for distributed AI training workloads. Includes subnet manager nodes, fabric switches, and host channel adapters. Ethernet-only clusters not using RDMA are not in scope. Managed cloud HPC networking must verify provider partition key and fabric isolation controls.
  primary_enforcement_point: InfiniBand subnet manager configuration, partition key tables on switches and HCAs, Kubernetes RDMA device plugin configuration, and network fabric management plane access controls.
  implementation_surface: InfiniBand subnet manager (OpenSM or vendor SM) access controls and configuration, partition key (P_Key) tables on InfiniBand switches and Host Channel Adapters (HCAs), SR-IOV network operator and RDMA device plugin P_Key configuration per pod, InfiniBand fabric switch management interface access controls, RoCE fabric segmentation, ConnectX adapter (HDR/NDR) security settings, and subnet manager authentication and logging.
  owner_primary: Network Engineering
  owner_supporting: GPU Infrastructure Engineering; ML Platform Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0803-003
  domain_code: D08
  domain_name: GPU, Accelerator, and Confidential Computing
  knowledge_area: '8.3'
  control_seq: '003'
  control_title: RDMA memory region and queue pair isolation
  control_statement: RDMA-enabled AI workloads must enforce memory region access controls with properly scoped remote access keys, isolate queue pairs between tenants, and implement protections against remote memory read/write attacks targeting GPU training buffers.
  objective: Prevent unauthorized remote direct memory access to GPU training data, model parameters, and gradient buffers by enforcing strict RDMA memory region boundaries and queue pair isolation between workloads.
  rationale: RDMA allows remote nodes to read and write memory without CPU involvement, using memory registration keys (rkeys) for access control. A compromised or malicious workload that obtains a valid rkey can silently read training data or write corrupted gradients to a victim's memory regions. Shared queue pairs between tenants can enable traffic injection into another tenant's RDMA communication streams, poisoning distributed training collective operations.
  scope: Applies to Kubernetes pods using RDMA (InfiniBand verbs, RoCE) for distributed training communication libraries (NCCL, Gloo, MPI). Covers memory region registration, protection domain configuration, and queue pair allocation. Workloads not using RDMA are not in scope. Managed RDMA services must verify provider-enforced memory isolation.
  primary_enforcement_point: RDMA device plugin configuration, libibverbs memory region registration policies, protection domain isolation in RDMA workloads, and kernel-level RDMA access controls (rdma cgroup).
  implementation_surface: RDMA verbs layer memory region (MR) registration and remote key (rkey) scoping, RDMA queue pair (QP) creation and isolation per training job, RDMA protection domain assignment per tenant, libibverbs memory region registration policies, rdma cgroup controller configuration restricting per-container RDMA resource allocation, NCCL communication channel isolation settings, and RDMA device plugin per-pod protection domain configuration.
  owner_primary: ML Platform Engineering
  owner_supporting: Network Engineering; GPU Infrastructure Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
