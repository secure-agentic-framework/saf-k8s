- control_id: SAF-K8S-0905-044
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: '044'
  control_title: Public model quarantine isolation and malicious artifact scanning
  control_statement: Organizations must route externally sourced models through an isolated quarantine workflow that enforces restricted network access and scans third-party models for malicious payloads, unsafe formats, and disallowed embedded content before internal approval.
  objective: Prevent malicious or unsafe third-party model artifacts from entering organizational infrastructure by requiring isolated quarantine and pre-approval scanning.
  rationale: Public model hubs routinely host unvetted artifacts. Without isolated quarantine and malicious artifact scanning, unsafe pickle payloads, embedded files, and backdoored model packages can move directly into training or serving environments.
  scope: Applies to all models sourced from public hubs and community repositories. Covers quarantine namespaces, malware and format scanning, and restricted egress or network isolation. Excludes sandboxed behavioral vetting and approval decisions after scanning.
  primary_enforcement_point: Quarantine namespace and pre-approval scanning workflow.
  implementation_surface: Quarantine Kubernetes namespace with restricted egress, automated format and payload scanning, malware detection, and workflow records showing pre-vetting scan outcomes.
  owner_primary: Security Engineering
  owner_supporting: ML Platform Engineering; ML Engineering
