- control_id: SAF-K8S-0804-001
  domain_code: D08
  domain_name: GPU, Accelerator, and Confidential Computing
  knowledge_area: '8.4'
  control_seq: '001'
  control_title: TEE-based model and data protection for AI workloads
  control_statement: AI workloads processing sensitive models or data must use hardware Trusted Execution Environment (TEE) capabilities (NVIDIA H100 Confidential Computing, Intel TDX, or AMD SEV-SNP) where available and operationally feasible, with TEE configurations validated for both inference and training use cases and memory encryption verified as active.
  objective: Protect AI model intellectual property and sensitive training or inference data from unauthorized access by infrastructure operators, co-tenants, or compromised hypervisors through hardware-enforced memory encryption and isolation provided by TEEs.
  rationale: Standard GPU workloads expose model weights and data in plaintext GPU memory, accessible to anyone with privileged host access including cloud operators, co-tenant attackers, and compromised hypervisors. TEE-enabled GPU computing encrypts GPU memory contents in hardware, ensuring that even with physical access or hypervisor compromise, model weights and training data remain confidential. Without TEE protection, regulated data processed by AI workloads may fail to meet data sovereignty and confidentiality compliance requirements.
  scope: Applies to Kubernetes clusters with TEE-capable hardware (NVIDIA H100/H200 with Confidential Computing mode, Intel TDX-enabled CPUs, AMD SEV-SNP-enabled CPUs) processing sensitive AI workloads. Workloads on non-TEE-capable hardware must document compensating controls. This is an emerging control; organizations must evaluate readiness and plan adoption timelines.
  primary_enforcement_point: GPU Confidential Computing mode enablement in BIOS/firmware, TEE-aware Kubernetes device plugin configuration, confidential VM or container runtime settings, and admission control policies requiring TEE for classified workloads.
  implementation_surface: NVIDIA H100/H200 Confidential Computing mode BIOS/firmware enablement, nvidia-smi conf-compute verification tooling, GPU Operator Confidential Computing configuration, Intel TDX and AMD SEV-SNP VM configuration for Kubernetes nodes, TEE-aware device plugin settings, confidential VM or container runtime (Kata Containers with CC) settings, node taints and labels for CC-enabled node identification, and admission control policies requiring TEE for classified workload scheduling.
  owner_primary: ML Platform Engineering
  owner_supporting: GPU Infrastructure Engineering; Security Engineering; Compliance
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
