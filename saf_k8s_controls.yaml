- control_id: SAF-K8S-1001-010
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.1'
  control_seq: '010'
  control_title: Kubernetes audit level and stage filtering for AI workloads
  control_statement: Production Kubernetes clusters running AI workloads must configure appropriate Kubernetes audit levels and stage filtering for AI-relevant resources so that security-critical events are recorded with sufficient detail while low-value noise is reduced.
  objective: Ensure that audit records for AI-relevant activity contain the level of detail needed for investigation without overwhelming the audit subsystem with unnecessary event volume.
  rationale: Audit coverage alone is insufficient if the recorded event detail is too shallow for reconstruction or if noisy stages obscure important signals. AI workloads often require different audit levels for inference services, training jobs, secrets, and long-running requests.
  scope: Applies to Kubernetes audit policy tuning for AI workloads, including inference services, training job controllers, secrets, admission decisions, and long-running API requests where stage visibility matters.
  primary_enforcement_point: Audit policy level selection and stage filtering in kube-apiserver audit policy configuration.
  implementation_surface: Audit policy rule ordering, level selection (Metadata, Request, RequestResponse), stage filters such as ResponseComplete and ResponseStarted, and AI-resource-specific tuning for inference, training, and authorization-sensitive resources.
  owner_primary: Security Operations
  owner_supporting: Platform Engineering; AI/ML Engineering
  baseline_or_ai_specific: ai-specific
