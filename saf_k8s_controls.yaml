- control_id: SAF-K8S-1007-018
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.7'
  control_seq: 018
  control_title: Deprecated Kubernetes API usage inventory and migration tracking for AI workloads
  control_statement: Organizations must maintain an inventory of deprecated Kubernetes APIs used by cluster workloads, operators, custom resources, Helm charts, and manifests, and must notify responsible teams with tracked migration plans and completion status before production upgrades proceed.
  objective: Discover deprecated Kubernetes API usage in AI environments and drive accountable migration completion before removed APIs break production workloads during upgrades.
  rationale: Upstream deprecation awareness alone is insufficient unless teams know exactly which workloads and controllers still depend on deprecated APIs. Inventorying that usage and tracking migration completion prevents removed APIs from causing upgrade failures in AI platforms.
  scope: Applies to all Kubernetes clusters scheduled for version upgrades. Discovery must cover AI workload namespaces, operator deployments, Helm chart templates, and custom resource definitions used by AI platforms and services.
  primary_enforcement_point: Deprecation scanning tools in CI/CD pipelines, manifest and cluster scan workflows, and migration tracking dashboards.
  implementation_surface: API deprecation scanning tools such as kubent, pluto, kubepug, or kubectl deprecations; manifest and Helm chart scanning for deprecated APIs; CRD deprecated field detection; deprecated API inventory generation; team notification workflows; and migration completion tracking before upgrade approval.
  owner_primary: Platform Engineering
  owner_supporting: AI/ML Engineering; DevOps; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
