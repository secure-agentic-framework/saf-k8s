  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.3'
  control_seq: '23'
  control_title: Investigation and termination of confirmed unauthorized GPU workloads
  control_statement: Organizations must investigate confirmed abusive GPU consumption and terminate, quarantine, or otherwise stop non-sanctioned GPU workloads through approved incident response actions that document disposition and preserve evidence needed for follow-up analysis.
  objective: Respond to confirmed unauthorized GPU consumption quickly enough to halt abusive usage, preserve evidence, and determine whether the event reflects simple misuse or a broader security incident.
  rationale: Detection alone does not reclaim accelerator capacity or resolve the security risk created by confirmed abuse. A separate response control is required so organizations have governed workflows to investigate, terminate, or quarantine abusive GPU workloads while preserving the evidence needed to understand impact and recurrence.
  scope: Applies to all confirmed abusive GPU consumption events in Kubernetes clusters, including cryptomining, personal workloads, resource squatting that persists after validation, and other unauthorized GPU use requiring response action.
  primary_enforcement_point: Incident triage, containment, and workload termination or quarantine workflows for confirmed GPU abuse.
  implementation_surface: Abuse investigation tickets, termination or quarantine workflows, evidence capture steps, and approved incident response procedures for unauthorized GPU workloads.
