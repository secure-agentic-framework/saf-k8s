- control_id: SAF-K8S-1006-005
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.6'
  control_seq: '005'
  control_title: Policy-as-code enforcement for AI workload compliance
  control_statement: Organizations must implement policy-as-code engines (OPA/Gatekeeper, Kyverno, or Kubewarden) to enforce compliance policies on Kubernetes AI workloads, including image provenance verification, GPU resource limit enforcement, security context constraints, and required classification labels for AI-specific resources.
  objective: Enforce AI workload compliance requirements at admission and policy evaluation time so non-compliant workloads are prevented from running.
  rationale: Manual pre-deployment checks do not scale with AI workload velocity. Deterministic admission and policy enforcement reduces security exposure from unsafe images, excessive GPU usage, and insecure runtime settings.
  scope: Applies to Kubernetes clusters hosting AI workloads. Covers admission and policy enforcement for workload security and governance constraints.
  primary_enforcement_point: Kubernetes admission control and policy engine evaluation path.
  implementation_surface: Policy engines, admission policies, workload labels, and namespace policy scopes for AI workloads.
  owner_primary: GRC/Compliance
  owner_supporting: Platform Engineering; AI/ML Engineering; Security Engineering
