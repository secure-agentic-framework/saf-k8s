- control_id: SAF-K8S-0906-006
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.6'
  control_seq: '006'
  control_title: Training data provenance tracking from ingestion through model training
  control_statement: Organizations must maintain end-to-end provenance tracking for training data from ingestion through feature engineering to model training so that the origin and downstream use of training data can be traced.
  objective: Establish verifiable lineage for training data so that compromised, biased, or recalled data can be traced to impacted models and pipeline outputs.
  rationale: Without provenance tracking, organizations cannot determine which data was used to train a specific model or which models were affected when a data source is compromised, biased, or subject to regulatory recall.
  scope: Applies to all training data pipelines on Kubernetes, from initial data ingestion through feature engineering to model training input. Covers data lineage metadata, provenance records, manifests, and queryability across pipeline stages. Excludes transformation-stage integrity verification controls.
  primary_enforcement_point: Data lineage metadata store and provenance query workflow.
  implementation_surface: Data lineage metadata stores recording source, timestamp, and lineage identifiers at ingestion and across pipeline stages, immutable provenance manifests, and provenance query tooling for tracing production models back to source data.
  owner_primary: Data Engineering
  owner_supporting: ML Platform Engineering; Security Engineering
