- control_id: SAF-K8S-0103-015
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.3'
  control_seq: '015'
  control_title: Scheduler extender authentication and custom scheduler approval
  control_statement: Production Kubernetes clusters must require authentication and authorization for all scheduler extenders and webhook endpoints, and must permit custom schedulers only after security review and approval.
  objective: Prevent unauthorized or untrusted scheduler extensions from influencing workload placement decisions without authenticated integration and explicit governance.
  rationale: Unauthenticated scheduler extenders allow external parties to influence placement decisions, while unreviewed custom schedulers can bypass security-aware scheduling constraints entirely. Requiring authenticated extender integration and explicit approval for custom schedulers preserves trust in placement decisions while still allowing platform-specific scheduling extensions.
  scope: Applies to all production clusters. Covers scheduler extender webhook endpoints, extender TLS and auth configuration, and governance for custom scheduler deployments including third-party GPU-oriented schedulers.
  primary_enforcement_point: Scheduler extension authentication and governance
  implementation_surface: Scheduler extender webhook TLS and authentication configuration, admission or deployment approval records for custom schedulers, and periodic review of deployed scheduler extensions.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Application Platform teams
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
