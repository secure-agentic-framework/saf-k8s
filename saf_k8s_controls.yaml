  control_seq: 029
  control_title: Kubernetes backup verification for etcd and AI workload data
  control_statement: Organizations must verify backups for Kubernetes environments subject to ransomware or destructive attacks, including etcd snapshots and relevant persistent workload data used by AI workloads.
  objective: Ensure backup copies for Kubernetes control plane and AI workload data are valid before they are needed during destructive-attack recovery.
  rationale: Backup programs fail in practice when teams assume snapshots and stored copies are usable without verification. Verifying etcd and persistent workload backups reduces the chance of discovering corruption, incompleteness, or unusable copies during active incident recovery.
  scope: Applies to production Kubernetes clusters and supporting infrastructure used by AI workloads, including etcd, persistent volumes, model artifact stores, training checkpoints, and related backup systems. Covers backup verification for control plane and relevant workload data. Excludes restoration runbook governance and recovery prioritization.
