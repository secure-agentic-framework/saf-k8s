- control_id: SAF-K8S-0604-007
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.4'
  control_seq: '007'
  control_title: Third-party component security requirements documentation
  control_statement: Organizations must document security requirements for third-party software components admitted to the cluster, including container base images, Helm charts, operators, ML frameworks, and pre-trained models. Requirements must specify minimum expectations for vulnerability disclosure practices, SBOM availability, image signing, supported lifecycle and patching cadence, and license compliance. Requirements must be communicated to vendors and open-source project maintainers through procurement documents, supplier agreements, or published intake criteria. Admission control policies must enforce the verifiable subset of these requirements.
  objective: Formalize and communicate the security expectations that third-party software components must meet before admission to the cluster, closing the gap between infrastructure-level enforcement and upstream supplier engagement.
  rationale: SAF-K8S admission controls enforce technical requirements (signatures, scanning) at the cluster boundary, but without documented requirements communicated to suppliers, organizations cannot hold vendors accountable for missing SBOMs, unsigned images, or absent vulnerability disclosure practices. SSDF task PO.1.3 requires communication of requirements to third parties.
  scope: 'All third-party software components consumed by the Kubernetes platform and AI workloads: container images, Helm charts, operators, CSI/CNI plugins, ML frameworks, pre-trained models, and pipeline components.'
  primary_enforcement_point: admission-controller
  implementation_surface: Procurement and vendor management documentation, supplier security questionnaires, published intake criteria for open-source components, admission controller policies enforcing SBOM presence and image signature requirements, model quarantine workflow intake checklists.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; ML Platform Engineering; Procurement
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
