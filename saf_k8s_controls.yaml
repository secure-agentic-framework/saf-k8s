- control_id: SAF-K8S-0201-014
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.1'
  control_seq: '014'
  control_title: Kubelet serving certificate trust and expiry enforcement
  control_statement: Kubelet HTTPS endpoints must use valid serving certificates issued by a trusted cluster or organizational certificate authority, and expired or self-signed serving certificates must not remain in service.
  objective: Maintain trustworthy kubelet HTTPS endpoints for node management traffic, exec, logs, and metrics access.
  rationale: Expired or self-signed kubelet serving certificates enable man-in-the-middle attacks and break trust in kubelet HTTPS endpoints. Enforcing trusted issuance and expiry replacement preserves authenticated node-management traffic and prevents insecure fallback behavior.
  scope: Applies to all cluster nodes running kubelet, including control-plane nodes where kubelet manages static pods. For managed services that handle certificate lifecycle internally, evidence of provider-managed rotation and TLS enforcement satisfies this control. Environments using external certificate authorities must document their rotation schedule and monitoring.
  primary_enforcement_point: Kubelet serving certificate bootstrap configuration, serving CSR approval workflow, and certificate chain or expiry validation.
  implementation_surface: KubeletConfiguration serverTLSBootstrap setting, kubelet-serving CSR approver, Kubernetes certificates API, and serving certificate chain and expiry validation tooling.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; PKI/Certificate Management
