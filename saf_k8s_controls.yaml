- control_id: SAF-K8S-1005-018
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.5'
  control_seq: 018
  control_title: Component integrity verification before restoration after compromise
  control_statement: Organizations must verify the integrity of components affected by an AI security incident before restoration to prevent reinfection or persistence during recovery operations.
  objective: Ensure only verified components are restored after compromise so recovery does not reintroduce attacker persistence into the environment.
  rationale: Restoring nodes, images, drivers, or other components without integrity verification can reintroduce the original compromise or preserve attacker footholds. Recovery must confirm component integrity before restored assets are trusted again.
  scope: Applies to all Kubernetes clusters recovering from security incidents affecting AI workloads. Covers integrity verification of images, nodes, drivers, and related components before restoration to service.
  primary_enforcement_point: Post-incident restoration checklists and integrity verification workflows for components affected by the incident.
  implementation_surface: Container image re-pull from trusted registries, hash or signature verification against known-good values, node OS integrity verification, GPU driver integrity checks, and other pre-restoration validation steps for affected components.
  owner_primary: Security Operations
  owner_supporting: Platform Engineering; AI/ML Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
