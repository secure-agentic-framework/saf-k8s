  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.1'
  control_seq: '034'
  control_title: AI-specific SIEM source onboarding and forwarding
  control_statement: Organizations must onboard Kubernetes audit logs and AI workload security event sources into the SIEM and forward those events through approved ingestion pipelines so AI-relevant telemetry is available for centralized security analysis.
  objective: Ensure that Kubernetes and AI-specific security telemetry sources are onboarded and forwarded into the SIEM for centralized analysis.
  rationale: Correlation rules and SOC workflows are ineffective if the required AI security telemetry never reaches the SIEM. Source onboarding and forwarding ensure that Kubernetes audit logs and AI workload security events are actually present in the centralized analysis platform.
  scope: Applies to SIEM onboarding and event forwarding for Kubernetes audit logs and AI workload security telemetry, including inference, training, registry, policy, and runtime security event sources. Covers source onboarding and forwarding pipeline configuration. Excludes monitoring of delivery completeness and ingestion health after onboarding.
  primary_enforcement_point: SIEM source onboarding and forwarding pipeline configuration.
  implementation_surface: SIEM ingestion configuration for Kubernetes audit logs and AI workload security event sources, source connector onboarding, event pipeline routing, and forwarding paths that deliver AI security telemetry into the centralized SIEM.
