- control_id: SAF-K8S-0401-001
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.1'
  control_seq: '001'
  control_title: RBAC least-privilege design
  control_statement: Production Kubernetes clusters must implement RBAC using Roles, ClusterRoles, RoleBindings, and ClusterRoleBindings designed according to least-privilege principles, granting only the minimum permissions required for each subject to perform its designated function.
  objective: Ensure that every human user, service account, and group is granted only the Kubernetes API permissions strictly necessary for its role, reducing the blast radius of compromised credentials or insider misuse.
  rationale: Overly permissive RBAC configurations are among the most common Kubernetes misconfigurations. When subjects hold unnecessary privileges such as wildcard verbs or cluster-wide resource access, a single compromised credential can lead to full cluster takeover, data exfiltration, or workload manipulation. Least-privilege RBAC design constrains each actor to its operational boundary.
  scope: Applies to all production and pre-production Kubernetes clusters. Covers all RBAC objects including Roles, ClusterRoles, RoleBindings, and ClusterRoleBindings for human users, service accounts, and group subjects. Managed Kubernetes services must apply this control to all customer- configurable RBAC settings.
  primary_enforcement_point: RBAC manifest definitions, cluster provisioning templates, admission policies that reject overly permissive role definitions, and periodic RBAC configuration audits.
  implementation_surface: Kubernetes RBAC API objects (Roles, ClusterRoles, RoleBindings, ClusterRoleBindings), namespace-scoped Role definitions, admission policies (OPA Gatekeeper, Kyverno) rejecting wildcard verb or resource grants, cluster provisioning templates and GitOps manifests, RBAC review tooling, and periodic RBAC configuration audit reports.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Identity and Access Management
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0401-002
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.1'
  control_seq: '002'
  control_title: RBAC permission audit and analysis
  control_statement: Organizations must perform periodic RBAC permission audits to identify overly permissive roles, detect privilege escalation paths, and remediate findings using RBAC analysis tooling such as rakkess, kubectl-who-can, or equivalent.
  objective: Continuously verify that RBAC configurations remain aligned with least-privilege principles and that no unintended privilege escalation paths have been introduced through role changes or new bindings.
  rationale: RBAC configurations drift over time as teams add roles, bindings, and exceptions to meet operational needs. Without regular audits, permissions accumulate beyond what is required, creating hidden privilege escalation paths that attackers can exploit. Automated tooling detects issues such as subjects who can create RoleBindings referencing cluster-admin or who hold escalate, bind, or impersonate verbs without justification.
  scope: Applies to all Kubernetes clusters hosting production or sensitive workloads. Audits must cover all namespaces including kube-system and operator-managed namespaces. Managed service environments must audit all customer-configurable RBAC objects.
  primary_enforcement_point: RBAC audit tooling integrated into CI/CD pipelines or scheduled cluster scans, with findings tracked in the organization's vulnerability management system.
  implementation_surface: RBAC analysis tools (rakkess, kubectl-who-can, rbac-tool), policy engine audit modes (Kyverno audit, Gatekeeper dry-run), CI/CD pipeline RBAC manifest analysis, privilege escalation path detection for escalate/bind/impersonate verbs, SIEM integration for RBAC audit findings, and vulnerability management system tracking.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Identity and Access Management
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0401-003
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.1'
  control_seq: '003'
  control_title: Aggregated ClusterRole governance
  control_statement: Organizations must review and restrict aggregated ClusterRole configurations to prevent controllers or operators from unintentionally granting elevated permissions through label-based role aggregation rules.
  objective: Prevent unintended permission expansion caused by Kubernetes role aggregation, where new ClusterRoles with matching aggregation labels automatically inherit into parent roles such as admin, edit, or view.
  rationale: Kubernetes aggregated ClusterRoles use label selectors to automatically merge permissions from multiple ClusterRoles into a single effective role. When operators or custom controllers install CRDs with aggregation labels, they can silently expand the permissions of built-in roles like admin or edit without explicit approval. This creates a covert privilege escalation vector where installing a Helm chart or operator grants broader access than intended.
  scope: Applies to all clusters where aggregated ClusterRoles are in use, including the default admin, edit, and view roles. Covers all installed operators, Helm charts, and custom resource definitions that include aggregation labels. Particular attention is required during operator and CRD installation workflows.
  primary_enforcement_point: Admission policies that validate aggregation labels on ClusterRole resources, and pre-deployment review of Helm charts and operator manifests for aggregation rule declarations.
  implementation_surface: ClusterRole aggregationRule label selectors (rbac.authorization.k8s.io/aggregate-to-admin, aggregate-to-edit, aggregate-to-view), admission policies (OPA Gatekeeper, Kyverno) validating or blocking aggregation labels on ClusterRole resources, Helm chart and operator manifest pre-deployment review for aggregation rule declarations, and effective permission inventories for built-in admin/edit/view ClusterRoles.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0401-004
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.1'
  control_seq: '004'
  control_title: RBAC for AI operator custom resources
  control_statement: Organizations must define and enforce dedicated RBAC policies for AI operator custom resource definitions including InferenceService, TrainingJob, RayCluster, and PodGroup, restricting create, update, and delete operations to authorized ML engineering and platform roles.
  objective: Ensure that access to AI-specific custom resources is explicitly governed by RBAC, preventing unauthorized users from deploying, modifying, or deleting AI workloads through operator CRDs.
  rationale: AI operator CRDs such as InferenceService, TrainingJob, RayCluster, and PodGroup control the deployment of GPU-intensive workloads, model serving endpoints, and distributed training clusters. Without dedicated RBAC policies for these custom resources, any user with broad namespace permissions could deploy unauthorized models, consume expensive GPU resources, or tamper with training pipelines. Default RBAC often does not cover custom resources explicitly.
  scope: Applies to all clusters running AI/ML operators such as KServe, Kubeflow Training Operator, KubeRay, or Volcano. Covers all custom resource types registered by these operators. Must be enforced in namespaces where ML workloads are scheduled.
  primary_enforcement_point: Namespace-scoped Roles and RoleBindings for AI operator CRDs, with admission policies preventing creation of these resources by unauthorized subjects.
  implementation_surface: Namespace-scoped Roles and RoleBindings for AI operator CRDs (KServe InferenceService, Kubeflow TrainingJob/PyTorchJob/TFJob/MPIJob, KubeRay RayCluster, Volcano PodGroup), admission policies restricting CRD create/update/delete to authorized ML engineering and platform groups, and Kubernetes audit logs for denied access attempts against AI custom resources.
  owner_primary: Platform Engineering
  owner_supporting: ML Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
