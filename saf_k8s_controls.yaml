- control_id: SAF-K8S-0301-002
  domain_code: D03
  domain_name: Workload and Pod Security
  knowledge_area: '3.1'
  control_seq: '002'
  control_title: Pod Security Admission configuration and version pinning
  control_statement: Production clusters must configure Pod Security Admission with namespace labels specifying enforcement mode (enforce), audit mode, and warn mode at explicit Kubernetes version pins, and must not rely on unpinned or floating version defaults.
  objective: Guarantee predictable and auditable pod admission behavior by explicitly configuring PSA enforcement modes and pinning them to known Kubernetes API versions, preventing unexpected policy changes during cluster upgrades.
  rationale: PSA enforcement modes without explicit version pinning may silently change behavior when the cluster is upgraded, potentially admitting previously blocked workloads or rejecting legitimate ones. Missing audit and warn modes eliminate visibility into policy violations before enforcement, increasing the risk of service disruptions during policy rollouts.
  scope: Applies to all namespaces in production and staging clusters. Version pinning is required for enforce and audit modes. Managed Kubernetes services must have PSA labels verified after provider-initiated upgrades.
  primary_enforcement_point: Namespace metadata labels (pod-security.kubernetes.io/enforce, pod-security.kubernetes.io/enforce-version, audit, warn variants) validated by admission control and GitOps pipeline checks.
  implementation_surface: Namespace metadata labels (pod-security.kubernetes.io/enforce-version, audit-version, warn-version), Pod Security Admission controller version-pin configuration, cluster upgrade checklists and automation scripts, GitOps pipeline validation for PSA label presence and version correctness, and PSS profile changelog review tooling.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Release Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0301-003
  domain_code: D03
  domain_name: Workload and Pod Security
  knowledge_area: '3.1'
  control_seq: '003'
  control_title: PodSecurityPolicy to PSA migration
  control_statement: Organizations still operating legacy PodSecurityPolicy (PSP) must execute a documented migration plan to Pod Security Admission that includes gap analysis of existing PSP rules, mapping of PSP policies to PSS levels, dry-run validation in audit and warn modes, and phased namespace-by-namespace rollout before PSP removal.
  objective: Eliminate reliance on the deprecated PodSecurityPolicy API while preserving equivalent or stronger workload security controls through a structured, validated migration to Pod Security Admission.
  rationale: PodSecurityPolicy was removed in Kubernetes 1.25. Clusters that have not migrated to PSA or an equivalent policy engine operate without any pod-level security admission enforcement, leaving all workloads unconstrained. Unplanned migration can introduce gaps where previously enforced policies are silently lost, creating windows of vulnerability.
  scope: Applies to any cluster that previously relied on PodSecurityPolicy or is upgrading from a Kubernetes version that supported PSP. Clusters already running PSA with validated policies are exempt. Migration plans must cover both application and system namespaces.
  primary_enforcement_point: Migration project governance, with validation through PSA audit and warn mode results before switching to enforce mode.
  implementation_surface: PodSecurityPolicy API objects (legacy), Pod Security Admission namespace labels, policy engines (OPA Gatekeeper, Kyverno) for gap coverage of PSP features not present in PSA (per-field granularity, mutation), PSA audit and warn mode logs, migration project governance tooling, and phased namespace-by-namespace rollout automation.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Application Development teams
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0301-005
  domain_code: D03
  domain_name: Workload and Pod Security
  knowledge_area: '3.1'
  control_seq: '005'
  control_title: PSA exemption register and justification tracking
  control_statement: Organizations must maintain a formal register for workloads that require elevated privileges beyond their namespace PSS level, documenting the exact privileges required, justification, risk owner, and associated compensating controls for each exemption.
  objective: Ensure privileged PSA exceptions are explicitly documented, justified, and reviewable rather than hidden inside namespace-wide privilege relaxations.
  rationale: A formal register is necessary to track why exceptions exist, who owns them, and which workloads still need them. This documentation obligation is distinct from the enforcement of scoped exemption rules.
  scope: Applies to all workloads requesting privileges beyond their namespace PSS level, including GPU device plugins, CNI agents, CSI drivers, log collectors, and monitoring DaemonSets. Each exemption must specify the exact privileges required and the compensating controls applied.
  primary_enforcement_point: Exemption Governance Process
  implementation_surface: Policy engines (OPA Gatekeeper, Kyverno) with exemption rules scoped to specific ServiceAccounts and pod labels, PSA namespace-level exemption configuration, formal exemption register in version control, NVIDIA device plugin DaemonSets (nvidia-device-plugin, GPU Operator, DCGM exporter, MIG manager), CNI agent DaemonSets (Cilium, Calico, Multus), CSI driver pods, network policies for compensating isolation, and audit logging at RequestResponse level for exempted namespaces.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; AI/ML Platform team; Infrastructure team
  baseline_or_ai_specific: ai-specific
  maturity: Foundational
