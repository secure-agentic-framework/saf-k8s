- control_id: SAF-K8S-0201-006
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.1'
  control_seq: '006'
  control_title: Node system and kube reserved resource allocations
  control_statement: Kubernetes nodes must configure system-reserved and kube-reserved resource allocations so that kubelet, the container runtime, and operating system processes retain sufficient CPU, memory, and storage to remain responsive under workload pressure.
  objective: Prevent user workloads from starving node-level control processes by reserving sufficient capacity for kubelet, runtime, and operating system functions on every production node.
  rationale: Node stability depends on protecting core system processes from workload contention. Explicit system and kube reservations prevent AI training or inference workloads from consuming the resources needed for health checks, logging, networking, and pod lifecycle operations.
  scope: Applies to all production cluster nodes, with particular attention to nodes hosting GPU workloads or AI training jobs that can exhibit sudden memory spikes. Managed Kubernetes services that expose allocatable resource configuration must have these values tuned for the node instance type. Exemptions require documented risk acceptance.
  primary_enforcement_point: Node provisioning templates and kubelet configuration files specifying systemReserved and kubeReserved settings.
  implementation_surface: KubeletConfiguration resource reservation settings for systemReserved and kubeReserved, GPU driver and node agent resource accounting, node capacity planning tooling, and node allocatable validation in provisioning pipelines.
  owner_primary: Platform Engineering
  owner_supporting: Workload Teams; Capacity Planning
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
