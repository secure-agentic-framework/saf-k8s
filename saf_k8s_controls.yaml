  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.1'
  control_seq: '037'
  control_title: Tenant and workload context preservation for AI log segregation and searchability
  control_statement: Organizations must preserve source, tenant, and workload context on centralized AI workload logs so those log streams remain searchable, segregated, and usable for investigation and governance.
  objective: Ensure centralized AI workload logs retain the source, tenant, and workload context needed for segregation, search, and investigative use.
  rationale: Centralized logging is not sufficient if AI workload logs lose tenant or workload context after collection. Without workload-aware labels and preserved metadata, multi-tenant platforms cannot separate one tenant's activity from another's or reliably reconstruct events for investigation.
  scope: Applies to all centralized AI workload logs on Kubernetes. Covers workload metadata enrichment, tenant-aware segregation, searchable source labeling, and retained context for investigation and governance. Excludes the initial collection and routing of AI workload logs into the enterprise platform.
  primary_enforcement_point: Workload metadata enrichment and search or index segregation configuration.
  implementation_surface: Workload and tenant metadata enrichment; centralized logging platform indexes, views, or labels that preserve source, tenant, and workload context; and searchable segregation of AI workload log classes for investigation.
