- control_id: SAF-K8S-0905-001
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: '001'
  control_title: AI system lifecycle classification
  control_statement: Organizations must classify each AI system as either train-verify-lock (model fixed at deployment) or continuous learning (model updates post-deployment) and document the classification in the AI system registry using standardized labels before production deployment on Kubernetes.
  objective: Ensure each AI system has a documented lifecycle classification that drives appropriate security control selection, with classification labels applied before production deployment to enable risk-calibrated enforcement.
  rationale: Train-verify-lock systems and continuous learning systems have fundamentally different risk profiles. Accurate classification is the prerequisite for applying the correct security controls. Without documented classification, there is no basis for choosing between integrity-focused controls for static models versus update governance controls for continuously learning models.
  scope: Applies to all AI systems deployed on Kubernetes before production deployment. Covers the classification decision and registry documentation. Excludes pre-deployment model development activities and the enforcement of the control profile itself (see SAF-K8S-0905-015).
  primary_enforcement_point: Model deployment admission control that validates system classification label and corresponding control profile assignment before allowing production deployment.
  implementation_surface: AI system registry with classification labels (train-verify-lock, continuous-learning), Kubernetes pod labels (ai.kais.io/update-model), model deployment admission control validating classification labels, file integrity monitoring for train-verify-lock models, model update authorization workflows for continuous-learning systems, drift monitoring dashboards, and periodic classification review processes.
  owner_primary: ML Platform Engineering
  owner_supporting: Security Engineering; ML Engineering; Governance
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0905-005
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: '005'
  control_title: Automated model promotion gates
  control_statement: Models must pass automated security scan, bias evaluation, performance threshold, and adversarial robustness gates before production deployment. Gate results must be recorded as attestation evidence linked to the model artifact.
  objective: Prevent deployment of models that fail security, fairness, or robustness requirements through mandatory automated gate checks.
  rationale: Without mandatory promotion gates, models with known vulnerabilities, biases, or adversarial weaknesses can reach production. Automated gates provide consistent, repeatable enforcement that does not depend on manual review completeness.
  scope: Applies to all model promotion workflows on Kubernetes. Covers automated pre-deployment gate checks including security scanning, bias evaluation, performance threshold validation, and adversarial robustness testing. Excludes manual approval workflows (SAF-K8S-0905-010) and canary/A-B deployment controls (SAF-K8S-0905-011).
  primary_enforcement_point: Model promotion pipeline gate configurations.
  implementation_surface: Model promotion pipeline gate configurations (security scan, bias evaluation, performance threshold, adversarial robustness via ART/Foolbox), signature verification gate, and gate result attestation recording.
