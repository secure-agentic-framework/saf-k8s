- control_id: SAF-K8S-0601-007
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.1'
  control_seq: '007'
  control_title: AI GPU and ML framework base image validation
  control_statement: AI workload images must use validated CUDA base images and ML framework base images that have been assessed for GPU compatibility, version alignment, and removal of non-essential components, and any non-standard AI base image must be documented in an approved exception process.
  objective: Ensure AI-specific base images are selected from validated GPU and ML framework variants rather than generic or unvetted images that introduce compatibility risk and excess attack surface.
  rationale: AI images carry enlarged native dependency chains and compatibility constraints that do not apply to generic application images. CUDA, cuDNN, PyTorch, TensorFlow, Triton, and similar bases must be explicitly validated and curated so organizations do not trade operational compatibility for unnecessary exposure.
  scope: Applies to training, inference, and model-serving images that depend on CUDA, GPU drivers, or heavyweight ML framework runtimes. Exceptions require documented justification and approved compensating controls.
  primary_enforcement_point: Image Approval / ML Platform Governance
  implementation_surface: Approved AI base image catalogs, GPU compatibility validation records, and exception approvals for non-standard AI images.
  owner_primary: ML Platform Engineering
  owner_supporting: DevSecOps / Release Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
