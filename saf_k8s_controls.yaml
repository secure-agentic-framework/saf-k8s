- control_id: SAF-K8S-1001-026
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.1'
  control_seq: '032'
  control_title: Durable audit backend delivery for Kubernetes AI workloads
  control_statement: Production Kubernetes clusters running AI workloads must deliver audit records to a durable backend so captured audit events remain available for investigation, compliance, and recovery even when local components fail or restart.
  objective: Ensure that captured audit records are durably delivered to backend storage or downstream logging infrastructure after collection.
  rationale: Audit policy coverage provides little value if collected records never reach durable storage or downstream analysis systems. Durable backend delivery ensures that audit data survives local restarts, buffer loss, and node or control-plane disruption long enough to support detection and investigation.
  scope: Applies to audit record delivery paths and backend targets for Kubernetes clusters hosting AI workloads, including webhook targets, log file destinations, centralized logging platforms, and archival pipelines. Covers reliable delivery of audit events to durable backends. Excludes retention immutability and deletion resistance on the backend after arrival.
  primary_enforcement_point: Audit backend configuration and audit record delivery path health.
  implementation_surface: Kube-apiserver audit webhook configuration, audit log path configuration, durable external storage or SIEM delivery targets, fallback delivery design, and health validation that audit records reach configured backends.
  owner_primary: Security Operations
  owner_supporting: Platform Engineering; GRC/Compliance
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
