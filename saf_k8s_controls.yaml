- control_id: SAF-K8S-0402-022
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.2'
  control_seq: '022'
  control_title: Projected service account token lifetime bounds enforcement
  control_statement: Kubernetes clusters must enforce time-bounded projected service account token lifetimes through bounded expiration settings and policy validation so workload tokens are issued only for the minimum practical duration.
  objective: Reduce the replay window for workload identity tokens by enforcing short projected-token lifetimes.
  rationale: Even when issuance paths and audiences are correctly scoped, a stolen workload token remains useful until it expires. Enforcing bounded projected-token lifetimes reduces the value of token theft and limits the duration of any replay opportunity.
  scope: Applies to all projected workload service account tokens used for in-cluster or federated workload authentication.
  primary_enforcement_point: Token lifetime policy enforcement and validation of projected token expiration settings.
  implementation_surface: Projected token expirationSeconds settings, policy validation, and workload token lifetime audit evidence.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Application Development
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
