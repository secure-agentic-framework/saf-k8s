  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.5'
  control_seq: 019
  control_title: Vulnerability disclosure policy, intake channels, and triage SLAs for Kubernetes AI infrastructure
  control_statement: Organizations must publish and maintain a vulnerability disclosure policy for their Kubernetes platform and AI infrastructure that defines intake channels for internal and external reporters and severity-based triage SLAs for reported vulnerabilities.
  objective: Ensure vulnerabilities affecting Kubernetes platform and AI infrastructure components are received through defined channels and triaged within established timeframes rather than handled ad hoc.
  rationale: Kubernetes and AI infrastructure rely on many externally sourced components and internal platform services where vulnerabilities may be reported by employees, researchers, customers, or upstream communities. Without a published policy, intake path, and triage SLA, vulnerability reports are delayed or lost and remediation starts too late.
  scope: Kubernetes control plane, node components, cluster add-ons, AI/ML operators, and GPU infrastructure vulnerabilities affecting the platform layer.
  primary_enforcement_point: governance
  implementation_surface: Published vulnerability disclosure policy, security intake channels, severity definitions, and triage SLA workflow for Kubernetes and AI infrastructure issues.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; ML Platform Engineering; Site Reliability Engineering
