  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.10'
  control_seq: 029
  control_title: Multi-cluster policy drift detection and remediation
  control_statement: Organizations operating AI workloads across multiple Kubernetes clusters must continuously detect drift from approved security policy and configuration baselines across the federation and remediate deviations before they create exploitable gaps.
  objective: Detect and remediate security policy drift across multi-cluster AI platforms before inconsistent configurations can be exploited.
  rationale: Even when a common baseline is initially deployed, clusters diverge over time through failed sync, emergency changes, or manual exceptions. Continuous drift detection and remediation are needed to find and correct deviations before adversaries exploit weaker admission controls, network policies, RBAC, or AI operator configuration on an outlier cluster.
  scope: Applies to organizations operating AI workloads across multiple Kubernetes clusters. Covers continuous drift detection, deviation alerting, and remediation workflows for security-relevant policy and configuration baselines across member clusters. Excludes initial centralized baseline distribution and excludes unified compliance reporting, secret governance, certificate governance, and incident coordination.
  primary_enforcement_point: Drift detection monitoring and remediation workflow for multi-cluster security baselines.
  implementation_surface: Continuous monitoring for drift in admission policies, NetworkPolicy, RBAC, security contexts, and AI operator configuration across clusters, with remediation workflows for detected divergence and exception handling for approved temporary variance.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; GRC/Compliance; ML Platform Engineering
