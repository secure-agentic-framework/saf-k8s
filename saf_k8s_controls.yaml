- control_id: SAF-K8S-0910-026
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.10'
  control_seq: 028
  control_title: Multi-cluster security policy baseline federation
  control_statement: Organizations operating AI workloads across multiple Kubernetes clusters must centrally distribute consistent security policy and configuration baselines so all member clusters enforce the same approved policy set for AI workloads.
  objective: Prevent exploitable cross-cluster policy inconsistencies by federating approved security policy baselines to all clusters in the AI platform.
  rationale: Attackers exploit the least restrictive cluster in a federation when policy baselines diverge. Centralized policy baseline federation ensures each cluster receives the same approved admission, workload, and security configuration controls rather than drifting through cluster-specific customization.
  scope: Applies to organizations operating AI workloads across multiple Kubernetes clusters. Covers centralized policy distribution and baseline consistency for admission controls, workload guardrails, and security configuration across member clusters. Excludes detection and remediation of drift after rollout, and excludes unified compliance reporting, secret governance, certificate governance, and incident coordination.
  primary_enforcement_point: Centralized policy distribution system and baseline rollout workflow.
  implementation_surface: Policy-as-code frameworks with centralized Git-based or controller-driven policy distribution to all clusters, baseline version management, and enforcement of common admission, workload, and security policy bundles across member clusters.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; GRC/Compliance; ML Platform Engineering
  baseline_or_ai_specific: ai-specific
