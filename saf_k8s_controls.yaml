- control_id: SAF-K8S-0205-009
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.5'
  control_seq: 009
  control_title: Service proxy path hardening for kube-proxy or replacements
  control_statement: Clusters must harden the selected service proxy path by restricting kube-proxy or replacement permissions, enabling strict conntrack or equivalent state controls, and removing unnecessary service proxy capabilities.
  objective: Reduce attack surface in the active service proxy implementation after the mode or replacement choice is made.
  rationale: Even after a mode is selected, permissive kube-proxy privileges, loose conntrack behavior, or unnecessary service proxy capabilities can widen attack surface or undermine network policy expectations. Hardening the chosen implementation is a distinct obligation from choosing the implementation in the first place.
  scope: Applies to all production clusters using kube-proxy or kube-proxy replacement implementations. Clusters using eBPF-based CNI plugins that fully replace kube-proxy (e.g., Cilium kube-proxy replacement) must document the replacement and apply equivalent hardening. Managed Kubernetes services must document the provider-selected mode and any available hardening options.
  primary_enforcement_point: kube-proxy ConfigMap or DaemonSet configuration, replacement DaemonSet configuration, and node networking hardening settings for the active service proxy path.
  implementation_surface: kube-proxy RBAC, conntrack tuning, kube-proxy ConfigMap or replacement DaemonSet settings, and removal of unnecessary proxy capabilities in the selected service routing path.
  owner_primary: Platform Engineering
  owner_supporting: Network Engineering; Security Engineering
