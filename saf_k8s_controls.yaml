- control_id: SAF-K8S-1001-019
  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.1'
  control_seq: 019
  control_title: Regulatory AI artifact and provenance record retention enforcement
  control_statement: Organizations subject to regulatory requirements must enforce retention policies for AI model artifacts, provenance records, human oversight decision records, and related compliance evidence so those artifacts are preserved for the required period and protected from premature lifecycle deletion.
  objective: Ensure regulatory-required AI artifacts and provenance evidence remain preserved for audit, monitoring, and post-market obligations.
  rationale: Regulatory retention duties extend beyond logs to model artifacts, provenance records, and oversight evidence. If storage lifecycle rules delete those artifacts too early, the organization cannot reconstruct model lineage, oversight decisions, or post-market evidence during audits or incident response.
  scope: Applies to retained AI model versions, provenance records, training or deployment lineage artifacts, and human oversight decision evidence stored in registries, object stores, or compliance repositories. Excludes general audit-log retention.
  primary_enforcement_point: Artifact storage lifecycle policy and compliance retention scanning.
  implementation_surface: Object storage lifecycle policies, registry retention protection for referenced artifacts, provenance-record retention configuration, human-oversight evidence retention rules, and automated compliance checks preventing premature deletion of retained AI artifacts.
  owner_primary: GRC/Compliance
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
