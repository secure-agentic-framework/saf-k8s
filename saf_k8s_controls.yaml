  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.4'
  control_seq: '010'
  control_title: Post-compromise certificate recovery validation
  control_statement: Organizations must validate service recovery after certificate compromise by confirming affected services are operating correctly on replacement certificates and key pairs.
  objective: Ensure certificate compromise response restores secure service operation after replacement credentials are deployed.
  rationale: Recovery validation is independently auditable from the revocation and re-issuance action itself. This control isolates post-replacement validation so teams can verify that services, trust chains, and dependent workloads are actually healthy on the new certificate material.
  scope: Applies to compromise scenarios affecting API server, etcd, kubelet, webhook, service mesh, and application certificates. Covers service redeployment validation, trust-chain verification, and exercise-based confirmation that services recovered correctly after certificate replacement. Revocation and re-issuance remain governed by SAF-K8S-0404-009.
  primary_enforcement_point: Service recovery validation after certificate replacement.
  implementation_surface: Service redeployment validation, trust-chain checks, smoke tests, and exercise records demonstrating successful recovery after certificate compromise response.
