  date_modified: '2026-03-17'
- control_id: SAF-K8S-0201-011
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.1'
  control_seq: '011'
  control_title: Kubelet webhook authentication and authorization enforcement
  control_statement: Production Kubernetes nodes must configure the kubelet to require webhook authentication and webhook authorization for kubelet API access so that only authenticated and authorized entities can interact with kubelet endpoints.
  objective: Reduce node-level attack surface by ensuring kubelet API access is mediated by authenticated identities and authorization decisions.
  rationale: The kubelet exposes direct workload and node management operations. Enforcing webhook authentication and authorization is a distinct access-control obligation from disabling anonymous and read-only access paths.
  scope: Applies to all kubelet instances on production cluster nodes, including dedicated GPU and AI inference nodes. For managed Kubernetes services where kubelet flags are provider-controlled, compensating controls such as node network isolation and provider-documented hardening attestation must be in place. Non-production clusters that process sensitive data or connect to production networks are also in scope.
  primary_enforcement_point: Node provisioning templates, kubelet configuration files, and configuration management tooling (e.g., Ansible, Terraform, cloud-init).
  implementation_surface: KubeletConfiguration API settings (webhook authentication, webhook authorization, anonymous access, readOnlyPort), node provisioning templates, CIS Benchmark verification tooling (kube-bench), and kubelet configuration management automation.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Cloud Infrastructure
  baseline_or_ai_specific: baseline
