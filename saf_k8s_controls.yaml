  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.2'
  control_seq: 009
  control_title: Inference response filtering and output controls
  control_statement: Inference endpoints must apply response filtering and output controls to prevent model responses from leaking training data, PII, or sensitive patterns through memorization, overfitting, or unintended information disclosure.
  objective: Prevent model outputs from disclosing sensitive information embedded in training data, including PII, proprietary data, or internal infrastructure details.
  rationale: Without output filtering, models may produce responses containing memorized training data, PII, or proprietary information that constitutes a data breach. LLM endpoints are particularly susceptible to prompt-based extraction of training data. Response filtering at the infrastructure layer provides defense independent of model-level safeguards.
  scope: Applies to all inference response processing paths on Kubernetes, including HTTP/gRPC inference APIs, batch prediction outputs, and streaming inference channels. Covers output postprocessing pipelines. Complements SAF-K8S-0902-003 (input validation). Excludes model-level safety alignment, which is outside infrastructure scope.
  primary_enforcement_point: Response filtering middleware or sidecar proxies deployed alongside inference servers.
  implementation_surface: Response filtering middleware or sidecar proxies for PII pattern scanning (SSN, email, phone), sensitive pattern detection rules (internal hostnames, API keys, file paths), confidence score precision controls, output size limiting configuration, and training data extraction detection heuristics.
