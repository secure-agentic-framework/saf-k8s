- control_id: SAF-K8S-0701-007
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.1'
  control_seq: '007'
  control_title: High-performance AI storage backend hardening
  control_statement: Organizations using high-performance storage backends for AI workloads (Lustre, GPFS/Spectrum Scale, parallel NFS, object storage) must document and mitigate the elevated privilege requirements of these backends, restrict host-level mounts and privileged containers to dedicated storage nodes, and enforce compensating controls for expanded attack surface.
  objective: Ensure that high-performance storage backends required by AI workloads do not introduce unmitigated privilege escalation paths despite their inherent need for elevated host access.
  rationale: High-performance AI storage backends such as Lustre and GPFS often require host-level mounts and privileged containers, which expand the attack surface beyond standard CSI drivers. Without dedicated node isolation, AppArmor/SELinux confinement, and documented risk assessments, these backends create persistent privilege escalation vectors on GPU nodes.
  scope: Applies to Kubernetes clusters using high-performance storage backends for AI workloads including Lustre, GPFS/Spectrum Scale, parallel NFS, and object storage gateways. Covers storage node dedication, privilege confinement, and risk assessment.
  primary_enforcement_point: Node taints dedicating storage nodes, admission control restricting privileged storage pods, and documented risk registers for elevated privilege requirements.
  implementation_surface: High-performance storage backend configurations (Lustre, GPFS/Spectrum Scale, parallel NFS), node taints dedicating storage nodes, AppArmor/SELinux profiles for privileged storage pods, runtime security monitoring for storage backend behavior, and risk register documentation for elevated privilege requirements with compensating controls.
  owner_primary: Storage Engineering
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
