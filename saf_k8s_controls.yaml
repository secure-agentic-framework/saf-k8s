- control_id: SAF-K8S-0102-023
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.2'
  control_seq: '023'
  control_title: etcd backup break-glass authorization governance
  control_statement: Production Kubernetes clusters must require explicit break-glass authorization records for emergency etcd backup repository or restore media access outside the approved routine access path.
  objective: Constrain emergency etcd backup access so exceptional use is formally authorized and auditable rather than informally bypassing repository restrictions.
  rationale: Backup recovery scenarios sometimes require emergency access outside routine automation paths, but unmanaged break-glass access weakens separation of duties and accountability. Requiring explicit authorization records preserves emergency operability while ensuring backup access remains governable and reviewable.
  scope: Applies to all production clusters. Covers emergency access approval paths, break-glass identities, and authorization records for etcd backup repositories and restore media.
  primary_enforcement_point: Emergency access governance
  implementation_surface: Break-glass approval workflows, authorization records, emergency access role definitions, and periodic review of break-glass eligibility for etcd backup access.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Backup and Recovery Operations
  baseline_or_ai_specific: baseline
  maturity: Foundational
