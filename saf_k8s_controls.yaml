- control_id: SAF-K8S-0302-007
  domain_code: D03
  domain_name: Workload and Pod Security
  knowledge_area: '3.2'
  control_seq: '007'
  control_title: Safe fsGroup and supplementalGroups volume ownership
  control_statement: Pods that use fsGroup or supplementalGroups must restrict group ownership changes to designated workload data directories and must not grant write access to sensitive paths, shared platform volumes, or host-backed filesystems outside the container's approved storage scope.
  objective: Prevent filesystem group ownership settings from creating cross-workload tampering paths or unintended write access to sensitive storage.
  rationale: fsGroup and supplementalGroups change the group ownership and write semantics of mounted volumes. Without explicit limits, those settings can grant container processes write access to shared or sensitive paths, enabling cross-tenant tampering, credential overwrite, or model and dataset corruption.
  scope: Applies to workloads that mount persistent volumes, shared datasets, model caches, or other writable storage in production clusters.
  primary_enforcement_point: Admission policy rules and workload validation that restrict approved fsGroup and supplementalGroups use for mounted storage.
  implementation_surface: Pod securityContext fsGroup and supplementalGroups fields, volume mount definitions, and volume permission analysis outputs.
  owner_primary: Application Development teams
  owner_supporting: Platform Engineering; Security Engineering
