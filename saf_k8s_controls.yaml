  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.5'
  control_seq: '020'
  control_title: Vulnerability response ownership and multi-party coordination governance for Kubernetes AI infrastructure
  control_statement: Organizations must define ownership, escalation responsibilities, and multi-party coordination procedures for vulnerabilities affecting shared Kubernetes and AI infrastructure components, including upstream open-source projects and cloud providers when remediation spans organizational boundaries.
  objective: Ensure vulnerability reports affecting shared Kubernetes and AI infrastructure components are coordinated through named owners, escalation paths, and external partner engagement processes until remediation is complete.
  rationale: Shared platform vulnerabilities often require coordinated action across security engineering, platform owners, ML platform teams, cloud providers, and upstream open-source maintainers. Without defined ownership and coordination governance, critical issues stall between teams and boundary-spanning vulnerabilities remain unresolved.
  scope: Kubernetes control plane, node components, cluster add-ons, AI/ML operators, and GPU infrastructure vulnerabilities that require coordination across internal teams or external providers.
  primary_enforcement_point: governance
  implementation_surface: Roles and responsibilities matrix, escalation runbooks, cloud provider and upstream coordination playbooks, and vulnerability response governance records for shared infrastructure issues.
