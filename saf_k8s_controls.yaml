- control_id: SAF-K8S-0503-012
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.3'
  control_seq: '012'
  control_title: Client source IP preservation for external services
  control_statement: Services exposed to external traffic must preserve client source IP addresses where client IP-based access controls, geographic restrictions, audit logging, or forensic analysis require origin visibility.
  objective: Preserve client IP visibility for external services where security controls or investigations depend on accurate request origin identity.
  rationale: When source IP is hidden behind SNAT or load-balancer rewriting, teams lose the origin information needed for IP-based access control, geo restrictions, and forensic attribution. Separating preservation from routing mode governance makes source identity handling independently auditable.
  scope: Applies to all Services of type LoadBalancer or NodePort in production clusters that receive external traffic. The choice between Local and Cluster externalTrafficPolicy must be documented per service with security and availability justification.
  primary_enforcement_point: External client source identity preservation controls.
  implementation_surface: Cloud load balancer proxy protocol configuration, X-Forwarded-For or equivalent header preservation settings, service exposure configuration, and validation that client source IP remains visible to applications or policy engines where required.
  owner_primary: Network Engineering
  owner_supporting: Application Development; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
