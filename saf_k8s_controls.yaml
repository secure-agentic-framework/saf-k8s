- control_id: SAF-K8S-0602-006
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.2'
  control_seq: '006'
  control_title: Fail-closed admission enforcement of image signature verification
  control_statement: Kubernetes clusters must deploy an admission controller configured to reject any container image that lacks a valid cryptographic signature from an authorized signing identity, and the admission policy must fail closed when verification is unavailable.
  objective: Enforce image signature verification at the Kubernetes admission layer so unsigned or tampered images cannot run even during admission component failure conditions.
  rationale: Mandatory admission-time verification is a distinct control claim from exception governance. Without fail-closed enforcement, a webhook outage or policy-controller error silently degrades image integrity protection and allows unsigned images to deploy.
  scope: Applies to all production and staging Kubernetes clusters. All namespaces must be covered unless explicitly exempted in a documented policy (e.g., kube-system for provider-managed components). Emergency break-glass procedures must be audited and time-limited.
  primary_enforcement_point: Kubernetes validating admission webhook and image verification policy configuration.
  implementation_surface: 'ValidatingWebhookConfiguration with failurePolicy: Fail, admission controller deployments, signature verification rules, verifyImages or equivalent policy configuration, and audit logs for rejected unsigned images.'
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; DevSecOps / Release Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
