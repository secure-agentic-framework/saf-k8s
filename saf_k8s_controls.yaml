- control_id: SAF-K8S-0405-018
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.5'
  control_seq: 018
  control_title: Secure credential storage and lifecycle governance
  control_statement: Organizations must enforce secure credential storage and credential lifecycle handling requirements for Kubernetes cluster and AI infrastructure authentication pathways.
  objective: Ensure authentication credentials are protected at rest and governed through secure lifecycle handling so theft, reuse, or unmanaged persistence do not become initial access paths into the cluster.
  rationale: Secure storage and lifecycle handling are independently auditable from baseline credential strength policy. This control isolates the protection and lifecycle governance claim so teams can verify that credentials are stored securely and handled under controlled lifecycle standards.
  scope: Applies to authentication pathways for Kubernetes clusters, OIDC integrations, and cloud provider IAM integrations that rely on managed credentials. Covers secure storage controls, password or secret storage protections, certificate-based authentication policy baselines, and administrative credential lifecycle standards. Baseline credential policy requirements remain governed by SAF-K8S-0405-017.
  primary_enforcement_point: Credential storage and lifecycle controls in identity providers, IAM systems, and cluster authentication systems.
  implementation_surface: Password and secret storage protections, certificate-based authentication handling, and administrative credential lifecycle standards in OIDC providers, cloud IAM, and related authentication systems.
  owner_primary: Identity and Access Management
  owner_supporting: Platform Engineering; Security Engineering
