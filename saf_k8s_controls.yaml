- control_id: SAF-K8S-0905-046
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: '046'
  control_title: ML artifact cryptographic signing with Sigstore or equivalent
  control_statement: All ML lifecycle artifacts produced by internal training and build pipelines must be cryptographically signed using Sigstore or equivalent signing infrastructure so downstream systems can verify artifact origin and integrity.
  objective: Establish cryptographic authenticity for internally produced ML artifacts through signing that downstream verification and promotion controls can trust.
  rationale: Without cryptographic signing, there is no trustworthy proof that a model or related artifact was produced by an authorized pipeline or that the artifact was not modified after creation. Signing creates the integrity evidence downstream verification and promotion controls rely on.
  scope: Applies to models, training input manifests, intermediate pipeline artifacts, final outputs, and related provenance records generated by internal ML training and packaging pipelines. Covers signing, but not training-step attestation generation or deploy-time verification.
  primary_enforcement_point: Model artifact signing workflow.
  implementation_surface: Sigstore cosign or equivalent signing infrastructure with identity-based trust, keyless or managed-key signing for models and related artifacts, signing of manifests and intermediate outputs, and internal re-signing workflow for externally sourced models admitted into internal registries.
  owner_primary: ML Platform Engineering
  owner_supporting: Security Engineering; DevOps Engineering
