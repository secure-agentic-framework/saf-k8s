  date_modified: '2026-03-17'
- control_id: SAF-K8S-0102-018
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.2'
  control_seq: 018
  control_title: etcd client and peer certificate authentication
  control_statement: Production Kubernetes clusters must enforce client certificate authentication for all etcd client connections and mutual TLS with certificate-based peer authentication for all etcd member communication.
  objective: Prevent unauthorized etcd access and spoofed member communication by requiring certificate-based authentication on all etcd client and peer channels.
  rationale: etcd holds the authoritative cluster state. Without client certificate authentication, any network-reachable process can attempt direct etcd access. Without mutually authenticated peer TLS, inter-member traffic can be intercepted or spoofed, undermining cluster-state integrity and availability.
  scope: Applies to all production Kubernetes clusters. Covers API server to etcd client authentication and etcd member-to-member peer authentication. For managed Kubernetes services, applies to verifying that provider-managed etcd uses customer-inaccessible, certificate-authenticated channels or equivalent provider controls.
  primary_enforcement_point: etcd transport authentication
  implementation_surface: etcd configuration flags (--client-cert-auth, --peer-client-cert-auth, --cert-file, --peer-cert-file), certificate issuance and trust configuration, and periodic certificate validation testing.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; PKI / Certificate Operations
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0102-019
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.2'
  control_seq: 019
  control_title: etcd endpoint network isolation from worker and workload traffic
  control_statement: Production Kubernetes clusters must isolate etcd at the network level so that only authorized control-plane components can reach etcd endpoints and worker nodes, workloads, and external networks cannot directly connect to etcd ports.
  objective: Prevent RBAC bypass through direct etcd reachability by enforcing network isolation around etcd endpoints.
  rationale: Direct network reachability to etcd bypasses API server authentication and authorization, allowing a compromised node or workload to read, modify, or delete cluster state directly. Restricting etcd ports to authorized control-plane paths preserves the API server as the sole managed access path to cluster state.
  scope: Applies to all production Kubernetes clusters. Covers host firewalls, security groups, routing boundaries, and equivalent node-level controls that restrict etcd port access. For managed Kubernetes services, applies to verifying that provider-managed etcd is not exposed to customer workloads or networks.
  primary_enforcement_point: Node and control-plane network boundary enforcement
  implementation_surface: Node firewall rules, cloud security groups, control-plane network placement, and periodic reachability assessment from worker and workload paths.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Network Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0102-020
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.2'
  control_seq: '020'
  control_title: etcd certificate maximum validity period enforcement
  control_statement: Production Kubernetes clusters must enforce organization-defined maximum validity periods for etcd server, peer, and API server-to-etcd client certificates through certificate issuance policy or equivalent configuration controls.
  objective: Reduce key-compromise exposure by constraining etcd-related certificates to approved maximum validity windows.
  rationale: Certificate rotation loses much of its security value when certificate validity windows remain excessively long. Enforcing bounded validity periods limits the blast radius of certificate compromise and ensures etcd-related identities are re-issued on a deliberate cadence aligned to organizational policy.
  scope: Applies to all self-managed Kubernetes clusters using etcd. Covers certificate lifetime policy and issuance profile configuration for etcd server, peer, and API server-to-etcd client certificates.
  primary_enforcement_point: Certificate issuance policy enforcement
  implementation_surface: CA or issuer policy configuration, certificate profile templates, and periodic certificate inventory review for etcd-related identities.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
