- control_id: SAF-K8S-0605-010
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.5'
  control_seq: '010'
  control_title: AI custom resource webhook abuse resistance and resource hardening
  control_statement: Webhook endpoints that validate AI custom resources must be hardened against abuse and denial-of-service through rate limiting, resource constraints, and deployment protections that preserve validation service availability under expected and adversarial load.
  objective: Keep AI-CRD validation services available and resistant to abuse so adversaries cannot disable or degrade policy enforcement by overwhelming webhook backends.
  rationale: Even when validation logic is correct, weakly resourced or unprotected webhook endpoints can be exhausted by bursty or malicious request patterns, creating denial-of-service conditions and pressure to weaken enforcement. Endpoint hardening preserves operational resilience for AI admission controls.
  scope: Applies to all validating admission webhooks dedicated to AI/ML operator CRDs in production, staging, and shared development clusters with GPU node pools.
  primary_enforcement_point: Webhook backend deployment and serving infrastructure for AI CRD validation.
  implementation_surface: Webhook backend rate limits, container resource requests and limits, concurrency controls, and deployment hardening for KServe, Kubeflow Training Operator, KubeRay, Volcano, and similar AI operator admission services.
  owner_primary: Platform Engineering
  owner_supporting: ML Platform Engineering; Security Engineering
