- control_id: SAF-K8S-0702-027
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.2'
  control_seq: '027'
  control_title: Pipeline classification label application, propagation, and coverage verification
  control_statement: Organizations must apply and propagate data classification labels across pipeline resources and stages of data processing and must periodically verify that required classification labels remain present on covered resources.
  objective: Ensure classification metadata is applied, preserved, and verifiably present across pipeline resources so downstream controls can enforce handling requirements.
  rationale: A taxonomy alone does not protect data unless classification labels are actually applied and preserved through orchestration, storage, and workload transitions. Label propagation and periodic coverage verification are therefore distinct operational obligations from defining the taxonomy itself.
  scope: Applies to all data pipeline workloads, including ETL jobs, preprocessing steps, feature engineering pipelines, training jobs, and model-serving data paths. Covers label application, metadata propagation, and periodic coverage verification across PersistentVolumeClaims, pods, jobs, services, and related pipeline resources.
  primary_enforcement_point: Pipeline metadata labeling model, orchestration propagation, and recurring coverage audit.
  implementation_surface: PVC and workload metadata labels for data type classification, orchestrator-level propagation across Kubeflow Pipelines, Argo Workflows, and similar stages, and periodic audits confirming covered resources retain required classification labels.
  owner_primary: Data Governance
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
