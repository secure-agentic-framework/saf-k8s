- control_id: SAF-K8S-0205-011
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.5'
  control_seq: '011'
  control_title: Node firewall audit and change governance
  control_statement: Node-level firewall rules must be audited periodically and changes to those rules must follow controlled change management so unauthorized or drifted firewall modifications are detectable and reviewable.
  objective: Ensure node firewall policy remains governed, reviewable, and resistant to unauthorized change over time.
  rationale: Even if an initial rule set is restrictive, unmanaged changes or configuration drift can reopen node communication paths. Periodic audit and controlled change management make firewall governance independently auditable from the rule content itself.
  scope: Applies to all production cluster nodes. Cloud environments may use security groups or VPC firewall rules as the node-level firewall layer. On-premises environments may use iptables, nftables, or firewalld.
  primary_enforcement_point: Firewall audit workflows, change records, and periodic verification of node firewall policy state.
  implementation_surface: Firewall verification scripts, change tickets, security group audit logs, NSG review workflows, and periodic attestation of node firewall rule state.
