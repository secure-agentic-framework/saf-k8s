- control_id: SAF-K8S-0905-050
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: '050'
  control_title: Authenticated reviewer identity validation for model promotion approvals
  control_statement: Model promotion approval workflows must require authenticated reviewer identity validation through approved identity mechanisms before an approval decision is accepted.
  objective: Ensure that human promotion approvals are performed only by authenticated and authorized reviewers using trusted identity mechanisms.
  rationale: If reviewer identity is not authenticated at approval time, approval actions can be forged, replayed, or submitted by unauthorized personnel, undermining the trustworthiness of human production-promotion decisions.
  scope: Applies to all model promotion workflows requiring human approval on Kubernetes. Covers reviewer authentication, session-bound approval actions, and trusted identity provider integration for approval decisions. Excludes downstream audit-record binding of the approval decision to the promoted model version.
  primary_enforcement_point: Approval workflow identity verification at decision time.
  implementation_surface: Promotion approval workflows integrated with SSO or OIDC, authenticated approval actions, session-bound reviewer approvals, and authorization checks for approved reviewers.
  owner_primary: Governance
  owner_supporting: ML Platform Engineering; Security Engineering
