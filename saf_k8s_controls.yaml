- control_id: SAF-K8S-0401-006
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.1'
  control_seq: '006'
  control_title: Organizational role separation for ML, platform, and security functions
  control_statement: Organizations must enforce separation of duties between ML engineers responsible for model deployment and training, platform engineers responsible for cluster configuration and infrastructure, and security teams responsible for policy enforcement, audit, and approval functions through distinct RBAC roles and independently governed bindings.
  objective: Prevent any single role from spanning model deployment, infrastructure change, and security oversight responsibilities, reducing the risk of unauthorized or unreviewed changes to AI infrastructure and operations.
  rationale: When the same individual or group can deploy models, modify infrastructure, and approve or bypass security policy, review becomes ineffective and high-impact changes can occur without independent challenge. Clear role boundaries ensure that ML delivery, platform administration, and security oversight remain separately authorized and auditable.
  scope: Applies to all clusters running AI and ML workloads. Covers RBAC for core Kubernetes resources, AI operator CRDs, and organizational role mappings between identity provider groups and Kubernetes roles. Exceptions require documented risk acceptance.
  primary_enforcement_point: Distinct RBAC Roles and ClusterRoles per organizational function, enforced through RoleBindings mapped to identity provider groups with independent role ownership and review.
  implementation_surface: Distinct RBAC roles and ClusterRoles for ML engineers, platform engineers, and security engineers; RoleBindings mapped to identity provider groups; approval workflows for cross-functional privilege changes; and access review processes confirming no single subject holds conflicting cross-functional permissions.
  owner_primary: Identity and Access Management
  owner_supporting: Platform Engineering; ML Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
