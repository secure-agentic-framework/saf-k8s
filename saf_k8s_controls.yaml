- control_id: SAF-K8S-0503-016
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.3'
  control_seq: '016'
  control_title: Namespace-scoped DNS service discovery restriction
  control_statement: DNS-based service discovery must be limited to authorized namespaces and approved service scopes so workloads cannot enumerate or resolve services outside their intended boundary.
  objective: Restrict service discovery scope so shared DNS cannot expose cross-namespace or cross-tenant service information beyond authorized boundaries.
  rationale: Shared DNS becomes a lateral-movement channel if workloads can enumerate or resolve services outside their intended namespace scope. Separating service-discovery scoping from resolution-path enforcement makes boundary control independently auditable.
  scope: Applies to DNS egress restrictions, CNI DNS-aware policies, namespace-scoped service discovery controls, and any external DNS proxy or enforcement layer used by production workloads.
  primary_enforcement_point: Namespace-scoped service discovery controls.
  implementation_surface: Namespace-scoped service discovery policy configuration, DNS service visibility controls, and verification that workloads cannot resolve unauthorized cross-namespace services.
  owner_primary: Network Engineering
  owner_supporting: Platform Engineering
  baseline_or_ai_specific: baseline
