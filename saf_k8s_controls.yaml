  knowledge_area: '10.1'
  control_seq: '042'
  control_title: Regulatory audit log retention period configuration and compliance verification
  control_statement: Organizations subject to regulatory requirements must configure audit log storage systems with retention periods that meet or exceed applicable minimum regulatory durations and must use automated compliance checks to detect under-configured retention periods.
  objective: Ensure regulatory audit logs for Kubernetes AI workloads are configured with retention periods that satisfy applicable minimum regulatory durations and are continuously checked for under-configuration.
  rationale: Regulatory frameworks impose minimum audit log retention periods. If retention durations are under-configured and not detected, organizations lose evidence needed for compliance audits, incident investigations, and post-market monitoring even when centralized log retention mechanisms otherwise function.
  scope: Applies to audit log storage systems receiving Kubernetes and AI workload audit data subject to regulatory retention requirements. Covers retention-period configuration and automated compliance verification against applicable minimum durations. Excludes immutable deletion prevention and WORM enforcement mechanics.
  primary_enforcement_point: Audit log storage retention period policy configuration and compliance checking.
  implementation_surface: Object storage retention period settings, log management system retention configuration, SIEM retention policy values, regulatory retention mapping documentation, and automated scans that identify under-configured audit log retention periods.
