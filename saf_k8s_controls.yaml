- control_id: SAF-K8S-0503-015
  domain_code: D05
  domain_name: Network Security and Communication
  knowledge_area: '5.3'
  control_seq: '015'
  control_title: Approved DNS resolution path enforcement
  control_statement: DNS policy enforcement must prevent workloads from using unauthorized DNS resolution paths so name resolution cannot bypass approved cluster DNS controls or external DNS policy boundaries.
  objective: Constrain how workloads resolve names so DNS cannot be used to bypass network controls or approved resolver paths.
  rationale: Even a hardened DNS infrastructure becomes a policy-bypass channel if workloads can resolve names through unauthorized paths. Separating resolution-path enforcement from service-discovery scoping makes each control independently auditable.
  scope: Applies to DNS egress restrictions, CNI DNS-aware policies, namespace-scoped service discovery controls, and any external DNS proxy or enforcement layer used by production workloads.
  primary_enforcement_point: DNS resolution path enforcement controls.
  implementation_surface: DNS-aware network policies, egress restrictions to CoreDNS or approved DNS proxies, and verification that workloads cannot resolve names through unauthorized DNS paths.
  owner_primary: Network Engineering
  owner_supporting: Platform Engineering
  baseline_or_ai_specific: baseline
