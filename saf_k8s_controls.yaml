- control_id: SAF-K8S-0606-023
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.6'
  control_seq: '023'
  control_title: IaC security scanning gate enforcement for deployment platforms
  control_statement: Infrastructure as Code definitions for deployment platforms must undergo security scanning in the CI pipeline, and changes that fail required IaC security checks must be blocked from promotion or deployment.
  objective: Prevent insecure infrastructure templates from reaching staging or production by enforcing IaC scanning as a delivery gate.
  rationale: Terraform, Pulumi, and CloudFormation templates can weaken network boundaries, expose services, disable encryption, or introduce privileged infrastructure changes. IaC scanning is a distinct preventive control because it evaluates template risk before any infrastructure is created or modified.
  scope: Applies to Infrastructure as Code used for staging and production platform provisioning, including cluster infrastructure, cloud networking, and supporting security services.
  primary_enforcement_point: CI pipeline security gate for infrastructure template changes.
  implementation_surface: IaC scanning tools and policies integrated into the CI pipeline, with blocking gates for non-compliant Terraform, Pulumi, or CloudFormation changes before platform deployment.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; DevSecOps / Release Engineering
