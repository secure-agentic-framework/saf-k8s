  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.1'
  control_seq: '017'
  control_title: Multi-stage build and stripped runtime image minimization
  control_statement: All container images deployed to production clusters must use multi-stage builds to exclude build-time tooling from runtime images and must remove unnecessary packages and utilities before promotion.
  objective: Reduce runtime container attack surface by ensuring production images exclude build-time tooling and unnecessary packages.
  rationale: 'Multi-stage builds and runtime stripping are independently auditable build-hardening obligations: they prevent compilers, shells, package managers, and other non-runtime content from reaching production images even when the selected base image is already approved.'
  scope: Applies to all container images built or deployed in production and pre-production Kubernetes clusters, regardless of workload type.
  primary_enforcement_point: CI/CD build stage and image inspection controls that verify runtime image composition before promotion.
