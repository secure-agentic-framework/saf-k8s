- control_id: SAF-K8S-0104-015
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.4'
  control_seq: '015'
  control_title: CIS Benchmark result retention and posture trend reporting
  control_statement: Production Kubernetes clusters must retain recurring CIS Kubernetes Benchmark assessment results and produce posture trend reporting over time so that hardening status, drift, and sustained baseline assurance can be demonstrated during operations, audits, and risk reviews.
  objective: Demonstrate benchmark-derived hardening posture over time by preserving scan history and producing trend evidence that shows configuration drift or sustained compliance.
  rationale: Running scans without retaining historical results leaves teams unable to prove sustained hardening, identify slow configuration drift, or support audit and risk review. This control isolates the evidence-retention and trend-reporting obligation from scan execution itself.
  scope: Applies to all production clusters subject to recurring CIS Benchmark assessment. Covers retained scan history, evidence repositories, and reporting that shows benchmark posture over time.
  primary_enforcement_point: Audit Evidence Retention
  implementation_surface: Evidence repository for benchmark outputs, reporting pipeline, and posture trend dashboards or reports.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Governance Risk and Compliance
  baseline_or_ai_specific: baseline
