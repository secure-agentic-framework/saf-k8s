- control_id: SAF-K8S-0905-058
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: 058
  control_title: Internal re-signing of approved external models before deployment eligibility
  control_statement: Organizations must internally re-sign approved external models with organizational signing infrastructure before the models become deployable within organizational environments.
  objective: Convert approved external artifacts into internally governed deployable assets through organizational cryptographic signing before deployment eligibility.
  rationale: Using externally sourced models directly from outside repositories breaks the organization's trust boundary. Internal re-signing establishes organizational cryptographic custody and ensures that only internally governed artifacts become deployable.
  scope: Applies to externally sourced models approved for internal use. Covers internal artifact signing and the requirement that only internally re-signed versions become deployable. Excludes external-origin annotation and registry enrollment recordkeeping.
  primary_enforcement_point: Internal signing process before deployment eligibility.
  implementation_surface: Internal artifact signing, signed external-model derivatives, and promotion logic that marks only internally re-signed external models as eligible for deployment.
