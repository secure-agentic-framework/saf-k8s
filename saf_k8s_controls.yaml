- control_id: SAF-K8S-0102-024
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.2'
  control_seq: '024'
  control_title: etcd backup repository access audit logging
  control_statement: Production Kubernetes clusters must generate auditable records for all access to etcd backup repositories and restore media.
  objective: Ensure access to etcd backup repositories is observable through complete audit logging of backup and restore-media access activity.
  rationale: Least-privilege backup access controls are difficult to enforce and investigate without a durable record of who accessed backup repositories or restore media. Dedicated access logging preserves the evidentiary trail needed to detect misuse and reconstruct backup-related activity.
  scope: Applies to all production clusters. Covers object storage access logging, repository audit trails, and restore-media access records for etcd backup repositories.
  primary_enforcement_point: Backup repository access logging
  implementation_surface: Backup repository access logs, object storage audit events, restore-media access records, and centralized retention of those records.
