- control_id: SAF-K8S-0601-022
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.1'
  control_seq: '022'
  control_title: Kubernetes image pull secret distribution and external secret integration
  control_statement: Image pull credentials for authenticated registries must be distributed through Kubernetes Secrets or synchronized from an approved external secrets manager rather than embedded directly in workloads, Dockerfiles, or CI environment variables.
  objective: Prevent unauthorized registry pulls and uncontrolled credential sprawl by managing image pull credential distribution through approved secret delivery paths.
  rationale: How image pull credentials are stored and delivered is an independently auditable control claim from rotation. Centralized secret distribution through Kubernetes Secrets or external secret integrations prevents ad hoc credential embedding and supports controlled access to registry credentials.
  scope: Applies to Kubernetes clusters and CI/CD workflows that use authenticated registries for pulling images. Covers image pull secret storage, synchronization from external secret managers, and automatic credential rotation.
  primary_enforcement_point: Kubernetes cluster image pull secret distribution and external secret synchronization configuration.
  implementation_surface: Image pull secret resources, External Secrets Operator or equivalent integration, secret synchronization workflows, service account references, and controls preventing embedded registry credentials in build or deployment configuration.
