  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.6'
  control_seq: '030'
  control_title: GitOps configuration revision and deployment history traceability
  control_statement: GitOps deployment processes must preserve configuration revision history and deployment traceability records so deployed state can be reconstructed and correlated to specific Git revisions, rendered manifests, and deployment events during audits, incident response, and rollback analysis.
  objective: Ensure GitOps-managed deployments retain configuration revision and deployment history records sufficient to reconstruct deployed state and trace configuration changes to specific revisions and rollout events.
  rationale: Even when release packages are identifiable, teams cannot reconstruct deployed state or investigate a faulty rollout without revision history linking rendered configuration, Git revisions, and deployment events. This is a separate traceability obligation from package/version retention.
  scope: Applies to production and staging GitOps deployments and to revision history, rendered manifests, deployment events, and traceability records needed to reconstruct deployed configuration state.
  primary_enforcement_point: GitOps deployment history and retained configuration revision records.
  implementation_surface: Git revision metadata, rendered-manifest history, deployment controller history, environment revision records, and change traces linking reconciled state to specific commits and rollout events.
