- control_id: SAF-K8S-0802-002
  domain_code: D08
  domain_name: GPU, Accelerator, and Confidential Computing
  knowledge_area: '8.2'
  control_seq: '002'
  control_title: CUDA library and container toolkit security
  control_statement: CUDA libraries and the NVIDIA Container Toolkit must be configured with security-hardened settings, including disabling unnecessary compat libraries, restricting driver persistence mode to authorized use cases, and validating container toolkit configurations to prevent unauthorized host GPU access paths.
  objective: Harden the CUDA runtime and container toolkit stack to minimize the attack surface through which containerized workloads interact with GPU hardware, preventing privilege escalation via misconfigured toolkit components.
  rationale: The NVIDIA Container Toolkit (nvidia-container-runtime) modifies container configurations to inject GPU device access, libraries, and driver bindings. Misconfigured toolkit settings can expose host filesystem paths, enable unauthorized device access beyond requested GPUs, or allow containers to load arbitrary compat libraries that bypass version controls. Driver persistence mode, while improving GPU initialization latency, maintains a persistent kernel-level process that increases the attack surface window.
  scope: Applies to all Kubernetes nodes where the NVIDIA Container Toolkit is installed and GPU workloads are scheduled. Covers runtime configuration files (nvidia-container-runtime config), CDI specifications, and CUDA library injection settings. Managed Kubernetes GPU services must verify provider toolkit configurations meet hardening requirements.
  primary_enforcement_point: NVIDIA Container Toolkit runtime configuration, container runtime (containerd or CRI-O) GPU integration settings, and node-level configuration management for CUDA library paths and persistence mode.
  implementation_surface: NVIDIA Container Toolkit runtime configuration (/etc/nvidia-container-runtime/config.toml including no-cgroups, visible-devices settings), Container Device Interface (CDI) specifications, CUDA base images (nvidia/cuda:*) in approved image registries with digest pinning, CUDA compatibility library (libcuda.so compat mode) settings, nvidia-persistenced daemon configuration, containerd/CRI-O GPU runtime hook configuration controlling device file mounts (/dev/nvidia*), and container image vulnerability scanning for CUDA components.
  owner_primary: ML Platform Engineering
  owner_supporting: GPU Infrastructure Engineering; Container Platform Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
