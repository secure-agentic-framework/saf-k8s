  knowledge_area: '4.3'
  control_seq: 029
  control_title: Environment variable secret injection prohibition enforcement
  control_statement: Organizations must prohibit injection of secrets via environment variables for production workloads by enforcing admission policies that detect and reject Pod specifications containing environment variable references to Secret objects.
  objective: Prevent secrets from being exposed through environment variable injection by enforcing a production-wide prohibition at admission time.
  rationale: The actual enforcement of an environment-variable prohibition is independently auditable from the governance of any rare exceptions. This control isolates the blocking requirement so teams can verify that production workloads cannot reference Secret objects through environment variables under normal policy.
  scope: Applies to all production workloads in Kubernetes clusters. Covers admission enforcement for environment variable Secret references and enforcement-mode configuration by namespace or environment. Approved deviations and their review process remain governed by SAF-K8S-0403-030. Selection of approved alternative patterns remains governed by SAF-K8S-0403-003.
  primary_enforcement_point: Admission enforcement for Secret reference patterns.
  implementation_surface: Kyverno or OPA Gatekeeper policies rejecting environment variable Secret references, namespace enforcement configuration, and enforcement reports for blocked or denied attempts.
