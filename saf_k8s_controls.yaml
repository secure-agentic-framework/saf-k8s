  date_modified: '2026-03-17'
- control_id: SAF-K8S-0205-007
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.5'
  control_seq: '007'
  control_title: Node firewall compatibility validation with CNI and network policy
  control_statement: Node-level firewall rules must be validated for compatibility with the cluster CNI plugin's overlay and network policy enforcement requirements so that node firewalls do not create conflicts, blind spots, or broken cluster communication paths.
  objective: Ensure node firewalls complement rather than disrupt CNI overlays and Kubernetes network policy enforcement.
  rationale: Improperly configured node firewalls can break CNI overlays, bypass intended policy paths, or create gaps between node and pod-layer enforcement. This control isolates compatibility validation so teams can independently prove that firewall rules and CNI requirements are aligned.
  scope: Applies to all production cluster nodes using CNI plugins or cloud networking models with specific overlay, encapsulation, or enforcement path requirements such as VXLAN, Geneve, or WireGuard.
  primary_enforcement_point: Compatibility validation between node firewall layer and pod-network enforcement layer.
  implementation_surface: CNI port allowance configuration, documented compatibility validation, and network connectivity tests confirming legitimate cluster communication functions correctly.
  owner_primary: Network Engineering
  owner_supporting: Platform Engineering; Cloud Infrastructure; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
