- control_id: SAF-K8S-0606-021
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.6'
  control_seq: '021'
  control_title: Kubernetes manifest cryptographic signing before deployment
  control_statement: Kubernetes deployment manifests must be cryptographically signed before promotion or deployment, and the signing step must be executed in the CI/CD workflow using authorized signing identities and protected signing configuration.
  objective: Ensure deployment manifests become tamper-evident artifacts before they leave the delivery workflow.
  rationale: If manifests are not signed before promotion, an attacker who modifies deployment configuration after image signing can alter resource limits, security contexts, environment variables, or image references without a cryptographic trace. Manifest signing is therefore a distinct authoring and promotion control even when later admission checks also exist.
  scope: Applies to Kubernetes deployment manifests used in staging and production delivery workflows. Development-only environments may use reduced signing requirements only with documented justification.
  primary_enforcement_point: CI/CD manifest signing step before promotion or deployment.
  implementation_surface: Manifest signing configuration, authorized signing identities, CI/CD signing workflow steps, and signed manifest artifacts produced before deployment.
  owner_primary: DevSecOps / Release Engineering
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: baseline
