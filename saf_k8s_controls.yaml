- control_id: SAF-K8S-0603-004
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.3'
  control_seq: '004'
  control_title: Cryptographic agility and post-quantum readiness
  control_statement: Organizations must select cryptographic algorithms for artifact signing and hashing that account for the long-lived nature of ML model artifacts, maintain a documented migration plan for transitioning to post-quantum signature schemes, and ensure hashing and signing coverage spans the full ML lifecycle including training inputs, model weights, inference outputs, and intermediate artifacts such as checkpoints and embeddings.
  objective: Prepare the supply chain cryptographic infrastructure for algorithm migration, particularly for long-lived ML model artifacts whose signing validity may extend beyond the expected security lifetime of current algorithms.
  rationale: ML model artifacts often have multi-year lifespans in production, far exceeding typical container image retention periods. If signing algorithms become compromised or deprecated during that lifespan, all provenance guarantees are invalidated. Without cryptographic agility, re-signing the full artifact corpus requires rebuilding trust chains from scratch. Gaps in signing coverage (e.g., unsigned checkpoints or embeddings) create supply chain blind spots exploitable by adversaries.
  scope: Applies to all cryptographic signing and hashing operations across the ML supply chain, including container image signing, model signing, attestation signing, and SBOM signing. Covers both cloud-hosted and on-premises signing infrastructure. Migration plans must address timeline, algorithm selection, and backward compatibility.
  primary_enforcement_point: Signing infrastructure configuration and cryptographic policy governance review.
  implementation_surface: Cryptographic algorithm selection configuration for artifact signing (ECDSA P-256, RSA-2048, SHA-256 minimum hashing), NIST-approved post-quantum signature algorithm support (ML-DSA, SLH-DSA), ML-KEM for key-establishment and envelope-encryption, dual-signing infrastructure for long-lived ML artifacts (>5-year retention), signing coverage spanning training data manifests, model weights, checkpoint hashes, embedding indices, and inference outputs, and documented post-quantum migration plans with timeline and algorithm candidates.
  owner_primary: Security Engineering
  owner_supporting: ML Platform Engineering; DevSecOps / Release Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0603-005
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.3'
  control_seq: '005'
  control_title: FIPS 140 cryptographic module validation
  control_statement: All cryptographic modules used for artifact signing and signature verification operations must be validated to FIPS 140 requirements where mandated by organizational policy or regulatory obligation. Signing infrastructure must use FIPS-validated cryptographic libraries, and key storage must meet the applicable FIPS 140 security level for the sensitivity of the artifacts being signed.
  objective: Ensure that cryptographic operations underpinning supply chain integrity use validated modules that meet recognized assurance standards, preventing reliance on unvetted or weak cryptographic implementations.
  rationale: Supply chain signing and verification depend on the correctness and strength of the underlying cryptographic implementation. An unvalidated module may contain implementation flaws (side-channel leaks, weak random number generation) that compromise key material or signature integrity. FIPS 140 validation provides third-party assurance that the module meets minimum security requirements, which is also a prerequisite for many government and regulated-industry deployment environments.
  scope: Applies to all signing and verification operations for container images, attestations, SBOMs, model artifacts, and Helm charts. Includes HSM-backed signing, software-based signing libraries, and verification libraries in admission controllers. Organizations not subject to FIPS requirements must document their cryptographic module assurance strategy.
  primary_enforcement_point: Signing infrastructure provisioning and cryptographic library selection during build system configuration.
  implementation_surface: FIPS 140-validated cryptographic libraries (go-fips compiled cosign and notation), HSM and cloud KMS services validated to FIPS 140-2 Level 2 or higher (AWS CloudHSM, Azure Managed HSM, Google Cloud HSM), FIPS-approved algorithms for key generation, signing, and verification operations, signing infrastructure provisioning configuration, and admission controller verification libraries compiled against FIPS-validated modules.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Compliance / GRC
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0603-006
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.3'
  control_seq: '006'
  control_title: TUF-based secure software update systems
  control_statement: Organizations distributing software updates or artifact metadata through update systems must implement TUF (The Update Framework) with threshold and quorum trust for signing keys, HSM-based key storage for online signing roles, documented key rotation procedures, and protections against known update metadata attacks including rollback, freeze, mix-and-match, and endless data attacks.
  objective: Secure the software update distribution channel against metadata-level attacks by implementing TUF's delegated trust model with proper key management and rotation.
  rationale: Standard artifact signing protects individual artifacts but does not protect the metadata that describes which versions are current. Without TUF, an attacker who compromises the update metadata can serve stale (rollback), partial (mix-and-match), or indefinitely cached (freeze) artifact sets, causing clusters to run vulnerable or inconsistent versions. Threshold signing prevents a single compromised key from corrupting the entire update channel.
  scope: Applies to organizations operating internal artifact distribution systems, Helm chart repositories, or custom update channels for Kubernetes operators and AI workload components. Does not apply to organizations exclusively consuming artifacts from third-party registries that implement their own TUF infrastructure, though verification of the third-party TUF root of trust is required.
  primary_enforcement_point: Update system metadata signing infrastructure and client-side TUF verification configuration.
  implementation_surface: TUF (The Update Framework) metadata signing infrastructure with delegated trust roles (root, targets, snapshot, timestamp), HSM-based key storage for online signing roles (targets, snapshot, timestamp), offline HSM key storage for root keys with 3-of-5 quorum threshold signing, key rotation procedures and ceremony documentation, client-side TUF verification configuration, and protections against rollback, freeze, mix-and-match, and endless data attacks on update metadata.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; DevSecOps / Release Engineering
  baseline_or_ai_specific: baseline
  maturity: Advanced
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0603-007
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.3'
  control_seq: '007'
  control_title: Build environment and process attestations per NIST SP 800-204D
  control_statement: Build pipelines must generate independently signed and verifiable environment attestations documenting build platform inventory and process attestations recording build tools and transformations applied, in alignment with NIST SP 800-204D.
  objective: Ensure the build environment and build-step execution path are independently attested so compromised runners or unauthorized build-step changes are detectable.
  rationale: Environment and process attestations expose compromise in build infrastructure and unauthorized pipeline modifications that a single monolithic attestation would obscure. Separating these dimensions makes the build platform and transformation chain independently verifiable.
  scope: Applies to all CI/CD pipelines that produce container images or deployable artifacts for production clusters, including managed build services that must provide equivalent environment and process provenance.
  primary_enforcement_point: CI/CD attestation generation for build platform inventory and transformation steps.
  implementation_surface: Environment attestation for runner image, node, and platform inventory; process attestation for build tools, Dockerfile transformations, and pipeline stages; per-category signatures; and verification of environment and process attestation presence.
  owner_primary: DevSecOps / Release Engineering
  owner_supporting: Security Engineering; Platform Engineering
  baseline_or_ai_specific: baseline
