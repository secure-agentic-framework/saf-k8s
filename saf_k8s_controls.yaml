- control_id: SAF-K8S-0804-005
  domain_code: D08
  domain_name: GPU, Accelerator, and Confidential Computing
  knowledge_area: '8.4'
  control_seq: '005'
  control_title: Attestation-conditioned enclave key release
  control_statement: Encryption keys protecting models and data within confidential computing enclaves must be managed through a hardware-rooted key management system with key release conditioned on successful TEE attestation.
  objective: Ensure cryptographic keys for model decryption and data access are released only to verified TEE environments that present approved attestation evidence.
  rationale: If model or data encryption keys are released without attestation-conditioned policy checks, a compromised host or operator can retrieve the keys and decrypt protected assets outside the enclave. This obligation is distinct from sealed storage because it governs live key release decisions made by the KMS at access time.
  scope: Applies to confidential AI workloads where encrypted models or data require key release into a TEE enclave. Covers hardware-rooted KMS integration, attestation-conditioned release policies, and audit of key release decisions tied to attestation results.
  primary_enforcement_point: Attestation-Conditioned KMS Release Policy
  implementation_surface: Hardware-rooted key management systems, attestation-conditioned key release policies, audit correlation between attestation verification and key release, and enclave model decryption workflows using KMS-mediated release.
  owner_primary: Security Engineering
  owner_supporting: Key Management; ML Platform Engineering; GPU Infrastructure Engineering
