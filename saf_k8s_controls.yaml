- control_id: SAF-K8S-0102-021
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.2'
  control_seq: '021'
  control_title: etcd certificate expiration monitoring and lead-time alerting
  control_statement: Production Kubernetes clusters must generate monitoring alerts with sufficient lead time to remediate etcd server, peer, and API server-to-etcd client certificates approaching expiration.
  objective: Prevent etcd certificate outages by ensuring expiration telemetry and alert routing provide actionable remediation lead time.
  rationale: Even with appropriate validity limits, etcd availability is still at risk if approaching certificate expiration is not visible to operators early enough to renew or replace certificates safely. Dedicated monitoring and alerting make certificate expiry operationally actionable before it becomes a control-plane outage.
  scope: Applies to all self-managed Kubernetes clusters using etcd. Covers expiration telemetry, dashboards, threshold policy, and notification routing for etcd-related certificates.
  primary_enforcement_point: Certificate expiration monitoring and alert routing
  implementation_surface: Expiration dashboards, alert rules, notification routing, and periodic alert-path validation for etcd certificate expiry.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
