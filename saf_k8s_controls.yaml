- control_id: SAF-K8S-0104-018
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.4'
  control_seq: 018
  control_title: Kubernetes security advisory and provider bulletin monitoring
  control_statement: Organizations must maintain active monitoring of Kubernetes security announcement channels, CVE databases, and relevant provider or vendor advisories affecting cluster components and managed Kubernetes dependencies.
  objective: Ensure security teams receive timely notice of Kubernetes and provider vulnerability disclosures that may affect cluster security posture.
  rationale: Kubernetes and managed-service vulnerabilities are disclosed through multiple channels, and teams that do not actively monitor those channels can miss urgent advisories or provider patch notices. Continuous monitoring of upstream and vendor disclosure sources is the prerequisite for timely vulnerability awareness and downstream response decisions.
  scope: Applies to all production and non-production clusters. Covers Kubernetes core component advisories, container runtime disclosures, and critical add-on or provider bulletins affecting CNI, CSI, ingress, and managed control-plane dependencies.
  primary_enforcement_point: Vulnerability disclosure monitoring
  implementation_surface: Security announcement monitoring integrations, mailing-list subscriptions, RSS or feed ingestion, provider advisory monitoring, and documented notification routing.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Incident Response
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
