- control_id: SAF-K8S-0704-002
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.4'
  control_seq: '002'
  control_title: VPC and security group integration with Kubernetes network policies
  control_statement: Organizations must configure VPC networking, security groups, and cloud firewalls to isolate Kubernetes node networks, restrict control plane endpoint access to authorized networks, and align cloud-level network controls with Kubernetes NetworkPolicy objects to create consistent, layered network security without gaps or conflicts.
  objective: Create defense-in-depth network isolation by ensuring that cloud-level network controls and Kubernetes-level network policies enforce consistent security boundaries.
  rationale: Cloud VPC security groups and Kubernetes NetworkPolicy operate at different layers of the network stack. If cloud security groups permit broad inter-node traffic while NetworkPolicy restricts pod-to-pod communication, an attacker who compromises a node can bypass pod-level network policies entirely. Conversely, if the API server control plane endpoint is publicly accessible, attackers can attempt credential-based attacks without needing network-level access. Misalignment between these layers creates exploitable gaps.
  scope: Applies to all cloud-hosted Kubernetes clusters. Covers VPC subnet design for node networks, security group rules for inter-node and external traffic, control plane endpoint access restrictions (private endpoint, authorized networks), and alignment between cloud firewalls and Kubernetes NetworkPolicy. Must be reviewed when VPC topology or Kubernetes network configuration changes.
  primary_enforcement_point: Cloud VPC and security group configuration, API server endpoint access settings (private endpoint, authorized networks), and infrastructure-as-code templates that co-define cloud and Kubernetes network policies.
  implementation_surface: VPC subnet configuration isolating Kubernetes nodes in dedicated subnets, cloud security groups and firewall rules for node-to-node and node-to-external traffic, managed Kubernetes API server private endpoint configuration and authorized CIDR restrictions, Kubernetes NetworkPolicy objects (CNI-enforced pod-level rules) aligned with VPC-level controls, egress security group rules permitting registry endpoints, cloud service APIs, and DNS, and layered defense-in-depth documentation mapping VPC coarse-grained controls to Kubernetes fine-grained pod-level policies.
  owner_primary: Cloud Platform Engineering
  owner_supporting: Network Engineering; Platform Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0704-004
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.4'
  control_seq: '004'
  control_title: IMDSv2 enforcement on Kubernetes nodes
  control_statement: Organizations must enforce session-based metadata access (IMDSv2 or cloud-equivalent) on all Kubernetes nodes by configuring node launch settings so metadata requests require session-oriented tokens rather than simple unauthenticated metadata GET access.
  objective: Prevent SSRF-based credential theft from cloud metadata services by requiring session-based metadata access controls on every Kubernetes node.
  rationale: Metadata services that allow simple unauthenticated requests are a common credential-theft path for compromised workloads and lateral movement. Requiring IMDSv2 or equivalent session-oriented access hardens the node-side metadata surface independently of separate network-level metadata blocking and per-workload cloud identity mechanisms.
  scope: Applies to all Kubernetes nodes on cloud providers that expose an instance metadata service. Covers node launch template, node pool, or VM scale set settings that enforce session-based metadata access. Does not cover pod egress blocking or per-workload cloud identity binding, which are addressed separately.
  primary_enforcement_point: Node Launch Configuration for Metadata Service Session Enforcement
  implementation_surface: AWS EC2 launch templates with HttpTokens required and appropriate hop-limit settings, GKE node pool metadata protections, Azure VMSS metadata security configuration, and validation scans across all node pools.
  owner_primary: Cloud Platform Engineering
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
