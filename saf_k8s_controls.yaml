- control_id: SAF-K8S-0605-002
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.5'
  control_seq: '002'
  control_title: Kyverno admission policies
  control_statement: Kubernetes clusters using Kyverno must implement validation policies that reject non-compliant workloads, mutation policies that enforce security defaults (labels, resource limits, security contexts), generation policies that create required companion resources, and image verification rules that validate image signatures and attestations before admission. Policies must be version-controlled and tested in audit mode before enforcement.
  objective: Enforce Kubernetes security and operational policies at admission time using Kyverno's validation, mutation, generation, and image verification capabilities.
  rationale: Without Kyverno policies (or equivalent), workloads can be deployed without required security contexts, labels, or resource limits, and images can enter the cluster without signature verification. Mutation policies prevent configuration drift by enforcing defaults, while generation policies ensure companion resources (NetworkPolicies, ResourceQuotas) are consistently created. Operating without audit-mode testing risks blocking legitimate deployments.
  scope: Applies to all Kubernetes clusters where Kyverno is the selected admission controller. Covers all namespaces except those explicitly exempted in documented policy. Organizations using OPA/Gatekeeper exclusively may document this control as not applicable.
  primary_enforcement_point: Kubernetes Kyverno admission webhook (validating and mutating).
  implementation_surface: 'Kyverno ClusterPolicy and Policy resources, validation policies (validationFailureAction: Audit/Enforce) rejecting non-compliant workloads, mutation policies enforcing security defaults (runAsNonRoot, allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, labels, resource limits), generation policies creating companion resources (NetworkPolicies, ResourceQuotas), verifyImages rules for image signature and attestation verification, kyverno test CLI for policy testing, and Kyverno PolicyReport CRDs for violation and enforcement statistics.'
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; DevSecOps / Release Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0605-003
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.5'
  control_seq: '003'
  control_title: Kubewarden WebAssembly-based admission policies
  control_statement: Kubernetes clusters using Kubewarden must deploy WebAssembly-based admission policies that enforce organizational security requirements, must source policies from trusted and verified policy registries, and must validate policy module signatures before deployment. Custom policies must be developed following secure coding practices and tested in a sandboxed environment before production deployment.
  objective: Enforce Kubernetes admission policies using Kubewarden's WebAssembly-based policy engine, leveraging its language-agnostic policy development model and sandboxed execution environment.
  rationale: Kubewarden policies execute in a WebAssembly sandbox, providing stronger isolation than native admission webhook code. However, without signature verification on policy modules, an attacker could inject malicious policies that modify or approve non-compliant workloads. Without trusted registry sourcing and pre-deployment testing, policy defects or supply chain attacks on the policy modules themselves could compromise the admission control layer.
  scope: Applies to Kubernetes clusters where Kubewarden is the selected admission controller. Covers policy sourcing, signature verification, and custom policy development. Organizations using OPA/Gatekeeper or Kyverno exclusively may document this control as not applicable.
  primary_enforcement_point: Kubernetes Kubewarden policy server admission webhook.
  implementation_surface: Kubewarden policy server admission webhook deployment, WebAssembly-based policy modules compiled from Rust/Go/other languages, Kubewarden policy hub (ghcr.io/kubewarden/policies/) for sourcing trusted policies, kwctl verify CLI for policy module signature verification, ClusterAdmissionPolicy and AdmissionPolicy custom resources, sandboxed Wasm execution environment for policy runtime, and custom policy development with secure coding practices and pre-deployment sandbox testing.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0605-006
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.5'
  control_seq: '006'
  control_title: Pod Security Admission enforcement for AI workload namespaces
  control_statement: Pod Security Admission (PSA) labels must be enforced on namespaces hosting AI workloads via admission policies to ensure baseline or restricted pod security standards. Admission policies must prevent downgrade of PSA labels on AI workload namespaces and must audit any namespace operating below the restricted security level.
  objective: Ensure that AI workload namespaces cannot be downgraded from restricted to privileged pod security levels, preventing AI workloads from running with excessive privileges.
  rationale: AI workload namespaces host high-value inference and training pods that process sensitive data and consume GPU resources. Without PSA label enforcement, namespace administrators can downgrade pod security standards from restricted to privileged, enabling containers to run as root, access host namespaces, or mount host filesystems. Admission-enforced PSA label immutability ensures pod security standards cannot be weakened without policy-level approval.
  scope: Applies to all Kubernetes namespaces hosting AI/ML workloads in production, staging, and shared development clusters. Includes namespaces managed by KServe, Kubeflow, Ray, and Volcano operators. Namespaces requiring elevated privileges must have documented justification and compensating controls.
  primary_enforcement_point: Namespace-level PSA label enforcement via admission controller policies.
  implementation_surface: 'Pod Security Admission (PSA) namespace labels (pod-security.kubernetes.io/enforce: baseline|restricted, pod-security.kubernetes.io/audit: restricted, pod-security.kubernetes.io/warn: restricted), Kyverno or Gatekeeper policies enforcing PSA label presence and immutability on AI workload namespaces, namespace creation admission policies requiring PSA labels, and PSA label downgrade detection and alerting.'
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; ML Platform Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-06'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0605-007
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.5'
  control_seq: '007'
  control_title: Admission webhook fail-closed enforcement and timeout bounds
  control_statement: Security-critical admission webhooks must use a failure policy of Fail and must set timeout values that bound API server latency while preserving fail-closed enforcement for requests that cannot be safely evaluated.
  objective: Ensure admission decisions fail securely without allowing webhook latency or misconfiguration to silently disable enforcement or destabilize the API server request path.
  rationale: 'A webhook configured with failurePolicy: Ignore or with unbounded response times can create either a silent policy bypass or an API server degradation path that attackers can exploit. Fail-closed behavior paired with deliberate timeout bounds preserves enforcement intent and keeps admission failure modes predictable.'
  scope: Applies to all validating and mutating admission webhooks in production and staging Kubernetes clusters where webhook decisions enforce security-relevant policy.
  primary_enforcement_point: Kubernetes API server webhook configuration.
  implementation_surface: ValidatingWebhookConfiguration and MutatingWebhookConfiguration resources, failurePolicy settings, timeoutSeconds configuration, and operational validation of fail-closed behavior for security-critical request paths.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; SRE / Operations
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
