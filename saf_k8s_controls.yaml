  control_title: Cross-cluster communication authorization policy enforcement
  control_statement: Cross-cluster network communication for distributed AI workloads must enforce authorization policies that restrict communication to explicitly authorized workload pairs, services, and cluster endpoints across federated clusters.
  objective: Prevent unauthorized cross-cluster AI communication by enforcing explicit peer authorization across federated cluster boundaries.
  rationale: Encrypted transport and authenticated endpoints do not prevent any federated workload from talking to every other remote workload. Cross-cluster authorization policies constrain reachable peers and limit misuse if an otherwise legitimate federated identity attempts unauthorized communication.
  scope: Applies to all cross-cluster network communication for AI workloads, including distributed training gradient exchange, multi-cluster inference routing, and cross-cluster pipeline data transfer. Covers authorization rules and explicit allowlists for workload pairs, services, and endpoints across clusters. Excludes traffic anomaly detection and monitoring after communication is permitted.
  primary_enforcement_point: Cross-cluster authorization policy enforcement and default-deny peer restrictions.
  implementation_surface: Cross-cluster AuthorizationPolicy or Cilium ClusterMesh network policies with default-deny and explicit allow rules, service-identity-based allowlists for authorized workload pairs, and policy definitions governing allowed cross-cluster communication paths.
  owner_primary: Network Engineering
  owner_supporting: Platform Engineering; Security Engineering; ML Platform Engineering
  baseline_or_ai_specific: ai-specific
