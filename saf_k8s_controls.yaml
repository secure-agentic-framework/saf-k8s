  date_modified: '2026-03-17'
- control_id: SAF-K8S-0101-020
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.1'
  control_seq: '020'
  control_title: API server profiling and debug exposure disablement
  control_statement: Production Kubernetes clusters must disable unnecessary API server profiling and debug exposure on the API server or restrict those interfaces through approved compensating controls where direct disablement is not available.
  objective: Reduce API server reconnaissance and denial-of-service risk by removing exposed profiling and debug interfaces from the control plane attack surface.
  rationale: Profiling and debug interfaces can leak CPU profiles, heap data, goroutine traces, and other runtime details that aid reconnaissance or can be abused to trigger expensive diagnostic operations. Disabling or tightly restricting these interfaces reduces information disclosure and denial-of-service risk on the API server.
  scope: Applies to all production Kubernetes clusters and to non-production clusters that host sensitive data, shared workloads, or provide a path to production. For managed Kubernetes services, this control applies to all customer-exposed API server profiling or debug settings and to compensating controls where provider-managed settings are not directly configurable.
  primary_enforcement_point: API Server Surface Reduction
  implementation_surface: Cluster provisioning templates, API server configuration management, managed Kubernetes security settings, and periodic configuration assessment.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Cloud Platform Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
