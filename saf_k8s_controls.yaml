- control_id: SAF-K8S-0402-015
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.2'
  control_seq: '015'
  control_title: Legacy service account token secret removal
  control_statement: Kubernetes clusters must disable or remove all legacy static service account token secrets of type kubernetes.io/service-account-token.
  objective: Eliminate persistent, non-expiring credentials by removing legacy static service account token Secrets, ensuring that stale agent identities cannot be exploited through credentials that never expire.
  rationale: Legacy static service account tokens stored as Kubernetes Secrets never expire and are valid for any audience. A stolen legacy token provides indefinite cluster access until manually revoked. Removing these secrets enforces account disabling for unused agent identities and eliminates the risk surface from stale credentials. This control was decomposed from the original SAF-K8S-0402-005 which combined projected token configuration with legacy token removal.
  scope: Applies to all clusters that have existing kubernetes.io/service-account-token type Secrets, whether auto-created or manually provisioned. All such Secrets must be identified using LegacyServiceAccountTokenTracking controller metrics (stable since Kubernetes 1.28) and scanning tools, then removed or migrated.
  primary_enforcement_point: Periodic scans for remaining kubernetes.io/service-account-token type Secrets, LegacyServiceAccountTokenTracking controller monitoring (serviceaccount_legacy_auto_token_uses_total, serviceaccount_legacy_manual_token_uses_total), and admission policies rejecting pods that mount legacy token Secrets.
  implementation_surface: LegacyServiceAccountTokenTracking controller metrics, kubernetes.io/service-account-token type Secret scanning, admission policies blocking legacy token Secret mounts, and audit logs recording legacy token use events.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Application Development
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-13'
  date_modified: '2026-03-13'
- control_id: SAF-K8S-0402-018
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.2'
  control_seq: 018
  control_title: Default service account disablement and token automount hardening
  control_statement: The default service account in each namespace must not be used by application workloads, and automatic mounting of tokens on the default service account must be disabled unless a documented system exception is approved.
  objective: Remove the shared default service account as a broadly reusable workload credential and eliminate automatic token exposure through default service account configuration.
  rationale: The default service account creates a shared identity surface across pods in a namespace. Disabling its routine use and turning off token auto-mounting reduces opportunistic API credential exposure and limits common lateral-movement paths after pod compromise.
  scope: Applies to all application namespaces in production and pre-production clusters. System namespaces may retain documented exceptions only for platform-managed components.
  primary_enforcement_point: Namespace service account configuration and admission controls that reject application workloads using the default service account or inheriting default token mounts.
  implementation_surface: Default ServiceAccount automount configuration, Pod admission policies, namespace bootstrap configuration, and workload validation rejecting implicit default service account usage.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Application Development
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0402-019
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.2'
  control_seq: 019
  control_title: Dedicated workload service accounts and least-privilege assignment
  control_statement: Each workload must be assigned a dedicated service account that is scoped to the workload's function and bound only to the permissions required for that workload.
  objective: Ensure each workload operates with a distinct Kubernetes identity and least-privilege authorization instead of inheriting a shared namespace credential.
  rationale: Per-workload service accounts create clear identity boundaries between applications and limit the blast radius of token compromise. Dedicated identities also support auditable authorization review and workload-specific permission minimization.
  scope: Applies to all application workloads in production and pre-production clusters, including training, inference, and batch jobs that require Kubernetes API or cloud identity access.
  primary_enforcement_point: Workload specification and provisioning controls that require explicit serviceAccountName assignment and scoped RBAC or workload identity bindings for each workload class.
  implementation_surface: Pod specs, service account provisioning automation, RBAC bindings, workload identity bindings, and deployment policy checks enforcing explicit dedicated service accounts.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Application Development
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
