- control_id: SAF-K8S-0910-015
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.10'
  control_seq: '017'
  control_title: Destination-side signature and digest re-verification for replicated model artifacts
  control_statement: Each destination cluster or registry endpoint that receives replicated model artifacts must independently re-verify model signatures and replicated digests before accepting replicated artifacts for storage, promotion, or use.
  objective: Prevent tampered model artifacts from being accepted downstream by requiring every destination registry or cluster to perform its own signature and digest verification after replication.
  rationale: A secure replication channel is insufficient if downstream clusters trust replicated artifacts without local verification. Independent destination-side verification ensures that a compromised intermediary or destination endpoint cannot silently accept altered or substituted model artifacts after replication completes.
  scope: Applies to model registry replication and federation channels spanning clusters or regions, including replicated OCI model artifacts, mirrored registries, and custom model distribution pipelines where destination endpoints receive artifacts from upstream registries.
  primary_enforcement_point: Destination-side artifact acceptance policy and verification workflow at each receiving registry or cluster endpoint.
  implementation_surface: Destination-side signature verification policy, content-addressable digest verification after replication, admission or acceptance checks that block unverifiable artifacts, and operational review of verification failures.
