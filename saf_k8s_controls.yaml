  date_modified: '2026-03-17'
- control_id: SAF-K8S-0604-008
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.4'
  control_seq: 008
  control_title: AI workload vulnerability exposure classification
  control_statement: Vulnerability management processes must distinguish training-time from inference-time exposure and separately classify GPU driver and CUDA stack CVEs from application-layer CVEs based on AI workload context before remediation decisions are made.
  objective: Ensure AI workload vulnerabilities are evaluated in their actual exploitation context rather than as an undifferentiated queue of findings.
  rationale: Generic severity scoring does not capture the operational context of AI workloads. A GPU driver flaw in a training-only environment, an ML framework library flaw in an internet-facing inference endpoint, and a preprocessing dependency issue in an internal pipeline produce different attack surfaces and different urgency. Without explicit exposure classification, downstream remediation decisions are noisy and inconsistent.
  scope: Applies to all AI and ML workload images and runtime environments deployed in Kubernetes, including inference servers, training jobs, data preprocessing pipelines, and model-serving infrastructure. Covers application-layer dependencies and GPU/CUDA driver stack vulnerabilities. Does not define remediation SLAs or automated rebuild execution, which are addressed by SAF-K8S-0604-009 and SAF-K8S-0604-010.
  primary_enforcement_point: Vulnerability management platform classification policy configuration and reporting views that segment findings by AI workload context.
  implementation_surface: Vulnerability management platform policy configuration distinguishing training-time versus inference-time exposure, GPU driver and CUDA stack CVEs versus application-layer CVEs, cluster- and workload-tier metadata enrichment, and reporting or dashboard views that segment AI workload findings by exposure class before remediation routing.
  owner_primary: Security Engineering
  owner_supporting: ML Platform Engineering; DevSecOps / Release Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-13'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0604-009
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.4'
  control_seq: 009
  control_title: AI workload vulnerability prioritization and remediation SLAs
  control_statement: Vulnerability management processes must prioritize AI workload findings according to workload context, exploitability, and exposure profile, and must enforce differentiated remediation SLAs for each AI workload tier.
  objective: Ensure AI workload vulnerabilities are remediated in risk-ranked order with workload-tier-specific response expectations.
  rationale: Even after findings are correctly classified, organizations still need a defensible prioritization model and explicit remediation timelines. Without differentiated SLAs, critical inference-tier vulnerabilities compete with lower-risk training-only findings and patching decisions drift toward generic CVSS sorting instead of workload-specific business impact and exposure.
  scope: Applies to all AI and ML workload images deployed in Kubernetes clusters, including inference servers, training jobs, data preprocessing pipelines, and model-serving infrastructure. Covers prioritization criteria, workload-tier risk ranking, and remediation SLA assignment. Does not cover exposure classification mechanics or automated rebuild pipeline execution, which are addressed by SAF-K8S-0604-008 and SAF-K8S-0604-010.
  primary_enforcement_point: Vulnerability management platform prioritization policy configuration and workload-tier SLA enforcement rules.
  implementation_surface: Prioritization rules that weight exploitability context, blast radius, internet exposure, and workload criticality; differentiated remediation SLA definitions for training, inference, and supporting AI pipeline tiers; exception workflows for deferred remediation; and reporting that measures remediation timelines by workload category against SLA targets.
  owner_primary: Security Engineering
  owner_supporting: ML Platform Engineering; DevSecOps / Release Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-13'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0604-010
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.4'
  control_seq: '010'
  control_title: Automated AI workload rebuild and redeployment patch pipelines
  control_statement: Organizations must maintain automated rebuild and redeployment pipelines that can patch AI workload images and supporting components without requiring model retraining.
  objective: Enable timely patching of AI workloads without the operational cost and delay of retraining models for routine image and dependency fixes.
  rationale: If patching an AI workload requires retraining or manual repackaging of model artifacts, teams will defer remediation and accept unnecessary exposure. Automated rebuild and redeployment pipelines break that dependency by separating model weights from patchable runtime images and by validating that patched images can be promoted without retraining the underlying model.
  scope: Applies to AI and ML workload container images, supporting runtime components, and deployment pipelines in Kubernetes. Covers base image and dependency patch rebuilds, redeployment automation, and validation that patched runtime images do not require model retraining. Does not cover vulnerability classification or SLA prioritization, which are addressed by SAF-K8S-0604-008 and SAF-K8S-0604-009.
  primary_enforcement_point: CI/CD rebuild and redeployment pipeline triggers for patched AI workload images.
  implementation_surface: Automated CI/CD rebuild and redeployment pipelines triggered by base image or dependency patches, model weight loading at runtime from model registries rather than baking models into container images, regression test automation for patched AI workload images, promotion workflows for patched runtime images, and deployment records demonstrating patch rollout without model retraining.
  owner_primary: Security Engineering
  owner_supporting: ML Platform Engineering; DevSecOps / Release Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
