  domain_code: D10
  domain_name: Observability, Incident Response, and Governance
  knowledge_area: '10.5'
  control_seq: '021'
  control_title: Kubernetes containment runbooks for node draining, namespace isolation, and workload suspension
  control_statement: Organizations must define and document Kubernetes incident containment procedures for node draining, namespace isolation, and workload suspension, with pre-built runbooks and isolation templates that enable targeted containment while minimizing impact to unaffected workloads.
  objective: Enable rapid, targeted platform-level containment of Kubernetes incidents through documented and tested node, namespace, and workload isolation procedures that reduce blast radius without causing unnecessary disruption.
  rationale: Kubernetes incidents require targeted containment actions such as node draining, namespace isolation, and workload suspension that must be executed quickly and consistently. Without documented runbooks and isolation templates, responders may over-isolate and cause avoidable outages or under-isolate and fail to contain the incident.
  scope: Applies to all Kubernetes clusters hosting AI workloads. Covers node-level, namespace-level, and workload-level containment procedures, including multi-tenant environments where unaffected workloads must remain available wherever possible.
  primary_enforcement_point: IR playbook containment procedures, namespace isolation templates, and emergency authorization for Kubernetes containment actions.
  implementation_surface: kubectl cordon and drain procedures, deny-all NetworkPolicy manifests with documented exceptions, workload suspension or scaling procedures, and tested runbooks for each platform containment layer.
  owner_primary: Security Operations
  owner_supporting: Platform Engineering; AI/ML Engineering; SRE
