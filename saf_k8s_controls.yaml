- control_id: SAF-K8S-0201-013
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.1'
  control_seq: '013'
  control_title: Kubelet client certificate rotation via TLS bootstrap
  control_statement: Kubelet instances must use TLS bootstrapping and automatic client certificate rotation so node identities are issued by the cluster certificate authority and renewed before expiry without manual credential reuse.
  objective: Maintain current kubelet client identity for node-to-API-server authentication.
  rationale: Kubelet client certificates establish each node's authenticated identity to the API server. TLS bootstrap and automatic rotation prevent expired credentials, reduce manual renewal drift, and ensure node identities remain bound to approved certificate issuance workflows.
  scope: Applies to all cluster nodes running kubelet, including control-plane nodes where kubelet manages static pods. For managed services that handle certificate lifecycle internally, evidence of provider-managed rotation and TLS enforcement satisfies this control. Environments using external certificate authorities must document their rotation schedule and monitoring.
  primary_enforcement_point: Kubelet bootstrap configuration, certificate signing workflow, and client certificate rotation monitoring.
  implementation_surface: KubeletConfiguration rotateCertificates setting, bootstrap kubeconfig or bootstrap tokens, Kubernetes certificates API, and CSR approval workflow.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; PKI/Certificate Management
  baseline_or_ai_specific: baseline
