- control_id: SAF-K8S-0904-014
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.4'
  control_seq: '014'
  control_title: Pipeline stage-scoped artifact access and retention governance
  control_statement: Pipeline stages must use distinct least-privilege identities for artifact access, and artifact retention periods must be governed per stage and aligned to data-classification requirements so artifacts are not retained or exposed beyond their approved handling window.
  objective: Constrain artifact access and lifetime by pipeline stage so intermediate outputs remain available only to the identities and retention window required for their processing role.
  rationale: Even when artifacts are encrypted, overly broad stage identities or indefinite retention expand the blast radius of compromise and increase exposure of sensitive intermediate outputs. Stage-scoped access and retention governance ensure only the necessary pipeline step can access a given artifact and only for the period justified by its classification and operational use.
  scope: Applies to ML pipeline artifact handling on Kubernetes across orchestration systems such as Kubeflow, Argo, and similar workflow engines. Covers per-stage service-account scoping for artifact access and retention settings tied to classification needs. Excludes stage execution isolation and cross-classification transfer approval, which remain on adjacent controls.
  primary_enforcement_point: Pipeline stage identity bindings and artifact retention policy configuration.
  implementation_surface: Per-step service accounts or workload identities scoped to minimum artifact resources, pipeline manifests showing stage-specific identity assignment, object lifecycle or retention policies, and classification-aligned artifact expiration or archival controls.
