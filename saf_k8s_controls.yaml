- control_id: SAF-K8S-0905-032
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: '032'
  control_title: Safe model format allowlist and unsafe deserialization blocking
  control_statement: Organizations must enforce an allowlist of approved safe model formats for production loading operations and must block or quarantine models that use unsafe deserialization mechanisms such as Python pickle or unsafe torch.load patterns.
  objective: Prevent code execution through unsafe model serialization by restricting production model intake to approved safe formats and blocking unsafe deserialization paths.
  rationale: Pickle-based and similar unsafe model formats can execute attacker-controlled code during deserialization. Safe format allowlisting and explicit blocking of unsafe deserialization paths remove this execution path before a model reaches training or serving infrastructure.
  scope: Applies to all model loading operations on Kubernetes, including inference servers, training pipelines loading pretrained weights, and fine-tuning jobs. Covers safe format allowlisting, unsafe-format blocking, and deserialization safeguards in production paths. Excludes deeper structural and metadata validation of model files, which is addressed separately.
  primary_enforcement_point: Model loading policy, admission or promotion gates, and runtime deserialization configuration.
  implementation_surface: Model format allowlist policy, admission controllers rejecting pickle-based or otherwise disallowed model formats, inference and training configuration enforcing safe deserialization settings such as weights_only, and CI or promotion gates blocking unsafe deserialization usage.
  owner_primary: ML Platform Engineering
  owner_supporting: Security Engineering; ML Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
