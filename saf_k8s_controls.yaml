- control_id: SAF-K8S-0903-001
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.3'
  control_seq: '001'
  control_title: Adversarial example defenses at the serving layer
  control_statement: Inference serving infrastructure must deploy adversarial input defenses including input transformation-based detection, perturbation detection, and adversarial input rejection policies, and must integrate explainable AI (xAI) capabilities for security monitoring while restricting xAI outputs to prevent model reverse engineering.
  objective: Detect and reject adversarial inputs at the serving layer before they reach the model, and leverage model explanations to identify anomalous predictions while protecting explanation outputs from exploitation.
  rationale: Adversarial examples are carefully crafted inputs designed to cause model misclassification or targeted misbehavior. Without serving-layer defenses, these attacks succeed at the application layer even against robust models. Explainable AI can help detect anomalous predictions from adversarial or poisoned inputs, but xAI outputs themselves reveal model internals that attackers can exploit for model extraction or evasion refinement.
  scope: Applies to all production inference endpoints on Kubernetes that serve models vulnerable to adversarial manipulation. Covers input preprocessing defenses, adversarial detection middleware, xAI integration for anomaly detection, and xAI output access controls. Excludes adversarial training during model development, which is covered as an infrastructure requirement only.
  primary_enforcement_point: Inference preprocessing pipeline configuration, adversarial detection middleware or sidecar deployment, and xAI endpoint access control policies.
  implementation_surface: Inference preprocessing pipeline with input transformation defenses (JPEG compression, spatial smoothing, input quantization), adversarial perturbation detector model deployment as sidecar or middleware, adversarial input rejection and logging configuration, explainable AI (xAI) endpoint deployment (SHAP, attention maps, feature attributions) with separate authorization and aggressive rate limiting, forensic sample retention with PII-aware redaction, and adversarial robustness evaluation suites (ART, Foolbox).
  owner_primary: Security Engineering
  owner_supporting: ML Platform Engineering; ML Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
