- control_id: SAF-K8S-0904-017
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.4'
  control_seq: '017'
  control_title: Pipeline definition signing and execution-time signature verification
  control_statement: Pipeline definitions must be cryptographically signed and their signatures verified before execution or admission so unauthorized or tampered ML workflow definitions cannot run.
  objective: Ensure only authenticated and untampered pipeline definitions are accepted for execution.
  rationale: Pipeline definitions govern the entire ML workflow. Without cryptographic signing and enforcement of signature verification before execution, an attacker can substitute or tamper with workflow manifests and run malicious stages while appearing to use a legitimate pipeline process.
  scope: Applies to ML pipeline definitions, templates, and workflow manifests stored and executed on Kubernetes-based orchestration platforms such as Argo Workflows and Kubeflow Pipelines. Covers definition signing, signature verification workflows, and pre-execution or admission enforcement. Excludes immutable version storage and rollback governance, which are addressed separately.
  primary_enforcement_point: Pipeline definition repository signing workflow and execution-time verification point.
  implementation_surface: Signed pipeline manifests, provenance or signature artifacts, signature verification before execution or admission, and enforcement records showing unsigned or invalid definitions are rejected.
  owner_primary: ML Platform Engineering
  owner_supporting: Security Engineering; ML Engineering
  baseline_or_ai_specific: ai-specific
