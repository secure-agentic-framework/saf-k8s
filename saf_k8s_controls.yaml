  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.10'
  control_seq: '035'
  control_title: Investigation of anomalous cross-cluster AI communication
  control_statement: Cross-cluster network communication alerts that indicate misuse, lateral movement, or data exfiltration across cluster boundaries must be investigated through approved triage and incident response workflows that document findings, scope, and disposition.
  objective: Investigate suspicious cross-cluster AI communication quickly enough to determine whether an anomaly reflects benign drift, policy violation, or active compromise requiring containment.
  rationale: Monitoring without investigation leaves suspicious cross-cluster communication unresolved and makes it impossible to distinguish benign variation from active misuse or exfiltration. A separate investigation control is needed so alerted traffic anomalies are triaged, scoped, and documented through governed response workflows.
  scope: Applies to alerts and suspicious observations arising from cross-cluster network communication for distributed AI workloads, including distributed training, multi-cluster inference routing, and cross-cluster pipeline data transfer.
  primary_enforcement_point: Alert triage, investigation, and incident response workflows for anomalous cross-cluster communication.
  implementation_surface: Cross-cluster communication alert triage records, investigation case records, and documented findings or disposition for suspicious inter-cluster communication.
