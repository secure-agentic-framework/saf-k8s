- control_id: SAF-K8S-0203-014
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.3'
  control_seq: '014'
  control_title: Authenticated cloud metadata service mode enforcement
  control_statement: Kubernetes nodes on cloud infrastructure must enforce IMDSv2 or equivalent authenticated metadata access requirements so insecure metadata service modes are not available on node instances or managed node pools.
  objective: Ensure cloud instance metadata access requires provider-authenticated request patterns instead of legacy insecure modes.
  rationale: Cloud provider metadata services expose instance identity and credentials. If insecure metadata modes such as IMDSv1 remain available, simple HTTP requests or SSRF paths can retrieve cloud credentials. Requiring IMDSv2 or equivalent authenticated metadata access is independently auditable from endpoint or hop-limit tuning because it governs the core metadata access protocol mode.
  scope: Applies to Kubernetes nodes on AWS, GCP, Azure, and other cloud providers exposing instance metadata services. Covers node group, VM, or managed service metadata configuration that customers can set or must verify through provider documentation and platform APIs.
  primary_enforcement_point: Cloud infrastructure provisioning and managed service configuration governing metadata protocol mode on node instances or node pools.
  implementation_surface: Infrastructure-as-code templates, node group or VM metadata options, IMDSv2 or equivalent provider-authenticated metadata settings, and managed service verification of metadata mode defaults.
  owner_primary: Cloud Infrastructure
  owner_supporting: Platform Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
