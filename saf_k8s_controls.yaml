  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.1'
  control_seq: 018
  control_title: Registry push-time container image vulnerability rescanning
  control_statement: Container images must be rescanned at registry push time so newly built or externally introduced images receive current vulnerability analysis before promotion or deployment decisions are made.
  objective: Maintain current vulnerability visibility for pushed container images after build completion by rescanning images in registries.
  rationale: Build-time scanning alone does not cover images introduced outside standard CI paths or vulnerability disclosures that occur between build completion and registry promotion. Registry rescanning provides a current checkpoint at the artifact distribution layer.
  scope: Applies to container registries and deployed workloads across all Kubernetes clusters, including runtime scanning of AI/ML images and continuous monitoring of native library exposure.
  primary_enforcement_point: Registry webhook scanning and registry-side rescan configuration.
  implementation_surface: Registry webhook scanning, registry-native vulnerability scanning services, image push events, and rescan results for pushed images.
