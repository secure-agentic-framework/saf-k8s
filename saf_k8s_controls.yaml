- control_id: SAF-K8S-0903-004
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.3'
  control_seq: '004'
  control_title: LLM context window and token resource controls
  control_statement: LLM inference workloads must enforce context window resource controls including maximum input token limits that account for quadratic attention memory scaling, per-request and per-session output token budgets, KV cache memory caps that prevent single requests from exhausting GPU memory, and token generation rate limiting to prevent context window resource exhaustion attacks that exploit the unique computational characteristics of autoregressive generation.
  objective: Prevent denial-of-service and resource exhaustion attacks that exploit LLM-specific computational characteristics (quadratic attention scaling, KV cache growth, unbounded token generation) which are not addressed by general-purpose inference resource controls.
  rationale: LLM inference has unique resource characteristics that general inference controls (SAF-K8S-0903-003) do not fully address. Attention-based models consume memory quadratically with context length, meaning a request with 128K tokens consumes orders of magnitude more GPU memory than a 4K-token request. KV cache memory grows linearly with both context length and batch size, and a single long-context request can exhaust the KV cache allocation for an entire inference server. Unbounded output token generation can monopolize a GPU for minutes, blocking all other requests. Without LLM-specific token resource controls, attackers can craft requests that maximize context window utilization and generation length to exhaust serving capacity at minimal request volume.
  scope: Applies to all LLM inference deployments on Kubernetes using autoregressive generation models. Covers input token limits, output token budgets, KV cache memory management, and token generation rate controls. Complements SAF-K8S-0903-003 (general inference resource controls) with LLM-specific resource dimensions. Does not apply to non-generative models.
  primary_enforcement_point: LLM inference server configuration (max_model_len, max_num_seqs, gpu_memory_utilization parameters), API gateway token counting middleware, and token budget enforcement at the serving framework level.
  implementation_surface: LLM inference server configuration (max_model_len for context length caps, gpu_memory_utilization for KV cache headroom, max_num_seqs for concurrent sequence limits, preemption policy), API gateway token counting middleware for per-request and per-session output token budgets, per-API-key daily token budget enforcement, tokens-per-minute (TPM) rate limiting with separate input/output token tracking, sliding window burst allowances, and KV cache memory monitoring dashboards.
  owner_primary: ML Platform Engineering
  owner_supporting: Security Engineering; Platform Engineering; FinOps
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
