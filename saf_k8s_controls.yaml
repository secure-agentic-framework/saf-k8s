- control_id: SAF-K8S-0601-010
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.1'
  control_seq: '010'
  control_title: Artifact retention period and lifecycle enforcement
  control_statement: Organizations must define and enforce retention policies for container images, Helm charts, and ML model artifacts in registries, including minimum retention periods by artifact type and protection of artifacts referenced by running deployments from garbage collection.
  objective: Ensure software release artifacts remain available long enough for rollback, forensics, and audit while preventing uncontrolled registry growth.
  rationale: Without explicit retention periods and deployment-aware garbage-collection protection, organizations can lose the exact artifacts needed to investigate incidents or roll back safely, or accumulate unbounded artifact storage with no lifecycle discipline.
  scope: All container registries, Helm chart repositories, ML model registries, and OCI artifact stores used by the organization for release artifact storage.
  primary_enforcement_point: Registry retention and lifecycle policy enforcement for release artifacts.
  implementation_surface: Registry lifecycle rules, garbage-collection protections for deployed digests, tag immutability and retention policies, and automated cleanup tooling for container, chart, and model artifacts.
