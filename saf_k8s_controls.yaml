- control_id: SAF-K8S-0905-051
  domain_code: D09
  domain_name: 'AI Workload Security: Training, Serving, and Pipelines'
  knowledge_area: '9.5'
  control_seq: '051'
  control_title: Model promotion approval audit binding to reviewer identity and model version
  control_statement: Model promotion workflows must record an audit trail that binds the authenticated reviewer identity, approval decision, timestamp, and approved model version so promotion decisions remain attributable and reviewable.
  objective: Ensure that approved model versions have an auditable promotion record linking the reviewer identity and decision details to the promoted model artifact or version.
  rationale: Even when reviewer identity is authenticated, promotion decisions remain weakly governed if the resulting audit trail does not preserve who approved what and when. Audit binding supports reviewability, non-repudiation, and post-incident reconstruction of production promotion decisions.
  scope: Applies to all model promotion workflows requiring human approval on Kubernetes. Covers audit records linking reviewer identity, decision time, approval outcome, and promoted model version. Excludes separation-of-duties enforcement, which remains covered by SAF-K8S-0905-025.
  primary_enforcement_point: Promotion audit logging and decision record retention.
  implementation_surface: Promotion audit trail records linking approver identity, timestamp, approval decision, and promoted model version, plus retention and review mechanisms for those approval records.
