- control_id: SAF-K8S-0602-007
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.2'
  control_seq: '007'
  control_title: Admission signature bypass and emergency break-glass governance
  control_statement: Any bypass or exemption from admission-time image signature verification must be explicitly documented, time-limited, and restricted to an audited emergency break-glass procedure.
  objective: Constrain and audit any exceptional bypass of image signature verification so emergency operation does not become a persistent integrity gap.
  rationale: Exception governance is a separate obligation from enforcement. Even with strong admission verification, undocumented or open-ended bypass mechanisms undermine the control by creating an alternate path for unsigned or tampered images.
  scope: Applies to all production and staging Kubernetes clusters. All namespaces must be covered unless explicitly exempted in a documented policy (e.g., kube-system for provider-managed components). Emergency break-glass procedures must be audited and time-limited.
  primary_enforcement_point: Admission bypass policy, namespace exemption policy, and emergency break-glass governance workflow.
  implementation_surface: Break-glass annotation mechanisms, exemption policies, auto-expiry controls, exception approval records, and audit logs for bypass use or emergency exemption activation.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; DevSecOps / Release Engineering
  baseline_or_ai_specific: baseline
