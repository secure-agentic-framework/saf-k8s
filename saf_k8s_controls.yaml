- control_id: SAF-K8S-0605-008
  domain_code: D06
  domain_name: Supply Chain, Images, and Admission Control
  knowledge_area: '6.5'
  control_seq: 008
  control_title: Admission webhook TLS rotation and high-availability resilience
  control_statement: Admission webhooks must use automatically rotated TLS certificates and must be deployed with high-availability and monitoring configurations that prevent certificate expiration, backend outages, or sustained latency errors from making the webhook unavailable to the cluster.
  objective: Keep webhook trust chains valid and webhook backends continuously available so admission enforcement infrastructure does not become a single point of failure for cluster operations.
  rationale: Expired webhook certificates, single-replica backends, and absent latency monitoring can block admission entirely or create prolonged control-plane outages. Automated certificate lifecycle management and resilient deployment topology reduce that operational fragility.
  scope: Applies to all validating and mutating admission webhooks in production and staging Kubernetes clusters, including custom webhooks and framework-provided webhooks such as Gatekeeper, Kyverno, and Kubewarden.
  primary_enforcement_point: Webhook deployment infrastructure and certificate lifecycle management.
  implementation_surface: Automated TLS certificate rotation, CA injection, webhook backend Deployment replicas, PodDisruptionBudgets, anti-affinity settings, and webhook latency and availability dashboards with alerting.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; SRE / Operations
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
