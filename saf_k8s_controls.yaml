- control_id: SAF-K8S-0103-001
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.3'
  control_seq: '001'
  control_title: Controller-manager service account token hardening
  control_statement: Production Kubernetes clusters must configure the controller-manager to issue bound, time-limited service account tokens and disable legacy token auto-provisioning (--controllers=-serviceaccount-token or equivalent). Feature gate governance is addressed in SAF-K8S-0104-004.
  objective: Reduce the privilege and persistence of service account credentials and limit controller-manager behavior to well-understood, security-reviewed feature sets by enforcing bound tokens, disabling legacy provisioning, and governing feature gates.
  rationale: Legacy service account tokens are long-lived, non-audience-bound, and automatically mounted into every pod, providing persistent credentials that an attacker can exfiltrate and reuse from any compromised workload. Bound service account tokens are time-limited, audience-scoped, and tied to the pod lifecycle, significantly reducing credential theft impact.
  scope: Applies to all production clusters. Covers controller-manager flags for service account token issuance and legacy token controller configuration. For managed Kubernetes services, applies to customer-configurable controller-manager settings and to verification that provider defaults align with bound token requirements.
  primary_enforcement_point: Controller-Manager Configuration
  implementation_surface: Controller-manager manifest or managed-service configuration, feature gate policy documentation, and periodic configuration assessment.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; Application Platform teams
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0103-005
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.3'
  control_seq: '005'
  control_title: Pod garbage collection threshold configuration
  control_statement: Production Kubernetes clusters must configure the controller-manager terminated pod garbage collection threshold (--terminated-pod-gc-threshold) to limit the accumulation of terminated pods. This reduces the window during which terminated pod metadata, including environment variable references, volume mounts, and container status, remains queryable via the API server.
  objective: Minimize the exposure window for sensitive metadata retained in terminated pod objects by ensuring timely garbage collection of completed and failed pods.
  rationale: Terminated pods persist in the API server until the pod GC controller removes them. These objects retain environment variable references (which may point to Secrets), volume mount specifications, container image references, and exit status details. In AI clusters, large distributed training jobs can create thousands of worker pods per run, and the default threshold of 12500 allows a large backlog of terminated pods to accumulate. A lower threshold reduces the queryable metadata surface and limits the forensic value available to an attacker with read access to the namespace.
  scope: Applies to all production Kubernetes clusters. Particularly relevant for clusters running batch AI workloads (distributed training, pipeline jobs) that create large numbers of short-lived pods. For managed Kubernetes services, verify whether the provider exposes this setting or applies a default threshold.
  primary_enforcement_point: Controller-Manager Configuration
  implementation_surface: Controller-manager static pod manifest or flag configuration (--terminated-pod-gc-threshold), monitoring for terminated pod accumulation per namespace.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering; AI/ML Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-01'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0103-006
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.3'
  control_seq: '006'
  control_title: Profiling endpoint disablement for controller-manager and scheduler
  control_statement: Production Kubernetes clusters must disable profiling endpoints on the controller-manager and scheduler by setting --profiling=false on each component, ensuring that debug endpoints are not exposed on any control-plane component.
  objective: Eliminate profiling debug surface on controller-manager and scheduler processes, complementing API server profiling disablement (SAF-K8S-0101-001) to achieve consistent control-plane hardening.
  rationale: The controller-manager and scheduler each expose /debug/pprof/ profiling endpoints by default. These endpoints leak internal runtime state, including CPU profiles, heap dumps, and goroutine traces, and they can be abused for denial-of-service by triggering expensive profiling operations. SAF-K8S-0101-001 covers the API server. This control ensures the same hardening is applied to the remaining control-plane components.
  scope: Applies to all production Kubernetes clusters. For managed Kubernetes services, verify through provider documentation that profiling is disabled on provider-managed controller-manager and scheduler processes, or document as a provider-managed control.
  primary_enforcement_point: Controller-Manager Configuration
  implementation_surface: Controller-manager and scheduler static pod manifests or flag configuration (--profiling=false on both components), CIS Benchmark checks for profiling flags.
  owner_primary: Platform Engineering
  owner_supporting: Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-01'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0103-008
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.3'
  control_seq: 008
  control_title: Cloud controller-manager deployment isolation
  control_statement: Production Kubernetes clusters using a cloud controller-manager must deploy it separately from the core kube-controller-manager so that cloud-provider-specific controller execution, privileges, and failure modes are isolated from the core control-plane controller process.
  objective: Limit the blast radius of a cloud controller-manager compromise or failure by separating it from the core controller-manager execution boundary.
  rationale: Co-deploying the cloud controller-manager with the core controller-manager collapses trust boundaries between cloud-facing automation and core Kubernetes reconciliation logic. This control isolates the deployment and process-boundary requirement so teams can independently verify component separation from cloud IAM and credential lifecycle concerns.
  scope: Applies to production clusters with cloud controller-manager integrations. Covers separate deployment topology, process boundary, and operational separation from kube-controller-manager.
  primary_enforcement_point: Component Isolation
  implementation_surface: Cloud controller-manager deployment manifests, static pod or deployment topology, and component process inventory showing separate execution from kube-controller-manager.
  owner_primary: Platform Engineering
  owner_supporting: Cloud Platform Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-15'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0103-010
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.3'
  control_seq: '010'
  control_title: Leader election configuration and lease object RBAC
  control_statement: Production Kubernetes clusters must enable leader election for kube-controller-manager, kube-scheduler, and cloud-controller-manager, configure lease duration, renew deadline, and retry period parameters appropriate to cluster latency, and restrict RBAC permissions for leader election Lease objects so that only the designated control-plane service accounts may read or update their respective Lease resources.
  objective: Protect leader election from disruption or manipulation by ensuring safe timing parameters and tightly scoped access to Lease objects.
  rationale: Leader election is both a configuration-safety problem and an authorization problem. Incorrect timing values cause unnecessary failovers or stuck leaders, while overly broad Lease-object permissions allow unauthorized workloads to interfere with the active control-plane leader. This control isolates those leader-election-specific safeguards from broader HA topology requirements.
  scope: Applies to production clusters running kube-controller-manager, kube-scheduler, and cloud-controller-manager with leader election. Covers --leader-elect flags, lease timing parameters, and RBAC on Lease objects in kube-system.
  primary_enforcement_point: Leader Election / RBAC
  implementation_surface: Component flag configuration, Lease-object RBAC roles and bindings, kube-system Lease resources, and latency-aware parameter documentation.
  owner_primary: Platform Engineering
  owner_supporting: Site Reliability Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-15'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0103-012
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.3'
  control_seq: '012'
  control_title: Cloud controller-manager cloud IAM least-privilege scoping
  control_statement: Production Kubernetes clusters using a cloud controller-manager must grant only the minimum cloud IAM permissions required for cloud provider operations performed by the cloud controller-manager.
  objective: Reduce cloud-environment blast radius by ensuring the cloud controller-manager operates with least-privilege cloud permissions scoped only to required cloud APIs and infrastructure actions.
  rationale: The cloud controller-manager can manipulate high-impact infrastructure such as load balancers, routes, and volumes. Excessive IAM permissions allow a Kubernetes control-plane compromise to expand into the broader cloud account, so permission scope must be independently auditable from credential lifecycle controls.
  scope: Applies to production clusters on cloud providers with cloud controller-manager integrations. Covers cloud IAM policy scope, allowed cloud APIs, resource scoping, and periodic review of granted permissions.
  primary_enforcement_point: Cloud IAM Authorization Scope
  implementation_surface: Cloud IAM policy definitions, provider-specific role bindings, scoped service permissions for load balancer, route, and volume operations, and IAM access review evidence.
  owner_primary: Platform Engineering
  owner_supporting: Cloud Platform Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0103-013
  domain_code: D01
  domain_name: Control Plane and Cluster Hardening
  knowledge_area: '1.3'
  control_seq: '013'
  control_title: Cloud controller-manager workload identity and credential rotation
  control_statement: Production Kubernetes clusters using a cloud controller-manager must enforce workload identity or equivalent federated credential use, or automated rotation and short-lived issuance, for all cloud credentials used by the cloud controller-manager.
  objective: Reduce cloud-environment blast radius by ensuring the cloud controller-manager does not rely on long-lived static cloud credentials and instead uses federated identity, short-lived credentials, or automated rotation.
  rationale: Long-lived cloud credentials create a persistent pivot point from cluster compromise into the cloud account. Separating workload identity and credential rotation from IAM scope makes it possible to audit whether the controller uses non-persistent credentials even when the granted permissions are already minimal.
  scope: Applies to production clusters on cloud providers with cloud controller-manager integrations. Covers workload identity or equivalent federation, short-lived credential issuance, automated credential rotation, and supporting review records.
  primary_enforcement_point: Cloud Credential Lifecycle
  implementation_surface: Workload identity or equivalent credential federation configuration, cloud controller-manager credential rotation automation, short-lived credential issuance settings, and credential lifecycle review evidence.
  owner_primary: Platform Engineering
  owner_supporting: Cloud Platform Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
