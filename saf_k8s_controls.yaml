- control_id: SAF-K8S-0304-010
  domain_code: D03
  domain_name: Workload and Pod Security
  knowledge_area: '3.4'
  control_seq: '010'
  control_title: Pod resource requests and limits specification
  control_statement: All pods must define explicit CPU, memory, and ephemeral-storage resource requests and limits for each regular and init container so the scheduler can place workloads accurately and the kubelet can enforce per-container resource boundaries.
  objective: Prevent individual workloads from consuming unbounded node resources by requiring explicit per-container resource declarations.
  rationale: Without explicit resource requests and limits, a single compromised or misconfigured workload can starve co-located pods, trigger evictions, or destabilize nodes through CPU, memory, or disk exhaustion. Pod-level resource specifications are the first enforcement point for bounding each workload's impact.
  scope: Applies to all regular workload pods and init containers in production clusters. GPU resource requests must be included where applicable, but GPU quota governance is handled separately.
  primary_enforcement_point: Policy engine rules, CI/CD manifest validation, and admission checks that require per-container resource requests and limits.
  implementation_surface: Pod spec resources.requests and resources.limits fields for CPU, memory, ephemeral-storage, and GPU extended resources where applicable.
  owner_primary: Platform Engineering
  owner_supporting: Application Development teams; AI/ML Platform team (for GPU resource requests)
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-03-16'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0304-011
  domain_code: D03
  domain_name: Workload and Pod Security
  knowledge_area: '3.4'
  control_seq: '011'
  control_title: Namespace LimitRange and ResourceQuota enforcement
  control_statement: Every production namespace must enforce LimitRange defaults and maximums together with ResourceQuota aggregate caps for CPU, memory, ephemeral storage, and applicable accelerator resources so that teams cannot bypass resource governance through omitted or excessive specifications.
  objective: Prevent tenant and namespace level resource exhaustion by enforcing namespace-scoped defaults, ceilings, and aggregate consumption caps.
  rationale: Pod-level limits alone do not prevent a team from deploying many bounded pods until a namespace or cluster is exhausted. LimitRange establishes default and maximum values, while ResourceQuota constrains aggregate namespace consumption and prevents one tenant from monopolizing shared capacity.
  scope: Applies to all production namespaces. Accelerator-specific quotas remain applicable where GPU or AI resources are allocated to teams or workloads.
  primary_enforcement_point: LimitRange and ResourceQuota admission controllers plus namespace governance reviews and quota utilization monitoring.
  implementation_surface: LimitRange objects, ResourceQuota objects, and namespace resource consumption dashboards including accelerator quota usage where applicable.
  owner_primary: Platform Engineering
  owner_supporting: AI/ML Platform team; Application Development teams
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
