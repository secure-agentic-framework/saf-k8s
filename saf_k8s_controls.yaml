- control_id: SAF-K8S-0403-021
  domain_code: D04
  domain_name: Identity, Access, and Secrets Management
  knowledge_area: '4.3'
  control_seq: '021'
  control_title: Automated AI workload credential inventory
  control_statement: Organizations running AI workloads at scale must maintain an automated credential inventory tracking all active secrets, tokens, and keys issued to AI workloads.
  objective: Provide continuous visibility into the active credential surface of AI workloads across platforms and secret types.
  rationale: Inventorying issued credentials is a distinct obligation from cleaning up abandoned ones. This control isolates the requirement to continuously enumerate active workload credentials so teams can independently verify that the platform knows what credentials exist and where they are bound.
  scope: Applies to all credentials issued to AI and ML workloads including Vault dynamic secrets, cloud IAM temporary credentials, Kubernetes service account tokens, API keys for external services, and model registry authentication tokens. Covers automated inventory collection and correlation to workload identity and ownership. Orphaned credential cleanup remains governed by SAF-K8S-0403-022.
  primary_enforcement_point: Credential inventory system and credential-to-workload correlation records.
  implementation_surface: Vault audit logs and lease inventory, cloud IAM credential reports, Kubernetes service account token tracking, model registry credential inventories, and pipeline orchestrator identity issuance records.
