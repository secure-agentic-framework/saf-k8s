- control_id: SAF-K8S-0701-001
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.1'
  control_seq: '001'
  control_title: PersistentVolume and PersistentVolumeClaim access mode enforcement
  control_statement: Organizations must configure PersistentVolume and PersistentVolumeClaim access modes using the least-permissive option required by the workload (preferring ReadWriteOnce or ReadOnlyMany over ReadWriteMany), and must enforce access mode restrictions for volumes containing training datasets, model checkpoints, and feature stores to prevent unauthorized cross-pod data modification.
  objective: Prevent unintended cross-pod write access to persistent storage holding AI training data, model artifacts, and feature stores by enforcing least-privilege access modes.
  rationale: ReadWriteMany volumes allow any pod on any node to read and write data simultaneously. If training dataset or model checkpoint volumes are inadvertently configured with ReadWriteMany, a compromised or misbehaving pod can corrupt training data, tamper with model checkpoints, or exfiltrate feature store contents. Restricting access modes limits the blast radius of a single pod compromise.
  scope: Applies to all Kubernetes clusters hosting AI workloads where PersistentVolumes store training datasets, model checkpoints, feature stores, or inference artifacts. Covers both dynamically provisioned and statically provisioned volumes. ReadWriteMany may be permitted with documented justification and compensating controls for distributed training frameworks that require shared filesystem access.
  primary_enforcement_point: StorageClass parameters, PersistentVolumeClaim specs, and admission control policies (e.g., OPA Gatekeeper or Kyverno) that reject PVCs requesting overly permissive access modes without approved exceptions.
  implementation_surface: PersistentVolume and PersistentVolumeClaim spec.accessModes configuration (ReadWriteOnce, ReadOnlyMany, ReadWriteMany), StorageClass definitions, admission control policy engines (Kyverno ClusterPolicy, OPA/Gatekeeper ConstraintTemplates) enforcing PVC access mode restrictions, namespace allowlisting for ReadWriteMany, pod affinity rules, and NetworkPolicy on storage backend endpoints.
  owner_primary: Platform Engineering
  owner_supporting: ML Engineering; Security Engineering
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0701-002
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.1'
  control_seq: '002'
  control_title: CSI driver security and privilege restriction
  control_statement: Organizations must restrict CSI driver deployments to approved and verified drivers, enforce least-privilege for driver service accounts, apply RBAC controls on volume snapshot operations, and restrict StorageClass creation to authorized administrators.
  objective: Limit the privilege footprint of storage drivers and prevent unauthorized provisioning or snapshot access through least-privilege CSI driver configuration.
  rationale: CSI drivers operate with elevated cluster privileges and can access raw block devices and host filesystems. An unauthorized or misconfigured driver can exfiltrate data, escalate privileges, or bypass namespace isolation. Unrestricted snapshot access allows unauthorized cloning of sensitive volumes.
  scope: Applies to all Kubernetes clusters running CSI drivers. Covers driver installation, service account permissions, snapshot controller RBAC, and StorageClass management. Managed Kubernetes services must apply equivalent restrictions through provider-supported storage configuration.
  primary_enforcement_point: CSI driver deployment manifests, ClusterRole and ClusterRoleBinding for driver service accounts, VolumeSnapshotClass RBAC, StorageClass creation policies, and admission control rules restricting privileged CSI pods.
  implementation_surface: CSIDriver and StorageClass Kubernetes resource types, CSI driver DaemonSet deployments and their ServiceAccount RBAC bindings, VolumeSnapshot/VolumeSnapshotContent/VolumeSnapshotClass CRDs, admission control policies blocking unapproved CSIDriver installation, AppArmor/SELinux profiles for CSI node pods, and runtime security tooling (Falco, Tetragon) monitoring CSI driver behavior.
  owner_primary: Platform Engineering
  owner_supporting: Storage Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0701-003
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.1'
  control_seq: '003'
  control_title: Encryption at rest for persistent volumes
  control_statement: All persistent volumes must be encrypted at rest using cloud provider-managed encryption, dm-crypt/LUKS, or storage-level encryption mechanisms, with encryption keys managed through a dedicated key management service and rotated according to organizational key rotation policy.
  objective: Protect data stored on persistent volumes from unauthorized access in the event of physical media theft, improper disk decommissioning, or unauthorized access to underlying storage infrastructure.
  rationale: Persistent volumes may contain sensitive training data, model weights, inference results, and configuration secrets. Without encryption at rest, an attacker who gains access to the underlying storage media or cloud storage layer can read data directly, bypassing all Kubernetes access controls. Regulatory frameworks such as PCI DSS and HIPAA require encryption at rest for sensitive data.
  scope: Applies to all persistent volumes across all Kubernetes clusters, regardless of data classification. Covers cloud provider-managed encryption (e.g., AWS EBS encryption, GCE PD encryption, Azure Disk encryption), node-level dm-crypt/LUKS, and storage-backend-native encryption. Exceptions for ephemeral scratch volumes must be documented with justification.
  primary_enforcement_point: StorageClass encryption parameters, cloud provider volume encryption settings, node-level disk encryption configuration, and admission control policies that reject PVCs bound to unencrypted StorageClasses.
  implementation_surface: Cloud provider storage encryption settings (AWS EBS encryption, GCP Persistent Disk encryption, Azure Disk encryption), cloud KMS services (AWS KMS, GCP Cloud KMS, Azure Key Vault) for customer-managed encryption keys (CMK/CMEK), on-premises block-level encryption (dm-crypt/LUKS), storage-backend-native encryption (Ceph, Longhorn), StorageClass encryptionConfiguration parameters, key rotation policy automation, HashiCorp Vault or Thales CipherTrust for on-premises key management, and LUKS header validation tooling.
  owner_primary: Platform Engineering
  owner_supporting: Cloud Platform Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Foundational
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0701-004
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.1'
  control_seq: '004'
  control_title: PV reclaim policy enforcement for AI data volumes
  control_statement: Organizations must configure PersistentVolume reclaim policies to prevent data remnants after volume release, and must enforce the Retain policy for volumes containing training data backups and model checkpoint archives.
  objective: Prevent unintended data loss of valuable AI artifacts through premature volume deletion and prevent data leakage through insecure volume reclamation.
  rationale: The Delete reclaim policy automatically destroys the underlying storage when a PVC is released, which can cause irreversible loss of training data and model checkpoints that may have taken days or weeks of compute to produce. Conversely, if volumes are reclaimed without proper data wiping, residual data from a previous tenant's training run can be exposed to the next consumer. Dual authorization for destruction prevents a single compromised account from deleting critical AI artifacts.
  scope: Applies to all persistent volumes in Kubernetes clusters hosting AI workloads, with mandatory Retain policy for volumes storing training data backups and model checkpoint archives. Dual authorization requirements apply to deletion requests for retained AI data volumes. Scratch volumes and ephemeral training caches may use Delete policy with documented justification.
  primary_enforcement_point: PersistentVolume reclaimPolicy settings, StorageClass reclaimPolicy defaults, and admission control policies enforcing Retain for labeled AI data volumes.
  implementation_surface: PersistentVolume spec.persistentVolumeReclaimPolicy configuration (Retain, Delete), StorageClass reclaimPolicy defaults, PV metadata labels for data-classification and retention-policy, admission webhooks enforcing Retain on AI data volumes, and cloud provider secure erasure verification.
  owner_primary: Platform Engineering
  owner_supporting: ML Engineering; Security Engineering; Data Governance
  baseline_or_ai_specific: ai-specific
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0701-006
  domain_code: D07
  domain_name: Storage, Multi-tenancy, and Resource Governance
  knowledge_area: '7.1'
  control_seq: '006'
  control_title: Dual authorization for retained AI data volume destruction
  control_statement: Organizations must require dual authorization before destroying retained training data volumes or model checkpoint archives, ensuring that no single account or role can unilaterally delete persistent volumes containing valuable AI artifacts.
  objective: Prevent unauthorized or accidental destruction of retained AI data volumes by requiring independent approval from two authorized parties before deletion.
  rationale: Retained volumes containing training data and model checkpoints represent significant compute investment and irreplaceable artifacts. A single compromised or mistaken account that can unilaterally delete these volumes creates an unacceptable risk of permanent data loss. Dual authorization ensures that volume destruction requires deliberate, independently verified intent from two parties.
  scope: Applies to all retained PersistentVolumes storing training data backups and model checkpoint archives. The dual authorization mechanism must be enforced at the storage backend or through an admission control webhook that intercepts PV deletion requests. Scratch volumes and ephemeral training caches are excluded.
  primary_enforcement_point: Admission control webhooks or storage backend policies requiring dual authorization for PV deletion requests on retained AI data volumes.
  implementation_surface: Custom admission webhooks intercepting PV deletion requests and requiring multi-person approval, cloud provider deletion protection settings, audit logging for volume lifecycle events, and operational procedures for retained volume destruction with multi-person approval.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Data Governance
  baseline_or_ai_specific: ai-specific
