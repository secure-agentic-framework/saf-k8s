  date_modified: '2026-04-02'
- control_id: SAF-K8S-0204-001
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.4'
  control_seq: '001'
  control_title: Runtime security tool deployment for syscall and network monitoring
  control_statement: Production clusters must deploy at least one runtime security monitoring tool (e.g., Falco, Tetragon, KubeArmor) on all nodes to provide real-time syscall monitoring, network connection tracking, and file access observation, with alerts forwarded to the centralized security monitoring platform.
  objective: Establish continuous runtime visibility into container and host behavior at the syscall level, enabling detection of malicious activity that bypasses application-layer and Kubernetes API-layer controls.
  rationale: Kubernetes API audit logs and application-level monitoring do not capture host-level and container-level activities such as unexpected process execution, privilege escalation syscalls, or anomalous network connections. Without runtime security monitoring, container escape attempts, cryptomining, reverse shells, and lateral movement via host networking go undetected until impact becomes visible. Runtime tools operating at the kernel level (eBPF, kernel modules) provide the deepest detection capability available.
  scope: Applies to all production cluster nodes, including GPU nodes and nodes hosting AI inference workloads. At least one runtime security tool must be deployed as a DaemonSet or host-level agent on every schedulable node. Managed Kubernetes services may satisfy this control through provider-native runtime threat detection services if they provide equivalent syscall-level visibility.
  primary_enforcement_point: Cluster bootstrapping automation deploying runtime security DaemonSets, with node affinity rules ensuring coverage on all node pools.
  implementation_surface: Runtime security tool DaemonSet deployment (Falco, Tetragon, KubeArmor), node scheduling affinity ensuring coverage of GPU nodes, syscall and network monitoring configuration, alert forwarding to SIEM, and Kubernetes context enrichment settings.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Security Operations (SOC)
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0204-002
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.4'
  control_seq: '002'
  control_title: Kubernetes-specific runtime detection rules
  control_statement: Runtime security tools must include detection rules specifically tuned for Kubernetes-native threats including container escape attempts, in-container privilege escalation, lateral movement between pods or nodes, and cryptomining indicators such as unexpected CPU-intensive processes or connections to known mining pool endpoints.
  objective: Ensure that runtime detection capabilities address the specific threat landscape of containerized Kubernetes environments rather than relying solely on generic host-based detection signatures.
  rationale: Generic host-based detection rules miss Kubernetes-specific attack patterns such as nsenter-based container escape, /proc/self/exe exploitation, service account token theft for lateral movement, and cryptomining processes that disguise themselves within container namespaces. Without purpose-built detection rules, Kubernetes-native attacks can progress through kill chain stages undetected. Regular rule tuning is necessary as new container escape CVEs and Kubernetes-specific exploitation techniques emerge.
  scope: Applies to all runtime security tool deployments on production cluster nodes. Detection rules must be reviewed and updated at least quarterly or upon publication of new Kubernetes-relevant CVEs. Rules must be tested in non-production environments before deployment to avoid false positive disruption in production workloads.
  primary_enforcement_point: Runtime security tool rule configuration, managed through version-controlled rule repositories and automated deployment pipelines.
  implementation_surface: Runtime detection rule definitions (Falco rules, Tetragon TracingPolicy), detection categories (container escape, privilege escalation, lateral movement, cryptomining, credential theft), MITRE ATT&CK mapping, rule testing frameworks, and quarterly rule review procedures.
  owner_primary: Security Engineering
  owner_supporting: Security Operations (SOC); Threat Intelligence
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0204-003
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.4'
  control_seq: '003'
  control_title: Container filesystem drift detection
  control_statement: Production workloads must be monitored for container filesystem drift, detecting and alerting on unexpected binary execution, library loading, or configuration file modifications that deviate from the original container image contents.
  objective: Detect post-deployment tampering with container filesystems that may indicate malware installation, backdoor deployment, or attacker tool staging within running containers.
  rationale: Containers are designed to be immutable after deployment; any runtime filesystem modification is inherently suspicious. Attackers who gain code execution inside a container frequently download additional tools, modify configuration files to disable security controls, or drop persistent backdoors. Without drift detection, these modifications go unnoticed even when the initial intrusion vector is eventually patched. Drift detection provides a high-signal, low-false-positive detection layer because legitimate containers rarely modify their own filesystems.
  scope: Applies to all production workloads deployed from container images. Workloads that legitimately write to the container filesystem (e.g., applications with local caching or temporary file creation) must have drift detection rules tuned to distinguish between expected writable paths and unexpected binary or configuration modifications. Init containers and sidecar containers are also in scope.
  primary_enforcement_point: Runtime security tool configuration with container image baseline comparison and filesystem monitoring policies.
  implementation_surface: Drift detection tool configuration (Falco, Tetragon, Sysdig drift control, Aqua drift prevention), readOnlyRootFilesystem enforcement, exclusion path definitions for legitimate writes (model cache, checkpoints, emptyDir), and binary execution alerting from writable paths.
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Application Development
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0204-004
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.4'
  control_seq: '004'
  control_title: Forensic capture capabilities for container incident investigation
  control_statement: Clusters must provide documented and tested forensic capture capabilities including container filesystem snapshots, container memory dumps, and network flow logging that can be invoked during incident investigation without requiring container restart or evidence destruction.
  objective: Enable security teams to collect volatile forensic evidence from containerized workloads during active incidents, preserving container state for root cause analysis and legal proceedings before containment actions destroy evidence.
  rationale: Container environments are ephemeral by design; restarting, scaling, or deleting pods destroys all in-memory state, filesystem modifications, and network connection data. Without pre-established forensic capture tooling, incident responders cannot collect evidence before containment actions occur. This leads to incomplete root cause analysis, inability to determine blast radius, and loss of evidence needed for regulatory reporting or legal action. Forensic capabilities must be tested before incidents occur to ensure they function under pressure.
  scope: 'Applies to all production clusters. Forensic capabilities must cover at minimum: container filesystem snapshot to persistent storage, container process memory dump, and network flow logs with at least 72 hours of retention. Managed Kubernetes environments must document available forensic capabilities and any provider-imposed limitations. Forensic procedures must be tested at least annually through tabletop or simulated exercises.'
  primary_enforcement_point: Incident response toolkit deployment and forensic capture runbook maintained alongside cluster operational documentation.
  implementation_surface: Container filesystem snapshot tools (ctr snapshot, crictl), memory dump tools (gcore, /proc/<pid>/mem), network flow logging (Cilium Hubble, Calico flow logs), pod metadata capture procedures, node-level debug tools (kubectl debug node), persistent forensic storage, and forensic capture runbook documentation.
  owner_primary: Security Operations (SOC)
  owner_supporting: Security Engineering; Platform Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0205-002
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.5'
  control_seq: '002'
  control_title: NodePort and HostPort restriction policies
  control_statement: Clusters must enforce admission policies that restrict the use of NodePort services and HostPort pod specifications to approved exceptions only, preventing workloads from exposing services directly on node IP addresses without explicit authorization and security review.
  objective: Limit node-level network exposure by preventing workloads from binding directly to host network ports, which bypasses ingress controls, load balancer security features, and network policy enforcement.
  rationale: NodePort services expose a port on every cluster node's external IP address, creating a cluster-wide network entry point that bypasses ingress controller WAF rules, TLS termination, and rate limiting. HostPort specifications bind containers directly to the host network interface, bypassing pod-level network policies entirely. Both mechanisms create direct network paths to workloads that are invisible to standard ingress monitoring and difficult to audit across large clusters. Unrestricted use enables shadow entry points that persist even after intended ingress configurations are updated.
  scope: Applies to all production cluster namespaces. System namespaces (kube-system, monitoring) may require NodePort or HostPort for infrastructure components (e.g., ingress controllers, node exporters) and must be explicitly whitelisted. Development clusters may relax this control with documented exceptions. Cloud environments should prefer LoadBalancer services or Ingress resources over NodePort exposure.
  primary_enforcement_point: Admission controllers (Pod Security Admission, OPA Gatekeeper, Kyverno) enforcing policies that deny NodePort services and HostPort specifications except in whitelisted namespaces.
  implementation_surface: Admission policies (Kyverno, OPA Gatekeeper) validating Service type and pod hostPort fields, NodePort and HostPort denial rules, exemption registration process, and infrastructure component exception documentation (ingress controllers, node exporters).
  owner_primary: Platform Engineering
  owner_supporting: Network Engineering; Security Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0205-004
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.5'
  control_seq: '004'
  control_title: eBPF-based kernel-level network policy enforcement
  control_statement: Clusters using eBPF-based networking (Cilium, Calico eBPF mode) must configure kernel-level network policy enforcement, validate kernel version compatibility for required eBPF features, and verify that network policies are correctly translated to eBPF programs in the kernel data path.
  objective: Leverage eBPF's kernel-level network policy enforcement capabilities to provide high-performance, granular network segmentation that operates directly in the kernel data path.
  rationale: eBPF-based networking provides superior performance and more granular network policy enforcement than iptables-based approaches by operating directly in the kernel data path. Kernel-level enforcement eliminates iptables rule scaling limitations and enables identity-aware, L7-capable network policies. However, eBPF features depend on specific kernel versions, and misconfiguration can silently degrade to permissive behavior. Explicit validation of policy enforcement ensures that declared network segmentation is actually applied at the kernel level.
  scope: Applies to all clusters using eBPF-based CNI plugins or kube-proxy replacements. Clusters using traditional iptables-based networking are exempt. Managed Kubernetes services offering eBPF-based networking must document provider-managed configuration. Kernel version requirements for eBPF features must be documented and validated.
  primary_enforcement_point: CNI plugin configuration and deployment with validated kernel version compatibility.
  implementation_surface: CNI plugin eBPF mode configuration (Cilium, Calico), kernel version requirements documentation, network policy enforcement verification tests, eBPF datapath validation tools, and kube-proxy replacement configuration.
  owner_primary: Platform Engineering
  owner_supporting: Network Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
  date_created: '2026-02-28'
  date_modified: '2026-03-17'
- control_id: SAF-K8S-0205-005
  domain_code: D02
  domain_name: Node, Runtime, and OS Security
  knowledge_area: '2.5'
  control_seq: '005'
  control_title: eBPF program integrity verification and loading monitoring
  control_statement: Nodes running eBPF-based networking must validate that eBPF programs are loaded from trusted and integrity-verified sources, restrict eBPF capabilities to authorized components, and monitor eBPF program loading events to detect unauthorized kernel-level network manipulation.
  objective: Ensure that eBPF programs executing with kernel-level privileges are trustworthy and that unauthorized eBPF program loading is detected, preventing attackers from using rogue eBPF programs to bypass network policies or exfiltrate data.
  rationale: eBPF programs execute with kernel-level privileges, meaning a compromised or malicious eBPF program can intercept, modify, or redirect any network traffic on the node without application-layer visibility. Without integrity verification and loading monitoring, an attacker who gains sufficient node access could load rogue eBPF programs to exfiltrate data, bypass network policies, or create covert communication channels, all invisible to traditional network monitoring tools.
  scope: Applies to all nodes running eBPF-based CNI plugins or other eBPF networking components. eBPF capability restrictions (CAP_BPF, CAP_SYS_ADMIN) must be enforced for all non-CNI workloads. Managed Kubernetes services must document provider-managed eBPF program integrity controls.
  primary_enforcement_point: Runtime monitoring of bpf() syscalls and eBPF program loading events, combined with container image integrity verification for CNI components.
  implementation_surface: eBPF capability restriction (CAP_BPF, CAP_SYS_ADMIN denial for non-CNI workloads), eBPF program loading detection (auditd bpf syscall rules, Falco/Tetragon rules), eBPF program source integrity verification (container image digest pinning for CNI), and eBPF verification tools (bpftool prog list).
  owner_primary: Security Engineering
  owner_supporting: Platform Engineering; Network Engineering
  baseline_or_ai_specific: baseline
  maturity: Practitioner
  status: draft
  superseded_by_control_id: null
