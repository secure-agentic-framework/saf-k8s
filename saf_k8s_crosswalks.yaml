  framework_version: 2024/1689
  framework_requirement_id: Art-72:72(2)
  framework_requirement_title: Post-market Monitoring by Providers and Post-market Monitoring Plan for High-risk AI Systems
  framework_mapping_notes: 'The post-market monitoring system shall actively and systematically collect, document and analyse relevant data which may be provided by deployers or which may be collected through other sources on the performance of high-risk AI systems throughout their lifetime, and which allow the provider to evaluate the continuous compliance of AI systems with the requirements set out in Chapter III, Section 2. Where relevant, post-market monitoring shall include an analysis of the interaction with other AI systems. This obligation shall not cover sensitive operational data of deployers which are law enforcement authorities.


    SAF-K8S platform controls support systematic data collection through audit logging (D10 KA 10.1), metrics pipelines (D10 KA 10.2), and observability infrastructure (D10 KA 10.5). Data analysis, compliance evaluation, and the full monitoring lifecycle require application-layer and organizational action.'
